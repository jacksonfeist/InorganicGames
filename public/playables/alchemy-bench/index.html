// The near-miss reads cozy, not alarming: the last free slots breathe warm amber
// and the pot leans on its ring — no reds, no klaxons.
function drawPressure(L) {
  if (W.state !== 'SOLVE') return;
  var free = freeSlots(W.cells);
  if (free.length > 1) return;
  for (var i = 0; i < free.length; i++) {
    var c = slotCenter(L, free[i]), half = L.grid.cell * 0.34;
    cx.save();
    cx.globalAlpha = 0.22 + Math.abs(Math.sin(TIME * 4.2)) * 0.3;
    cx.strokeStyle = P.brassLit; cx.lineWidth = Math.max(1.5, S(3));
    roundRect(cx, X(c.x - half), Y(c.y - half), S(half * 2), S(half * 2), S(12));
    cx.stroke();
    cx.restore();
  }
}

/* the escalating preview: each miss shows more of the canonical plan — a golden
   thread for the next fuse (or a ring on the pot), then numbered steps, then the
   whole chain with a looping ghost hand. Honest teaching, never a magnet. */
function drawPreview(L) {
  if (W.state !== 'SOLVE' || attempts === 0 || !W.plan || !W.plan.length) return;
  var frac = PREVIEW_FRAC();
  var show = Math.max(1, Math.round(frac * Math.min(4, W.plan.length)));
  for (var i = 0; i < show && i < W.plan.length; i++) {
    var act = W.plan[i], main = i === 0;
    var alpha = main ? 0.5 + Math.abs(Math.sin(TIME * 3)) * 0.35 : 0.30;
    if (act.type === 'spawn') {
      var pot = slotCenter(L, CIDX);
      cx.save();
      cx.globalAlpha = alpha;
      cx.strokeStyle = P.gold; cx.lineWidth = Math.max(1.5, S(3));
      cx.beginPath(); cx.arc(X(pot.x), Y(pot.y - L.grid.cell * 0.05), S(L.grid.cell * 0.3 + (main ? Math.sin(TIME * 3) * 3 : 0)), 0, 6.2832); cx.stroke();
      cx.restore();
      if (main) text(String(i + 1), pot.x + L.grid.cell * 0.34, pot.y - L.grid.cell * 0.34, 15, P.gold, 'rgba(11,7,4,.8)');
      else text(String(i + 1), pot.x + L.grid.cell * 0.34, pot.y - L.grid.cell * 0.34, 13, 'rgba(255,209,102,.7)');
    } else {
      var a = slotCenter(L, act.from), b = slotCenter(L, act.to);
      cx.save();
      cx.globalAlpha = alpha;
      cx.strokeStyle = P.gold; cx.lineWidth = Math.max(1.5, S(3.4)); cx.lineCap = 'round';
      cx.setLineDash([S(7), S(9)]);
      cx.lineDashOffset = -TIME * S(30);
      cx.beginPath();
      cx.moveTo(X(a.x), Y(a.y));
      cx.quadraticCurveTo(X((a.x + b.x) / 2), Y(Math.min(a.y, b.y) - L.grid.cell * 0.3), X(b.x), Y(b.y));
      cx.stroke();
      cx.setLineDash([]);
      var ang = Math.atan2(Y(b.y) - Y((a.y + b.y) / 2 - L.grid.cell * 0.15), X(b.x) - X((a.x + b.x) / 2));
      cx.translate(X(b.x), Y(b.y)); cx.rotate(ang);
      cx.fillStyle = P.gold;
      cx.beginPath(); cx.moveTo(0, 0); cx.lineTo(S(-11), S(-6)); cx.lineTo(S(-11), S(6)); cx.closePath(); cx.fill();
      cx.restore();
      text(String(i + 1), a.x + L.grid.cell * 0.3, a.y - L.grid.cell * 0.3, main ? 15 : 13,
           main ? P.gold : 'rgba(255,209,102,.7)', main ? 'rgba(11,7,4,.8)' : null);
    }
    if (frac < 0.99 && !main) break;                      // below full reveal: next step + one peek
  }
  if (frac >= 0.99 && W.plan.length) {                    // full reveal: the ghost hand loops step 1
    var act0 = W.plan[0];
    var u = (TIME * 0.7) % 1;
    var from = act0.type === 'spawn' ? slotCenter(L, CIDX) : slotCenter(L, act0.from);
    var to = act0.type === 'spawn' ? slotCenter(L, CIDX) : slotCenter(L, act0.to);
    var e = u * u * (3 - 2 * u);
    drawHand(from.x + (to.x - from.x) * e, from.y + (to.y - from.y) * e, 0.55 + Math.sin(u * Math.PI) * 0.3);
  }
}

// while a vial is held, its twins breathe — the drop is telegraphed, tactile
function drawDragAffordance(L) {
  if (!W.drag) return;
  for (var i = 0; i < NCELLS; i++) {
    if (!canMerge(W.cells, W.drag.slot, i)) continue;
    var c = slotCenter(L, i), tc = CONFIG.TIERS[W.cells[i] - 1];
    cx.save();
    cx.globalAlpha = 0.35 + Math.abs(Math.sin(TIME * 4)) * 0.35;
    cx.strokeStyle = tc.lit; cx.lineWidth = Math.max(1.5, S(3));
    cx.beginPath(); cx.arc(X(c.x), Y(c.y), S(L.grid.cell * 0.36 + Math.sin(TIME * 4) * 3), 0, 6.2832); cx.stroke();
    cx.restore();
  }
}

function drawHand(px, py, alpha) {
  var hx = X(px) + S(6), hy = Y(py) + S(30);
  cx.save();
  cx.globalAlpha = alpha;
  cx.translate(hx, hy);
  var hs = S(1.15); cx.scale(hs, hs);
  cx.fillStyle = P.paper; cx.strokeStyle = '#2A1B06'; cx.lineWidth = 2;
  cx.beginPath();
  cx.moveTo(0, -14); cx.quadraticCurveTo(-5, -16, -5, -7);
  cx.lineTo(-5, 3); cx.quadraticCurveTo(-11, 0, -14, 3);
  cx.quadraticCurveTo(-16, 7, -11, 11);
  cx.quadraticCurveTo(-3, 21, 3, 21);
  cx.quadraticCurveTo(12, 21, 13, 10);
  cx.lineTo(13, -3); cx.quadraticCurveTo(13, -7, 9, -7);
  cx.quadraticCurveTo(9, -11, 5, -11);
  cx.quadraticCurveTo(5, -16, 0, -14);
  cx.closePath(); cx.fill(); cx.stroke();
  cx.restore();
}

// the hook: a translucent hand rehearses the first fuse over the pair, then the
// cauldron gets the pulse once the pair is spent. Zero text does the teaching.
function drawHint(L) {
  if (W.state !== 'SOLVE' || W.hint <= 0) return;
  var a = W.hint;
  var pr = firstPair(W.cells);
  if (attempts === 0 && !W.touched && pr && !W.drive) {
    var A = slotCenter(L, pr.from), B = slotCenter(L, pr.to);
    var u = (TIME * 0.72) % 1, e = u * u * (3 - 2 * u);
    cx.save();                                            // the tether between the twins
    cx.globalAlpha = a * 0.5;
    cx.strokeStyle = P.brassLit; cx.lineWidth = Math.max(1.5, S(2.6));
    cx.setLineDash([S(6), S(8)]); cx.lineDashOffset = -TIME * S(26);
    cx.beginPath();
    cx.moveTo(X(A.x), Y(A.y));
    cx.quadraticCurveTo(X((A.x + B.x) / 2), Y(Math.min(A.y, B.y) - L.grid.cell * 0.26), X(B.x), Y(B.y));
    cx.stroke();
    cx.setLineDash([]);
    cx.restore();
    drawHand(A.x + (B.x - A.x) * e, A.y + (B.y - A.y) * e - Math.sin(u * Math.PI) * L.grid.cell * 0.12,
             a * (0.5 + Math.sin(u * Math.PI) * 0.4));
    text(CONFIG.COPY.hint, (A.x + B.x) / 2, A.y - L.grid.cell * 0.74, 15, P.brassLit, 'rgba(11,7,4,.8)');
  } else if (!W.touched && W.spawnsUsed < SPAWNS_NEEDED) {
    var pot = slotCenter(L, CIDX);
    drawHand(pot.x, pot.y - L.grid.cell * 0.12, a * (0.45 + Math.abs(Math.sin(TIME * 3.4)) * 0.4));
    text(CONFIG.COPY.tapHint, pot.x + L.grid.cell * 0.5, pot.y - L.grid.cell * 0.42, 14, P.brassLit, 'rgba(11,7,4,.8)');
  }
  if (W.drive) { var dp = drivePos(); if (dp) drawHand(dp.x, dp.y, 0.8); }
}

function drawParticles() {
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i], a = Math.max(0, p.life / p.max);
    cx.save();
    cx.globalAlpha = p.tw ? a * (0.4 + Math.abs(Math.sin(TIME * 8 + p.x)) * 0.6) : a;
    cx.translate(X(p.x), Y(p.y)); cx.rotate(p.rot);
    cx.fillStyle = p.c;
    var s = S(p.r * (0.4 + a * 0.6));
    if (p.tw) { cx.beginPath(); cx.arc(0, 0, s * 0.7, 0, 6.2832); cx.fill(); }
    else cx.fillRect(-s / 2, -s / 2, s, s);
    cx.restore();
  }
}
function drawConfetti() {
  for (var i = 0; i < confetti.length; i++) {
    var c = confetti[i];
    cx.save();
    cx.globalAlpha = Math.min(1, c.life);
    cx.translate(X(c.x), Y(c.y)); cx.rotate(c.rot);
    cx.fillStyle = c.c;
    cx.fillRect(-S(c.w) / 2, -S(c.h) / 2, S(c.w), S(c.h));
    cx.restore();
  }
}
function drawFloats() {
  for (var i = 0; i < floats.length; i++) {
    var f = floats[i], a = Math.min(1, f.life / f.max * 1.6);
    var pop = 1 + (1 - Math.min(1, (f.max - f.life) * 7)) * 0.5;
    cx.save();
    cx.globalAlpha = a;
    cx.translate(X(f.x), Y(f.y)); cx.scale(pop, pop);
    cx.font = '700 ' + FS(f.s) + 'px Chakra, sans-serif';
    cx.textAlign = 'center';
    cx.lineWidth = Math.max(3, S(6)); cx.strokeStyle = 'rgba(11,7,4,.9)';
    cx.strokeText(f.text, 0, 0);
    cx.fillStyle = f.c;
    cx.fillText(f.text, 0, 0);
    cx.restore();
  }
}
function drawRings() {
  for (var i = 0; i < rings.length; i++) {
    var r = rings[i];
    cx.save();
    cx.globalCompositeOperation = 'lighter';
    cx.globalAlpha = (1 - r.t) * 0.7;
    cx.strokeStyle = r.col; cx.lineWidth = Math.max(1.5, S(5 * (1 - r.t)));
    cx.beginPath(); cx.arc(X(r.x), Y(r.y), S(r.max * r.t), 0, 6.2832); cx.stroke();
    cx.restore();
  }
}
function drawRays() {
  if (!RAYS) return;
  var u = RAYS.t / 1.6, a = u < 0.15 ? u / 0.15 : 1 - (u - 0.15) / 0.85;
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  cx.translate(X(RAYS.x), Y(RAYS.y));
  cx.rotate(TIME * 0.35);
  cx.fillStyle = P.gold;
  var RR = Math.max(VW, VH) * 1.2;
  for (var i = 0; i < 12; i++) {
    cx.globalAlpha = a * (i % 2 ? 0.10 : 0.16);
    cx.rotate(Math.PI / 6);
    cx.beginPath();
    cx.moveTo(0, 0);
    cx.lineTo(RR, -RR * 0.055);
    cx.lineTo(RR, RR * 0.055);
    cx.closePath(); cx.fill();
  }
  cx.globalAlpha = a * 0.75;
  cx.rotate(-TIME * 0.35);
  cx.drawImage(tint(P.goldLit), -S(240), -S(240), S(480), S(480));
  cx.restore();
}

function draw() {
  var L = W ? W.layout : prep(layout());
  if (!BACKDROP) BACKDROP = buildBackdrop();
  if (!SPRITES) buildSprites();
  var sx = 0, sy = 0;
  if (shake > 0) { sx = (Math.random() - 0.5) * shakeMag * 2; sy = (Math.random() - 0.5) * shakeMag * 2; }

  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
  cx.fillStyle = P.bgDeep; cx.fillRect(0, 0, VW, VH);

  cx.save();
  var push = 1 + camPush * 0.06;
  cx.translate(VW / 2, VH * 0.45); cx.scale(push, push); cx.translate(-VW / 2, -VH * 0.45);
  cx.translate(sx, sy);

  cx.drawImage(BACKDROP, 0, 0, VW, VH);
  // the candle's pool of light breathes over the whole bench — motion on frame one
  var B = L.bench;
  glow(X(B.x + B.w / 2), Y(B.y + B.h * 0.45), S(B.w * 0.78), P.pool,
       0.13 + Math.sin(TIME * 6.3) * 0.018 + Math.sin(TIME * 2.1) * 0.014);

  drawPressure(L);
  drawCauldron(L);

  var dragged = null, legend = null;
  for (var i = 0; i < W.vials.length; i++) {
    var v = W.vials[i];
    if ((v.state === 'drag' && W.drag) || v.state === 'demoDrag') { dragged = v; continue; }
    if (v.state === 'legend') { legend = v; continue; }
    drawVial(v, L);
  }
  drawDragAffordance(L);
  if (dragged) drawVial(dragged, L);
  if (legend) drawVial(legend, L);

  drawRings();
  drawParticles();
  drawCandle(L);
  drawPlaqueLive(L);
  drawDialLive(L);
  drawPreview(L);
  drawHint(L);
  drawRays();
  drawConfetti();
  drawFloats();
  drawMotes(MOTES, TIME, '#FFD9A0', 0.008);
  cx.restore();

  cx.drawImage(vignette, 0, 0, VW, VH);
}

/* ══ 14. LOOP — ENGINE. Fixed 1/120 physics, render every rAF. ═══════════ */

var acc = 0, last = performance.now(), FIXED = 1 / 120;
var fpsBuf = [], fpsEl = document.getElementById('dbg-stat'), LAST_FPS = 60;

function frame(now) {
  // Pause cleanly when the ad is off-screen: no wasted battery, and no giant dt
  // spike when it comes back.
  if (document.hidden) { last = now; acc = 0; requestAnimationFrame(frame); return; }

  var dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  TIME += dt; acc += dt;
  var guard = 0;
  while (acc >= FIXED && guard++ < 8) { step(FIXED); acc -= FIXED; }
  if (W) draw();

  // a soft bloop from the pot every couple of seconds — ambience, never load-bearing
  if (W && W.state === 'SOLVE' && ((TIME % 1.7) < dt)) SFX.bubble();

  fpsBuf.push(dt);
  if (fpsBuf.length > 45) {
    var sum = fpsBuf.reduce(function (a, b) { return a + b; }, 0);
    LAST_FPS = Math.round(fpsBuf.length / sum);
    fpsEl.textContent = Math.round(SIZE_BYTES / 1024) + ' KB · 0 requests · ' + LAST_FPS + ' fps';
    fpsBuf.length = 0;
    if (started) postMeta();   // keep the gallery's fps badge live
  }
  requestAnimationFrame(frame);
}

/* ══ 15. TEST HANDLE — tools/verify-playable.mjs drives this. ═════════════
   Every key below is part of the contract. Do not rename them.

   archetype: 'merge' — a FOURTH archetype (docs/archetypes.md), added because
   none of the shipped shapes fit: the player commits ONE discrete action at a
   time, but a commit is a DRAG (vial onto its twin) or a tap (the cauldron),
   against a shared countdown. Its ARCH entry lives in tools/verify-playable.mjs:

     playState: 'SOLVE'.  commitsOnTap: false — a bare tap on the control (the
     brass pace dial) or empty wood is always harmless.
     win(page, sw, shot) asks autopilotAction() for the next intent and performs
     it with REAL pointer gestures — real drags on the real canvas, the discrete-
     drag sibling of how 'sequence' taps autopilotScreen() (GRIDLOCK).

   It still owes every other guarantee: ONE scalar control t ∈ [0,1] (tOf() —
   PACE, a live readout), a PURE sweepable sim (simRun/sweep, section 6), a
   10–50% band closed on both sides (the raised ceiling for a timed archetype
   racing a shared clock — docs/archetypes.md), an escalating preview. Never
   weaken an assertion to make a mechanic fit — add the archetype. */

window.__ad = {
  archetype: 'merge',
  get state()       { return W ? W.state : 'BOOT'; },
  get control()     { return W ? tOf(W) : 0.5; },
  get attempts()    { return attempts; },
  get hint()        { return W ? W.hint : 0; },
  get fps()         { return LAST_FPS; },
  get assist()      { return ASSIST(); },
  get previewFrac() { return PREVIEW_FRAC(); },
  maxAssist: 0.35,
  levels: 1,
  events: EVENTS,
  layoutName: function () { return VW / VH > 1.15 ? 'landscape' : 'portrait'; },
  sweep:      function (assist, n) { return sweep(assist, n); },
  // The control is the pace dial (a decorative brass gauge) — never a vial, so
  // the harness's stray-tap probe (it taps exactly here) can never advance or
  // cost anything. The needle moves as t changes.
  controlScreen: function () { if (!W) return { x: 0, y: 0 }; var p = dialNeedlePos(); return { x: X(p.x), y: Y(p.y) }; },
  setControl:    function (t) { if (W) W.paceOverride = Math.max(0, Math.min(1, t)); },
  // Where a good player's next tap should land RIGHT NOW (contract shape).
  autopilotScreen: function () {
    var a = window.__ad.autopilotAction();
    return a ? { x: a.x, y: a.y } : null;
  },
  // The merge driver's hook: the next canonical intent as a concrete gesture —
  // {type:'tap',x,y} on the cauldron, or {type:'drag',x,y,x2,y2} vial → twin.
  autopilotAction: function () {
    if (!W || W.state !== 'SOLVE') return null;
    var act = bestAction(W.cells, W.spawnsUsed);
    if (!act) return null;
    if (act.type === 'spawn') {
      if (W.clock < W.spawnReadyClk) return null;         // pot still brewing — wait a beat
      var pot = slotCenter(W.layout, CIDX);
      return { type: 'tap', x: X(pot.x), y: Y(pot.y) };
    }
    var a = slotCenter(W.layout, act.from), b = slotCenter(W.layout, act.to);
    return { type: 'drag', x: X(a.x), y: Y(a.y), x2: X(b.x), y2: Y(b.y) };
  },
  fire: function () { /* nothing to commit — each drag/tap resolves itself; see onUp */ },

  // Both FAST-FORWARD through the REAL resolve path (spawnVial/doMerge/failRun),
  // they just skip the waiting — the outcome is the one the canonical policy
  // actually produces, so they can never disagree with real play.
  forceWin: function () {
    if (!W || W.state !== 'SOLVE') return;
    var guard = 0, act;
    while (W.state === 'SOLVE' && (act = bestAction(W.cells, W.spawnsUsed)) && guard++ < 40) {
      if (act.type === 'spawn') spawnVial(act.slot, true);
      else doMerge(act.from, act.to, true);
    }
  },
  forceFail: function () {
    if (!W || W.state !== 'SOLVE') return;
    W.timeLeft = 0;
    failRun('burned');
  },
  // Dev-only: patch tuning/layout and re-derive, so the level can be BALANCED by
  // sweeping rather than by guessing. Never used at runtime.
  tune: function (tPatch, lPatch) {
    if (tPatch) for (var k in tPatch) T[k] = tPatch[k];
    var L = layout();
    if (lPatch) for (var j in lPatch) L[j] = lPatch[j];
    L._ready = false; prep(L); resize(); resetAttempt(true);
    return { layout: L, band: sweep(0, 200).band };
  }
};

/* ══ 16. GO ══════════════════════════════════════════════════════════════ */

resize();
resetAttempt(true);
requestAnimationFrame(frame);
bootWhenReady();

// Stamped in by tools/bake.mjs. Measuring it at runtime would cost a request,
// and this ad does not make any.
// Debug overlay: nothing on the glass by default. CONFIG.DEBUG or ?debug=1 shows
// the event ticker + size/fps tag for dev work; players never see either.
if (CONFIG.DEBUG || /[?&#]debug=1/.test(location.href)) {
  document.getElementById('dbg').classList.add('on');
}
fpsEl.textContent = Math.round(SIZE_BYTES / 1024) + ' KB · 0 requests · 60 fps';

})();
</script>
