/* ── GAME LOGIC: palette. Keep in sync with CONFIG.PALETTE below. ─────────── */
:root{
  --bg:#0B0704; --wood:#3A2712; --wood-lit:#5C4022; --brass:#C89B4B; --brass-lit:#F0D48A;
  --ember:#FFB45E; --ember-l:#FFDCA8; --gold:#FFD166; --paper:#FFF3DC; --ink:#2A1B06;
  --disp:'Chakra','Futura','Trebuchet MS',Impact,sans-serif;
  --mono:'TechMono',ui-monospace,Menlo,Consolas,monospace;
}
/* ── ENGINE: everything below is shared chrome. Recolour, don't restructure. ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0B0704;
  font-family:var(--disp);color:var(--paper);
  -webkit-user-select:none;user-select:none;touch-action:none;overscroll-behavior:none}

#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0B0704}
#stage.framed{background:radial-gradient(120% 120% at 50% 0%,#221408 0%,#0B0704 60%)}
#screen{position:relative;width:100%;height:100%;overflow:hidden;background:#150D07}
#stage.framed #screen{
  width:min(400px,42vh);height:min(866px,91vh);aspect-ratio:400/866;
  border-radius:44px;box-shadow:0 0 0 11px #241608,0 0 0 13px #3E2A12,
    0 34px 90px -12px rgba(0,0,0,.85),0 0 120px -30px rgba(255,180,94,.22)}
#stage.framed #notch{position:absolute;top:9px;left:50%;transform:translateX(-50%);
  width:104px;height:26px;border-radius:14px;background:#0B0704;z-index:30}
#notch{display:none}
#stage.framed #dbg{top:44px}
#stage.framed #mute{top:38px}

canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

.layer{position:absolute;inset:0;pointer-events:none;z-index:10;
  padding:calc(env(safe-area-inset-top,0px) + 10px) calc(env(safe-area-inset-right,0px) + 10px)
          calc(env(safe-area-inset-bottom,0px) + 10px) calc(env(safe-area-inset-left,0px) + 10px)}


#mute{position:absolute;top:calc(env(safe-area-inset-top,0px) + 6px);right:calc(env(safe-area-inset-right,0px) + 6px);
  width:48px;height:48px;display:flex;align-items:center;justify-content:center;
  pointer-events:auto;cursor:pointer;opacity:.55;transition:opacity .2s}
#mute:hover{opacity:1}
#mute svg{width:20px;height:20px;fill:none;stroke:var(--paper);stroke-width:1.8;stroke-linecap:round}

/* Debug overlay — the old event ticker + size tag, OFF the glass by default.
   Shown only when CONFIG.DEBUG is true or the URL contains debug=1. The player-
   facing glass carries no instrumentation chrome; the gallery renders the live
   event feed BESIDE the phone from the postMessage envelope (docs/gallery-embed.md). */
#dbg{display:none;position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);
  left:calc(env(safe-area-inset-left,0px) + 12px);font-family:var(--mono);
  font-size:9px;letter-spacing:.02em;color:#CBB8E8;opacity:.85}
#dbg.on{display:block}
#dbg .row{white-space:nowrap;overflow:hidden}
#dbg .row .nm{color:var(--teal-l)}
#dbg .row .vl{color:#9C86BE;padding-left:6px}

#rail{position:absolute;right:calc(env(safe-area-inset-right,0px) + 12px);
  bottom:calc(env(safe-area-inset-bottom,0px) + 14px);
  pointer-events:auto;cursor:pointer;opacity:0;transform:translateY(14px);
  transition:opacity .45s ease,transform .45s cubic-bezier(.2,1,.3,1)}
#rail.on{opacity:1;transform:none}
#rail .btn{min-height:48px;padding:0 18px;display:flex;align-items:center;gap:7px;border-radius:24px;
  background:linear-gradient(180deg,#FFE49A,var(--gold));color:#2A1B06;
  font-size:13px;font-weight:700;letter-spacing:.09em;
  box-shadow:0 6px 18px -4px rgba(255,209,102,.5),inset 0 -2px 0 rgba(0,0,0,.16)}

/* End card: buttons only, over a LIGHT scrim — the finished scene (the payoff)
   stays readable behind it. Never an opaque panel. The whole scrim is tappable
   and triggers the CTA; REPLAY is its own button on top. */
#end{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  gap:12px;padding:24px 24px calc(env(safe-area-inset-bottom,0px) + 34px);
  opacity:0;pointer-events:none;cursor:pointer;
  background:linear-gradient(180deg,rgba(0,0,0,0) 34%,rgba(0,0,0,.30) 70%,rgba(0,0,0,.58) 100%);
  transition:opacity .5s ease;z-index:20}
#end.on{opacity:1;pointer-events:auto}
#cta{margin-top:4px;min-height:58px;width:min(300px,88%);border:0;cursor:pointer;border-radius:29px;
  font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:.1em;color:#2A1B06;
  background:linear-gradient(180deg,#FFE9A8,var(--gold));
  box-shadow:0 10px 0 -2px #B8853A,0 18px 34px -8px rgba(255,209,102,.5);
  animation:breathe 2.1s ease-in-out infinite;transition:transform .09s ease}
#cta:active{transform:translateY(4px);box-shadow:0 6px 0 -2px #B8853A}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
#replay{min-height:48px;padding:0 22px;border:1px solid rgba(122,85,38,.85);cursor:pointer;border-radius:24px;
  background:rgba(26,17,9,.6);color:#E2C9A0;font-family:var(--disp);font-weight:700;
  font-size:12px;letter-spacing:.15em;transition:all .18s ease}
#replay:hover{background:rgba(92,64,34,.7);color:var(--paper)}

#toast{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 84px);
  transform:translate(-50%,10px);padding:9px 15px;border-radius:9px;
  background:rgba(11,7,4,.93);border:1px solid rgba(255,180,94,.42);
  font-family:var(--mono);font-size:10.5px;color:var(--ember-l);white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s cubic-bezier(.2,1.2,.4,1);z-index:25}
#toast.on{opacity:1;transform:translate(-50%,0)}
</style>

<div id="stage">
  <div id="screen">
    <canvas id="c"></canvas>
    <div id="notch"></div>

    <div class="layer">
      <div id="dbg"><div id="dbg-stat">— KB · 0 requests · 60 fps</div><div id="dbg-ticker"></div></div>
      <div id="rail"><div class="btn" id="railbtn">PLAY NOW ▸</div></div>
    </div>

    <div id="mute" title="Sound"><svg id="muteicon" viewBox="0 0 24 24"></svg></div>

    <div id="end">
      <button id="cta">PLAY NOW ▸</button>
      <button id="replay">↻ PLAY AGAIN</button>
    </div>

    <div id="toast"></div>
  </div>
</div>

<script>
(function () {
'use strict';

/* ══════════════════════════════════════════════════════════════════════════
   PLAYABLE SHELL — Inorganic Games
   ──────────────────────────────────────────────────────────────────────────
   Sections marked ENGINE are shared across every ad: do not restructure them.
   Sections marked GAME LOGIC are the ad: replace them wholesale.

   ALCHEMY BENCH is a drag-to-fuse merge game — a FOURTH archetype, 'merge'
   (see docs/archetypes.md + ARCH.merge in tools/verify-playable.mjs). Glass
   vials sit on a 3×3 candlelit workbench; the centre-bottom tile is a brass
   cauldron. TAP the cauldron to brew a base vial; DRAG a vial onto its twin to
   fuse them into the next tier. Five tiers up sits the LEGENDARY ELIXIR — brew
   it before the candle burns out.

   This is not a launcher and not a tap-in-order, but it owes the exact same
   guarantees:

     · one control, normalised to t ∈ [0,1]  — PACE: hasty(0) ↔ steady(0.5) ↔
       hesitant(1). A LIVE readout (setControl/controlScreen still work) on a
       decorative brass dial — see tOf() in section 8.
     · a pure sim you can sweep: simRun(t) → outcome    (proves winnability)
     · a win band of 10–50% of the control range        (winnable, not trivial —
       the raised timed-archetype ceiling: docs/archetypes.md)
     · a stray tap costs nothing — commitsOnTap:false; controlScreen() sits on
       the dial, never on a vial
     · escalating preview on each miss                  (nobody gets stuck)

   Read docs/playable-design.md and docs/archetypes.md before you touch this.
   ══════════════════════════════════════════════════════════════════════════ */

/* ══ 1. CONFIG — the entire reskin surface. GAME LOGIC. ═══════════════════ */

var CONFIG = {
  // The ONE constant you repoint per campaign/network. Not always a store: the
  // gallery build points at our own site.
  CTA_URL: 'https://www.inorganicgames.com',
  BRAND: 'INORGANIC GAMES',
  // One or two sentences describing the LOOK this ad is going for. tools/critique.mjs
  // reads it and grades the art against YOUR stated direction, not a fixed style.
  ART_BRIEF: 'A candlelit alchemist workbench: dark polished wood and warm brass, glass vials of glowing jewel liquid (moss, amber, amethyst, sapphire — gold is reserved for the legendary payoff and the CTA) that grow bigger and more ornate each tier, a bubbling brass cauldron tile, drifting gold dust, soft candle rim-light. Cozy-premium, tactile, handmade — never flat or clip-arty.',

  CTA_TEXT: 'PLAY NOW ▸',
  COPY: {
    hint:    'MATCH THE PAIR',
    tapHint: 'TAP',
    goal:    'BREW THE LEGENDARY ELIXIR',
    // The payoff floater is the TIER NAME — informational (what was brewed), not
    // celebration. Waived below; there is no perfect/celebration slot any more.
    tierName: 'LEGENDARY!',
    shortF:  'SPILLED! TOO HASTY',
    longF:   'THE CANDLE DIED',
    newTier: 'NEW!',
    toast:   'In a live ad, this opens the App Store.'
  },
  // LEGENDARY is the top TIER's name — informational, the canonical legitimate waiver.
  COPY_WAIVERS: { LEGENDARY: 'tier name — informational, names what was brewed' },

  // The tier tree: five vials, each visibly bigger, brighter and more ornate.
  // `f` is the vial's body radius as a fraction of a board cell. The jewel hues
  // belong to the vials ALONE — the world stays in warm wood-and-brass — and
  // GOLD is spent nowhere but the legendary payoff, the goal star and the CTA.

/* ══ 2. INSTRUMENTATION — ENGINE. Four events, three destinations. ═════════

/* ══ 3. AUDIO — ENGINE. Procedural, gesture-gated, silence-safe. ══════════
   Never construct an AudioContext before the first pointerdown, or iOS logs a
   warning and Chrome's autoplay policy leaves it suspended forever. */

var SFX = (function () {
  var ctx = null, muted = false;
  function ac() {
    if (muted) return null;
    if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; } }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(freq, endFreq, dur, type, vol, delay) {
    var c = ac(); if (!c) return;
    var t = c.currentTime + (delay || 0);
    var o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (endFreq) o.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, vol, cut, delay) {
    var c = ac(); if (!c) return;
    var t = c.currentTime + (delay || 0);
    var n = Math.floor(c.sampleRate * dur), buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 1.6);
    var src = c.createBufferSource(), g = c.createGain(), f = c.createBiquadFilter();
    src.buffer = buf; f.type = 'lowpass'; f.frequency.value = cut || 900;
    g.gain.setValueAtTime(vol, t);
    src.connect(f); f.connect(g); g.connect(c.destination); src.start(t);
  }
  return {
    unlock: function () { ac(); },
    setMuted: function (m) { muted = m; if (m && ctx) { try { ctx.close(); } catch (e) {} ctx = null; } },
    isMuted: function () { return muted; },
    pick:   function () { tone(1180, 1420, 0.045, 'triangle', 0.05); },
    put:    function () { tone(340, 250, 0.06, 'triangle', 0.055); },
    bloop:  function () { tone(190, 560, 0.16, 'sine', 0.10); noise(0.10, 0.05, 900); },
    // The merge chime rises a step per tier crafted — the cadence the loop sells.
    fuse:   function (i) {
      var s = [740, 932, 1175, 1480];
      var f = s[Math.min(i, 3)];
      tone(f, f * 1.26, 0.16, 'triangle', 0.11);
      tone(f * 2, 0, 0.10, 'sine', 0.05, 0.03);
      tone(150, 90, 0.08, 'sine', 0.07);
      noise(0.06, 0.05, 5200);
    },
    tink:   function (i) { var s = [1568, 1976, 2489, 3136]; tone(s[Math.min(i, 3)], 0, 0.11, 'square', 0.06); },
    deny:   function () { tone(160, 110, 0.09, 'square', 0.07); },
    hmm:    function () { tone(115, 95, 0.35, 'sine', 0.10); },
    // Ambience only ever plays through an ALREADY-unlocked context: never constructs one.
    bubble: function () { if (!ctx || muted) return; tone(120 + Math.random() * 90, 320, 0.10, 'sine', 0.028); },
    win:    function () {
      [523, 659, 784, 1047, 1319].forEach(function (f, i) { tone(f, 0, 0.34, 'triangle', 0.12, i * 0.10); });
      tone(196, 0, 0.9, 'sine', 0.13);
      noise(0.8, 0.07, 6000, 0.25);
    },
    fail:   function () { tone(220, 70, 0.6, 'sine', 0.12); noise(0.5, 0.10, 500); }
  };
})();

/* ══ 5. LAYOUTS — GAME LOGIC. One authored staging per orientation. ═══════
   NOT one scene letterboxed twice. Portrait has height; landscape has width.
   The BOARD TOPOLOGY (3×3, cauldron at r2c1, the starting stock) is shared —
   only the PIXEL staging differs: portrait stacks plaque / bench / candle+dial
   down the height, landscape puts the bench left and fills the width slack
   with the apothecary hutch, plaque, candle and dial. */

var LAYOUTS = {
  portrait: {
    safe: { x: 0, y: 0, w: 620, h: 1100 },
    grid: { x0: 85, y0: 262, cell: 150 },
    bench: { x: 30, y: 232, w: 560, h: 514, face: 56 },
    plaque: { x: 310, y: 128, w: 500, h: 92 },
    candle: { x: 118, base: 1042, h: 168, w: 46 },
    dial: { x: 492, y: 966, r: 64 },
    shelfY: 44,
    floorY: 806
  },
  landscape: {
    safe: { x: 0, y: 0, w: 1180, h: 560 },
    grid: { x0: 88, y0: 98, cell: 118 },
    bench: { x: 42, y: 74, w: 446, h: 406, face: 44 },
    plaque: { x: 812, y: 78, w: 470, h: 80 },
    candle: { x: 1108, base: 486, h: 148, w: 40 },
    dial: { x: 918, y: 434, r: 58 },
    hutch: { x: 540, y: 140, w: 500, h: 300 },
    floorY: 534
  }
};

function slotCenter(L, i) {
  var g = L.grid, r = Math.floor(i / CONFIG.GRID.cols), c = i % CONFIG.GRID.cols;
  return { x: g.x0 + (c + 0.5) * g.cell, y: g.y0 + (r + 0.5) * g.cell };
}
function tierR(L, tier) { return L.grid.cell * CONFIG.TIERS[tier - 1].f; }

function prep(L) {
  if (L._ready) return L;
  L._ready = true;
  return L;
}

/* ══ 6. SIM — GAME LOGIC, but the SHAPE is mandatory. ═════════════════════

   The board is a plain array of 9 tiers (0 = empty); the cauldron cell CIDX is
   never occupied. Merge-2: two equal tiers fuse into tier+1 at the drop cell.
   Units are conserved (a tier holds 2^(tier−1) units), the target needs 16, the
   start holds 12 — so the cauldron owes exactly SPAWNS_NEEDED brews, and by
   pigeonhole (8 slots, 4 sub-legendary tiers) a full board ALWAYS has a pair:
   the game cannot deadlock, ever.

   bestAction() is the ONE canonical policy — the sim bot, the idle demo, the
   escalating preview and the harness's autopilotAction() all read this exact
   function, and live drops share canMerge() with it. Never a second copy.

   simRun(t) must be PURE and DETERMINISTIC: same t in, same result out. t is
   not a physical quantity — it is the player's deviation from optimal PACE
   (docs/archetypes.md's generalisation):
     t < 0.5  → hasty:    the bot burns fumbles (mismatch drops, full-pot taps)
     t = 0.5  → steady:   every action correct, promptly
     t > 0.5  → hesitant: the bot dawdles between correct actions
   Both sides burn the SAME budget — the candle — so both fail for real,
   distinguishable reasons: 'spilled' (fumble pile-up) vs 'burned' (the wax
   just ran out). Never read Math.random() in here. */

var NCELLS = CONFIG.GRID.cols * CONFIG.GRID.rows;
var CIDX = CONFIG.GRID.cauldron.r * CONFIG.GRID.cols + CONFIG.GRID.cauldron.c;

function startCells() {
  var cells = [], i;
  for (i = 0; i < NCELLS; i++) cells.push(0);
  for (i = 0; i < CONFIG.START.length; i++) {
    var s = CONFIG.START[i];
    cells[s.r * CONFIG.GRID.cols + s.c] = s.tier;
  }
  return cells;
}
function unitsOf(cells) {
  var u = 0;
  for (var i = 0; i < cells.length; i++) if (i !== CIDX && cells[i]) u += Math.pow(2, cells[i] - 1);
  return u;
}
// How many base vials the cauldron owes: derived, so a reskin that edits the
// starting stock or the target tier rebalances itself.
var SPAWNS_NEEDED = Math.max(0, Math.pow(2, CONFIG.TARGET_TIER - 1) - unitsOf(startCells()));

function freeSlots(cells) {
  var out = [];
  for (var i = 0; i < cells.length; i++) if (i !== CIDX && !cells[i]) out.push(i);
  return out;
}
// THE shared merge rule. Live drops and the sim bot both call this — never a
// second copy — so what the preview promises is what the drop does.
function canMerge(cells, a, b) {
  return a !== b && a !== CIDX && b !== CIDX &&
         cells[a] > 0 && cells[a] === cells[b] && cells[a] < CONFIG.TARGET_TIER;
}
function firstPair(cells) {
  var bestT = 99, pa = -1, pb = -1;
  for (var a = 0; a < cells.length; a++)
    for (var b = a + 1; b < cells.length; b++)
      if (canMerge(cells, a, b) && cells[a] < bestT) { bestT = cells[a]; pa = a; pb = b; }
  return pa < 0 ? null : { from: pb, to: pa, tier: bestT };
}
// The canonical "correct next move": brew the stock first (this is what crowds
// the bench into the near-miss), then fuse pairs lowest-tier-first. Any valid
// order wins — this single deterministic rule is simply always SAFE, so the
// demo, the preview badges, the autopilot and the sim bot all agree.
function bestAction(cells, spawnsUsed) {
  var free = freeSlots(cells);
  if (spawnsUsed < SPAWNS_NEEDED && free.length) return { type: 'spawn', slot: free[0] };
  var pr = firstPair(cells);
  if (pr) return { type: 'merge', from: pr.from, to: pr.to, tier: pr.tier };
  if (free.length) return { type: 'spawn', slot: free[0] };
  return null;
}
// The full canonical plan from a board snapshot — the escalating preview reads
// this. Never mutates its input.
function planFrom(cells, spawnsUsed) {
  var c = cells.slice(), used = spawnsUsed, plan = [], guard = 0;
  while (guard++ < 40) {
    var act = bestAction(c, used);
    if (!act) break;
    plan.push(act);
    if (act.type === 'spawn') { c[act.slot] = 1; used++; }
    else { c[act.to] = act.tier + 1; c[act.from] = 0; if (act.tier + 1 >= CONFIG.TARGET_TIER) break; }
  }
  return plan;
}

// The bot: holds a CONSTANT pace for the whole attempt, exactly like CLOUD
// RUNNER holds a constant steering error. It always performs the real canonical
// action — the only thing t changes is how much candle it fumbles away first
// (hasty) and how long it dawdles before each action that counts (hesitant).
function simRun(t, assist) {
  var cells = startCells(), spawnsUsed = 0;
  var budget = T.candleMs * (1 + (assist || 0));
  var hasty = Math.max(0, (0.5 - t) / 0.5);
  var slow  = Math.max(0, (t - 0.5) / 0.5);
  var wastePerAct = T.maxWaste * hasty;
  var extraDelay = T.maxExtraDelayMs * slow;
  var elapsed = 0, wasted = 0, lastSpawnEnd = -1e9, made = 0, guard = 0;

  while (guard++ < 60) {
    var act = bestAction(cells, spawnsUsed);
    if (!act) break;
    elapsed += wastePerAct * T.wasteCostMs + T.reactMs + extraDelay;
    wasted += wastePerAct;
    if (act.type === 'spawn') {
      if (elapsed < lastSpawnEnd + T.cooldownMs) elapsed = lastSpawnEnd + T.cooldownMs;
      lastSpawnEnd = elapsed;
      cells[act.slot] = 1; spawnsUsed++;
      elapsed += T.spawnAnimMs;
    } else {
      cells[act.to] = act.tier + 1; cells[act.from] = 0;
      made = Math.max(made, act.tier + 1);
      elapsed += T.mergeAnimMs;
    }
    if (made >= CONFIG.TARGET_TIER) break;
  }
  var won = made >= CONFIG.TARGET_TIER && elapsed <= budget;
  var perfect = won && wasted < 0.5 && elapsed <= budget * T.perfectFrac;
  return { out: won ? 'win' : (t < 0.5 ? 'spilled' : 'burned'),
           elapsed: Math.round(elapsed), wasted: +wasted.toFixed(2), perfect: perfect };
}

// Sample the whole control range. The harness uses this to PROVE the level is
// winnable but not trivial.
function sweep(assist, n) {
  n = n || 200;
  var res = [], win = [];
  for (var i = 0; i < n; i++) {
    var t = i / (n - 1);
    var r = simRun(t, assist || 0);
    res.push({ t: t, out: r.out, elapsed: r.elapsed, wasted: r.wasted, perfect: r.perfect });
    if (r.out === 'win') win.push(t);
  }
  var band = win.length ? { lo: win[0], hi: win[win.length - 1], width: win[win.length - 1] - win[0] } : null;
  return {
    band: band,
    idealApex: null,   // n/a for this archetype; kept for contract shape
    perfect: res.filter(function (r) { return r.out === 'win' && r.perfect; }).map(function (r) { return r.t; }),
    samples: res
  };
}

/* ══ 7. RENDERER — ENGINE. HiDPI backing store + contain-fit camera. ══════
   Canvas 2D has no automatic DPR handling: size the BACKING STORE in physical
   pixels, the CSS box in layout pixels, then scale the context. Re-apply on
   every resize. Cap DPR at 2 — 3× costs ~2× the fill for no visible gain. */

var cv = document.getElementById('c'), cx = cv.getContext('2d', { alpha: false });
var VW = 0, VH = 0, DPR = 1;
var cam = { s: 1, ox: 0, oy: 0 };
var vignette = null, grain = null;
var BACKDROP = null, SPRITES = null;   // prerendered scene + vial art; rebuilt on resize

function layout() { return LAYOUTS[VW / VH > 1.15 ? 'landscape' : 'portrait']; }

function resize() {
  var stage = document.getElementById('stage');
  var frame = CONFIG.SHOW_PHONE_FRAME === true ||
             (CONFIG.SHOW_PHONE_FRAME === 'auto' && window.innerWidth > 760 && window.innerHeight > 560);
  stage.classList.toggle('framed', frame);
  document.getElementById('notch').style.display = frame ? 'block' : 'none';

  var box = document.getElementById('screen').getBoundingClientRect();
  VW = Math.max(1, Math.round(box.width));
  VH = Math.max(1, Math.round(box.height));
  DPR = Math.min(window.devicePixelRatio || 1, 2);

  cv.width  = Math.round(VW * DPR);
  cv.height = Math.round(VH * DPR);
  cv.style.width = VW + 'px';
  cv.style.height = VH + 'px';
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);

  var L = prep(layout());
  cam.s = Math.min(VW / L.safe.w, VH / L.safe.h);     // contain: nothing critical crops
  cam.ox = (VW - L.safe.w * cam.s) / 2 - L.safe.x * cam.s;
  cam.oy = (VH - L.safe.h * cam.s) / 2 - L.safe.y * cam.s;

  if (!grain) grain = makeGrain();
  vignette = makeVignette();
  BACKDROP = null; SPRITES = null;                    // rebuilt lazily at the new scale
  if (W && W.layout !== L) resetAttempt(true);        // orientation flip → silent re-stage
}
window.addEventListener('resize', function () { setTimeout(resize, 0); });
window.addEventListener('orientationchange', function () { setTimeout(resize, 60); });

function X(x) { return x * cam.s + cam.ox; }
function Y(y) { return y * cam.s + cam.oy; }
function S(v) { return v * cam.s; }

// ALWAYS size canvas text with this, never with a raw world number.
// Positions go through X()/Y()/S(); a font size set straight from world units does
// NOT, so the text renders oversized for the world it sits in — and, because cam.s

function makeVignette() {

  // sides of a landscape frame into shadow and the bench with them

/* ══ 8. STATE + DIFFICULTY — ENGINE contract, GAME LOGIC fields. ══════════ */

var W = null;
var attempts = 0, firstTapAt = 0, wonAt = 0, gemGot = false;
var shake = 0, shakeMag = 0, hitstop = 0, timeScale = 1, camPush = 0;
var parts = [], floats = [], confetti = [], rings = [];
var RAYS = null;   // the legendary burst — set once, by THE moment

// Nobody watches an ad twice to "get good", so misses have to TEACH. Do that by
// revealing more of the solution each time — never by cheating. The CANDLE tops
// up only a hair (≤35%): enough to forgive a near-miss run, never enough to look
// like the wax waited for you. No vial is ever moved for the player.
function ASSIST() { return Math.min(attempts * T.assistPerFail, 0.35); }
function PREVIEW_FRAC() { return Math.min(1, 0.45 + attempts * 0.16); }

// GAME LOGIC: the LIVE pace readout — the control. 0.5 = steady; it spikes
// toward 0 on a fumble (hasty) and drifts toward 1 the longer nothing happens
// (hesitant). The same scalar the sim bot holds CONSTANT — see simRun().
function tOf(w) {
  if (w.paceOverride != null) return w.paceOverride;
  var since = performance.now() - w.lastEventAt;
  var hesitant = Math.max(0, Math.min(1, since / T.hesitantWindowMs));
  var hasty = Math.max(0, Math.min(1, w.hastyBurst));
  return Math.max(0, Math.min(1, 0.5 - hasty * 0.5 + hesitant * 0.5));
}

function makeVials(cells) {
  var out = [];
  for (var i = 0; i < cells.length; i++) if (cells[i]) out.push({
    slot: i, tier: cells[i], ph: i * 1.73,
    dx: 0, dy: 0, scale: 1, pop: 1, state: 'idle', t: 0, from: null

  return out;
}
function vialAt(slot) {
  for (var i = 0; i < W.vials.length; i++) if (W.vials[i].slot === slot) return W.vials[i];
  return null;
}

function resetAttempt(hard) {
  var L = prep(layout());
  var total = T.candleMs * (1 + ASSIST());
  W = {
    layout: L,
    state: 'SOLVE',                 // SOLVE → RESOLVE → SOLVE (a fail retries) | END (the win)
    cells: startCells(),
    vials: null,
    spawnsUsed: 0, spawnReadyClk: 0, mergesDone: 0, maxTierMade: 0,
    clock: 0, autoBrewClk: 0,
    timeTotal: total, timeLeft: total,
    lastEventAt: performance.now(), hastyBurst: 0, paceOverride: null,
    wastedThisAttempt: 0, startedAt: performance.now(),
    nearMissed: false,
    out: null, resolveT: 0,
    hint: 1, touched: false, idle: 0,
    demo: false, demoT: 0, drive: null,
    hookDone: attempts > 0,         // the ghost-hand first fuse belongs to attempt 1 only
    drag: null, plan: null,
    litFlash: [0, 0, 0, 0]
  };
  W.vials = makeVials(W.cells);
  W.plan = planFrom(W.cells, 0);
  parts.length = 0; floats.length = 0; rings.length = 0;
  if (hard) { confetti.length = 0; timeScale = 1; camPush = 0; RAYS = null; }
}

/* ══ 9. INPUT — GAME LOGIC. One thumb: press a vial to lift it, drag, release
   on its twin to fuse (drop on empty moves it; a wrong drop eases home and
   costs candle). A bare TAP on the cauldron brews a base vial. One active
   drag at a time; extra touches are ignored. */

var pointer = { id: null, downOnPot: false, moved: 0, sx: 0, sy: 0 };

function toWorld(ev) {
  var b = cv.getBoundingClientRect();
  return { x: (ev.clientX - b.left - cam.ox) / cam.s, y: (ev.clientY - b.top - cam.oy) / cam.s };
}
// Which board cell (if any) sits under a world point. rad widens a little for a
// DROP (forgive a near-miss release) — a static ≤35%-style catch, never a magnet.
function slotAtPoint(L, p, wide) {
  var rad = L.grid.cell * (wide ? 0.62 : 0.48);
  var best = -1, bd = 1e9;
  for (var i = 0; i < NCELLS; i++) {
    var c = slotCenter(L, i);
    var d = Math.max(Math.abs(p.x - c.x), Math.abs(p.y - c.y));
    if (d < rad && d < bd) { bd = d; best = i; }
  }

}
function dialNeedlePos() {
  var L = W.layout, g = L.dial, t = tOf(W);
  var a = Math.PI + t * Math.PI;   // t=0 → left (hasty) … t=1 → right (hesitant), through UP
  return { x: g.x + Math.cos(a) * g.r * 0.64, y: g.y + Math.sin(a) * g.r * 0.64 };
}

function onDown(ev) {
  ev.preventDefault();
  SFX.unlock();
  if (!firstTapAt && started) {
    firstTapAt = performance.now();
    emit('first_interaction', { ms_to_first_tap: Math.round(firstTapAt - t0) });
    setTimeout(function () { document.getElementById('rail').classList.add('on'); }, 1100);
  }
  if (!W || W.state !== 'SOLVE') return;
  if (pointer.id != null) return;                         // one active drag — ignore extra touches
  pointer.id = ev.pointerId != null ? ev.pointerId : -1;
  pointer.moved = 0; pointer.sx = ev.clientX; pointer.sy = ev.clientY;
  pointer.downOnPot = false;
  W.touched = true; W.idle = 0; W.demo = false; W.drive = null;

  var L = W.layout, wp = toWorld(ev);
  var slot = slotAtPoint(L, wp, false);
  if (slot === CIDX) { pointer.downOnPot = true; return; }  // brew on RELEASE (a tap)
  if (slot >= 0 && W.cells[slot] && !W.drag) {
    var v = vialAt(slot);
    if (v && v.state === 'idle') {
      W.drag = { slot: slot, tier: W.cells[slot], px: wp.x, py: wp.y, home: slotCenter(L, slot) };
      v.state = 'drag';
      SFX.pick();
    }
  }
}
function onMove(ev) {
  if (pointer.id == null || (ev.pointerId != null && ev.pointerId !== pointer.id)) return;
  if (!W || W.state !== 'SOLVE') return;
  ev.preventDefault();
  pointer.moved = Math.max(pointer.moved, Math.hypot(ev.clientX - pointer.sx, ev.clientY - pointer.sy));
  if (W.drag) { var wp = toWorld(ev); W.drag.px = wp.x; W.drag.py = wp.y; }
}
function onUp(ev) {
  if (pointer.id == null || (ev.pointerId != null && ev.pointerId !== pointer.id)) return;
  pointer.id = null;
  if (!W || W.state !== 'SOLVE') { if (W) W.drag = null; return; }

  if (pointer.downOnPot) {                                 // a TAP (≤8px) brews; a drag off the pot is nothing
    if (pointer.moved <= 8) tapCauldron();
    pointer.downOnPot = false;
    return;
  }
  if (!W.drag) return;
  var d = W.drag; W.drag = null;
  var v = vialAt(d.slot);
  if (!v) return;
  var L = W.layout;
  var target = slotAtPoint(L, { x: d.px, y: d.py }, true);

  if (pointer.moved <= 8 || target === d.slot || target < 0 || target === CIDX) {
    settleHome(v);                                         // set it back down — always free
    if (pointer.moved > 8) SFX.put();
    return;
  }
  if (!W.cells[target]) {                                  // empty slot → the vial moves
    W.cells[target] = W.cells[d.slot]; W.cells[d.slot] = 0;
    v.slot = target; settleHome(v);
    W.plan = planFrom(W.cells, W.spawnsUsed);
    SFX.put();
    return;
  }
  if (canMerge(W.cells, d.slot, target)) { doMerge(d.slot, target); return; }

}
cv.addEventListener('pointerdown', onDown, { passive: false });
window.addEventListener('pointermove', onMove, { passive: false });
window.addEventListener('pointerup', onUp);
window.addEventListener('pointercancel', onUp);

function settleHome(v) {
  var L = W.layout, c = slotCenter(L, v.slot);
  var cur = vialPos(v);
  v.state = 'settle'; v.t = 0;
  v.dx = cur.x - c.x; v.dy = cur.y - c.y;
}
function vialPos(v) {
  var L = W.layout, c = slotCenter(L, v.slot);
  if (v.state === 'drag' && W.drag && W.drag.slot === v.slot)
    return { x: W.drag.px, y: W.drag.py - L.grid.cell * 0.18 };   // lifted above the thumb
  if (v.state === 'fly' && v.from) {
    var u = Math.min(1, v.t), e = 1 - Math.pow(1 - u, 2.2);
    return { x: v.from.x + (c.x - v.from.x) * e,
             y: v.from.y + (c.y - v.from.y) * e - Math.sin(u * Math.PI) * L.grid.cell * 0.85 };
  }
  if (v.state === 'settle') {
    var k = Math.max(0, 1 - v.t * 6);
    return { x: c.x + v.dx * k, y: c.y + v.dy * k };
  }
  if (v.state === 'legend' && v.dest) {
    var lu = Math.min(1, v.t), le = lu * lu * (3 - 2 * lu);
    return { x: v.from.x + (v.dest.x - v.from.x) * le,
             y: v.from.y + (v.dest.y - v.from.y) * le };
  }
  return { x: c.x, y: c.y };

// GAME LOGIC: the consequences. The shared canMerge()/bestAction() (section 6)
// already decided what is legal — these carry it out with the juice attached.
function tapCauldron() {
  var L = W.layout, pot = slotCenter(L, CIDX);
  var free = freeSlots(W.cells);
  if (!free.length) {                                      // full bench — a real fumble
    W.wastedThisAttempt++;
    W.timeLeft = Math.max(0, W.timeLeft - T.wasteCostMs);
    W.lastEventAt = performance.now(); W.hastyBurst = 1;
    kick(3, 0.1); SFX.deny(); buzz(22);
    burst(pot.x, pot.y - L.grid.cell * 0.2, '#8A8578', 6, 120, 0.5, 3);
    emit('fumble', { kind: 'pot_full' });
    if (W.timeLeft <= 0) failRun('spilled');
    return;
  }
  if (W.clock < W.spawnReadyClk) { W.potJiggle = 1; return; }   // still brewing — free, just a wiggle
  spawnVial(free[0], false);
}
function spawnVial(slot, instant) {
  var L = W.layout, pot = slotCenter(L, CIDX);
  W.cells[slot] = 1;
  W.spawnsUsed++;
  W.spawnReadyClk = W.clock + T.cooldownMs / 1000;
  W.lastEventAt = performance.now(); W.hastyBurst = Math.max(0, W.hastyBurst - 0.4);
  var v = { slot: slot, tier: 1, ph: slot * 1.73, dx: 0, dy: 0, scale: 1, pop: 1,
            state: instant ? 'idle' : 'fly', t: 0, from: { x: pot.x, y: pot.y - L.grid.cell * 0.18 } };
  W.vials.push(v);
  W.plan = planFrom(W.cells, W.spawnsUsed);
  W.potPulse = 1;
  SFX.bloop(); buzz(10);
  burst(pot.x, pot.y - L.grid.cell * 0.25, CONFIG.TIERS[0].lit, 5, 140, 0.4, 3);
  emit('generate', { tier: 1, free: freeSlots(W.cells).length });
  var freeN = freeSlots(W.cells).length;

    W.nearMissed = true;
    SFX.hmm(); buzz(22);
    emit('near_miss', { free: freeN });
  }
}
function doMerge(from, to, instant) {
  var L = W.layout, tier = W.cells[from], newTier = tier + 1;
  var c = slotCenter(L, to);

  W.mergesDone++;
  W.lastEventAt = performance.now(); W.hastyBurst = Math.max(0, W.hastyBurst - 0.4);

  // visuals: both vials vanish, the result pops at the drop cell
  for (var i = W.vials.length - 1; i >= 0; i--)
    if (W.vials[i].slot === from || W.vials[i].slot === to) W.vials.splice(i, 1);
  W.vials.push({ slot: to, tier: newTier, ph: to * 1.73, dx: 0, dy: 0, scale: 1,
                 pop: instant ? 1 : 0, state: 'idle', t: 0, from: null });
  W.plan = planFrom(W.cells, W.spawnsUsed);

  var tc = CONFIG.TIERS[newTier - 1];
  kick(2 + newTier * 0.6, 0.09); SFX.fuse(tier - 1); buzz(14);
  burst(c.x, c.y, tc.lit, 8 + newTier * 3, 190, 0.55, 3.5);
  rings.push({ x: c.x, y: c.y, t: 0, col: tc.glow, max: L.grid.cell * (0.9 + newTier * 0.12) });

    W.maxTierMade = newTier;
    W.litFlash[newTier - 2] = 1;
    SFX.tink(newTier - 2);
    if (newTier < CONFIG.TARGET_TIER)   // the legendary's name is the win float's job
      float(c.x, c.y - L.grid.cell * 0.62, CONFIG.COPY.newTier + ' ' + tc.name, tc.lit, 21);
    emit('tier_reached', { tier: newTier, ms: Math.round(performance.now() - t0) });

    float(c.x, c.y - L.grid.cell * 0.58, '+ ' + tc.name, tc.lit, 17);

/* ══ 10. JUICE — ENGINE. Calibrate the numbers, keep the tools. ═══════════ */

function burst(x, y, color, n, spd, life, size) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2, s = spd * (0.35 + Math.random() * 0.65);
    parts.push({ x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - spd * 0.2,
      r: (size || 4) * (0.5 + Math.random()), life: life || 0.7, max: life || 0.7,
      c: color, g: 900 + Math.random() * 700, rot: Math.random() * 6, spin: (Math.random() - 0.5) * 14 });
  }
}
// A drifting spark that twinkles instead of falling — the light-shower half of
// the legendary payoff, and the sparkle on a high-tier fuse.
function shimmer(x, y, color, n, spread) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2, s = (spread || 120) * (0.2 + Math.random() * 0.8);
    parts.push({ x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s * 0.6 - 30,
      r: 2 + Math.random() * 2.6, life: 0.9 + Math.random() * 0.5, max: 1.2,
      c: color, g: 60, rot: 0, spin: 0, tw: 1 });
  }
}
function float(x, y, text, color, size) {
  floats.push({ x: x, y: y, text: text, c: color, s: size || 26, life: 0.9, max: 0.9 });
}
function kick(mag, dur) { shakeMag = Math.max(shakeMag, mag); shake = Math.max(shake, dur); }
function stop(ms) { hitstop = Math.max(hitstop, ms / 1000); }
function popConfetti(x, y) {
  var cols = [P.gold, P.goldLit, '#FFB45E', P.paper, '#FFE9A8'];
  for (var i = 0; i < 80; i++) confetti.push({
    x: x + (Math.random() - 0.5) * 80, y: y - 10,
    vx: (Math.random() - 0.5) * 480, vy: -300 - Math.random() * 480,
    w: 5 + Math.random() * 7, h: 3 + Math.random() * 5,
    rot: Math.random() * 6, spin: (Math.random() - 0.5) * 18, life: 2.6,
    c: cols[i % cols.length]

}

/* ══ 11. STEP — GAME LOGIC. ═══════════════════════════════════════════════ */

function step(dt) {
  if (!W) return;
  var L = W.layout;

  if (hitstop > 0) { hitstop -= dt; return; }
  dt *= timeScale;

  if (shake > 0) { shake -= dt; if (shake <= 0) shakeMag = 0; }
  camPush += (0 - camPush) * Math.min(1, dt * 5);
  timeScale += (1 - timeScale) * Math.min(1, dt * (timeScale < 1 ? 2.4 : 8));
  if (timeScale > 0.995) timeScale = 1;

  // vial anims tick whatever the state — settles and pops must finish
  for (var i = 0; i < W.vials.length; i++) {
    var v = W.vials[i];
    if (v.state === 'fly') { v.t += dt / 0.30; if (v.t >= 1) { v.state = 'idle'; v.t = 0; } }
    else if (v.state === 'settle') { v.t += dt; if (v.t > 0.24) { v.state = 'idle'; v.t = 0; } }
    else if (v.state === 'legend') { v.t = Math.min(1, v.t + dt / 0.9); }
    if (v.pop < 1) v.pop = Math.min(1, v.pop + dt / 0.34);
  }
  if (W.potPulse) W.potPulse = Math.max(0, W.potPulse - dt * 3);
  if (W.potJiggle) W.potJiggle = Math.max(0, W.potJiggle - dt * 4);

  if (W.state === 'SOLVE' && started) {
    W.clock += dt;
    // TIMER LAW: the candle's consequential burn starts at the first pointerdown.
    // Pre-touch it flickers and threatens but cannot conclude — an idle viewer
    // watches the ghost hand play; they can never be failed.
    if (W.touched) W.timeLeft -= dt * 1000;
    W.hastyBurst = Math.max(0, W.hastyBurst - dt / T.hastyDecayS);
    W.hint = Math.max(0, W.hint - (W.touched ? dt * 1.1 : 0));

    // The hook: if they only watch, the ghost hand performs the first fuse at
    // ~2s — the whole mechanic taught with zero text, before the first decision
    // point. Keep demoing on idle after that. Never let the ad stall.
    W.idle += dt;
    if (!W.touched) {
      if (!W.hookDone && W.clock >= T.hookDemoMs / 1000 && !W.drive) {
        var pr = firstPair(W.cells);
        if (pr) driveDemo({ type: 'merge', from: pr.from, to: pr.to, tier: pr.tier });
        W.hookDone = true;
      }
      if (W.idle > T.idleAutofireMs / 1000) W.demo = true;
    }
    if (W.demo && !W.drive) {
      W.demoT += dt;
      if (W.demoT > T.demoStepMs / 1000) {
        W.demoT = 0;
        var act = bestAction(W.cells, W.spawnsUsed);
        if (act && (act.type !== 'spawn' || W.clock >= W.spawnReadyClk)) driveDemo(act);
      }
    }
    if (W.drive) stepDrive(dt);

    // The pot brews on its own every autoBrewMs — active play or not, touched or
    // not — so a player who never discovers the tap still keeps getting vials.
    // Silently skipped when the bench is full; never fumbles, never costs candle.
    W.autoBrewClk += dt;
    if (W.autoBrewClk >= T.autoBrewMs / 1000) {
      W.autoBrewClk = 0;
      var freeAuto = freeSlots(W.cells);
      if (freeAuto.length && W.clock >= W.spawnReadyClk) spawnVial(freeAuto[0], false);
    }

    if (W.timeLeft <= 0) failRun('burned');
  }

  if (W.state === 'RESOLVE') {
    W.resolveT += dt;
    if (W.out !== 'win' && W.resolveT > T.retryMs / 1000) { attempts++; resetAttempt(false); }
  }

  if (RAYS) { RAYS.t += dt; if (RAYS.t > 1.6) RAYS = null; }
  for (var j = rings.length - 1; j >= 0; j--) { rings[j].t += dt * 2.6; if (rings[j].t >= 1) rings.splice(j, 1); }
  for (var k = parts.length - 1; k >= 0; k--) {
    var p = parts[k];
    p.vy += p.g * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    p.rot += p.spin * dt; p.life -= dt;
    if (p.life <= 0) parts.splice(k, 1);
  }
  for (var m = floats.length - 1; m >= 0; m--) {
    var f = floats[m]; f.y -= 46 * dt; f.life -= dt;
    if (f.life <= 0) floats.splice(m, 1);
  }
  for (var n = confetti.length - 1; n >= 0; n--) {
    var c = confetti[n];
    c.vy += 900 * dt; c.vx *= 0.99;
    c.x += c.vx * dt; c.y += c.vy * dt; c.rot += c.spin * dt; c.life -= dt;
    if (c.life <= 0) confetti.splice(n, 1);
  }
  for (var q = 0; q < 4; q++) if (W.litFlash[q] > 0) W.litFlash[q] = Math.max(0, W.litFlash[q] - dt * 1.4);
}

// The demo hand: glides to the action, performs it for real. Same functions the
// player's thumb reaches — the demo can never disagree with the game.
function driveDemo(act) {
  var L = W.layout;
  if (act.type === 'spawn') {
    W.drive = { act: act, t: 0, dur: 0.42, from: slotCenter(L, CIDX), to: slotCenter(L, CIDX) };
  } else {
    W.drive = { act: act, t: 0, dur: 0.55, from: slotCenter(L, act.from), to: slotCenter(L, act.to) };
    var v = vialAt(act.from); if (v) v.state = 'demoDrag';
  }
}
function stepDrive(dt) {
  var d = W.drive;
  d.t += dt / d.dur;
  if (d.t < 1) return;
  W.drive = null;
  if (d.act.type === 'spawn') {
    var free = freeSlots(W.cells);
    if (free.length && W.clock >= W.spawnReadyClk) spawnVial(free[0], false);
  } else if (canMerge(W.cells, d.act.from, d.act.to)) {
    doMerge(d.act.from, d.act.to);
  } else {
    var v = vialAt(d.act.from); if (v && v.state === 'demoDrag') v.state = 'idle';
  }
}
function drivePos() {
  var d = W.drive; if (!d) return null;
  var u = Math.min(1, d.t), e = u * u * (3 - 2 * u);
  return { x: d.from.x + (d.to.x - d.from.x) * e,
           y: d.from.y + (d.to.y - d.from.y) * e - Math.sin(u * Math.PI) * W.layout.grid.cell * 0.14 };
}

// ── THE MOMENT ── one memorable beat of delight, reserved for the LEGENDARY
// fuse alone: time dilates, the camera pushes in, a golden burst fills the
// frame, light rains, and a five-note fanfare rises. Every ad gets exactly one.
function winRun(at) {
  if (!W || W.state === 'RESOLVE' || W.state === 'END') return;
  W.state = 'RESOLVE'; W.out = 'win'; W.resolveT = 0;
  W.drag = null; W.drive = null;
  var L = W.layout;
  var perfect = W.wastedThisAttempt === 0 && (W.timeTotal - W.timeLeft) <= W.timeTotal * T.perfectFrac;
  gemGot = perfect;
  timeScale = 0.22; camPush = 1;
  kick(12, 0.35); stop(90);
  SFX.win(); buzz([40, 30, 90]);
  // the finished elixir rises to the heart of the bench, growing as it goes —
  // a celebration flourish (the game is over), never a gameplay magnet
  var mid = { x: L.grid.x0 + CONFIG.GRID.cols * L.grid.cell * 0.5,
              y: L.grid.y0 + CONFIG.GRID.rows * L.grid.cell * 0.5 };
  for (var i = 0; i < W.vials.length; i++)
    if (W.vials[i].tier >= CONFIG.TARGET_TIER) {
      var lv = W.vials[i];
      lv.state = 'legend'; lv.t = 0; lv.from = { x: at.x, y: at.y }; lv.dest = mid;
    }
  RAYS = { x: mid.x, y: mid.y, t: 0 };
  burst(at.x, at.y, P.goldLit, 30, 460, 1.1, 5);
  shimmer(mid.x, mid.y, P.gold, 46, 320);
  popConfetti(mid.x, mid.y);
  rings.push({ x: at.x, y: at.y, t: 0, col: P.gold, max: L.safe.w * 0.9 });
  float(mid.x, L.grid.y0 + L.grid.cell * 0.42,
        CONFIG.COPY.tierName, P.gold, 32);
  wonAt = performance.now();
  var ms = Math.round(wonAt - t0);
  emit('level_complete', { ms: ms, attempts: attempts + 1, bonus: perfect, control: +tOf(W).toFixed(3) });
  emit('completed', { ms: ms });   // campaign alias — alongside, never instead
  setTimeout(showEnd, 1600);
}
// reason: 'spilled' (fumbles emptied the candle) or 'burned' (the wax ran out).
function failRun(reason) {
  if (!W || W.state === 'RESOLVE' || W.state === 'END') return;
  W.state = 'RESOLVE'; W.out = reason; W.resolveT = 0;
  W.drag = null; W.drive = null;
  var L = W.layout, cd = L.candle;
  kick(5, 0.18);
  SFX.fail(); buzz(45);
  burst(cd.x, cd.base - cd.h * (W.timeLeft > 0 ? 0.2 : 0.06), '#9A917E', 12, 150, 0.8, 3);
  float(L.grid.x0 + CONFIG.GRID.cols * L.grid.cell * 0.5, L.grid.y0 + L.grid.cell * 0.42,
        reason === 'spilled' ? CONFIG.COPY.shortF : CONFIG.COPY.longF, P.barrier, 21);
}

/* ══ 12. END CARD — ENGINE. ═══════════════════════════════════════════════ */

var endEl = document.getElementById('end');
function showEnd() {
  if (!W || W.out !== 'win') return;
  W.state = 'END';
  endEl.classList.add('on');
  document.getElementById('rail').classList.remove('on');
}
// The WHOLE end card is the CTA — a buyer's conversion rate lives on this. Replay
// is the one thing on the card that isn't.
endEl.addEventListener('click', function (ev) {
  if (ev.target.closest && ev.target.closest('#replay')) return;
  openStore('endcard');
});
document.getElementById('railbtn').addEventListener('click', function () { openStore('rail'); });
document.getElementById('replay').addEventListener('click', function (ev) {
  ev.stopPropagation();
  emit('replay', {});
  endEl.classList.remove('on');
  document.getElementById('rail').classList.add('on');
  attempts = 0; gemGot = false; wonAt = 0;
  confetti.length = 0;
  resetAttempt(true);
});

var muteEl = document.getElementById('mute'), icon = document.getElementById('muteicon');

drawIcon();
muteEl.addEventListener('click', function () { SFX.setMuted(!SFX.isMuted()); drawIcon(); });

/* ══ 13. DRAW — GAME LOGIC. initMotes/drawMotes/popScale are copied in from
   templates/lib/art.js — that file is a catalog, not a runtime import. ══════ */

var TIME = 0;

function initMotes(n, seed) {
  var s = seed || 7, a = [];
  for (var i = 0; i < n; i++) {
    s = (s * 9301 + 49297) % 233280; var r1 = s / 233280;
    s = (s * 9301 + 49297) % 233280; var r2 = s / 233280;
    s = (s * 9301 + 49297) % 233280;
    a.push({ x: r1, y: r2, r: 0.6 + (s / 233280) * 2.2, ph: r1 * 6.28 });
  }
  return a;
}
function drawMotes(a, time, color, drift) {
  cx.save(); cx.fillStyle = color || '#FFFFFF';
  for (var i = 0; i < a.length; i++) {
    var m = a[i];
    var px = ((m.x + time * (drift || 0.01)) % 1) * VW;
    var py = ((m.y + time * 0.006) % 1) * VH + Math.sin(time + m.ph) * S(6);
    cx.globalAlpha = 0.07 + Math.abs(Math.sin(time * 0.8 + m.ph)) * 0.14;
    cx.beginPath(); cx.arc(px, py, S(m.r), 0, 6.2832); cx.fill();
  }
  cx.restore();
}
function popScale(t) { return t >= 1 ? 1 : 1 + Math.sin(t * 3.1416) * 0.4 * (1 - t); }
var MOTES = initMotes(26, 11);

/* ── the static scene, prerendered once per resize: background, hutch,
   bench, slots, plaque frame, candle dish, dial face. withCtx() lets every
   world-space helper (X/Y/S/text/roundRect) draw into the offscreen. ────── */
function withCtx(g, fn) { var old = cx; cx = g; fn(); cx = old; }

function buildBackdrop() {
  var o = document.createElement('canvas');
  o.width = cv.width; o.height = cv.height;
  var g = o.getContext('2d');
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  withCtx(g, function () {
    var L = prep(layout());
    // Law 10: never a flat background — a deep warm gradient, lightest behind the bench
    var bg = cx.createLinearGradient(0, 0, 0, VH);
    bg.addColorStop(0, '#1D130B');
    bg.addColorStop(0.42, P.bg);
    bg.addColorStop(1, P.bgDeep);
    cx.fillStyle = bg; cx.fillRect(0, 0, VW, VH);
    drawShelves(L);
    drawBench(L);
    drawPlaqueFrame(L);
    drawCandleDish(L);
    drawDialFace(L);
  });
  return o;
}

// dim apothecary clutter — background value, never confusable with the playfield
function drawShelves(L) {
  var bottles = [
    { w: 26, h: 52, hue: '#3A4A33' }, { w: 34, h: 40, hue: '#4A3A2A' }, { w: 22, h: 60, hue: '#43334A' },
    { w: 30, h: 46, hue: '#4A4030' }, { w: 24, h: 56, hue: '#33404A' }, { w: 36, h: 38, hue: '#4A3333' }
  ];
  function shelfRow(x0, x1, y, count, seed) {
    cx.fillStyle = P.shelf;
    cx.fillRect(X(x0), Y(y), S(x1 - x0), S(10));
    cx.fillStyle = 'rgba(0,0,0,.35)';
    cx.fillRect(X(x0), Y(y + 10), S(x1 - x0), S(4));
    var span = (x1 - x0 - 40) / count;
    for (var i = 0; i < count; i++) {
      var b = bottles[(i + seed) % bottles.length];
      var bx = x0 + 26 + i * span + (i % 2) * 8, by = y - b.h;
      cx.fillStyle = P.shelfObj;
      roundRect(cx, X(bx), Y(by), S(b.w), S(b.h), S(6)); cx.fill();
      cx.fillStyle = b.hue; cx.globalAlpha = 0.5;
      roundRect(cx, X(bx + 4), Y(by + b.h * 0.4), S(b.w - 8), S(b.h * 0.52), S(4)); cx.fill();
      cx.globalAlpha = 1;
      cx.fillStyle = P.shelfObj;
      cx.fillRect(X(bx + b.w * 0.32), Y(by - 8), S(b.w * 0.36), S(9));
    }
  }
  if (L.hutch) {         // landscape: a big hutch fills the width slack
    var H = L.hutch;
    cx.fillStyle = '#1E1309';
    roundRect(cx, X(H.x), Y(H.y), S(H.w), S(H.h), S(10)); cx.fill();
    cx.strokeStyle = '#3A2712'; cx.lineWidth = Math.max(1, S(4));
    roundRect(cx, X(H.x + 6), Y(H.y + 6), S(H.w - 12), S(H.h - 12), S(8)); cx.stroke();
    shelfRow(H.x + 24, H.x + H.w - 24, H.y + H.h * 0.44, 5, 1);
    shelfRow(H.x + 24, H.x + H.w - 24, H.y + H.h - 22, 5, 3);
  } else {               // portrait: one high shelf above the plaque
    shelfRow(24, L.safe.w - 24, L.shelfY + 58, 5, 0);
  }
}

function drawBench(L) {
  var B = L.bench;
  // top slab — lit from the candle side, planked
  var top = cx.createLinearGradient(X(B.x), Y(B.y), X(B.x), Y(B.y + B.h));
  top.addColorStop(0, P.woodLit);
  top.addColorStop(0.5, P.wood);
  top.addColorStop(1, '#3E290F');
  roundRect(cx, X(B.x), Y(B.y), S(B.w), S(B.h), S(18));
  cx.fillStyle = top; cx.fill();
  // plank seams + rim light (Law 5: authored, not a primitive)
  cx.strokeStyle = 'rgba(20,11,4,.55)'; cx.lineWidth = Math.max(1, S(2));
  var colsN = CONFIG.GRID.cols;
  for (var i = 1; i < colsN; i++) {
    var px = B.x + (B.w / colsN) * i;
    cx.beginPath(); cx.moveTo(X(px), Y(B.y + 8)); cx.lineTo(X(px), Y(B.y + B.h - 8)); cx.stroke();
  }
  cx.strokeStyle = 'rgba(240,212,138,.30)'; cx.lineWidth = Math.max(1, S(2.5));
  roundRect(cx, X(B.x + 2), Y(B.y + 2), S(B.w - 4), S(B.h - 4), S(16)); cx.stroke();
  // front face
  var face = cx.createLinearGradient(X(B.x), Y(B.y + B.h), X(B.x), Y(B.y + B.h + B.face));
  face.addColorStop(0, P.woodDeep);
  face.addColorStop(1, '#1C1106');
  cx.fillStyle = face;
  roundRect(cx, X(B.x + 4), Y(B.y + B.h - 4), S(B.w - 8), S(B.face), S(10)); cx.fill();
  // brass corner fittings
  cx.fillStyle = P.brassDark;
  [[B.x + 10, B.y + 10], [B.x + B.w - 30, B.y + 10], [B.x + 10, B.y + B.h - 30], [B.x + B.w - 30, B.y + B.h - 30]]
    .forEach(function (pt) {
      roundRect(cx, X(pt[0]), Y(pt[1]), S(20), S(20), S(5)); cx.fill();
    });
  // the 8 recessed slots + the cauldron recess
  for (var s = 0; s < NCELLS; s++) {
    var c = slotCenter(L, s), half = L.grid.cell * 0.40;
    roundRect(cx, X(c.x - half), Y(c.y - half), S(half * 2), S(half * 2), S(14));
    cx.fillStyle = P.slot; cx.fill();
    cx.strokeStyle = 'rgba(0,0,0,.5)'; cx.lineWidth = Math.max(1, S(2));
    roundRect(cx, X(c.x - half), Y(c.y - half), S(half * 2), S(half * 2), S(14)); cx.stroke();
    cx.strokeStyle = 'rgba(240,212,138,.14)'; cx.lineWidth = Math.max(1, S(2));
    cx.beginPath();
    cx.moveTo(X(c.x - half + 8), Y(c.y + half));
    cx.lineTo(X(c.x + half - 8), Y(c.y + half));
    cx.stroke();
    if (s !== CIDX) {                                 // engraved ring where a vial sits
      cx.strokeStyle = 'rgba(0,0,0,.35)'; cx.lineWidth = Math.max(1, S(1.6));
      cx.beginPath(); cx.arc(X(c.x), Y(c.y + half * 0.42), S(half * 0.52), 0, 6.2832); cx.stroke();
    }
  }
}

function drawPlaqueFrame(L) {
  var Q = L.plaque;
  roundRect(cx, X(Q.x - Q.w / 2), Y(Q.y - Q.h / 2), S(Q.w), S(Q.h), S(14));
  cx.fillStyle = '#241609'; cx.fill();
  cx.strokeStyle = P.brassDark; cx.lineWidth = Math.max(1, S(3));
  roundRect(cx, X(Q.x - Q.w / 2 + 5), Y(Q.y - Q.h / 2 + 5), S(Q.w - 10), S(Q.h - 10), S(11)); cx.stroke();
  text(CONFIG.COPY.goal, Q.x, Q.y - Q.h * 0.22, 17, '#C9A86A');
  // the milestone groove — gems light along it as tiers are crafted (drawn live)
  var gy = Q.y + Q.h * 0.18;
  cx.strokeStyle = 'rgba(0,0,0,.6)'; cx.lineWidth = Math.max(2, S(5));
  cx.beginPath(); cx.moveTo(X(Q.x - Q.w * 0.36), Y(gy)); cx.lineTo(X(Q.x + Q.w * 0.36), Y(gy)); cx.stroke();
}

function drawCandleDish(L) {
  var cd = L.candle;
  cx.fillStyle = P.brassDark;
  cx.beginPath(); cx.ellipse(X(cd.x), Y(cd.base + 6), S(cd.w * 1.15), S(12), 0, 0, 6.2832); cx.fill();
  cx.fillStyle = P.brass;
  cx.beginPath(); cx.ellipse(X(cd.x), Y(cd.base + 2), S(cd.w * 1.05), S(10), 0, 0, 6.2832); cx.fill();
  cx.fillStyle = P.brassDark;                          // the little carry loop
  cx.beginPath(); cx.arc(X(cd.x + cd.w * 1.25), Y(cd.base - 4), S(9), 0, 6.2832); cx.fill();
  cx.fillStyle = P.bgDeep;
  cx.beginPath(); cx.arc(X(cd.x + cd.w * 1.25), Y(cd.base - 4), S(4.5), 0, 6.2832); cx.fill();
}

function drawDialFace(L) {
  var D = L.dial;
  cx.fillStyle = P.brassDark;
  cx.beginPath(); cx.arc(X(D.x), Y(D.y), S(D.r), 0, 6.2832); cx.fill();
  cx.fillStyle = '#241708';
  cx.beginPath(); cx.arc(X(D.x), Y(D.y), S(D.r - 6), 0, 6.2832); cx.fill();
  cx.strokeStyle = P.brass; cx.lineWidth = Math.max(1, S(3));
  cx.beginPath(); cx.arc(X(D.x), Y(D.y), S(D.r - 2), 0, 6.2832); cx.stroke();
  for (var i = 0; i <= 8; i++) {                        // tick marks over the top half
    var a = Math.PI + (i / 8) * Math.PI;
    cx.strokeStyle = i === 4 ? P.brassLit : 'rgba(200,155,75,.5)';
    cx.lineWidth = Math.max(1, S(i === 4 ? 3 : 2));
    cx.beginPath();
    cx.moveTo(X(D.x + Math.cos(a) * (D.r - 10)), Y(D.y + Math.sin(a) * (D.r - 10)));
    cx.lineTo(X(D.x + Math.cos(a) * (D.r - 20)), Y(D.y + Math.sin(a) * (D.r - 20)));
    cx.stroke();
  }
  text('PACE', D.x, D.y + D.r * 0.42, 12, 'rgba(201,168,106,.75)');
}

/* ── vial sprites: each tier prerendered ONCE per resize at 2× screen size,
   so the per-frame cost is one drawImage + one glow. Every tier reads as a
   different SILHOUETTE, not just a different colour (Law 3, colourblind-safe):
   round phial → conical flask → twin-bulb → faceted ampoule → grand crowned. */
function buildSprites() {
  var L = prep(layout());
  SPRITES = [];
  for (var t = 1; t <= 5; t++) SPRITES.push(makeVialSprite(t, S(tierR(L, t)) * 2));
}
function makeVialSprite(tier, rpx) {
  var tc = CONFIG.TIERS[tier - 1];
  var w = Math.max(8, Math.ceil(rpx * 3.2)), h = Math.max(8, Math.ceil(rpx * 4.4));
  var o = document.createElement('canvas'); o.width = w; o.height = h;
  var g = o.getContext('2d');
  var bx = w / 2, by = h * 0.66, r = rpx;   // body centre
  o._cx = bx / w; o._cy = by / h;           // anchor for drawImage

  function bodyPath() {
    g.beginPath();
    if (tier === 1) {                                        // round phial
      g.arc(bx, by, r, 0, 6.2832);
    } else if (tier === 2) {                                 // conical flask
      g.moveTo(bx - r * 0.34, by - r * 1.15);
      g.lineTo(bx - r * 1.0, by + r * 0.72);
      g.quadraticCurveTo(bx - r * 1.05, by + r * 1.0, bx - r * 0.7, by + r * 1.0);
      g.lineTo(bx + r * 0.7, by + r * 1.0);
      g.quadraticCurveTo(bx + r * 1.05, by + r * 1.0, bx + r * 1.0, by + r * 0.72);
      g.lineTo(bx + r * 0.34, by - r * 1.15);
      g.closePath();
    } else if (tier === 3) {                                 // twin-bulb
      g.arc(bx, by - r * 0.78, r * 0.62, Math.PI * 0.999, Math.PI * 2.001);
      g.arc(bx, by + r * 0.18, r, -Math.PI * 0.38, Math.PI * 1.38);
      g.closePath();
    } else if (tier === 4) {                                 // faceted ampoule
      g.moveTo(bx, by - r * 1.28);
      g.lineTo(bx + r * 0.82, by - r * 0.42);
      g.lineTo(bx + r * 0.62, by + r * 0.92);
      g.lineTo(bx - r * 0.62, by + r * 0.92);
      g.lineTo(bx - r * 0.82, by - r * 0.42);
      g.closePath();
    } else {                                                 // the grand legendary
      g.moveTo(bx - r * 0.22, by - r * 1.5);
      g.quadraticCurveTo(bx - r * 0.3, by - r * 0.72, bx - r * 0.94, by - r * 0.3);
      g.quadraticCurveTo(bx - r * 1.18, by + r * 0.35, bx - r * 0.62, by + r * 0.88);
      g.quadraticCurveTo(bx, by + r * 1.08, bx + r * 0.62, by + r * 0.88);
      g.quadraticCurveTo(bx + r * 1.18, by + r * 0.35, bx + r * 0.94, by - r * 0.3);
      g.quadraticCurveTo(bx + r * 0.3, by - r * 0.72, bx + r * 0.22, by - r * 1.5);
      g.closePath();
    }
  }
  // glass shadow shell
  bodyPath();
  g.fillStyle = 'rgba(8,6,10,.55)'; g.fill();
  // liquid, clipped to the body — deep at the bottom, lit at the surface
  g.save();
  bodyPath(); g.clip();
  var liqTop = by - r * (tier === 5 ? 1.05 : tier === 3 ? 1.18 : 0.66);   // the twin-bulb fills its top bulb too
  var lg = g.createLinearGradient(0, liqTop, 0, by + r * 1.05);
  lg.addColorStop(0, tc.lit);
  lg.addColorStop(0.32, tc.base);
  lg.addColorStop(1, tc.deep);
  g.fillStyle = lg;
  g.fillRect(0, liqTop, w, by + r * 1.1 - liqTop);
  g.globalAlpha = 0.8; g.fillStyle = tc.lit;              // liquid surface
  g.beginPath(); g.ellipse(bx, liqTop + 1, r * 0.86, r * 0.16, 0, 0, 6.2832); g.fill();
  g.globalAlpha = 0.35; g.fillStyle = '#FFFFFF';          // inner bubbles
  var bseed = tier * 17;
  for (var i = 0; i < 3 + tier; i++) {
    bseed = (bseed * 9301 + 49297) % 233280;
    var ba = bseed / 233280;
    bseed = (bseed * 9301 + 49297) % 233280;
    g.beginPath();
    g.arc(bx + (ba - 0.5) * r * 1.2, by + (bseed / 233280 - 0.2) * r * 0.8, r * (0.04 + ba * 0.05), 0, 6.2832);
    g.fill();
  }
  g.restore();
  // glass rim + specular
  bodyPath();
  g.strokeStyle = 'rgba(10,6,2,.6)'; g.lineWidth = Math.max(1.5, r * 0.09); g.stroke();
  bodyPath();
  g.strokeStyle = 'rgba(255,255,255,.30)'; g.lineWidth = Math.max(1, r * 0.05); g.stroke();
  g.strokeStyle = 'rgba(255,255,255,.5)'; g.lineWidth = Math.max(1.5, r * 0.10);
  g.lineCap = 'round';
  g.beginPath();                                           // the tall left shine
  g.moveTo(bx - r * 0.52, by - r * 0.45);
  g.quadraticCurveTo(bx - r * 0.66, by + r * 0.1, bx - r * 0.4, by + r * 0.55);
  g.stroke();
  // neck + cork (every tier is stoppered — it's a potion, not a cup)
  var nw = r * (0.34 + tier * 0.02), nTop = by - r * (tier === 5 ? 1.5 : tier === 4 ? 1.28 : tier === 3 ? 1.38 : 1.15);
  if (tier === 1 || tier === 3) {                          // bulb tiers get a glass neck
    g.fillStyle = 'rgba(235,240,250,.14)';
    g.fillRect(bx - nw / 2, nTop - r * 0.34, nw, r * 0.42);
    g.strokeStyle = 'rgba(255,255,255,.30)'; g.lineWidth = Math.max(1, r * 0.05);
    g.strokeRect(bx - nw / 2, nTop - r * 0.34, nw, r * 0.42);
    nTop -= r * 0.30;
  }
  // brass collar from tier 2 up — ornament climbs with the tier
  if (tier >= 2) {
    g.fillStyle = P.brass;
    g.fillRect(bx - nw * 0.72, nTop - r * 0.10, nw * 1.44, r * 0.16);
    g.fillStyle = P.brassLit;
    g.fillRect(bx - nw * 0.72, nTop - r * 0.10, nw * 1.44, r * 0.05);
  }
  g.fillStyle = '#8A6238';                                  // cork
  roundRectP(g, bx - nw * 0.44, nTop - r * 0.42, nw * 0.88, r * 0.36, r * 0.08); g.fill();
  g.fillStyle = '#A87E4C';
  g.beginPath(); g.ellipse(bx, nTop - r * 0.42, nw * 0.44, r * 0.07, 0, 0, 6.2832); g.fill();
  // tier ornaments
  if (tier === 3) {                                        // brass band at the bulb junction
    g.fillStyle = P.brass;
    g.fillRect(bx - r * 0.47, by - r * 0.44, r * 0.94, r * 0.10);
    g.fillStyle = P.brassLit;
    g.fillRect(bx - r * 0.47, by - r * 0.44, r * 0.94, r * 0.035);
  }
  if (tier === 4) {                                        // facet seams + star stopper
    g.strokeStyle = 'rgba(255,255,255,.28)'; g.lineWidth = Math.max(1, r * 0.045);
    g.beginPath(); g.moveTo(bx, by - r * 1.28); g.lineTo(bx, by + r * 0.92); g.stroke();
    starP(g, bx, nTop - r * 0.62, r * 0.22, tc.lit);
  }
  if (tier === 5) {                                        // filigree curls + handles + crown star
    g.strokeStyle = P.brass; g.lineWidth = Math.max(1.5, r * 0.09);
    g.beginPath(); g.arc(bx - r * 1.06, by + r * 0.05, r * 0.3, Math.PI * 0.5, Math.PI * 1.5); g.stroke();
    g.beginPath(); g.arc(bx + r * 1.06, by + r * 0.05, r * 0.3, -Math.PI * 0.5, Math.PI * 0.5); g.stroke();
    g.strokeStyle = 'rgba(240,212,138,.6)'; g.lineWidth = Math.max(1, r * 0.05);
    g.beginPath(); g.arc(bx, by + r * 0.1, r * 0.66, Math.PI * 0.15, Math.PI * 0.85); g.stroke();
    starP(g, bx, nTop - r * 0.66, r * 0.3, P.goldLit);
  }
  return o;

  function roundRectP(gg, x, y, ww, hh, rr) {
    rr = Math.min(rr, ww / 2, hh / 2);
    gg.beginPath();
    gg.moveTo(x + rr, y);
    gg.arcTo(x + ww, y, x + ww, y + hh, rr);
    gg.arcTo(x + ww, y + hh, x, y + hh, rr);
    gg.arcTo(x, y + hh, x, y, rr);
    gg.arcTo(x, y, x + ww, y, rr);
    gg.closePath();
  }
  function starP(gg, sx, sy, sr, col) {
    gg.fillStyle = col;
    gg.beginPath();
    for (var k = 0; k < 10; k++) {
      var ang = -Math.PI / 2 + k * Math.PI / 5, rr = k % 2 ? sr * 0.45 : sr;
      gg[k ? 'lineTo' : 'moveTo'](sx + Math.cos(ang) * rr, sy + Math.sin(ang) * rr);
    }
    gg.closePath(); gg.fill();
  }
}

function drawVial(v, L) {
  var tc = CONFIG.TIERS[v.tier - 1];
  var p = vialPos(v);
  var dragging = v.state === 'drag' || v.state === 'demoDrag';
  var bob = dragging || v.state === 'fly' ? 0 : Math.sin(TIME * 1.7 + v.ph) * 3.2;
  var rot = dragging ? Math.sin(TIME * 6) * 0.05 : Math.sin(TIME * 1.3 + v.ph) * 0.035;
  var sc = popScale(v.pop) * (dragging ? 1.12 : 1);
  if (v.state === 'legend') { var lu = Math.min(1, v.t); sc *= 1 + lu * lu * (3 - 2 * lu) * 0.8; }
  if (v.shakeAt && TIME - v.shakeAt < 0.3) p = { x: p.x + Math.sin((TIME - v.shakeAt) * 60) * 5 * (1 - (TIME - v.shakeAt) / 0.3), y: p.y };
  if (v.state === 'demoDrag' && W.drive) { var dp = drivePos(); if (dp) { p = dp; } }

  var r = tierR(L, v.tier);
  if (dragging) {                                          // lifted: shadow stays on the bench
    cx.save(); cx.globalAlpha = 0.35; cx.fillStyle = '#000';
    cx.beginPath(); cx.ellipse(X(p.x), Y(p.y + r * 1.5), S(r * 0.9), S(r * 0.24), 0, 0, 6.2832); cx.fill();
    cx.restore();
  }
  glow(X(p.x), Y(p.y + bob * 0.4), S(r * 2.1),
       tc.glow, 0.10 + v.tier * 0.022 + Math.sin(TIME * 2 + v.ph) * 0.03 + (dragging ? 0.08 : 0));
  var spr = SPRITES[v.tier - 1];
  var dw = S(r * 3.2) * sc, dh = S(r * 4.4) * sc;
  cx.save();
  cx.translate(X(p.x), Y(p.y + bob));
  cx.rotate(rot);
  cx.drawImage(spr, -dw * spr._cx, -dh * spr._cy, dw, dh);
  cx.restore();
  if (v.tier >= 3) {                                       // orbiting sparkles from tier 3 up
    for (var k = 0; k < v.tier - 1; k++) {
      var a = TIME * 1.2 + v.ph + k * 2.4;
      var sx2 = p.x + Math.cos(a) * r * 1.25, sy2 = p.y + bob + Math.sin(a) * r * 0.8;
      var tw = Math.max(0, Math.sin(TIME * 3 + k * 1.9 + v.ph));
      cx.save(); cx.globalAlpha = tw * 0.8; cx.fillStyle = tc.lit;
      cx.beginPath(); cx.arc(X(sx2), Y(sy2), S(2.2), 0, 6.2832); cx.fill();
      cx.restore();
    }
  }
}

function drawCauldron(L) {
  var c = slotCenter(L, CIDX), cell = L.grid.cell;
  var r = cell * 0.40;
  var jig = W.potJiggle ? Math.sin(TIME * 40) * 3 * W.potJiggle : 0;
  var pulse = W.potPulse || 0;
  var brewing = W.state === 'SOLVE' && W.clock < W.spawnReadyClk;
  var stockLeft = W.spawnsUsed < SPAWNS_NEEDED;

  // coals under the pot
  glow(X(c.x), Y(c.y + r * 0.9), S(r * 1.4), P.flame, 0.20 + Math.sin(TIME * 6.3) * 0.05 + Math.sin(TIME * 9.7) * 0.03);
  cx.save();
  cx.translate(X(c.x + jig), Y(c.y));
  // legs
  cx.strokeStyle = '#5A4020'; cx.lineWidth = Math.max(2.5, S(8)); cx.lineCap = 'round';
  cx.beginPath(); cx.moveTo(S(-r * 0.6), S(r * 0.46)); cx.lineTo(S(-r * 0.82), S(r * 1.04)); cx.stroke();
  cx.beginPath(); cx.moveTo(S(r * 0.6), S(r * 0.46)); cx.lineTo(S(r * 0.82), S(r * 1.04)); cx.stroke();
  // belly — lit from the candle side so it separates from the recessed slot
  var body = cx.createLinearGradient(S(-r), S(-r * 0.3), S(r * 0.6), S(r * 0.7));
  body.addColorStop(0, '#8A6432');
  body.addColorStop(0.45, '#5E4422');
  body.addColorStop(1, '#332312');
  cx.fillStyle = body;
  cx.beginPath();
  cx.moveTo(S(-r * 0.98), S(-r * 0.3));
  cx.quadraticCurveTo(S(-r * 1.14), S(r * 0.55), 0, S(r * 0.74));
  cx.quadraticCurveTo(S(r * 1.14), S(r * 0.55), S(r * 0.98), S(-r * 0.3));
  cx.closePath(); cx.fill();
  cx.strokeStyle = 'rgba(240,212,138,.30)'; cx.lineWidth = Math.max(1, S(2));   // rim-light on the belly
  cx.beginPath();
  cx.moveTo(S(-r * 0.98), S(-r * 0.26));
  cx.quadraticCurveTo(S(-r * 1.1), S(r * 0.5), S(-r * 0.15), S(r * 0.7));
  cx.stroke();
  // side handles
  cx.strokeStyle = P.brassDark; cx.lineWidth = Math.max(2, S(5));
  cx.beginPath(); cx.arc(S(-r * 1.02), S(-r * 0.08), S(r * 0.18), Math.PI * 0.45, Math.PI * 1.55); cx.stroke();
  cx.beginPath(); cx.arc(S(r * 1.02), S(-r * 0.08), S(r * 0.18), -Math.PI * 0.55, Math.PI * 0.55); cx.stroke();
  // rim
  cx.fillStyle = P.brass;
  cx.beginPath(); cx.ellipse(0, S(-r * 0.3), S(r * 1.06), S(r * 0.3), 0, 0, 6.2832); cx.fill();
  cx.fillStyle = P.brassLit;
  cx.beginPath(); cx.ellipse(0, S(-r * 0.34), S(r * 0.98), S(r * 0.24), 0, 0, 6.2832); cx.fill();
  // brew surface
  var moss = CONFIG.TIERS[0];
  cx.fillStyle = brewing ? moss.deep : moss.base;
  cx.beginPath(); cx.ellipse(0, S(-r * 0.34), S(r * 0.84), S(r * 0.18), 0, 0, 6.2832); cx.fill();
  cx.globalAlpha = 0.55; cx.fillStyle = moss.lit;
  cx.beginPath(); cx.ellipse(S(-r * 0.2), S(-r * 0.37), S(r * 0.4), S(r * 0.08), 0, 0, 6.2832); cx.fill();
  cx.globalAlpha = 1;
  // bubbles breaking the surface — motion on frame one
  for (var i = 0; i < 4; i++) {
    var bt = (TIME * 0.55 + i * 0.26) % 1;
    var bx2 = Math.sin(i * 2.4 + Math.floor(TIME * 0.55 + i * 0.26)) * r * 0.5;
    cx.globalAlpha = (1 - bt) * 0.8;
    cx.fillStyle = moss.lit;
    cx.beginPath(); cx.arc(S(bx2), S(-r * 0.36 - bt * r * 0.16), S(r * (0.05 + bt * 0.07)), 0, 6.2832); cx.fill();
  }
  cx.globalAlpha = 1;
  cx.restore();
  // steam wisps
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  cx.strokeStyle = 'rgba(207,243,168,.10)'; cx.lineCap = 'round';
  for (var wsp = 0; wsp < 2; wsp++) {
    var ph = TIME * 0.8 + wsp * 3.1;
    cx.lineWidth = Math.max(2, S(7 - wsp * 2));
    cx.beginPath();
    cx.moveTo(X(c.x + Math.sin(ph) * 8), Y(c.y - r * 0.5));
    cx.quadraticCurveTo(X(c.x + Math.sin(ph + 1.4) * 20), Y(c.y - r * 1.3),
                        X(c.x + Math.sin(ph + 2.6) * 14), Y(c.y - r * 2.1));
    cx.stroke();
  }
  cx.restore();
  // tap affordance: a soft breathing ring while stock remains and the pot is ready
  if (W.state === 'SOLVE' && stockLeft && !brewing) {
    cx.save();
    cx.globalAlpha = 0.25 + Math.abs(Math.sin(TIME * 2.6)) * 0.3 + pulse * 0.4;
    cx.strokeStyle = P.brassLit; cx.lineWidth = Math.max(1.5, S(3));
    cx.beginPath(); cx.arc(X(c.x), Y(c.y - r * 0.1), S(r * 1.25 + Math.sin(TIME * 2.6) * 4), 0, 6.2832); cx.stroke();
    cx.restore();
  }
}

function drawCandle(L) {
  var cd = L.candle;
  var frac = W.state === 'SOLVE' || W.state === 'RESOLVE' ? Math.max(0, W.timeLeft / W.timeTotal) : 1;
  var h = cd.h * (0.12 + frac * 0.88);
  var topY = cd.base - h;
  var out = W.out && W.out !== 'win' && W.state === 'RESOLVE';
  // wax
  var wg = cx.createLinearGradient(X(cd.x - cd.w / 2), 0, X(cd.x + cd.w / 2), 0);
  wg.addColorStop(0, P.waxDeep);
  wg.addColorStop(0.45, P.wax);
  wg.addColorStop(1, '#B69C6E');
  roundRect(cx, X(cd.x - cd.w / 2), Y(topY), S(cd.w), S(h), S(8));
  cx.fillStyle = wg; cx.fill();
  cx.fillStyle = P.wax;                                    // melt lip + a drip
  cx.beginPath(); cx.ellipse(X(cd.x), Y(topY), S(cd.w * 0.5), S(6), 0, 0, 6.2832); cx.fill();
  roundRect(cx, X(cd.x - cd.w * 0.42), Y(topY), S(7), S(Math.min(26, h * 0.4)), S(3.5));
  cx.fill();
  cx.fillStyle = '#D9C293';
  cx.beginPath(); cx.ellipse(X(cd.x), Y(topY), S(cd.w * 0.34), S(4), 0, 0, 6.2832); cx.fill();
  // wick + flame
  cx.strokeStyle = '#2A1B06'; cx.lineWidth = Math.max(1, S(2.5));
  cx.beginPath(); cx.moveTo(X(cd.x), Y(topY)); cx.lineTo(X(cd.x), Y(topY - 8)); cx.stroke();
  if (!out) {
    var gut = frac < 0.22;                                 // guttering when the wax is low
    var fl = Math.sin(TIME * 9.3) * 0.5 + Math.sin(TIME * 15.7) * 0.3 + (gut ? Math.sin(TIME * 31) * 0.7 : 0);
    var fh = (gut ? 17 : 26) + fl * 3.4;
    var sway = Math.sin(TIME * 5.1) * 2.6 + fl;
    glow(X(cd.x), Y(topY - 16), S(56 + fl * 6), P.flame, gut ? 0.16 : 0.26);
    cx.save();
    cx.translate(X(cd.x), Y(topY - 8));
    cx.fillStyle = P.flame;
    cx.beginPath();
    cx.moveTo(0, 0);
    cx.quadraticCurveTo(S(-7), S(-fh * 0.45), S(sway * 0.6), S(-fh));
    cx.quadraticCurveTo(S(7), S(-fh * 0.45), 0, 0);
    cx.fill();
    cx.fillStyle = P.flameLit;
    cx.beginPath();
    cx.moveTo(0, 0);
    cx.quadraticCurveTo(S(-3.6), S(-fh * 0.3), S(sway * 0.4), S(-fh * 0.58));
    cx.quadraticCurveTo(S(3.6), S(-fh * 0.3), 0, 0);
    cx.fill();
    cx.fillStyle = '#FFFDF4';
    cx.beginPath(); cx.ellipse(S(sway * 0.2), S(-fh * 0.22), S(2.2), S(4), 0, 0, 6.2832); cx.fill();
    cx.restore();
  } else {                                                 // out: an ember and a smoke curl
    cx.fillStyle = '#B3502E';
    cx.beginPath(); cx.arc(X(cd.x), Y(topY - 9), S(2.4), 0, 6.2832); cx.fill();
    cx.save();
    cx.strokeStyle = 'rgba(154,145,126,.4)'; cx.lineWidth = Math.max(1, S(3)); cx.lineCap = 'round';
    cx.beginPath();
    cx.moveTo(X(cd.x), Y(topY - 12));
    cx.quadraticCurveTo(X(cd.x + 10), Y(topY - 34), X(cd.x - 4), Y(topY - 56));
    cx.stroke();
    cx.restore();
  }
}

function drawPlaqueLive(L) {
  var Q = L.plaque;
  var gy = Q.y + Q.h * 0.18;
  var span = Q.w * 0.72, x0 = Q.x - span / 2;
  var totalMerges = 8;                                    // 12 units + 4 brews → 8 fuses
  var fill = Math.min(1, W.mergesDone / totalMerges);
  cx.save();                                              // the golden thread of progress
  cx.globalCompositeOperation = 'lighter';
  cx.strokeStyle = P.gold; cx.globalAlpha = 0.85; cx.lineWidth = Math.max(1.5, S(3));
  cx.beginPath(); cx.moveTo(X(x0), Y(gy)); cx.lineTo(X(x0 + span * fill), Y(gy)); cx.stroke();
  cx.restore();
  for (var i = 0; i < 4; i++) {                           // milestones: tiers 2..5
    var mx = x0 + span * (i / 3);
    var tier = i + 2, tc = CONFIG.TIERS[tier - 1];
    var lit = W.maxTierMade >= tier;
    var flash = W.litFlash[i];
    if (i === 3) {                                        // the legendary star
      var pr = lit ? 1 : 0.55 + Math.abs(Math.sin(TIME * 2.2)) * 0.25;
      cx.save(); cx.globalAlpha = pr;
      if (lit || flash) glow(X(mx), Y(gy), S(26), P.gold, 0.5 + flash * 0.5);
      cx.fillStyle = lit ? P.goldLit : 'rgba(201,168,106,.55)';
      cx.beginPath();
      for (var k = 0; k < 10; k++) {
        var ang = -Math.PI / 2 + k * Math.PI / 5, rr = (k % 2 ? 5.5 : 12) + flash * 3;
        cx[k ? 'lineTo' : 'moveTo'](X(mx) + Math.cos(ang) * S(rr), Y(gy) + Math.sin(ang) * S(rr));
      }
      cx.closePath(); cx.fill();
      cx.restore();
    } else {
      cx.fillStyle = '#1E1206';
      cx.beginPath(); cx.arc(X(mx), Y(gy), S(9 + flash * 3), 0, 6.2832); cx.fill();
      if (lit) {
        glow(X(mx), Y(gy), S(16 + flash * 10), tc.glow, 0.5 + flash * 0.5);
        cx.fillStyle = tc.base;
        cx.beginPath(); cx.arc(X(mx), Y(gy), S(6.5 + flash * 2.5), 0, 6.2832); cx.fill();
        cx.fillStyle = tc.lit;
        cx.beginPath(); cx.arc(X(mx) - S(2), Y(gy) - S(2), S(2.4), 0, 6.2832); cx.fill();
      } else {
        cx.strokeStyle = 'rgba(201,168,106,.4)'; cx.lineWidth = Math.max(1, S(1.6));
        cx.beginPath(); cx.arc(X(mx), Y(gy), S(6.5), 0, 6.2832); cx.stroke();
      }
    }
  }
}

function drawDialLive(L) {

  cx.fillStyle = P.brass;
