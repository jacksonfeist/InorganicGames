// ── the pace dial (the control) ─────────────────────────────────────────────
// A decorative frosted flow-dial whose needle IS the live pace readout tOf().
// The steady sweet-spot tick is the reserved gold — "good" wears the reward
// colour, exactly like the CTA. A tap here is always harmless (the harness's
// stray-tap probe taps exactly this needle).
function drawDial(L) {
  var d = L.dial, t = tOf(W);
  cx.save();
  cx.globalAlpha = 0.92;
  cx.fillStyle = 'rgba(255,255,255,0.55)';
  cx.beginPath(); cx.arc(X(d.x), Y(d.y), S(d.r), 0, 6.2832); cx.fill();
  cx.strokeStyle = 'rgba(46,53,66,0.30)';
  cx.lineWidth = Math.max(1, S(2));
  cx.stroke();
  cx.strokeStyle = 'rgba(90,99,116,0.5)';
  cx.lineWidth = Math.max(2, S(4)); cx.lineCap = 'round';
  cx.beginPath(); cx.arc(X(d.x), Y(d.y), S(d.r * 0.64), Math.PI, 6.2832); cx.stroke();
  cx.strokeStyle = P.gold;
  cx.beginPath(); cx.arc(X(d.x), Y(d.y), S(d.r * 0.64), Math.PI * 1.40, Math.PI * 1.60); cx.stroke();
  var a = Math.PI + t * Math.PI;
  var nx = d.x + Math.cos(a) * d.r * 0.64, ny = d.y + Math.sin(a) * d.r * 0.64;
  cx.strokeStyle = P.ink;
  cx.lineWidth = Math.max(2, S(3.2));
  cx.beginPath(); cx.moveTo(X(d.x), Y(d.y)); cx.lineTo(X(nx), Y(ny)); cx.stroke();
  cx.fillStyle = P.ink;
  cx.beginPath(); cx.arc(X(nx), Y(ny), S(4.4), 0, 6.2832); cx.fill();
  cx.fillStyle = '#FFFFFF';
  cx.beginPath(); cx.arc(X(nx) - S(1.2), Y(ny) - S(1.2), S(1.3), 0, 6.2832); cx.fill();
  cx.fillStyle = P.silverLit;
  cx.beginPath(); cx.arc(X(d.x), Y(d.y), S(5), 0, 6.2832); cx.fill();
  cx.strokeStyle = P.ink; cx.lineWidth = Math.max(1, S(1.6));
  cx.beginPath(); cx.arc(X(d.x), Y(d.y), S(5), 0, 6.2832); cx.stroke();
  cx.restore();
}

// ── undo / restart — frosted glass, icons only, never a word ───────────────
function drawButtons(L) {
  drawRoundBtn(L.undo, 'undo', W.history.length > 0 && !W.pour, W.btnPop.u);
  drawRoundBtn(L.restart, 'restart', W.pours > 0 || W.fumbles > 0, W.btnPop.r);
}
function arrowAt(ang, r, dir) {
  var px2 = Math.cos(ang) * r, py2 = Math.sin(ang) * r;
  var len = S(10), wd = S(5);
  cx.beginPath();
  cx.moveTo(px2 - Math.sin(ang) * dir * len, py2 + Math.cos(ang) * dir * len);
  cx.lineTo(px2 + Math.cos(ang) * wd, py2 + Math.sin(ang) * wd);
  cx.lineTo(px2 - Math.cos(ang) * wd, py2 - Math.sin(ang) * wd);
  cx.closePath();
  cx.fillStyle = P.ink;
  cx.fill();
}
function drawRoundBtn(c, kind, enabled, pop) {
  cx.save();
  cx.translate(X(c.x), Y(c.y));
  cx.scale(1 + pop * 0.1, 1 + pop * 0.1);
  cx.globalAlpha = enabled ? 1 : 0.42;
  cx.fillStyle = 'rgba(255,255,255,0.60)';
  cx.beginPath(); cx.arc(0, 0, S(c.r), 0, 6.2832); cx.fill();
  cx.strokeStyle = 'rgba(46,53,66,0.32)';
  cx.lineWidth = Math.max(1, S(2));
  cx.stroke();
  cx.strokeStyle = P.ink;
  cx.lineWidth = Math.max(2, S(4));
  cx.lineCap = 'round';
  var r = S(c.r * 0.42);
  if (kind === 'undo') {
    cx.beginPath(); cx.arc(0, 0, r, -2.5, 0.9); cx.stroke();
    arrowAt(-2.5, r, -1);
  } else {
    cx.beginPath(); cx.arc(0, 0, r, -0.6, 4.6); cx.stroke();
    arrowAt(4.6, r, 1);
    cx.fillStyle = P.ink;
    cx.beginPath(); cx.arc(0, 0, S(3), 0, 6.2832); cx.fill();
  }
  cx.restore();
}

// ── the demo hand ───────────────────────────────────────────────────────────
// THE HAND DEMONSTRATES: it performs the real two-tap gesture — settle on the
// canonical source (which ghost-lifts under it), tap, glide to the destination,
// tap — looping from frame one. It is the opening teach AND the idle rescue;
// the idle demo only pours for real while the ad is untouched, when the
// reservoir cannot drain (see step() and THE TIMER LAW). Zero words.
function drawHint(L) {
  if (W.hint <= 0.01 || !W.plan.length || W.pour) return;
  var a = W.hint;
  var mv = W.plan[0];
  var sG = tubeGeo(L, mv.s), dG = tubeGeo(L, mv.d);
  var ph = (TIME % 2.7) / 2.7;

  var sx2 = sG.cx + 14, sy2 = sG.baseY - sG.h * 0.42;
  var dx2 = dG.cx + 14, dy2 = dG.baseY - dG.h * 0.42;
  var gx, gy, pressed = false;
  if (ph < 0.16) { gx = sx2; gy = sy2 - 26 + (ph / 0.16) * 26; a *= ph / 0.16; }
  else if (ph < 0.30) { gx = sx2; gy = sy2; pressed = true; }
  else if (ph < 0.56) {
    var u = ease((ph - 0.30) / 0.26);
    gx = sx2 + (dx2 - sx2) * u;
    gy = sy2 + (dy2 - sy2) * u - Math.sin(u * Math.PI) * 60;
  }
  else if (ph < 0.70) { gx = dx2; gy = dy2; pressed = true; }
  else { var v = (ph - 0.70) / 0.30; gx = dx2; gy = dy2 + v * 20; a *= 1 - v; }

  if (pressed) {
    cx.save();
    cx.globalAlpha = a * 0.4;
    cx.strokeStyle = P.ink;
    cx.lineWidth = Math.max(1, S(1.8));
    cx.beginPath(); cx.arc(X(gx), Y(gy), S(15 + Math.sin(TIME * 9) * 2), 0, 6.2832); cx.stroke();
    cx.restore();
  }

  // soft shadow so the white glove reads on the light studio
  cx.save();
  cx.globalAlpha = a * 0.20;
  cx.fillStyle = '#20242C';
  cx.beginPath();
  cx.ellipse(X(gx) + S(12), Y(gy + 52), S(26), S(9), 0, 0, 6.2832);
  cx.fill();
  cx.restore();

  cx.save();
  cx.globalAlpha = a * (pressed ? 0.97 : 0.72);
  cx.translate(X(gx) + S(12), Y(gy + 30));
  cx.scale(S(pressed ? 1.42 : 1.56), S(pressed ? 1.42 : 1.56));
  cx.fillStyle = '#FFFFFF'; cx.strokeStyle = P.ink; cx.lineWidth = 2.2;
  cx.beginPath();
  cx.moveTo(0, -16); cx.quadraticCurveTo(-6, -18, -6, -8);
  cx.lineTo(-6, 4); cx.quadraticCurveTo(-13, 0, -16, 4);
  cx.quadraticCurveTo(-18, 8, -13, 13);
  cx.quadraticCurveTo(-4, 25, 4, 25);
  cx.quadraticCurveTo(14, 25, 15, 12);
  cx.lineTo(15, -3); cx.quadraticCurveTo(15, -8, 11, -8);
  cx.quadraticCurveTo(11, -13, 6, -13);
  cx.quadraticCurveTo(6, -18, 0, -16);
  cx.closePath(); cx.fill(); cx.stroke();
  cx.restore();

  // Optional one-liner — empty by default; the demonstration is the teach.
  if (CONFIG.COPY.hint) {
    cx.save();
    cx.globalAlpha = a * 0.95;
    cx.font = '700 ' + Math.round(FS(19)) + "px 'Chakra','Trebuchet MS',sans-serif";
    cx.textAlign = 'center';
    cx.lineWidth = Math.max(2, S(4)); cx.strokeStyle = 'rgba(255,255,255,.9)';
    cx.strokeText(CONFIG.COPY.hint, X(sG.cx), Y(sG.topY - 60));
    cx.fillStyle = P.ink;
    cx.fillText(CONFIG.COPY.hint, X(sG.cx), Y(sG.topY - 60));
    cx.restore();
  }
}

function drawParticles() {
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i], a = Math.max(0, p.life / p.max);
    cx.save();
    cx.globalAlpha = a;
    cx.fillStyle = p.c;
    cx.beginPath();
    cx.arc(X(p.x), Y(p.y), S(p.r) * (0.5 + a * 0.5), 0, 6.2832);
    cx.fill();
    cx.restore();
  }
}
function drawFloats() {
  for (var i = 0; i < floats.length; i++) {
    var f = floats[i], a = Math.min(1, f.life / f.max * 1.6);
    var pop = 1 + (1 - Math.min(1, (f.max - f.life) * 7)) * 0.5;
    cx.save();
    cx.globalAlpha = a;
    cx.translate(X(f.x), Y(f.y)); cx.scale(pop, pop);
    cx.font = '700 ' + Math.round(S(f.s)) + "px 'Chakra','Trebuchet MS',sans-serif";
    cx.textAlign = 'center';
    cx.lineWidth = Math.max(3, S(6)); cx.strokeStyle = 'rgba(255,255,255,.92)';
    cx.strokeText(f.text, 0, 0);
    cx.fillStyle = f.c;
    cx.fillText(f.text, 0, 0);
    cx.restore();
  }
}

/* ══ 14. LOOP — ENGINE. Fixed 1/120 physics, render every rAF. ═══════════ */

var acc = 0, last = performance.now(), FIXED = 1 / 120;
var fpsBuf = [], fpsEl = document.getElementById('dbg-stat'), LAST_FPS = 60;

function frame(now) {
  // Pause cleanly when the ad is off-screen: no wasted battery, and no giant dt
  // spike when it comes back.
  if (document.hidden) { last = now; acc = 0; requestAnimationFrame(frame); return; }

  var dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  TIME += dt; acc += dt;
  var guard = 0;
  while (acc >= FIXED && guard++ < 8) { step(FIXED); acc -= FIXED; }
  if (W) draw();

  fpsBuf.push(dt);
  if (fpsBuf.length > 45) {
    var sum = fpsBuf.reduce(function (a, b) { return a + b; }, 0);
    LAST_FPS = Math.round(fpsBuf.length / sum);
    fpsEl.textContent = Math.round(SIZE_BYTES / 1024) + ' KB · 0 requests · ' + LAST_FPS + ' fps';
    fpsBuf.length = 0;
    if (started) postMeta();   // keep the gallery's fps badge live
  }
  requestAnimationFrame(frame);
}

/* ══ 15. TEST HANDLE — tools/verify-playable.mjs drives this. ═════════════
   Every key below is part of the contract. Do not rename them.

   archetype: 'sequence' (GRIDLOCK's shape — ARCH.sequence in the harness):
   the player commits ONE discrete action at a time — a tap that selects, a tap
   that pours — any number of times, against a shared clock (the reservoir).

     playState 'SOLVE'. commitsOnTap: false — a tap on anything that is not a
     legal pour (the dial, the backdrop, a capped tube, a wrong destination) is
     harmless; nothing a single tap does can burn an attempt.
     win() taps __ad.autopilotScreen() on a loop — a REAL sequence of REAL taps
     on the REAL canvas: select the canonical source, then its destination.

   It still owes every other guarantee: ONE scalar control t ∈ [0,1] (tOf() —
   PACE, a live readout, not a physical drag), a PURE sweepable sim
   (simRun/sweep, section 6), a 10–34% band closed on both sides, an
   escalating preview. Never weaken an assertion to fit a mechanic. */

window.__ad = {
  archetype: 'sequence',
  get state()       { return W ? W.state : 'BOOT'; },
  get control()     { return W ? tOf(W) : 0.5; },
  get attempts()    { return attempts; },
  get hint()        { return W ? W.hint : 0; },
  get fps()         { return LAST_FPS; },
  get assist()      { return ASSIST(); },
  get previewFrac() { return PREVIEW_FRAC(); },
  maxAssist: 0.35,
  events: EVENTS,
  layoutName: function () { return VW / VH > 1.15 ? 'landscape' : 'portrait'; },
  sweep: function (assist, n) { return sweep(assist, n); },
  // The control is the pace dial's needle — decorative HUD glassware, never a
  // tube, so the harness's stray-tap probe (it taps exactly here) is harmless.
  controlScreen: function () {
    if (!W) return { x: 0, y: 0 };
    var p = dialNeedlePos();
    return { x: X(p.x), y: Y(p.y) };
  },
  setControl: function (t) { if (W) W.paceOverride = Math.max(0, Math.min(1, t)); },
  // Where a good player's NEXT tap should land right now: the canonical source
  // if nothing is lifted, its destination if it is, or the (wrong) selection
  // itself to put it down. Null while a pour is mid-air — wait for the glug.
  autopilotScreen: function () {
    if (!W || W.state !== 'SOLVE') return null;
    if (W.pour && W.pour.phase !== 'return') return null;   // wait out the glugs
    if (!W.plan.length) return null;
    var mv = W.plan[0];
    var i;
    if (W.pour) {                                  // settle: pre-select the next source
      if (W.sel >= 0) return null;
      i = mv.s;
    } else {
      i = (W.sel === mv.s) ? mv.d : (W.sel >= 0 ? W.sel : mv.s);
    }
    var g = tubeGeo(W.layout, i);
    return { x: X(g.cx), y: Y(g.baseY - g.h * 0.45) };
  },
  fire: function () { /* sequence: each tap resolves itself — nothing to fire */ },

  // Both FAST-FORWARD through the REAL resolve path, they just skip the
  // waiting: forceWin performs the canonical pours back-to-back through the
  // same afterPour/winRun code a player's taps run, with no animation between.
  forceWin: function () {
    if (!W || W.state !== 'SOLVE') return;
    if (W.pour) {                       // land a mid-air pour instantly first
      var pp = W.pour;
      var left = pp.n - pp.moved;
      if (left > 0) moveUnits(pp.s, pp.d, left);
      W.pour = null;
      afterPour(pp.s, pp.d, pp.n);
    }
    var guard = 0;
    while (W.state === 'SOLVE' && guard++ < 30) {
      if (!W.plan.length) break;
      var mv = W.plan[0];
      var n = legalPour(W.board, mv.s, mv.d);
      if (!n) break;
      commitPourInstant(mv.s, mv.d, n);
    }
  },
  forceFail: function () {
    if (!W || W.state !== 'SOLVE') return;
    W.touched = true;
    W.timeLeft = 0;
    failRun('stalled');
  },
  // Dev-only: patch tuning/layout and re-derive, so the level can be BALANCED
  // by sweeping rather than by guessing. Never used at runtime.
  tune: function (tPatch, lPatch) {
    if (tPatch) for (var k in tPatch) T[k] = tPatch[k];
    var L = layout();
    if (lPatch) for (var j in lPatch) L[j] = lPatch[j];
    L._ready = false; prep(L); resize(); resetAttempt(true);
    return { layout: L, band: sweep(0, 200).band };
  }
};

// Debug overlay: nothing on the glass by default. CONFIG.DEBUG or ?debug=1 shows
// the event ticker + size/fps tag for dev work; players never see either.
if (CONFIG.DEBUG || /[?&#]debug=1/.test(location.href)) {
  document.getElementById('dbg').classList.add('on');
}
fpsEl.textContent = Math.round(SIZE_BYTES / 1024) + ' KB · 0 requests · 60 fps';

resize();
resetAttempt(true);
requestAnimationFrame(frame);
bootWhenReady();

})();
</script>
