/* ── GAME LOGIC: palette. Keep in sync with CONFIG.PALETTE below. ─────────── */
:root{
  --studio-hi:#F8F5EF; --studio:#EBE6DC; --studio-lo:#CEC5B8;
  --ink:#2E3542; --ink-soft:#5A6374; --glass-edge:#39414F;
  --gold:#FFC53D; --gold-lit:#FFE49A; --paper:#FFFFFF; --fail:#D64545;
  --disp:'Chakra','Futura','Trebuchet MS',Impact,sans-serif;
  --mono:'TechMono',ui-monospace,Menlo,Consolas,monospace;
}
/* ── ENGINE: everything below is shared chrome. Recolour, don't restructure. ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#101216;
  font-family:var(--disp);color:var(--ink);
  -webkit-user-select:none;user-select:none;touch-action:none;overscroll-behavior:none}

#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0B0910}
#stage.framed{background:radial-gradient(120% 120% at 50% 0%,#191426 0%,#0B0910 60%)}
#screen{position:relative;width:100%;height:100%;overflow:hidden;background:#EFEBE3}
#stage.framed #screen{
  width:min(400px,42vh);height:min(866px,91vh);aspect-ratio:400/866;
  border-radius:44px;box-shadow:0 0 0 11px #1B1626,0 0 0 13px #2E2740,
    0 34px 90px -12px rgba(0,0,0,.85),0 0 120px -30px rgba(255,197,61,.16)}
#stage.framed #notch{position:absolute;top:9px;left:50%;transform:translateX(-50%);
  width:104px;height:26px;border-radius:14px;background:#0B0910;z-index:30}
#notch{display:none}
#stage.framed #dbg{top:44px}
#stage.framed #mute{top:38px}

canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

.layer{position:absolute;inset:0;pointer-events:none;z-index:10;
  padding:calc(env(safe-area-inset-top,0px) + 10px) calc(env(safe-area-inset-right,0px) + 10px)
          calc(env(safe-area-inset-bottom,0px) + 10px) calc(env(safe-area-inset-left,0px) + 10px)}

#mute{position:absolute;top:calc(env(safe-area-inset-top,0px) + 6px);right:calc(env(safe-area-inset-right,0px) + 6px);
  width:48px;height:48px;display:flex;align-items:center;justify-content:center;
  pointer-events:auto;cursor:pointer;opacity:.6;transition:opacity .2s;
  animation:mutepulse 3.2s ease-in-out infinite}
#mute:hover{opacity:1}
#mute svg{width:20px;height:20px;fill:none;stroke:var(--ink);stroke-width:1.8;stroke-linecap:round}
@keyframes mutepulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.95;transform:scale(1.08)}}

/* Debug overlay — the old event ticker + size tag, OFF the glass by default.
   Shown only when CONFIG.DEBUG is true or the URL contains debug=1. The player-
   facing glass carries no instrumentation chrome; the gallery renders the live
   event feed BESIDE the phone from the postMessage envelope (docs/gallery-embed.md). */
#dbg{display:none;position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);
  left:calc(env(safe-area-inset-left,0px) + 12px);font-family:var(--mono);
  font-size:9px;letter-spacing:.02em;color:#5A6374;opacity:.9}
#dbg.on{display:block}
#dbg .row{white-space:nowrap;overflow:hidden}
#dbg .row .nm{color:#1F7A5C}
#dbg .row .vl{color:#8A93A4;padding-left:6px}

#rail{position:absolute;right:calc(env(safe-area-inset-right,0px) + 12px);
  bottom:calc(env(safe-area-inset-bottom,0px) + 14px);
  pointer-events:auto;cursor:pointer;opacity:0;transform:translateY(14px);
  transition:opacity .45s ease,transform .45s cubic-bezier(.2,1,.3,1)}
#rail.on{opacity:1;transform:none}
#rail .btn{min-height:48px;padding:0 18px;display:flex;align-items:center;gap:7px;border-radius:24px;
  background:linear-gradient(180deg,#FFE49A,var(--gold));color:#2A1B06;
  font-size:13px;font-weight:700;letter-spacing:.09em;
  box-shadow:0 6px 18px -4px rgba(255,209,102,.5),inset 0 -2px 0 rgba(0,0,0,.16)}

/* End card: buttons only, over a LIGHT scrim — the finished scene (the payoff)
   stays readable behind it. Never an opaque panel. The whole scrim is tappable
   and triggers the CTA; REPLAY is its own button, centered under it. Buttons
   sit in the open studio headroom above the tubes — that's where the free
   space is; the bottom half is already busy with the tray and the pace dial. */
#end{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  gap:12px;padding:calc(env(safe-area-inset-top,0px) + 140px) 24px 24px;
  opacity:0;pointer-events:none;cursor:pointer;
  background:linear-gradient(180deg,rgba(240,235,226,.78) 0%,rgba(248,245,239,.36) 38%,rgba(248,245,239,0) 70%);
  transition:opacity .5s ease;z-index:20}
#end.on{opacity:1;pointer-events:auto}
#cta{margin-top:4px;min-height:58px;width:min(300px,88%);border:0;cursor:pointer;border-radius:29px;
  font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:.1em;color:#2A1B06;
  background:linear-gradient(180deg,#FFE9A8,var(--gold));
  box-shadow:0 10px 0 -2px #B8853A,0 18px 34px -8px rgba(255,209,102,.5);
  animation:breathe 2.1s ease-in-out infinite;transition:transform .09s ease}
#cta:active{transform:translateY(4px);box-shadow:0 6px 0 -2px #B8853A}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
#replay{min-height:48px;padding:0 22px;border:1px solid rgba(46,53,66,.35);cursor:pointer;border-radius:24px;
  background:rgba(255,255,255,.62);color:#3A4254;font-family:var(--disp);font-weight:700;
  font-size:12px;letter-spacing:.15em;transition:all .18s ease}
#replay:hover{background:rgba(255,255,255,.88);color:#12141A}

/* Landscape has width, not height (docs §5) — the headroom above the tubes is
   much shallower there, so the same stack sits closer to the top edge and
   trims a few px off CTA height + the gap to still clear the tube rims (both
   buttons stay ≥48px touch targets). Same 1.15 aspect threshold as layout()'s
   portrait/landscape switch. Stacking order and centering match portrait. */
@media (min-aspect-ratio: 23/20){
  #end{padding-top:calc(env(safe-area-inset-top,0px) + 100px);gap:10px}
  #cta{min-height:50px}
}

#toast{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 84px);
  transform:translate(-50%,10px);padding:9px 15px;border-radius:9px;
  background:rgba(255,255,255,.96);border:1px solid rgba(46,53,66,.28);
  font-family:var(--mono);font-size:10.5px;color:#3A4254;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s cubic-bezier(.2,1.2,.4,1);z-index:25}
#toast.on{opacity:1;transform:translate(-50%,0)}
</style>

<div id="stage">
  <div id="screen">
    <canvas id="c"></canvas>
    <div id="notch"></div>

    <div class="layer">
      <div id="dbg"><div id="dbg-stat">— KB · 0 requests · 60 fps</div><div id="dbg-ticker"></div></div>
      <div id="rail"><div class="btn" id="railbtn">PLAY NOW ▸</div></div>
    </div>

    <div id="mute" title="Sound"><svg id="muteicon" viewBox="0 0 24 24"></svg></div>

    <!-- End card: TWO BUTTONS, nothing else. No headline, no badge, no stats, no
         agency blurb — the finished scene behind the scrim is the whole message.
         The scrim itself triggers the CTA (see §12). Keep the element ids. -->
    <div id="end">
      <button id="cta">PLAY NOW ▸</button>
      <button id="replay">REPLAY</button>
    </div>

    <div id="toast"></div>
  </div>
</div>

<script>
(function () {
'use strict';

/* ══════════════════════════════════════════════════════════════════════════
   PLAYABLE SHELL — Inorganic Games
   ──────────────────────────────────────────────────────────────────────────
   Sections marked ENGINE are shared across every ad: do not restructure them.
   Sections marked GAME LOGIC are the ad: replace them wholesale.

   CHROMA SORT is a liquid-sort puzzle — archetype 'sequence' (docs/archetypes.md
   + ARCH.sequence in tools/verify-playable.mjs), GRIDLOCK's input shape. Five
   glass tubes hold jumbled jewel liquid; tap a tube to lift it, tap another to
   POUR its top colour across. Sort every tube pure before the reservoir at the
   frame's edge drains. The board is FIXED and was chosen by exhaustive search:
   canonical solve = 7 pours, the first pour is a same-colour merge (the teach),
   and the path passes one genuine "looks stuck" state whose relief is the empty
   tube (the engineered near-miss). It owes the same guarantees as every ad:

     · one control, normalised to t ∈ [0,1] — PACE: hasty(0) ↔ steady(0.5) ↔
       hesitant(1), a LIVE readout (setControl/controlScreen work) — see tOf()
     · a pure sim you can sweep: simRun(t) → outcome   (proves winnability)
     · a win band of 10–34% of the control range      (winnable, not trivial)
     · a stray tap costs nothing — commitsOnTap:false; the control is a
       decorative pace dial, never a tube
     · escalating preview on each miss                (nobody gets stuck)

   SHOW, DON'T TELL — the shell's creative defaults:
     · The HAND DEMONSTRATES the real gesture (§13 drawHint): it performs the
       actual drag/tap as a ghost, from frame one. Instructional text is OFF by
       default (COPY.hint is empty); one ≤4-word line only if the gesture truly
       isn't self-evident.
     · Celebration is ANIMATION's job, never text. There is no win/perfect copy
       slot. Failure strings (shortF/longF) stay — they NAME the failure side,
       which is teaching, not fluff.
     · The END CARD is two buttons over a light scrim; the finished scene stays
       visible behind it. The whole scrim taps through to the CTA.
     · Instrumentation is OFF the glass. Events go to console, parent postMessage
       (docs/gallery-embed.md envelope) and __ad.events; the old ticker + size tag
       live in a debug overlay gated on CONFIG.DEBUG / ?debug=1.
     · TIMER LAW: pre-interaction the world may threaten but may never conclude
       a failure. Any countdown's consequential window starts at the first
       pointerdown; an idle player can never reach a fail state — idling brings
       the demonstration back, it never burns an attempt. Time pressure reads
       spatially (a gate lowering, a bar on the goal), never as a numeric alarm.

   Read docs/playable-design.md before you touch this.
   ══════════════════════════════════════════════════════════════════════════ */

/* ══ 1. CONFIG — the entire reskin surface. GAME LOGIC. ═══════════════════ */

var CONFIG = {
  // The ONE constant you repoint per campaign/network. Not always a store: the
  // gallery build points at our own site.
  CTA_URL: 'https://apps.apple.com/app/id0000000000',
  BRAND: 'INORGANIC GAMES',
  // One or two sentences describing the LOOK this ad is going for. tools/critique.mjs
  // reads it and grades the art against YOUR stated direction, not a fixed style.
  ART_BRIEF: 'A soft-lit studio product shot: five tall glass test tubes of saturated jewel liquid (ruby, sapphire, emerald — gold reserved for the finale wave and the CTA) on a glossy white tray against a pale seamless backdrop. Real glass — dark outline, white specular streak, visible meniscus, warm rim light — and wet, sloshing liquid. Bright, clean, premium; never flat, never gradient-soup.',

  CTA_TEXT: 'PLAY NOW ▸',
  COPY: {
    // The demo hand teaches the two-tap pour by performing it; no words needed.
    hint:    '',
    // Failure strings are INFORMATIONAL — they name the failure side (Law 4).
    // There is no win/perfect celebration slot: celebration is animation's job.
    shortF:  'TOO HASTY',
    longF:   'TOO SLOW',
    toast:   'In a live ad, this opens the App Store.'
  },
  // Quality adjectives in string literals fail the lint unless declared here with
  // their informational role (e.g. { LEGENDARY: 'tier name — informational' }).
  COPY_WAIVERS: {},

  // ── THE RESKIN SURFACE ────────────────────────────────────────────────────
  // CAP: units per tube. A tube is COMPLETE when it holds CAP units of one
  // colour, so every colour's total across BOARD must be exactly CAP (a boot
  // guard console.errors otherwise).
  CAP: 4,
  // BOARD: colour indices into LIQUIDS, bottom→top, one array per tube, in
  // screen order. This exact board is load-bearing: chosen by exhaustive search
  // so the canonical solve is 7 pours, the FIRST pour is a same-colour merge
  // that uncovers a ruby-×3 tube (the hook teach + the cold read), and the path
  // passes a genuine "looks stuck" state (no matching tops anywhere) whose
  // relief is the empty tube. If you change it, keep every colour's total = CAP,
  // keep it solvable, and re-run tools/sweep.mjs + verify.
  BOARD: [ [0,0,0,1], [0,2,2], [1,2,1], [1,2], [] ],
  // LIQUIDS: the jewel colours. `name` is informational only (event payloads —
  // never rendered). Keep them apart in VALUE, not just hue (art law 3).
  LIQUIDS: [
    { name: 'ruby',     base:'#E02348', lit:'#FF7A97', deep:'#8F0E2E' },
    { name: 'sapphire', base:'#2757E6', lit:'#7FA5FF', deep:'#14309B' },
    { name: 'emerald',  base:'#0FA96F', lit:'#66E8B4', deep:'#056A45' }
  ],

  PALETTE: {
    bgHi:'#F8F5EF', bg:'#EBE6DC', bgLo:'#CEC5B8',
    tray:'#FCFBF8', trayEdge:'#E2DCD2', trayShade:'#B7AE9F',
    ink:'#2E3542', inkSoft:'#5A6374', glass:'#39414F',
    silver:'#B9CCE4', silverLit:'#E9F1FA', silverDeep:'#7E96B8',
    gold:'#FFC53D', goldLit:'#FFE49A', paper:'#FFFFFF', fail:'#D64545'
  },

  TUNING: {
    reactMs: 280,          // bot: think time before each pour
    pourAnimMs: 760,       // live+bot: one pour — travel, glugs, return
    maxFumbleMs: 2600,     // bot: reservoir fumbled away per pour at t=0 (fully hasty)
    maxExtraDelayMs: 5200, // bot: hesitation per pour at t=1 (fully hesitant)
    budgetMs: 25000,       // the reservoir, before assist — swept to a ~32% band
    fumbleCostMs: 650,     // live: reservoir lost per illegal pour (the decline shake)
    perfectFrac: 0.62,     // solve inside this fraction, zero fumbles = the bonus tier
    hastyDecayS: 0.9,      // live pace gauge: how fast a fumble spike decays
    hesitantWindowMs: 2600,// live pace gauge: ms of stillness = fully hesitant
    idleDemoMs: 4600,      // idle this long → the hand comes back; keep idling → it
                           // pours for real. TIMER LAW: demo pours never burn budget
                           // (the reservoir only drains after the first pointerdown).
    demoPourMs: 1150,      // idle demo cadence
    retryMs: 820,
    assistPerFail: 0.30    // see ASSIST() — tops up the RESERVOIR, never moves liquid
  },

  SHOW_PHONE_FRAME: 'auto',  // 'auto' | true | false
  DEBUG: false               // true (or ?debug=1) shows the debug overlay: event ticker + size/fps
};

/* The analytics shim. Swap this ONE function to wire a real endpoint — every event
   in the ad passes through it on the way to the three required destinations. */
CONFIG.ANALYTICS = function (name, payload) {
  // e.g. navigator.sendBeacon('https://your-endpoint/e', JSON.stringify({ name: name, payload: payload }));
};

var P = CONFIG.PALETTE, T = CONFIG.TUNING;
var DEG = Math.PI / 180;

/* ══ 2. INSTRUMENTATION — ENGINE. Four events, three destinations. ════════
   console · window.parent (the docs/gallery-embed.md envelope) · __ad.events.
   Nothing on the glass by default — the gallery site renders the live feed
   BESIDE the phone frame from the postMessage envelope. The debug overlay
   (CONFIG.DEBUG / ?debug=1) shows the old ticker + size tag for dev work.
   Never quietly drop an event. */

var EVENTS = [];
var t0 = performance.now();

// Stamped by tools/bake.mjs — the ad's own byte size, exposed via inorganic_meta
// and the debug overlay. Measuring it at runtime would cost a request (and throw
// CORS on file://); this ad makes zero requests.
var SIZE_BYTES = 119065; /* @size */

function emit(name, payload) {
  var e = { event: name, payload: payload || {}, t: Math.round(performance.now() - t0) };
  EVENTS.push(e);
  console.log('[playable] ' + name, e.payload);
  try { CONFIG.ANALYTICS(name, e.payload); } catch (err) {}
  try { if (window.parent && window.parent !== window)
    window.parent.postMessage({ type: 'inorganic_event', name: name, payload: e.payload, t: e.t }, '*');
  } catch (err) {}
  tick(name, e.payload);
}

// The gallery's size/requests/fps badge. Posted on boot, then re-posted whenever
// the fps sample refreshes (~1/s) so the badge is live. docs/gallery-embed.md.
function postMeta() {
  try { if (window.parent && window.parent !== window)
    window.parent.postMessage({ type: 'inorganic_meta', meta: { bytes: SIZE_BYTES, requests: 0, fps: LAST_FPS } }, '*');
  } catch (err) {}
}

// Haptics. Guarded: desktop and iOS Safari have no vibrate(), and calling it there
// unguarded throws. Pass a number or a [buzz, gap, buzz] pattern.
function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }

// Debug-overlay ticker rows. The overlay is display:none unless debug is on, so
// this costs nothing on the player-facing glass.
var tickerEl = document.getElementById('dbg-ticker');
function tick(name, payload) {
  var val = payload && payload.ms_to_first_tap != null ? payload.ms_to_first_tap + 'ms'
          : payload && payload.ms != null ? (payload.ms / 1000).toFixed(1) + 's'
          : payload && payload.source ? payload.source : '✓';
  var row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = '<span class="nm"></span><span class="vl"></span>';
  row.querySelector('.nm').textContent = name;
  row.querySelector('.vl').textContent = val;
  tickerEl.appendChild(row);
  var rows = tickerEl.querySelectorAll('.row');
  if (rows.length > 4) rows[0].remove();
}

/* ══ 3. AUDIO — ENGINE. Procedural, gesture-gated, silence-safe. ══════════
   Never construct an AudioContext before the first pointerdown, or iOS logs a
   warning and Chrome's autoplay policy leaves it suspended forever. */

var SFX = (function () {
  var ctx = null, muted = false;
  function ac() {
    if (muted) return null;
    if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; } }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(freq, endFreq, dur, type, vol, delay) {
    var c = ac(); if (!c) return;
    var t = c.currentTime + (delay || 0);
    var o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (endFreq) o.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, vol, cut, delay) {
    var c = ac(); if (!c) return;
    var t = c.currentTime + (delay || 0);
    var n = Math.floor(c.sampleRate * dur), buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 1.6);
    var src = c.createBufferSource(), g = c.createGain(), f = c.createBiquadFilter();
    src.buffer = buf; f.type = 'lowpass'; f.frequency.value = cut || 900;
    g.gain.setValueAtTime(vol, t);
    src.connect(f); f.connect(g); g.connect(c.destination); src.start(t);
  }
  return {
    unlock: function () { ac(); },
    setMuted: function (m) { muted = m; if (m && ctx) { try { ctx.close(); } catch (e) {} ctx = null; } },
    isMuted: function () { return muted; },
    // glass tink on select — the "pick up" answer
    tink:   function () { tone(1240, 1560, 0.06, 'triangle', 0.07); noise(0.03, 0.03, 6000); },
    untink: function () { tone(880, 640, 0.05, 'triangle', 0.045); },
    // dull thunk on an illegal target
    thunk:  function () { tone(150, 92, 0.09, 'square', 0.10); noise(0.07, 0.08, 500); },
    // the ASMR core: a bottle glug whose pitch rises as the destination fills
    glug:   function (fill) {
      var f = 165 + fill * 92;
      tone(f * 1.5, f, 0.055, 'sine', 0.17);
      tone(f * 0.8, f * 2.2, 0.075, 'sine', 0.15, 0.05);
      noise(0.06, 0.05, 700, 0.02);
    },
    settle: function () { noise(0.12, 0.05, 900); },
    // a tube going pure — shine sweep's chime
    chime:  function () { tone(1568, 0, 0.28, 'triangle', 0.11); tone(2093, 0, 0.34, 'triangle', 0.07, 0.05); noise(0.10, 0.03, 8000, 0.02); },
    // the near-miss "hm"
    sting:  function () { tone(330, 292, 0.22, 'sine', 0.07); },
    // the finale wave rings each tube in turn
    note:   function (i) { var s = [523, 659, 784, 1047, 1319]; tone(s[Math.min(i, 4)], 0, 0.30, 'triangle', 0.12); },
    win:    function () { [523, 659, 784, 1047].forEach(function (f, i) { tone(f, 0, 0.34, 'triangle', 0.09, 0.55 + i * 0.09); }); noise(0.4, 0.04, 5000, 0.6); },
    fail:   function () { tone(210, 58, 0.5, 'sawtooth', 0.12); noise(0.30, 0.12, 420); },
    whoosh: function () { noise(0.22, 0.07, 2000); }
  };
})();

/* ══ 4. AD CONTAINER — ENGINE. MRAID, Google ExitApi, or plain web. ═══════
   Google AdMob does NOT speak MRAID; it injects ExitApi and its own CTA, and
   calling mraid.* in a Google build is a rejection. Check ExitApi first. */

var MRAID = window.mraid || null;
var started = false;

function bootWhenReady() {
  if (!MRAID) { start(); return; }                       // website / Google / preview
  if (MRAID.getState && MRAID.getState() === 'loading')
    MRAID.addEventListener('ready', onMraidReady);
  else onMraidReady();
}
function onMraidReady() {
  if (MRAID.isViewable && MRAID.isViewable()) { start(); return; }
  MRAID.addEventListener('viewableChange', function (v) { if (v) start(); });
}
function start() {
  if (started) return;
  started = true;
  t0 = performance.now();
  emit('playable_start', { mraid: !!MRAID });
  // Campaign-requested alias — emitted ALONGSIDE the canonical event, never
  // instead of it (docs/gallery-embed.md: the envelope is not a rename layer).
  emit('play_start', { alias_of: 'playable_start' });
  postMeta();
  resetAttempt(true);
}

function openStore(source) {
  emit('cta_click', { source: source });
  if (window.ExitApi && window.ExitApi.exit) { window.ExitApi.exit(); return; }   // Google AdMob

  /* ── MINTEGRAL ────────────────────────────────────────────────────────────
     Mintegral does NOT attribute a plain mraid.open(). For an MTG build,
     uncomment this (confirm against the campaign's spec sheet — some MTG
     template versions expose window.install() instead):                      */
  // if (window.mtg && window.mtg.openurl) { window.mtg.openurl(CONFIG.CTA_URL); return; }

  if (MRAID && MRAID.open) { MRAID.open(CONFIG.CTA_URL); return; }                // MRAID 3.0
  ctaClicked();                                                                    // plain web
}

// Website-showcase behaviour. Global so a host page can override it.
// Gallery/demo build: this is a showcase, not a store listing — there's no game to
// launch, so PLAY NOW is deliberately INERT (no navigation). The cta_click event
// still fires in openStore, so the instrumentation demo stays honest; and the ad-
// network hooks in openStore (ExitApi / MRAID) are untouched for real campaigns.
window.ctaClicked = function () {
  showToast(CONFIG.COPY.toast);
};

var toastEl = document.getElementById('toast'), toastT = 0;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(function () { toastEl.classList.remove('on'); }, 3200);
}

/* ══ 5. LAYOUTS — GAME LOGIC. One authored staging per orientation. ═══════
   NOT one scene letterboxed twice. Portrait stacks tray / dial+buttons below;
   landscape re-stages the row mid-frame with the reservoir far left and the
   dial + buttons in the right slack. The BOARD topology is shared (section 6);
   only the pixel staging differs — the same split GRIDLOCK and CANDY SWAP use.
   safe{} is the box guaranteed fully on-screen; the studio backdrop is drawn
   beyond it to fill whatever slack the viewport has. */

var LAYOUTS = {
  portrait: {
    safe: { x: 0, y: 0, w: 620, h: 1160 },
    tubes: { xs: [128, 232, 336, 440, 544], w: 86, h: 330, baseY: 862 },
    tray: { x1: 62, x2: 596, y: 862, h: 30 },
    res:  { x: 40, w: 30, top: 500, base: 862 },    // the reservoir (the clock)
    dial: { x: 318, y: 1004, r: 56 },               // the pace dial (the control)
    undo: { x: 96, y: 1004, r: 40 },
    restart: { x: 190, y: 1004, r: 40 },
    floatAt: { x: 336, y: 466 },
    key: { x: 240, y: 250, r: 430 }                 // the soft studio key light
  },
  landscape: {
    safe: { x: 0, y: 0, w: 1180, h: 560 },
    tubes: { xs: [400, 504, 608, 712, 816], w: 84, h: 300, baseY: 470 },
    tray: { x1: 322, x2: 896, y: 470, h: 26 },
    res:  { x: 180, w: 28, top: 160, base: 470 },
    dial: { x: 1035, y: 168, r: 52 },
    undo: { x: 988, y: 396, r: 40 },
    restart: { x: 1082, y: 396, r: 40 },
    floatAt: { x: 608, y: 128 },
    key: { x: 520, y: 120, r: 520 }
  }
};

// tube i → its geometry in world space for the CURRENT staging
function tubeGeo(L, i) {
  var tb = L.tubes;
  return { cx: tb.xs[i], w: tb.w, h: tb.h, baseY: tb.baseY, topY: tb.baseY - tb.h };
}
// the y of the liquid surface inside tube i (world), for streams and guides
function liquidTopY(L, i) {
  var g = tubeGeo(L, i);
  return g.baseY - 10 - unitH(L) * (W.board[i].length + pourFrac(i));
}
// mid-stream, the fraction of a unit visually in transit for tube i. The board
// mutates whole units at each glug's midpoint; this signed remainder (±half a
// unit at most) lets the drawn surfaces glide continuously between the ticks.
function pourFrac(i) {
  var p = W && W.pour;
  if (!p || p.phase !== 'stream' || (i !== p.s && i !== p.d)) return 0;
  var prog = Math.min(p.n, p.n * p.t / p.streamDur);
  return i === p.d ? prog - p.moved : p.moved - prog;
}
function unitH(L) { return (L.tubes.h - 48) / CONFIG.CAP; }

function prep(L) {
  if (L._ready) return L;
  L._ready = true;
  return L;
}

/* ══ 6. SIM — GAME LOGIC, but the SHAPE is mandatory. ═════════════════════

   The POUR RULES, in one function: a pour moves the contiguous top same-colour
   run from source to destination; legal only if the destination is empty or its
   top colour matches, and it has room; as many units move as fit. legalPour()
   is the ONE hit-test — the live tap handler, the BFS solver, the idle demo,
   the escalating preview and the harness autopilot all call it. Never a copy.

   The canonical plan comes from solveFrom() — a deterministic BFS (fixed move
   order, no randomness) over a tiny state space. simRun(t) must be PURE and
   DETERMINISTIC: same t in, same result out. t is NOT a physical quantity —
   it is the player's deviation from optimal PACING (docs/archetypes.md):
     t < 0.5  → hasty:    the bot fumbles reservoir away on illegal pours
     t = 0.5  → steady:   the bot pours the canonical plan, promptly
     t > 0.5  → hesitant: the bot dawdles between pours
   Both sides burn the SAME budget — the reservoir — so both fail for real,
   distinguishable reasons: 'rushed' vs 'stalled'. Never Math.random() here. */

var CAPN = CONFIG.CAP, NTUBES = CONFIG.BOARD.length, LQ = CONFIG.LIQUIDS;

function freshBoard() { return CONFIG.BOARD.map(function (t) { return t.slice(); }); }

function topRunOf(tube) {
  if (!tube.length) return { color: -1, n: 0 };
  var c = tube[tube.length - 1], n = 1;
  while (n < tube.length && tube[tube.length - 1 - n] === c) n++;
  return { color: c, n: n };
}
function isPure(tube) {
  for (var i = 1; i < tube.length; i++) if (tube[i] !== tube[0]) return false;
  return tube.length > 0;
}
function isComplete(tube) { return tube.length === CAPN && isPure(tube); }
function boardSolved(board) {
  for (var i = 0; i < board.length; i++)
    if (board[i].length && !isComplete(board[i])) return false;
  return true;
}

// THE shared hit-test: how many units s→d would move; 0 = illegal.
function legalPour(board, s, d) {
  if (s === d) return 0;
  var src = board[s], dst = board[d];
  if (!src.length || dst.length >= CAPN) return 0;
  if (isComplete(src)) return 0;                    // a capped tube is done
  var run = topRunOf(src);
  if (dst.length && dst[dst.length - 1] !== run.color) return 0;
  return Math.min(run.n, CAPN - dst.length);
}

function pourCopy(board, s, d, n) {
  var b = board.map(function (t) { return t.slice(); });
  var moved = b[s].splice(b[s].length - n, n);
  for (var i = 0; i < moved.length; i++) b[d].push(moved[i]);
  return b;
}
function keyOf(board) {
  return board.map(function (t) { return t.join(''); }).sort().join('|');
}

// Deterministic BFS shortest solve — the canonical plan. Shared by the sim bot,
// the idle demo, the escalating preview and the harness autopilot. The state
// space of a 5-tube board is a few thousand nodes; this returns in ~1ms.
function solveFrom(board) {
  if (boardSolved(board)) return [];
  var seen = {}; seen[keyOf(board)] = 1;
  var frontier = [{ b: board, path: [] }], depth = 0;
  while (frontier.length && depth++ < 40) {
    var next = [];
    for (var f = 0; f < frontier.length; f++) {
      var node = frontier[f];
      for (var s = 0; s < NTUBES; s++) for (var d = 0; d < NTUBES; d++) {
        var n = legalPour(node.b, s, d);
        if (!n) continue;
        if (!node.b[d].length && isPure(node.b[s])) continue;   // a null move
        var b2 = pourCopy(node.b, s, d, n);
        var k = keyOf(b2);
        if (seen[k]) continue;
        seen[k] = 1;
        var path = node.path.concat([{ s: s, d: d, n: n }]);
        if (boardSolved(b2)) return path;
        next.push({ b: b2, path: path });
      }
    }
    frontier = next;
  }
  return null;
}

var SOLUTION = solveFrom(freshBoard()) || [];
var SOLVE_LEN = SOLUTION.length;
// Boot guards for reskins: the board must be solvable and each colour must
// total exactly CAP units (completion = a full tube of one colour).
(function () {
  if (!SOLVE_LEN) console.error('[chroma-sort] CONFIG.BOARD is not solvable — fix the board');
  var counts = {};
  for (var i = 0; i < CONFIG.BOARD.length; i++)
    for (var u = 0; u < CONFIG.BOARD[i].length; u++)
      counts[CONFIG.BOARD[i][u]] = (counts[CONFIG.BOARD[i][u]] || 0) + 1;
  for (var c in counts) if (counts[c] !== CAPN)
    console.error('[chroma-sort] colour ' + c + ' totals ' + counts[c] + ' units — must be exactly CAP (' + CAPN + ')');
})();

// The engineered near-miss is a PROPERTY of the state, not a script: the board
// "looks stuck" when no matching-top pour exists anywhere yet a rescue pour
// (onto an empty tube) does. The chosen BOARD guarantees the canonical path
// passes through exactly this once, mid-solve.
function looksStuck(board) {
  var match = 0, rescue = 0;
  for (var s = 0; s < NTUBES; s++) for (var d = 0; d < NTUBES; d++) {
    var n = legalPour(board, s, d);
    if (!n) continue;
    if (board[d].length) match++;
    else if (!isPure(board[s])) rescue++;
  }
  return !match && rescue > 0;
}

// The bot: holds a CONSTANT pace for the whole attempt, exactly like CLOUD
// RUNNER holds a constant steering error. It always pours the canonical plan —
// the only thing t changes is how much reservoir it fumbles away first (hasty)
// and how long it dawdles before each pour (hesitant).
function simRun(t, assist) {
  var budget = T.budgetMs * (1 + (assist || 0));
  var hasty = Math.max(0, (0.5 - t) / 0.5);
  var slow = Math.max(0, (t - 0.5) / 0.5);
  var perPour = T.reactMs + T.pourAnimMs + slow * T.maxExtraDelayMs + hasty * T.maxFumbleMs;
  var elapsed = perPour * SOLVE_LEN;
  var fumbledMs = hasty * T.maxFumbleMs * SOLVE_LEN;
  var won = elapsed <= budget;
  return {
    out: won ? 'win' : (t < 0.5 ? 'rushed' : 'stalled'),
    elapsed: Math.round(elapsed),
    fumbledMs: Math.round(fumbledMs),
    perfect: won && fumbledMs < 1 && elapsed <= budget * T.perfectFrac
  };
}

// Sample the whole control range. The harness uses this to PROVE the level is
// winnable but not trivial (and, for a timed archetype, that the pre-assist
// budget is ≥ 2× the ideal solve — `elapsed` in each sample feeds that check).
function sweep(assist, n) {
  n = n || 200;
  var res = [], win = [];
  for (var i = 0; i < n; i++) {
    var t = i / (n - 1);
    var r = simRun(t, assist || 0);
    res.push({ t: t, out: r.out, elapsed: r.elapsed, perfect: r.perfect });
    if (r.out === 'win') win.push(t);
  }
  var band = win.length ? { lo: win[0], hi: win[win.length - 1], width: win[win.length - 1] - win[0] } : null;
  return {
    band: band,
    idealApex: null,   // n/a for this archetype; kept for contract shape
    perfect: res.filter(function (r) { return r.out === 'win' && r.perfect; }).map(function (r) { return r.t; }),
    samples: res
  };
}

/* ══ 7. RENDERER — ENGINE. HiDPI backing store + contain-fit camera. ══════
   Canvas 2D has no automatic DPR handling: size the BACKING STORE in physical
   pixels, the CSS box in layout pixels, then scale the context. Re-apply on
   every resize. Cap DPR at 2 — 3× costs ~2× the fill for no visible gain. */

var cv = document.getElementById('c'), cx = cv.getContext('2d', { alpha: false });
var VW = 0, VH = 0, DPR = 1;
var cam = { s: 1, ox: 0, oy: 0 };
var vignette = null, grain = null;

function layout() { return LAYOUTS[VW / VH > 1.15 ? 'landscape' : 'portrait']; }

function resize() {
  var stage = document.getElementById('stage');
  var frame = CONFIG.SHOW_PHONE_FRAME === true ||
             (CONFIG.SHOW_PHONE_FRAME === 'auto' && window.innerWidth > 760 && window.innerHeight > 560);
  stage.classList.toggle('framed', frame);
  document.getElementById('notch').style.display = frame ? 'block' : 'none';

  var box = document.getElementById('screen').getBoundingClientRect();
  VW = Math.max(1, Math.round(box.width));
  VH = Math.max(1, Math.round(box.height));
  DPR = Math.min(window.devicePixelRatio || 1, 2);

  cv.width  = Math.round(VW * DPR);
  cv.height = Math.round(VH * DPR);
  cv.style.width = VW + 'px';
  cv.style.height = VH + 'px';
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);

  var L = prep(layout());
  cam.s = Math.min(VW / L.safe.w, VH / L.safe.h);     // contain: nothing critical crops
  cam.ox = (VW - L.safe.w * cam.s) / 2 - L.safe.x * cam.s;
  cam.oy = (VH - L.safe.h * cam.s) / 2 - L.safe.y * cam.s;

  if (!grain) grain = makeGrain();
  vignette = makeVignette();
  if (W && W.layout !== L) resetAttempt(true);        // orientation flip → silent re-stage
}
window.addEventListener('resize', function () { setTimeout(resize, 0); });
window.addEventListener('orientationchange', function () { setTimeout(resize, 60); });

function X(x) { return x * cam.s + cam.ox; }
function Y(y) { return y * cam.s + cam.oy; }
function S(v) { return v * cam.s; }

// ALWAYS size canvas text with this, never with a raw world number.
//
// Positions go through X()/Y()/S(); a font size set straight from world units does
// NOT, so the text renders oversized for the world it sits in — and, because cam.s
// differs per orientation, it looks correct in one and broken in the other. That cost
// a debugging session in CLOUD RUNNER, where two gate labels collided into an
// unreadable mash in portrait only. See docs/learnings.md.
function FS(worldSize) { return Math.max(8, S(worldSize)); }
function text(str, wx, wy, worldSize, fill, stroke) {
  cx.font = '700 ' + FS(worldSize) + "px 'Chakra','Trebuchet MS',sans-serif";
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  if (stroke) {
    cx.lineWidth = Math.max(2, S(worldSize * 0.11));
    cx.strokeStyle = stroke;
    cx.strokeText(str, X(wx), Y(wy));
  }
  cx.fillStyle = fill;
  cx.fillText(str, X(wx), Y(wy));
}

function makeVignette() {
  var o = document.createElement('canvas');
  o.width = Math.max(2, VW >> 1); o.height = Math.max(2, VH >> 1);
  var g = o.getContext('2d');
  var r = g.createRadialGradient(o.width / 2, o.height * 0.44, o.height * 0.16,
                                 o.width / 2, o.height * 0.5, o.height * 0.82);
  r.addColorStop(0, 'rgba(0,0,0,0)');
  r.addColorStop(0.62, 'rgba(58,50,40,0.08)');
  r.addColorStop(1, 'rgba(52,44,34,0.34)');
  g.fillStyle = r; g.fillRect(0, 0, o.width, o.height);
  // bake the grain in, so the whole post pass is a single drawImage per frame
  if (grain) {
    g.globalAlpha = 0.05;
    g.fillStyle = g.createPattern(grain, 'repeat');
    g.fillRect(0, 0, o.width, o.height);
  }
  return o;
}
function makeGrain() {
  var o = document.createElement('canvas'); o.width = o.height = 96;
  var g = o.getContext('2d'), d = g.createImageData(96, 96), a = d.data;
  for (var i = 0; i < a.length; i += 4) {
    var n = 118 + Math.random() * 68;
    a[i] = a[i + 1] = a[i + 2] = n; a[i + 3] = 255;
  }
  g.putImageData(d, 0, 0);
  return o;
}

// One prerendered radial glow, tinted on demand. NEVER use ctx.shadowBlur in a
// frame loop — it is the single most expensive thing in canvas 2D.
var GLOW = (function () {
  var o = document.createElement('canvas'); o.width = o.height = 128;
  var g = o.getContext('2d');
  var r = g.createRadialGradient(64, 64, 0, 64, 64, 64);
  r.addColorStop(0, 'rgba(255,255,255,1)');
  r.addColorStop(0.22, 'rgba(255,255,255,0.55)');
  r.addColorStop(0.55, 'rgba(255,255,255,0.16)');
  r.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = r; g.fillRect(0, 0, 128, 128);
  return o;
})();
var tintCache = {};
function tint(color) {
  if (tintCache[color]) return tintCache[color];
  var o = document.createElement('canvas'); o.width = o.height = 128;
  var g = o.getContext('2d');
  g.drawImage(GLOW, 0, 0);
  g.globalCompositeOperation = 'source-in';
  g.fillStyle = color; g.fillRect(0, 0, 128, 128);
  tintCache[color] = o;
  return o;
}
function glow(x, y, rad, color, alpha) {
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  cx.globalAlpha = alpha;
  cx.drawImage(tint(color), x - rad, y - rad, rad * 2, rad * 2);
  cx.restore();
}
function poly(pts, fill, edge) {
  cx.beginPath();
  cx.moveTo(X(pts[0].x), Y(pts[0].y));
  for (var i = 1; i < pts.length; i++) cx.lineTo(X(pts[i].x), Y(pts[i].y));
  cx.closePath();
  cx.fillStyle = fill; cx.fill();
  if (edge) { cx.strokeStyle = edge; cx.lineWidth = Math.max(1, S(2)); cx.stroke(); }
}

/* ══ 8. STATE + DIFFICULTY — ENGINE contract, GAME LOGIC fields. ══════════ */

var W = null;
var attempts = 0, firstTapAt = 0, wonAt = 0, gemGot = false;
var shake = 0, shakeMag = 0, hitstop = 0, timeScale = 1, camPush = 0;
var parts = [], floats = [], confetti = [];

// Nobody watches an ad twice to "get good", so misses have to TEACH. Do that by
// revealing more of the solution each time — never by cheating. The RESERVOIR
// tops up only a hair (≤35%): enough to forgive a near-miss run, never enough
// to look like the clock waited for you. See docs/playable-design.md.
function ASSIST() { return Math.min(attempts * T.assistPerFail, 0.35); }
function PREVIEW_FRAC() { return Math.min(1, 0.45 + attempts * 0.16); }

// GAME LOGIC: the LIVE pace readout — the control. 0.5 = steady (acting
// promptly); it spikes toward 0 on a fumbled pour (hasty) and drifts toward 1
// the longer nothing happens (hesitant). The same scalar the sim bot holds
// CONSTANT — see simRun(). setControl() can override it (dev/test only).
function tOf(w) {
  if (w.paceOverride != null) return w.paceOverride;
  var since = performance.now() - w.lastEventAt;
  var hesitant = Math.max(0, Math.min(1, since / T.hesitantWindowMs));
  var hasty = Math.max(0, Math.min(1, w.hastyBurst));
  return Math.max(0, Math.min(1, 0.5 - hasty * 0.5 + hesitant * 0.5));
}

function resetAttempt(hard) {
  var L = prep(layout());
  var total = T.budgetMs * (1 + ASSIST());
  W = {
    layout: L,
    state: 'SOLVE',            // SOLVE → RESOLVE → SOLVE (a fail retries) | END (a win)
    board: freshBoard(),
    plan: SOLUTION.slice(),
    sel: -1, pour: null, history: [], pours: 0, fumbles: 0,
    timeTotal: total, timeLeft: total,
    lastEventAt: performance.now(), hastyBurst: 0, paceOverride: null,
    startedAt: performance.now(), touched: false, idle: 0, demo: false, demoT: 0,
    nearMissAt: 0, out: null, resolveT: 0, hint: 1,
    lift: [0, 0, 0, 0, 0], liftT: [0, 0, 0, 0, 0],   // current / target lift per tube
    wig: [-9, -9, -9, -9, -9],                       // decline-shake clocks (TIME)
    surf: [], capped: [false, false, false, false, false],
    capT: [0, 0, 0, 0, 0],                           // shine-sweep clocks per tube
    wave: null, resTremor: 0, btnPop: { u: 0, r: 0 }
  };
  for (var i = 0; i < NTUBES; i++) W.surf.push({ o: 0, v: 0 });
  parts.length = 0; floats.length = 0;
  if (hard) { confetti.length = 0; timeScale = 1; camPush = 0; }
}

function replan() { W.plan = solveFrom(W.board) || []; }

/* ══ 9. INPUT — GAME LOGIC. Two taps: lift a tube, pour it. Only a matching
   destination accepts; an illegal target answers with a decline shake and a
   visible dip of the reservoir (the cost is TIME, spatially read — no attempt
   is ever burned by a tap). Undo and restart are small frosted buttons; the
   whole game is one thumb. */

function toWorld(ev) {
  var b = cv.getBoundingClientRect();
  return { x: (ev.clientX - b.left - cam.ox) / cam.s, y: (ev.clientY - b.top - cam.oy) / cam.s };
}
// GAME LOGIC: which tube (if any) sits under a world point — thumb-generous.
function tubeAtPoint(L, p) {
  for (var i = 0; i < NTUBES; i++) {
    var g = tubeGeo(L, i);
    if (Math.abs(p.x - g.cx) < g.w * 0.72 && p.y > g.topY - 60 && p.y < g.baseY + 26) return i;
  }
  return -1;
}
function inCircle(p, c) { return Math.hypot(p.x - c.x, p.y - c.y) < c.r + 8; }

// GAME LOGIC: where THE CONTROL sits on screen — the pace-dial needle. A tap
// here is always safe: it is a decorative HUD dial, never a tube, so the
// harness's stray-tap probe (it taps exactly here) can never cost anything.
function dialNeedlePos() {
  var g = W.layout.dial, t = tOf(W);
  var a = Math.PI + t * Math.PI;                   // t=0 → left, t=1 → right, through up
  return { x: g.x + Math.cos(a) * g.r * 0.64, y: g.y + Math.sin(a) * g.r * 0.64 };
}

function onDown(ev) {
  ev.preventDefault();
  SFX.unlock();
  if (!firstTapAt && started) {
    firstTapAt = performance.now();
    emit('first_interaction', { ms_to_first_tap: Math.round(firstTapAt - t0) });
    setTimeout(function () { document.getElementById('rail').classList.add('on'); }, 1100);
  }
  if (!W || W.state !== 'SOLVE') return;
  var L = W.layout, wp = toWorld(ev);

  if (inCircle(wp, L.undo)) { doUndo(); return; }
  if (inCircle(wp, L.restart)) { doRestart(); return; }
  if (W.pour && W.pour.phase !== 'return') return; // mid-air pour: let it land

  if (!W.touched) W.startedAt = performance.now(); // the reservoir arms NOW (timer law)
  W.touched = true; W.idle = 0; W.demo = false;

  if (W.pour) {                                    // the settle: you may already
    var nx2 = tubeAtPoint(L, wp);                  // lift the NEXT tube, but not
    if (nx2 >= 0 && W.sel < 0 && !W.capped[nx2]) selectTube(nx2);   // pour yet
    return;
  }

  var i = tubeAtPoint(L, wp);
  if (i < 0) { if (W.sel >= 0) deselect(); return; }   // bare studio — harmless
  if (W.capped[i]) { capGlint(i); return; }            // a done tube: a glint, no more
  if (W.sel === i) { deselect(); return; }
  if (W.sel < 0) { selectTube(i); return; }
  var n = legalPour(W.board, W.sel, i);
  if (n) startPour(W.sel, i, n);
  else declinePour(W.sel, i);
}
cv.addEventListener('pointerdown', onDown, { passive: false });

// GAME LOGIC: the shared hit-test (legalPour, section 6) already decided
// whether the second tap is a pour — these carry out the consequences.
function selectTube(i) {
  if (!W.board[i].length) { wiggle(i); SFX.untink(); return; }   // nothing to pour
  W.sel = i;
  W.lastEventAt = performance.now();
  SFX.tink(); buzz(10);
}
function deselect() { W.sel = -1; SFX.untink(); }
function wiggle(i) { W.wig[i] = TIME; }
function capGlint(i) { W.capT[i] = Math.max(W.capT[i], 0.0001); SFX.tink(); }

function startPour(s, d, n) {
  W.sel = -1;
  W.lastEventAt = performance.now();
  W.hastyBurst = Math.max(0, W.hastyBurst - 0.4);
  W.pour = { s: s, d: d, n: n, color: W.board[s][W.board[s].length - 1],
             t: 0, phase: 'travel', moved: 0, streamDur: 0.16 + 0.15 * n };
  SFX.whoosh(); buzz(12);
}

function declinePour(s, d) {
  W.fumbles++;
  W.hastyBurst = 1;
  W.lastEventAt = performance.now();
  W.timeLeft = Math.max(0, W.timeLeft - T.fumbleCostMs);   // the cost is visible: the
  W.resTremor = 1;                                         // reservoir dips and shivers
  wiggle(s);                                               // the SOURCE declines
  kick(3, 0.12);
  SFX.thunk(); buzz(24);
  emit('invalid_pour', { from: s, to: d });
  if (W.touched && W.timeLeft <= 0) failRun('rushed');
}

// Move n units s→d on the logical board (shared by the animated pour's unit
// ticks and the instant paths — forceWin and the idle demo's fast path).
function moveUnits(s, d, n) {
  var src = W.board[s];
  var moved = src.splice(src.length - n, n);
  for (var i = 0; i < moved.length; i++) W.board[d].push(moved[i]);
}
// Bookkeeping every completed pour goes through, animated or instant: events,
// replan, tube completion, the near-miss, the win.
function afterPour(s, d, n) {
  W.pours++;
  W.history.push({ s: s, d: d, n: n });
  emit('pour', { from: s, to: d, units: n, pours: W.pours });
  replan();
  if (isComplete(W.board[d]) && !W.capped[d]) capTube(d);
  if (boardSolved(W.board)) { winRun(); return; }
  if (!W.nearMissAt && looksStuck(W.board)) {
    W.nearMissAt = performance.now();
    W.resTremor = 1;
    SFX.sting();
    emit('near_miss', { pours: W.pours });
  }
}
function commitPourInstant(s, d, n) { moveUnits(s, d, n); afterPour(s, d, n); }

function capTube(i) {
  W.capped[i] = true; W.capT[i] = 0.0001;                  // starts the shine sweep
  var g = tubeGeo(W.layout, i), c = LQ[W.board[i][0]];
  kick(2.5, 0.1);
  SFX.chime(); buzz([18, 20, 26]);
  burst(g.cx, g.topY + 16, c.lit, 8, 150, 0.5, 3);
  emit('tube_completed', { colour: c.name, tube: i, pours: W.pours });
}

function doUndo() {
  if (!W.history.length || W.pour) { SFX.untink(); return; }
  var mv = W.history.pop();
  var dst = W.board[mv.d];
  var units = dst.splice(dst.length - mv.n, mv.n);
  for (var i = 0; i < units.length; i++) W.board[mv.s].push(units[i]);
  if (W.capped[mv.d] && !isComplete(W.board[mv.d])) { W.capped[mv.d] = false; W.capT[mv.d] = 0; }
  W.pours = Math.max(0, W.pours - 1);
  W.sel = -1;
  W.surf[mv.s].v -= 240; W.surf[mv.d].v += 180;
  W.lastEventAt = performance.now();
  W.btnPop.u = 1;
  replan();
  SFX.untink(); buzz(8);
  emit('undo', { restored: mv.n });
}

function doRestart() {
  if (W.pour) return;
  if (!W.pours && !W.fumbles) { SFX.untink(); return; }    // board is already fresh
  W.btnPop.r = 1;
  SFX.whoosh(); buzz(16);
  emit('restart', { pours: W.pours });
  attempts++;                        // a voluntary retry climbs the same honest
  resetAttempt(false);               // ladder as a timeout: more preview, more top-up
}

/* ══ 10. JUICE — ENGINE. Calibrate the numbers, keep the tools. ═══════════ */

function burst(x, y, color, n, spd, life, size) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2, s = spd * (0.35 + Math.random() * 0.65);
    parts.push({ x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - spd * 0.2,
      r: (size || 4) * (0.5 + Math.random()), life: life || 0.7, max: life || 0.7,
      c: color, g: 900 + Math.random() * 700, rot: Math.random() * 6, spin: (Math.random() - 0.5) * 14 });
  }
}
function float(x, y, text, color, size) {
  floats.push({ x: x, y: y, text: text, c: color, s: size || 26, life: 0.9, max: 0.9 });
}
function kick(mag, dur) { shakeMag = Math.max(shakeMag, mag); shake = Math.max(shake, dur); }
function stop(ms) { hitstop = Math.max(hitstop, ms / 1000); }
// Effervescence rising from a tube's mouth — debris OF that tube's own liquid
// (its colours, its position, upward momentum), never confetti from nowhere.
function fizz(i, n) {
  var g = tubeGeo(W.layout, i), c = LQ[W.board[i][0]] || LQ[0];
  for (var k = 0; k < n; k++) {
    parts.push({ x: g.cx + (Math.random() - 0.5) * g.w * 0.6, y: g.topY - 12,
      vx: (Math.random() - 0.5) * 60, vy: -90 - Math.random() * 170,
      r: 2.2 + Math.random() * 3.2, life: 0.9 + Math.random() * 0.5, max: 1.2,
      c: k % 3 ? c.lit : c.base, g: 60, rot: 0, spin: 0 });
  }
}
// Droplet spray where the stream lands — the pour's own colour and momentum.
function spray(x, y, color, n) {
  for (var k = 0; k < n; k++) {
    parts.push({ x: x + (Math.random() - 0.5) * 8, y: y,
      vx: (Math.random() - 0.5) * 150, vy: -60 - Math.random() * 120,
      r: 1.6 + Math.random() * 2.2, life: 0.35 + Math.random() * 0.25, max: 0.5,
      c: color, g: 1400, rot: 0, spin: 0 });
  }
}

/* ══ 11. STEP — GAME LOGIC. ═══════════════════════════════════════════════ */

// smoothstep — the one easing every animation here shares
function ease(u) { u = Math.max(0, Math.min(1, u)); return u * u * (3 - 2 * u); }

function step(dt) {
  if (!W) return;
  var L = W.layout, i;

  if (hitstop > 0) { hitstop -= dt; return; }
  dt *= timeScale;

  if (shake > 0) { shake -= dt; if (shake <= 0) shakeMag = 0; }
  camPush += (0 - camPush) * Math.min(1, dt * 5);
  timeScale += (1 - timeScale) * Math.min(1, dt * (timeScale < 1 ? 2.4 : 8));
  if (timeScale > 0.995) timeScale = 1;

  // per-tube springs: lift toward target, liquid surface settle
  for (i = 0; i < NTUBES; i++) {
    var target = (W.sel === i) ? 1 : (W.liftT[i] || 0);
    W.lift[i] += (target - W.lift[i]) * Math.min(1, dt * 11);
    var sp = W.surf[i];
    sp.v += (-sp.o * 130 - sp.v * 9.5) * dt;
    sp.o += sp.v * dt;
    if (W.capT[i] > 0 && W.capT[i] < 1) W.capT[i] = Math.min(1, W.capT[i] + dt * 2.1);
  }
  W.resTremor = Math.max(0, W.resTremor - dt * 2.4);
  W.btnPop.u = Math.max(0, W.btnPop.u - dt * 4);
  W.btnPop.r = Math.max(0, W.btnPop.r - dt * 4);

  // the pour — travel, glugs, return. The board mutates one unit at a time at
  // the glug beats; the DRAWN surfaces glide continuously between those ticks
  // via pourFrac(), never more than half a unit from the logical board.
  if (W.pour) {
    var p = W.pour;
    p.t += dt;
    if (p.phase === 'travel' && p.t >= 0.16) { p.phase = 'stream'; p.t = 0; }
    else if (p.phase === 'stream') {
      while (p.moved < p.n && p.t >= (p.moved + 0.5) / p.n * p.streamDur) {
        moveUnits(p.s, p.d, 1);
        p.moved++;
        SFX.glug(W.board[p.d].length / CAPN); buzz(8);
        W.surf[p.d].v -= 300;                       // the surface leaps, then settles
        W.surf[p.s].v += 160;
        var sx2 = tubeGeo(L, p.d).cx, sy2 = liquidTopY(L, p.d);
        spray(sx2, sy2, LQ[p.color].base, 3);
      }
      if (p.moved >= p.n && p.t >= p.streamDur) {
        p.phase = 'return'; p.t = 0;
        if (boardSolved(W.board)) stop(70);          // hit-stop right on the last drop
        afterPour(p.s, p.d, p.n);
      }
    }
    else if (p.phase === 'return' && p.t >= 0.20) {
      W.pour = null;
      SFX.settle();
    }
  }

  if (W.state === 'SOLVE' && started) {
    // TIMER LAW: the reservoir's consequential drain starts at the first
    // pointerdown. Pre-touch it sits full and shimmering — an idle viewer
    // watches the hand demo real pours; they can never be failed.
    if (W.touched) {
      W.timeLeft -= dt * 1000;
      if (W.timeLeft <= 0) { failRun('stalled'); return; }
    }
    W.hastyBurst = Math.max(0, W.hastyBurst - dt / T.hastyDecayS);

    // ghost lift under the demo hand's press (cosmetic; recomputed each frame)
    for (i = 0; i < NTUBES; i++) W.liftT[i] = 0;
    if (!W.touched && W.hint > 0.5 && !W.pour && W.plan.length) {
      var hp = (TIME % 2.7) / 2.7;
      if (hp >= 0.16 && hp < 0.62) W.liftT[W.plan[0].s] = 0.35;
    }

    // Never stall — and never fail an idle player. Watching brings the hand
    // back; keep watching and it pours the canonical plan for real (a demo may
    // win; it can never lose — the reservoir isn't armed).
    W.idle += dt;
    if (W.touched) {
      if (W.idle > T.idleDemoMs / 1000) W.hint = Math.min(1, W.hint + dt * 2);
      else W.hint = Math.max(0, W.hint - dt * 1.1);
    } else if (W.idle > T.idleDemoMs / 1000) {
      W.demo = true;
    }
    if (W.demo && !W.pour && W.state === 'SOLVE') {
      W.demoT += dt;
      if (W.demoT > T.demoPourMs / 1000 && W.plan.length) {
        W.demoT = 0;
        var mv = W.plan[0], nn = legalPour(W.board, mv.s, mv.d);
        if (nn) startPour(mv.s, mv.d, nn);
      }
    }
  }

  if (W.state === 'RESOLVE') {
    W.resolveT += dt;
    if (W.out !== 'win' && W.resolveT > T.retryMs / 1000) { attempts++; resetAttempt(false); }
  }

  // the finale wave — rolls the tube row left→right in dilated time
  if (W.wave) {
    var wv = W.wave;
    wv.t += dt * 1.05;
    var xs = L.tubes.xs;
    var bandX = (xs[0] - 130) + (xs[xs.length - 1] + 150 - (xs[0] - 130)) * Math.min(1, wv.t);
    for (i = 0; i < NTUBES; i++) {
      if (!wv.rung[i] && bandX > xs[i]) {
        wv.rung[i] = true;
        if (W.board[i].length) {              // only tubes WITH liquid ring —
          SFX.note(wv.count++); buzz(12);     // fizz is debris OF a liquid,
          fizz(i, 12);                        // never from an empty glass
          kick(1.6, 0.07);
        }
      }
    }
    if (wv.t > 1.5) W.wave = null;
  }

  for (i = parts.length - 1; i >= 0; i--) {
    var pt = parts[i];
    pt.vy += pt.g * dt; pt.x += pt.vx * dt; pt.y += pt.vy * dt;
    pt.rot += pt.spin * dt; pt.life -= dt;
    if (pt.life <= 0) parts.splice(i, 1);
  }
  for (var j = floats.length - 1; j >= 0; j--) {
    var f = floats[j]; f.y -= 46 * dt; f.life -= dt;
    if (f.life <= 0) floats.splice(j, 1);
  }
}

// ── THE MOMENT ── one memorable beat of delight, reserved for the full solve:
// time dilates, the camera pushes in, a gold wave rolls the row ringing an
// arpeggio note per tube, effervescence rises in every liquid's own colour.
// Tube caps along the way stay deliberately small so this one lands.
function winRun() {
  if (!W || W.state === 'RESOLVE' || W.state === 'END') return;
  W.state = 'RESOLVE'; W.out = 'win'; W.resolveT = 0;
  var perfect = W.fumbles === 0 && (performance.now() - W.startedAt) <= W.timeTotal * T.perfectFrac;
  gemGot = perfect;
  timeScale = 0.3; camPush = 1;
  kick(6, 0.26);
  SFX.win(); buzz([40, 30, 90]);
  W.wave = { t: 0, count: 0, rung: [false, false, false, false, false] };
  wonAt = performance.now();
  var payload = { ms: Math.round(wonAt - t0), attempts: attempts + 1,
                  pours: W.pours, bonus: perfect, control: +tOf(W).toFixed(3) };
  emit('level_complete', payload);
  emit('completed', { alias_of: 'level_complete', ms: payload.ms, pours: payload.pours });
  setTimeout(showEnd, 1500);
}

// reason: 'rushed' (fumbles emptied the reservoir) or 'stalled' (it ran dry).
function failRun(reason) {
  if (!W || W.state === 'RESOLVE' || W.state === 'END') return;
  W.state = 'RESOLVE'; W.out = reason; W.resolveT = 0;
  var L = W.layout;
  W.timeLeft = 0;
  kick(5, 0.2);
  SFX.fail(); buzz(45);
  float(L.floatAt.x, L.floatAt.y,
        reason === 'rushed' ? CONFIG.COPY.shortF : CONFIG.COPY.longF, P.fail, 22);
}

/* ══ 12. END CARD — ENGINE. ═══════════════════════════════════════════════ */

var endEl = document.getElementById('end');
function showEnd() {
  if (!W || W.out !== 'win') return;
  W.state = 'END';
  endEl.classList.add('on');
  document.getElementById('rail').classList.remove('on');
}
// The WHOLE scrim triggers the CTA (standard UA convention) — a click anywhere on
// the end card converts, including on the CTA button (its click bubbles here).
// Only REPLAY opts out, by stopping propagation.
endEl.addEventListener('click', function () { openStore('endcard'); });
document.getElementById('railbtn').addEventListener('click', function () { openStore('rail'); });
document.getElementById('replay').addEventListener('click', function (e) {
  e.stopPropagation();
  emit('replay', {});
  endEl.classList.remove('on');
  document.getElementById('rail').classList.add('on');
  attempts = 0; gemGot = false; wonAt = 0;
  confetti.length = 0;
  resetAttempt(true);
});

var muteEl = document.getElementById('mute'), icon = document.getElementById('muteicon');
function drawIcon() {
  icon.innerHTML = SFX.isMuted()
    ? '<path d="M4 9h4l5-4v14l-5-4H4z"/><path d="M17 9l4 6M21 9l-4 6"/>'
    : '<path d="M4 9h4l5-4v14l-5-4H4z"/><path d="M16.5 8.5a5 5 0 010 7M19 6a8.5 8.5 0 010 12"/>';
}
drawIcon();
muteEl.addEventListener('click', function () { SFX.setMuted(!SFX.isMuted()); drawIcon(); });

/* ══ 13. DRAW — GAME LOGIC. Every pixel is a canvas path. Glass is a
   prerendered per-size sprite (one drawImage per tube per frame); light is the
   tinted glow sprite composited 'lighter' — never ctx.shadowBlur. ══════════ */

var TIME = 0;
var GLASS_CACHE = {};
var SET = null;   // the static studio + tray, prerendered once per viewport —
                  // two full-screen gradients become one drawImage per frame

function draw() {
  var L = W ? W.layout : prep(layout());
  var sx = 0, sy = 0;
  if (shake > 0) { sx = (Math.random() - 0.5) * shakeMag * 2; sy = (Math.random() - 0.5) * shakeMag * 2; }

  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
  if (!SET || SET.vw !== VW || SET.vh !== VH || SET.layout !== L) SET = buildSet(L);
  cx.fillStyle = P.bg; cx.fillRect(0, 0, VW, VH);   // slack behind the shaken set

  cx.save();
  var push = 1 + camPush * 0.05;
  cx.translate(VW / 2, VH * 0.5); cx.scale(push, push); cx.translate(-VW / 2, -VH * 0.5);
  cx.translate(sx, sy);

  cx.drawImage(SET.c, 0, 0, VW, VH);
  drawStudioLive(L);
  drawTrayDyn(L);
  drawReservoir(L);
  if (W) {
    var pouring = W.pour ? W.pour.s : -1;
    for (var i = 0; i < NTUBES; i++) if (i !== pouring) drawTube(L, i);
    if (pouring >= 0) { drawStream(L); drawTube(L, pouring); }
    drawWave(L);
    if (W.state === 'SOLVE') drawGuide(L);
    drawParticles();
    drawDial(L);
    drawButtons(L);
    if (W.state === 'SOLVE') drawHint(L);
    drawFloats();
  }

  cx.restore();
  if (vignette) cx.drawImage(vignette, 0, 0, VW, VH);
}

// ── the studio ──────────────────────────────────────────────────────────────
// buildSet prerenders everything static — backdrop gradient, cyc band, tray
// slab — into one offscreen canvas per viewport. drawStudioLive layers the
// breathing key light, three big colour-echo bokehs (the liquids' own hues,
// ghosted into the backdrop) and drifting motes: motion on frame one, cheap.
function buildSet(L) {
  var o = document.createElement('canvas');
  o.width = cv.width; o.height = cv.height;
  var g = o.getContext('2d');
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  var old = cx; cx = g;                     // route the world-space helpers here
  try {
    var top = (0 - cam.oy) / cam.s, bot = (VH - cam.oy) / cam.s;
    var bgG = cx.createLinearGradient(0, Y(top), 0, Y(bot));
    bgG.addColorStop(0, P.bgHi);
    bgG.addColorStop(0.55, P.bg);
    bgG.addColorStop(1, P.bgLo);
    cx.fillStyle = bgG; cx.fillRect(0, 0, VW, VH);

    // the cyc curve — a soft bright band where the backdrop meets the tray
    var bandTop = L.tray.y - 170;
    var bg2 = cx.createLinearGradient(0, Y(bandTop), 0, Y(L.tray.y + 8));
    bg2.addColorStop(0, 'rgba(255,255,255,0)');
    bg2.addColorStop(0.85, 'rgba(255,255,255,0.26)');
    bg2.addColorStop(1, 'rgba(255,255,255,0.04)');
    cx.fillStyle = bg2;
    cx.fillRect(0, Y(bandTop), VW, Y(L.tray.y + 8) - Y(bandTop));

    // the tray slab
    var t = L.tray;
    glow(X((t.x1 + t.x2) / 2), Y(t.y + t.h + 14), S((t.x2 - t.x1) * 0.55), '#20242C', 0.15);
    var fg = cx.createLinearGradient(0, Y(t.y), 0, Y(t.y + t.h + 22));
    fg.addColorStop(0, P.trayEdge);
    fg.addColorStop(1, P.trayShade);
    cx.fillStyle = fg;
    pathRound(t.x1, t.y + 4, t.x2 - t.x1, t.h + 18, 12);
    cx.fill();
    var tg = cx.createLinearGradient(0, Y(t.y - 8), 0, Y(t.y + t.h));
    tg.addColorStop(0, '#FFFFFF');
    tg.addColorStop(1, P.tray);
    cx.fillStyle = tg;
    pathRound(t.x1 - 8, t.y - 8, (t.x2 - t.x1) + 16, t.h, 10);
    cx.fill();
    cx.save();
    cx.globalAlpha = 0.7;
    cx.strokeStyle = '#FFFFFF';
    cx.lineWidth = Math.max(1, S(1.6));
    cx.beginPath(); cx.moveTo(X(t.x1 - 4), Y(t.y - 7)); cx.lineTo(X(t.x2 + 4), Y(t.y - 7)); cx.stroke();
    cx.restore();
  } finally { cx = old; }
  return { c: o, vw: VW, vh: VH, layout: L };
}

function drawStudioLive(L) {
  glow(X(L.key.x), Y(L.key.y), S(L.key.r) * (1 + Math.sin(TIME * 0.4) * 0.03), '#FFFFFF', 0.15);
  glow(X(L.key.x), Y(L.key.y), S(L.key.r * 0.5), '#FFF6DC', 0.09);

  // colour echoes — the jewel hues ghosted big and slow into the backdrop
  var w = L.safe.w, h = L.safe.h;
  glow(X(w * 0.16 + Math.sin(TIME * 0.21) * 22), Y(h * 0.20 + Math.cos(TIME * 0.17) * 16),
       S(w * 0.30), LQ[0].base, 0.045);
  glow(X(w * 0.80 + Math.sin(TIME * 0.15 + 2) * 26), Y(h * 0.13 + Math.sin(TIME * 0.19) * 14),
       S(w * 0.26), LQ[1].base, 0.05);
  glow(X(w * 0.55 + Math.sin(TIME * 0.18 + 4) * 24), Y(h * 0.33 + Math.cos(TIME * 0.14) * 18),
       S(w * 0.22), LQ[2].base, 0.04);

  // bokeh motes drifting up at varying depths
  var spanX = w + 240, spanY = h + 240;
  for (var m = 0; m < 16; m++) {
    var mx = (((m * 173.3 - TIME * (2.5 + (m % 3))) % spanX) + spanX) % spanX - 120;
    var my = spanY - ((((m * 97.7 + TIME * (6 + (m % 4) * 3)) % spanY) + spanY) % spanY) - 120;
    glow(X(mx), Y(my), S(7 + (m % 4) * 5), m % 5 === 0 ? '#FFE9B8' : '#FFFFFF', 0.045 + (m % 3) * 0.018);
  }
}

// world-space rounded-rect path on the main ctx
function pathRound(x, y, w, h, r) {
  var x2 = x + w, y2 = y + h;
  r = Math.min(r, w / 2, h / 2);
  cx.beginPath();
  cx.moveTo(X(x + r), Y(y));
  cx.lineTo(X(x2 - r), Y(y)); cx.quadraticCurveTo(X(x2), Y(y), X(x2), Y(y + r));
  cx.lineTo(X(x2), Y(y2 - r)); cx.quadraticCurveTo(X(x2), Y(y2), X(x2 - r), Y(y2));
  cx.lineTo(X(x + r), Y(y2)); cx.quadraticCurveTo(X(x), Y(y2), X(x), Y(y2 - r));
  cx.lineTo(X(x), Y(y + r)); cx.quadraticCurveTo(X(x), Y(y), X(x + r), Y(y));
  cx.closePath();
}
// local-space rounded-rect path on any ctx (sprite building, tube-local draws)
function roundRectOn(g, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  g.beginPath();
  g.moveTo(x + r, y);
  g.lineTo(x + w - r, y); g.quadraticCurveTo(x + w, y, x + w, y + r);
  g.lineTo(x + w, y + h - r); g.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  g.lineTo(x + r, y + h); g.quadraticCurveTo(x, y + h, x, y + h - r);
  g.lineTo(x, y + r); g.quadraticCurveTo(x, y, x + r, y);
  g.closePath();
}

// ── the tray's dynamic layer ────────────────────────────────────────────────
// The slab itself lives in the prerendered SET; only what moves stays here:
// per-tube contact shadows (they detach on lift) and the liquid reflections.
function drawTrayDyn(L) {
  var t = L.tray;
  for (var i = 0; i < NTUBES; i++) {
    var g = tubeGeo(L, i);
    if (W && W.pour && W.pour.s === i) continue;      // that tube is airborne
    var lift = W ? W.lift[i] * 26 : 0;
    cx.save();
    cx.globalAlpha = 0.15 * (1 - Math.min(1, lift / 40) * 0.55);
    cx.fillStyle = '#232A36';
    cx.beginPath();
    cx.ellipse(X(g.cx), Y(t.y - 2), S(g.w * 0.52 + lift * 0.1), S(7), 0, 0, 6.2832);
    cx.fill();
    cx.restore();
    if (W && W.board[i].length) {
      var c = LQ[W.board[i][0]];
      cx.save();
      cx.globalAlpha = 0.10;
      cx.fillStyle = c.base;
      pathRound(g.cx - g.w * 0.3, t.y + 6, g.w * 0.6, 20, 6);
      cx.fill();
      cx.restore();
    }
  }
}

// ── glass, prerendered ──────────────────────────────────────────────────────
// Dark outline, cool glass tint, a BROKEN white specular streak, a warm rim
// light, a rolled lip — six cheap draws that read as a MATERIAL, cached per
// size, then one drawImage per tube per frame.
function glassSprite(wW, hW, kind) {
  var w = Math.max(8, Math.round(S(wW))), h = Math.max(16, Math.round(S(hW)));
  var key = kind + w + 'x' + h;
  if (GLASS_CACHE[key]) return GLASS_CACHE[key];
  var pad = Math.ceil(w * 0.35) + 4;
  var o = document.createElement('canvas');
  o.width = w + pad * 2; o.height = h + pad * 2;
  var g = o.getContext('2d');
  g.translate(pad + w / 2, pad);
  var hw = w / 2, lipH = Math.max(4, h * 0.03);

  function body(inset) {
    g.beginPath();
    g.moveTo(-hw + inset, lipH);
    g.lineTo(-hw + inset, h - hw);
    g.arc(0, h - hw, hw - inset, Math.PI, 0, true);
    g.lineTo(hw - inset, lipH);
  }
  body(0);
  g.fillStyle = 'rgba(208,222,238,0.16)';
  g.fill();
  var wallG = g.createLinearGradient(-hw, 0, hw, 0);
  wallG.addColorStop(0, 'rgba(255,255,255,0.10)');
  wallG.addColorStop(0.15, 'rgba(255,255,255,0)');
  wallG.addColorStop(0.82, 'rgba(46,53,66,0)');
  wallG.addColorStop(1, 'rgba(46,53,66,0.16)');
  body(0); g.fillStyle = wallG; g.fill();
  body(0);
  g.strokeStyle = 'rgba(46,53,66,0.85)';
  g.lineWidth = Math.max(1.5, w * 0.045);
  g.stroke();
  // bottom glass-thickness glint
  g.save();
  g.globalAlpha = 0.35; g.strokeStyle = '#FFFFFF';
  g.lineWidth = Math.max(1, w * 0.03);
  g.beginPath(); g.arc(0, h - hw, hw * 0.62, Math.PI * 0.35, Math.PI * 0.72); g.stroke();
  g.restore();
  // the specular streak, broken in two — the stroke that says GLASS
  var spx = -hw * 0.52, spw = Math.max(2, w * 0.14);
  var sg = g.createLinearGradient(0, lipH, 0, h * 0.7);
  sg.addColorStop(0, 'rgba(255,255,255,0.62)');
  sg.addColorStop(1, 'rgba(255,255,255,0.05)');
  g.fillStyle = sg;
  roundRectOn(g, spx - spw / 2, h * 0.075, spw, h * 0.30, spw / 2);
  g.fill();
  roundRectOn(g, spx - spw / 2, h * 0.47, spw, h * 0.16, spw / 2);
  g.fill();
  // warm rim light on the far edge — the key light has a DIRECTION
  g.save();
  g.globalAlpha = 0.5;
  g.strokeStyle = '#FFF3DA';
  g.lineWidth = Math.max(1, w * 0.045);
  g.beginPath();
  g.moveTo(hw - w * 0.06, h * 0.14);
  g.lineTo(hw - w * 0.06, h - hw * 1.1);
  g.stroke();
  g.restore();
  // the rolled lip
  g.strokeStyle = 'rgba(46,53,66,0.9)';
  g.lineWidth = Math.max(1.5, w * 0.05);
  g.beginPath(); g.ellipse(0, lipH, hw * 1.04, lipH, 0, 0, 6.2832); g.stroke();
  g.save();
  g.globalAlpha = 0.85; g.strokeStyle = '#FFFFFF';
  g.lineWidth = Math.max(1, w * 0.03);
  g.beginPath(); g.ellipse(0, lipH - 1, hw * 0.92, lipH * 0.7, 0, Math.PI * 1.15, Math.PI * 1.85); g.stroke();
  g.restore();

  var out = { c: o, pad: pad, w: w, h: h };
  GLASS_CACHE[key] = out;
  return out;
}

// ── the reservoir (the clock) ───────────────────────────────────────────────
// Time pressure in the theme's own language: a slim glass column of silver
// light that only starts draining at the first pointerdown (THE TIMER LAW),
// dips visibly on a fumble, and warms when it runs low. Never a number.
function drawReservoir(L) {
  var r = L.res, h = r.base - r.top;
  var frac = 1;
  if (W && (W.state === 'SOLVE' || W.state === 'RESOLVE' || W.state === 'END'))
    frac = (W.touched || W.state !== 'SOLVE') ? Math.max(0, Math.min(1, W.timeLeft / W.timeTotal)) : 1;
  var tremor = W ? Math.sin(TIME * 42) * 2.2 * W.resTremor : 0;
  var x = r.x + tremor;
  var low = frac < 0.30 && frac > 0 && W && W.state === 'SOLVE' && W.touched;

  glow(X(x), Y(r.base + 8), S(r.w * 2.0), '#20242C', 0.12);

  var level = r.base - 8 - (h - 20) * frac;
  if (frac > 0.005) {
    var lg = cx.createLinearGradient(0, Y(level), 0, Y(r.base));
    lg.addColorStop(0, P.silverLit);
    lg.addColorStop(0.12, P.silver);
    lg.addColorStop(1, P.silverDeep);
    cx.fillStyle = lg;
    pathRound(x - r.w / 2 + 3, level, r.w - 6, r.base - 6 - level, (r.w - 6) / 2);
    cx.fill();
    if (low) {
      cx.save(); cx.globalAlpha = 0.30 + Math.sin(TIME * 6) * 0.12;
      cx.fillStyle = P.fail;
      pathRound(x - r.w / 2 + 3, level, r.w - 6, r.base - 6 - level, (r.w - 6) / 2);
      cx.fill(); cx.restore();
    }
    cx.save();
    cx.fillStyle = low ? '#FFD9CF' : P.silverLit;
    cx.beginPath();
    cx.ellipse(X(x), Y(level), S(r.w / 2 - 3), S(2.6), 0, 0, 6.2832);
    cx.fill();
    cx.restore();
    // a shimmer sliding down the silver — idle motion before the first touch
    var shY = level + (r.base - 10 - level) * ((TIME * 0.35) % 1);
    cx.save(); cx.globalAlpha = 0.35;
    cx.fillStyle = '#FFFFFF';
    cx.beginPath(); cx.ellipse(X(x - r.w * 0.14), Y(shY), S(r.w * 0.16), S(9), 0, 0, 6.2832); cx.fill();
    cx.restore();
  }
  if (low) glow(X(x), Y(r.base - 6), S(30), '#FF8A5E', 0.20 + Math.sin(TIME * 6) * 0.08);

  var spr = glassSprite(r.w, h, 'res');
  cx.drawImage(spr.c, X(x) - spr.w / 2 - spr.pad, Y(r.base) - spr.h - spr.pad);
}

// ── the tubes ───────────────────────────────────────────────────────────────
// Where the pouring tube currently is: lerped between its stand and a perch
// above the destination, tilted so its mouth sits over the receiving lip.
function pourPose(L) {
  var p = W.pour, sG = tubeGeo(L, p.s), dG = tubeGeo(L, p.d);
  var dir = dG.cx >= sG.cx ? 1 : -1;
  var rot = dir * 1.18;
  var mouth = { x: dG.cx - dir * 14, y: dG.topY - 42 };
  var px = mouth.x - sG.h * Math.sin(rot);
  var py = mouth.y + sG.h * Math.cos(rot);
  var k = p.phase === 'travel' ? ease(p.t / 0.16)
        : p.phase === 'stream' ? 1
        : 1 - ease(p.t / 0.20);
  return { x: sG.cx + (px - sG.cx) * k, y: sG.baseY + (py - sG.baseY) * k,
           rot: rot * k, mouth: mouth, dir: dir, k: k };
}

function drawTube(L, i) {
  var g = tubeGeo(L, i);
  var isSrc = W.pour && W.pour.s === i;
  var x = g.cx, y = g.baseY, rot = 0;
  if (isSrc) {
    var pose = pourPose(L);
    x = pose.x; y = pose.y; rot = pose.rot;
  } else {
    y -= W.lift[i] * 26;
    rot = W.lift[i] * 0.09 * (g.cx < L.tubes.xs[2] ? 1 : (g.cx > L.tubes.xs[2] ? -1 : 0));
    var wAge = TIME - W.wig[i];
    if (wAge >= 0 && wAge < 0.32) x += Math.sin(wAge * 44) * 5 * (1 - wAge / 0.32);
  }

  cx.save();
  cx.translate(X(x), Y(y));      // origin: tube BOTTOM centre, in screen px
  cx.rotate(rot);

  var w = S(g.w), h = S(g.h), hw = w / 2;
  var wall = Math.max(2, w * 0.10), lipH = Math.max(4, h * 0.03);
  var ihw = hw - wall;
  var uh = S(unitH(L));
  var tube = W.board[i];
  var pf = pourFrac(i);                 // fractional unit in transit (±0.5 max)
  var pc = W.pour ? W.pour.color : -1;  // the colour that fraction carries

  if (W.sel === i) glow(0, -h * 0.5, w * 1.5, '#FFFFFF', 0.20);

  if (tube.length || pf > 0) {
    cx.save();
    cx.beginPath();
    cx.moveTo(-ihw, -h + lipH * 2);
    cx.lineTo(-ihw, -hw);
    cx.arc(0, -hw, ihw, Math.PI, 0, true);
    cx.lineTo(ihw, -h + lipH * 2);
    cx.closePath();
    cx.clip();

    var so = Math.max(-14, Math.min(14, W.surf[i].o)) + Math.sin(TIME * 1.9 + i * 1.37) * 1.5;

    var idx = 0;
    while (idx < tube.length) {
      var cIdx = tube[idx], j = idx;
      while (j + 1 < tube.length && tube[j + 1] === cIdx) j++;
      var yBot = -wall - idx * uh + 1;
      var yTop = -wall - (j + 1) * uh;
      if (j === tube.length - 1) {
        yTop += S(so) * 0.14;
        if (pf < 0 || cIdx === pc) yTop -= pf * uh;   // surface glides with the pour
      }
      var col = LQ[cIdx];
      var lg = cx.createLinearGradient(0, yTop, 0, yBot);
      lg.addColorStop(0, col.base);
      lg.addColorStop(1, col.deep);
      cx.fillStyle = lg;
      cx.fillRect(-ihw, yTop, ihw * 2, yBot - yTop);
      if (idx > 0) {
        cx.fillStyle = 'rgba(18,22,30,0.22)';
        cx.fillRect(-ihw, yBot - Math.max(1, S(1.2)), ihw * 2, Math.max(1, S(1.8)));
      }
      idx = j + 1;
    }
    // the arriving fraction, when it can't merge into the run below it (an
    // empty tube, or a different colour surfacing under the last half-unit)
    if (pf > 0 && (!tube.length || tube[tube.length - 1] !== pc)) {
      var pcc = LQ[pc];
      var pTop = -wall - (tube.length + pf) * uh + S(so) * 0.14;
      var pBot = -wall - tube.length * uh + 1;
      var pg = cx.createLinearGradient(0, pTop, 0, pBot);
      pg.addColorStop(0, pcc.base);
      pg.addColorStop(1, pcc.deep);
      cx.fillStyle = pg;
      cx.fillRect(-ihw, pTop, ihw * 2, pBot - pTop);
      if (tube.length) {
        cx.fillStyle = 'rgba(18,22,30,0.22)';
        cx.fillRect(-ihw, pBot - Math.max(1, S(1.2)), ihw * 2, Math.max(1, S(1.8)));
      }
    }
    // meniscus — counter-tilted so the surface stays believably level while a
    // tube is merely lifted; on a steeply POURING tube the counter-rotation
    // would detach the ellipse from the liquid, so there it stays aligned with
    // the cross-section (the surface plane seen edge-on).
    var topC = pf > 0 ? LQ[pc] : LQ[tube[tube.length - 1]];
    var surfY = -wall - (tube.length + pf) * uh + S(so) * 0.14;
    cx.save();
    cx.translate(0, surfY);
    cx.rotate(Math.abs(rot) > 0.5 ? 0 : -rot * 0.55);
    cx.fillStyle = topC.lit;
    cx.beginPath(); cx.ellipse(0, 0, ihw, Math.max(2.5, w * 0.055), 0, 0, 6.2832); cx.fill();
    cx.globalAlpha = 0.4;
    cx.fillStyle = '#FFFFFF';
    cx.beginPath(); cx.ellipse(-ihw * 0.35, -Math.max(1, w * 0.014), ihw * 0.4, Math.max(1.4, w * 0.028), 0, 0, 6.2832); cx.fill();
    cx.restore();
    // bubbles rising in the liquid — the avatar's idle life (art law 6)
    for (var b = 0; b < 2; b++) {
      var bph = (TIME * 0.22 + i * 0.37 + b * 0.53) % 1;
      var depth = tube.length * uh - S(6);
      if (depth < uh * 0.5) break;
      var bx = Math.sin(i * 3.1 + b * 5.2) * ihw * 0.5;
      var by = -wall - S(5) - (depth - S(6)) * bph;
      cx.save();
      cx.globalAlpha = 0.25 + bph * 0.30;
      cx.fillStyle = topC.lit;
      cx.beginPath(); cx.arc(bx, by, Math.max(1, S(1.5 + b * 0.9)), 0, 6.2832); cx.fill();
      cx.restore();
    }
    cx.restore();
  }

  var spr = glassSprite(g.w, g.h, 'tube');
  cx.drawImage(spr.c, -spr.w / 2 - spr.pad, -spr.h - spr.pad);

  // travelling glint — every few seconds a flash sweeps the row, staggered
  var gl = Math.sin(TIME * 0.9 - i * 0.85);
  if (gl > 0.965) {
    cx.save();
    cx.globalAlpha = (gl - 0.965) / 0.035 * 0.5;
    cx.fillStyle = '#FFFFFF';
    roundRectOn(cx, -hw * 0.52 - w * 0.07, -h * 0.86, w * 0.14, h * 0.34, w * 0.07);
    cx.fill();
    cx.restore();
  }

  // completed: a slim silver cap with a gold glint, plus the one-time sweep
  if (W.capped[i]) {
    cx.save();
    cx.fillStyle = P.silverLit;
    roundRectOn(cx, -hw * 1.06, -h - S(7), hw * 2.12, S(13), S(6));
    cx.fill();
    cx.strokeStyle = 'rgba(46,53,66,0.7)';
    cx.lineWidth = Math.max(1, S(1.8));
    roundRectOn(cx, -hw * 1.06, -h - S(7), hw * 2.12, S(13), S(6));
    cx.stroke();
    cx.globalAlpha = 0.9;
    cx.fillStyle = P.gold;
    cx.fillRect(-hw * 0.7, -h - S(2.5), hw * 1.4, Math.max(1, S(2.4)));
    cx.restore();
  }
  if (W.capT[i] > 0 && W.capT[i] < 1) {
    var ct = W.capT[i];
    cx.save();
    cx.beginPath();                       // clip the sweep INSIDE the glass —
    cx.moveTo(-ihw, -h + lipH * 2);       // unclipped it reads as a stray white
    cx.lineTo(-ihw, -hw);                 // slash across the neighbours
    cx.arc(0, -hw, ihw, Math.PI, 0, true);
    cx.lineTo(ihw, -h + lipH * 2);
    cx.closePath();
    cx.clip();
    cx.globalCompositeOperation = 'lighter';
    cx.globalAlpha = (1 - ct) * 0.55;
    cx.translate(0, -h + h * ct);
    cx.rotate(-0.3);
    cx.fillStyle = '#FFFFFF';
    cx.fillRect(-hw * 1.7, -S(8), hw * 3.4, S(16));
    cx.restore();
    glow(0, -h - S(4), w * 0.9, P.goldLit, (1 - ct) * 0.4);
  }

  // selection ring at the base, in the lifted liquid's own colour
  if (W.sel === i && tube.length) {
    var selC = LQ[tube[tube.length - 1]];
    var pulse = 0.5 + Math.sin(TIME * 4.2) * 0.5;
    cx.save();
    cx.globalAlpha = 0.45 + pulse * 0.35;
    cx.strokeStyle = selC.lit;
    cx.lineWidth = Math.max(1.5, S(3));
    cx.beginPath();
    cx.ellipse(0, S(8), hw * 1.35 + S(pulse * 2), S(9), 0, 0, 6.2832);
    cx.stroke();
    cx.restore();
  }
  cx.restore();
}

// ── the stream ──────────────────────────────────────────────────────────────
function drawStream(L) {
  var p = W.pour;
  if (p.phase !== 'stream') return;
  var pose = pourPose(L);
  var c = LQ[p.color];
  var sx2 = pose.mouth.x, sy2 = pose.mouth.y;
  var ex = tubeGeo(L, p.d).cx, ey = liquidTopY(L, p.d) + 2;
  var midX = (sx2 + ex) / 2 + pose.dir * 6, midY = sy2 + (ey - sy2) * 0.35;
  var wob = Math.sin(TIME * 22) * 1.2;
  cx.save();
  cx.lineCap = 'round';
  cx.strokeStyle = c.base; cx.globalAlpha = 0.92;
  cx.lineWidth = Math.max(2.5, S(7));
  cx.beginPath();
  cx.moveTo(X(sx2), Y(sy2));
  cx.quadraticCurveTo(X(midX + wob), Y(midY), X(ex), Y(ey));
  cx.stroke();
  cx.strokeStyle = c.lit; cx.globalAlpha = 0.85;
  cx.lineWidth = Math.max(1.2, S(2.6));
  cx.beginPath();
  cx.moveTo(X(sx2 - pose.dir), Y(sy2));
  cx.quadraticCurveTo(X(midX + wob - pose.dir * 1.5), Y(midY), X(ex - 2), Y(ey));
  cx.stroke();
  cx.restore();
  glow(X(ex), Y(ey), S(16), c.lit, 0.25);
}

// ── the escalating guide (Law 4) ────────────────────────────────────────────
// Each miss reveals more of the canonical plan: attempt 1 cues the SOURCE on
// the first 45% of pours; later attempts add the pour arc, then the
// destination ring — by attempt 5 the next move is readable, not lucky.
function drawGuide(L) {
  if (!W.plan.length || W.pour) return;
  var frac = PREVIEW_FRAC();
  var K = Math.round(frac * SOLVE_LEN);
  if (W.pours >= K) return;
  var mv = W.plan[0];
  var sG = tubeGeo(L, mv.s), dG = tubeGeo(L, mv.d);
  var run = topRunOf(W.board[mv.s]);
  var c = run.color >= 0 ? LQ[run.color] : LQ[0];
  var pulse = 0.5 + Math.sin(TIME * 3.4) * 0.5;

  if (W.sel !== mv.s) {              // selected already wears its own ring
    cx.save();
    cx.globalAlpha = 0.35 + pulse * 0.35;
    cx.strokeStyle = c.lit;
    cx.lineWidth = Math.max(1.5, S(3));
    cx.beginPath();
    cx.ellipse(X(sG.cx), Y(sG.baseY + 4), S(sG.w * 0.62 + pulse * 3), S(9), 0, 0, 6.2832);
    cx.stroke();
    cx.restore();
  }

  if (frac >= 0.60) {
    var x1 = sG.cx, y1 = sG.topY - 16, x2 = dG.cx, y2 = dG.topY - 20;
    var mx2 = (x1 + x2) / 2, my2 = Math.min(y1, y2) - 70;
    cx.save();
    cx.fillStyle = c.base;
    for (var k = 1; k < 10; k++) {
      var u = k / 10;
      var bx = (1 - u) * (1 - u) * x1 + 2 * (1 - u) * u * mx2 + u * u * x2;
      var by = (1 - u) * (1 - u) * y1 + 2 * (1 - u) * u * my2 + u * u * y2;
      cx.globalAlpha = 0.25 + 0.5 * Math.max(0, Math.sin(TIME * 3 - u * 4));
      cx.beginPath(); cx.arc(X(bx), Y(by), S(3.4 - u * 1.2), 0, 6.2832); cx.fill();
    }
    cx.restore();
  }
  if (frac >= 0.99) {
    cx.save();
    cx.globalAlpha = 0.4 + pulse * 0.4;
    cx.strokeStyle = c.lit;
    cx.lineWidth = Math.max(1.5, S(2.6));
    cx.beginPath();
    cx.ellipse(X(dG.cx), Y(dG.topY - 8), S(dG.w * 0.55 + pulse * 3), S(8), 0, 0, 6.2832);
    cx.stroke();
    cx.restore();
  }
}

// ── the finale wave ─────────────────────────────────────────────────────────
// THE MOMENT's light: a travelling band of the reserved gold, composited
// additively, that rings each tube as it passes (the notes fire in step()).
function drawWave(L) {
  if (!W.wave) return;
  var wv = W.wave, xs = L.tubes.xs;
  var x0 = xs[0] - 130, x1 = xs[xs.length - 1] + 150;
  var bandX = x0 + (x1 - x0) * Math.min(1, wv.t);
  var fade = wv.t > 1 ? Math.max(0, 1 - (wv.t - 1) * 2) : 1;
  var g0 = tubeGeo(L, 0);
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  var grad = cx.createLinearGradient(X(bandX - 90), 0, X(bandX + 90), 0);
  grad.addColorStop(0, 'rgba(255,197,61,0)');
  grad.addColorStop(0.5, 'rgba(255,228,154,' + (0.34 * fade).toFixed(3) + ')');
  grad.addColorStop(1, 'rgba(255,197,61,0)');
  cx.fillStyle = grad;
  cx.fillRect(X(bandX - 90), Y(g0.topY - 90), X(bandX + 90) - X(bandX - 90), Y(g0.baseY + 40) - Y(g0.topY - 90));
  cx.restore();
  for (var i = 0; i < NTUBES; i++) if (wv.rung[i] && W.board[i].length) {
    var behind = bandX - xs[i];
    if (behind > 0) {
      var a = Math.max(0, 0.4 - behind / (x1 - x0) * 0.5) * fade;
      if (a > 0.01) {
        var g = tubeGeo(L, i);
        glow(X(g.cx), Y(g.baseY - g.h * 0.5), S(g.h * 0.55), P.goldLit, a);
      }
    }
  }
}
