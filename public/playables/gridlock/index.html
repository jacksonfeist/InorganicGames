/* ══ 13. DRAW — GAME LOGIC. skyGradient/pill below are adapted from
   templates/lib/art.js — that file is a catalog, not a runtime import; see its
   own header.

   The composition, in both orientations, is three value bands: SPACE (darkest,
   with a hard station silhouette so the background has structure and not just
   glow), the BERTH SLAB (lightest — it is the playfield, and Law 1 says it must
   separate from everything behind it by VALUE), and the PLATFORM FACE below it
   (mid-dark, carrying the impulse dial and the plumbing). Everything the player
   can act on lives on the light band. ══════════════════════════════════════ */

var TIME = 0;                 // wall clock — drives ambient life, never the sim
var SLIDE_MS = 300;           // launch animation, in SCALED game time (see GT)
var DIR_ROT = { right: 0, down: Math.PI / 2, left: Math.PI, up: -Math.PI / 2 };

// A seeded LCG. Every piece of scenery is AUTHORED — identical every run — so
// nothing in the file reaches for Math.random() outside a particle's lifetime.
function rng(seed) {
  var s = seed || 1;
  return function () { s = (s * 9301 + 49297) % 233280; return s / 233280; };
}

// Prerender helper. Canvas 2D has no DPR of its own (the same trap as the main
// backing store): bake at DEVICE resolution and blit back at CSS size, or every
// sprite in the ad is drawn at 1× and upscaled 2× — soft edges everywhere, on
// exactly the phones that show it off. Returns { img, w, h } in CSS units.
function bakeSprite(wCss, hCss, fn) {
  var o = document.createElement('canvas');
  o.width = Math.max(1, Math.round(wCss * DPR));
  o.height = Math.max(1, Math.round(hCss * DPR));
  var g = o.getContext('2d');
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  var real = cx;
  cx = g;                       // every helper draws through the module-level ctx
  fn();
  cx = real;
  return { img: o, w: wCss, h: hCss };
}

function skyGradient(stops) {
  var g = cx.createLinearGradient(0, 0, 0, VH);
  for (var i = 0; i < stops.length; i++) g.addColorStop(stops[i][0], stops[i][1]);
  // over-fill: the bake is padded on every side, so this has to cover more than
  // the viewport or the backdrop would carry transparent corners.
  cx.fillStyle = g; cx.fillRect(-90, -90, VW + 180, VH + 180);
}
function pill(sx, sy, str, bg, fg, fontPx) {
  cx.save();
  cx.font = '700 ' + Math.round(fontPx) + "px Chakra, sans-serif";
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  var w = cx.measureText(str).width + S(15), h = fontPx + S(8), rr = h / 2;
  cx.fillStyle = bg;
  cx.beginPath();
  cx.moveTo(sx - w / 2 + rr, sy - h / 2); cx.arcTo(sx + w / 2, sy - h / 2, sx + w / 2, sy + h / 2, rr);
  cx.arcTo(sx + w / 2, sy + h / 2, sx - w / 2, sy + h / 2, rr); cx.arcTo(sx - w / 2, sy + h / 2, sx - w / 2, sy - h / 2, rr);
  cx.arcTo(sx - w / 2, sy - h / 2, sx + w / 2, sy - h / 2, rr); cx.closePath(); cx.fill();
  cx.fillStyle = fg; cx.fillText(str, sx, sy + S(1));
  cx.restore();
}
// A rounded quad, centred. Canopies, panels, plates — the shape language of the
// whole ad, so it lives in one place.
function roundQuad(px, py, w, h, k) {
  var rr = Math.min(w, h) * (k == null ? 0.42 : k);
  cx.beginPath();
  cx.moveTo(px - w / 2 + rr, py - h / 2);
  cx.arcTo(px + w / 2, py - h / 2, px + w / 2, py + h / 2, rr);
  cx.arcTo(px + w / 2, py + h / 2, px - w / 2, py + h / 2, rr);
  cx.arcTo(px - w / 2, py + h / 2, px - w / 2, py - h / 2, rr);
  cx.arcTo(px - w / 2, py - h / 2, px + w / 2, py - h / 2, rr);
  cx.closePath();
}

/* ── SPACE ────────────────────────────────────────────────────────────────
   Gradient + nebula + drifting, twinkling stars satisfies Law 10 (never a flat
   background, always one ambient moving element) before anyone has tapped. The
   gas giant and the station silhouette are what stop it being Tell 5 — a soft
   purple haze with nothing hard in it. */

var STARS = (function () {
  var r = rng(1337), a = [];
  for (var i = 0; i < 76; i++) {
    var z = 0.35 + r() * 0.65;
    a.push({ x: r(), y: r(), z: z, r: 0.55 + z * 1.5, ph: r() * 6.2832, hue: r() });
  }
  return a;
})();
var PLANET_BANDS = (function () {
  var r = rng(91), a = [];
  for (var i = 0; i < 10; i++) a.push({ u: (i + r() * 0.5) / 10, h: 0.028 + r() * 0.062, a: 0.10 + r() * 0.15, hot: i % 3 === 0 });
  return a;
})();

function starColor(s) { return s.hue > 0.84 ? '#FFD9C2' : (s.hue < 0.20 ? '#BCD6FF' : '#FFFFFF'); }

// Most of the field is baked into the backdrop. The ones that stay LIVE — and so
// twinkle and drift — are chosen at bake time as the ones that provably sit in
// clear sky, because a star that drifts behind the station and keeps shining is
// worse than no drift at all.
var LIVE_STARS = [];
function classifyStars(L) {
  var mods = stationGeom(L), pl = L.planet, kept = 0;
  LIVE_STARS = [];
  for (var i = 0; i < STARS.length; i++) {
    var s = STARS[i], px = s.x * VW, py = s.y * VH, clear = true;
    for (var m = 0; m < mods.length; m++) {
      var mx = X(mods[m].x);
      if (px >= mx && px <= mx + S(mods[m].w) && py >= Y(L.hullY - mods[m].h)) { clear = false; break; }
    }
    if (clear && pl && Math.hypot(px - X(pl.x), py - Y(pl.y)) < S(pl.r)) clear = false;
    s.live = clear && kept < 18 && i % 3 === 0;
    if (s.live) { LIVE_STARS.push(s); kept++; }
  }
}
function bakeStars() {
  cx.save();
  for (var i = 0; i < STARS.length; i++) {
    var s = STARS[i];
    if (s.live) continue;
    cx.globalAlpha = (0.32 + Math.abs(Math.sin(s.ph * 3.1)) * 0.68) * 0.85;
    cx.fillStyle = starColor(s);
    cx.beginPath(); cx.arc(s.x * VW, s.y * VH, Math.max(0.6, S(s.r)), 0, 6.2832); cx.fill();
  }
  cx.restore();
}
function drawLiveStars() {
  cx.save();
  for (var i = 0; i < LIVE_STARS.length; i++) {
    var s = LIVE_STARS[i];
    cx.globalAlpha = (0.32 + Math.abs(Math.sin(TIME * (0.7 + s.z) + s.ph)) * 0.68) * 0.9;
    cx.fillStyle = starColor(s);
    cx.beginPath();
    cx.arc(((s.x + TIME * s.z * 0.0016) % 1) * VW, ((s.y + TIME * 0.0006) % 1) * VH,
           Math.max(0.7, S(s.r)), 0, 6.2832);
    cx.fill();
  }
  cx.restore();
}
// The payoff's reach beyond the play area: the whole field stretches away from
// the bay mouth. Clipped to the sky, so light never streaks across the deck.
function drawWarpStreaks(L, gx, gy) {
  if (warp <= 0.01) return;
  var s = slabRect(L);
  cx.save();
  cx.beginPath(); cx.rect(-40, -40, VW + 80, Y(s.y) + 40); cx.clip();
  cx.lineCap = 'round';
  for (var i = 0; i < STARS.length; i++) {
    var st = STARS[i];
    var px = st.x * VW, py = st.y * VH;
    var dx = px - gx, dy = py - gy, d = Math.hypot(dx, dy) || 1;
    var len = warp * Math.min(d * 0.34, S(170)) * st.z;
    cx.globalAlpha = Math.min(1, warp * 0.85);
    cx.strokeStyle = starColor(st);
    cx.lineWidth = Math.max(1, S(st.r * 0.85));
    cx.beginPath(); cx.moveTo(px, py); cx.lineTo(px + dx / d * len, py + dy / d * len); cx.stroke();
  }
  cx.restore();
}

// The one place soft light is allowed to be the whole object: it is 40,000 light
// years away and it is not something you can act on.
function drawNebula() {
  var m = Math.max(VW, VH);
  glow(VW * 0.20, VH * 0.18, m * 0.46, '#572C8E', 0.30);
  glow(VW * 0.84, VH * 0.34, m * 0.36, '#8E2E66', 0.20);
  glow(VW * 0.46, VH * 0.88, m * 0.40, '#1B4A8C', 0.16);
}

// A banded gas giant, deliberately CROPPED by a corner (Tell 8 wants things that
// continue past the frame). Hard bands and a hard terminator, so it carries value
// structure rather than being another halo.
function drawPlanet(L) {
  var pl = L.planet; if (!pl) return;
  var px = X(pl.x), py = Y(pl.y), r = S(pl.r);
  if (px + r < -20 || px - r > VW + 20 || py + r < -20 || py - r > VH + 20) return;
  cx.save();
  cx.beginPath(); cx.arc(px, py, r, 0, 6.2832); cx.clip();
  var g = cx.createLinearGradient(px - r, py - r, px + r, py + r);
  g.addColorStop(0, '#7B5CA8'); g.addColorStop(0.5, '#4A3573'); g.addColorStop(1, '#1B142E');
  cx.fillStyle = g; cx.fillRect(px - r, py - r, r * 2, r * 2);
  for (var i = 0; i < PLANET_BANDS.length; i++) {
    var b = PLANET_BANDS[i];
    cx.globalAlpha = b.a * 1.8;
    cx.fillStyle = b.hot ? '#B79AD8' : '#1A1130';
    cx.fillRect(px - r, py - r + b.u * r * 2, r * 2, r * b.h * 2);
  }
  cx.globalAlpha = 0.30; cx.fillStyle = '#E08AA8';
  cx.beginPath(); cx.ellipse(px + r * 0.26, py + r * 0.20, r * 0.17, r * 0.085, 0.18, 0, 6.2832); cx.fill();
  cx.globalAlpha = 1;
  var t = cx.createLinearGradient(px - r * 0.35, py, px + r, py);
  t.addColorStop(0, 'rgba(5,7,15,0)'); t.addColorStop(1, 'rgba(5,7,15,0.96)');
  cx.fillStyle = t; cx.fillRect(px - r, py - r, r * 2, r * 2);
  cx.restore();
  cx.save();
  cx.strokeStyle = 'rgba(214,196,255,.75)'; cx.lineWidth = Math.max(1.5, S(4));
  cx.beginPath(); cx.arc(px, py, r, Math.PI * 0.58, Math.PI * 1.34); cx.stroke();
  cx.restore();
}

// The horizon: the rest of the station, in near-black silhouette.
//
// The first pass built this out of tall rectangles with grids of little square
// windows, and it read — unmistakably, in every frame — as a CITY SKYLINE. That
// is a cold-read failure for a space ad, so the shape language is now machinery:
// pressure drums with rounded ends, radiator fin stacks, chamfered blocks, dish
// antennas and masts, lit with long HORIZONTAL strips instead of window grids.
// Nothing here is a building.
function stationGeom(L) {
  if (L._station) return L._station;
  var r = rng(4242), mods = [], x = -140;
  while (x < L.safe.w + 190) {
    var k = r(), w = 58 + r() * 132, h = 26 + r() * 92;
    var m = { x: x, w: w, h: h, ph: r() * 6.2832, tone: r() > 0.6 ? '#0D1324' : '#070A14',
              type: k < 0.36 ? 'drum' : (k < 0.66 ? 'fins' : 'block'),
              mast: r() > 0.58 ? 26 + r() * 54 : 0,
              dish: r() > 0.76 ? 15 + r() * 13 : 0,
              strips: [] };
    var n = Math.max(1, Math.floor(h / 28));
    for (var i = 0; i < n; i++)
      if (r() > 0.42) m.strips.push({ y: 14 + i * 26, x: w * r() * 0.35, w: w * (0.26 + r() * 0.46) });
    mods.push(m);
    x += w + (r() > 0.5 ? 18 : 3);
  }
  L._station = mods;
  return mods;
}
function drawStation(L) {
  var mods = stationGeom(L), base = L.hullY, i, j;
  cx.save();
  // the spine the whole assembly is bolted to
  cx.fillStyle = '#070A14';
  cx.fillRect(X(-160), Y(base - 14), S(L.safe.w + 340), S(58));
  for (i = 0; i < mods.length; i++) {
    var m = mods[i], top = base - m.h, cxm = m.x + m.w * 0.5;

    if (m.mast) {
      cx.strokeStyle = m.tone; cx.lineWidth = Math.max(1, S(3.5)); cx.lineCap = 'round';
      cx.beginPath(); cx.moveTo(X(cxm), Y(top)); cx.lineTo(X(cxm), Y(top - m.mast)); cx.stroke();
      // cross-spars, so a mast reads as a truss and not a flagpole
      cx.lineWidth = Math.max(1, S(2));
      for (j = 1; j <= 2; j++) {
        var my = top - m.mast * (j / 3);
        cx.beginPath(); cx.moveTo(X(cxm - 9), Y(my)); cx.lineTo(X(cxm + 9), Y(my)); cx.stroke();
      }
    }
    if (m.dish) {
      cx.fillStyle = m.tone;
      cx.beginPath();
      cx.arc(X(m.x + m.w * 0.24), Y(top - m.dish), S(m.dish), Math.PI * 1.15, Math.PI * 1.95);
      cx.closePath(); cx.fill();
      cx.fillRect(X(m.x + m.w * 0.24 - 2), Y(top - m.dish), Math.max(1, S(4)), S(m.dish + 6));
    }

    cx.fillStyle = m.tone;
    if (m.type === 'drum') {
      // a pressure tank lying on the spine — rounded ends, no corners at all
      roundQuad(X(cxm), Y(top + m.h * 0.5 + 22), S(m.w), S(m.h + 44), 0.42);
      cx.fill();
    } else if (m.type === 'fins') {
      cx.fillRect(X(m.x), Y(top + m.h * 0.34), S(m.w) + 1, S(m.h * 0.66 + 44));
      // radiator fins, raked one way — asymmetry for free (Tell 8)
      for (j = 0; j < 4; j++) {
        var fx = m.x + 6 + j * (m.w - 12) / 4;
        cx.beginPath();
        cx.moveTo(X(fx), Y(top + m.h * 0.36));
        cx.lineTo(X(fx + m.w * 0.10), Y(top));
        cx.lineTo(X(fx + m.w * 0.17), Y(top));
        cx.lineTo(X(fx + m.w * 0.07), Y(top + m.h * 0.36));
        cx.closePath(); cx.fill();
      }
    } else {
      cx.beginPath();                                  // chamfered block
      cx.moveTo(X(m.x), Y(top + 14));
      cx.lineTo(X(m.x + 14), Y(top));
      cx.lineTo(X(m.x + m.w), Y(top));
      cx.lineTo(X(m.x + m.w), Y(base + 44));
      cx.lineTo(X(m.x), Y(base + 44));
      cx.closePath(); cx.fill();
    }

    // long horizontal light strips — a corridor seen end-on, never a window grid
    cx.fillStyle = 'rgba(190,218,255,.34)';
    for (j = 0; j < m.strips.length; j++) {
      var st = m.strips[j];
      if (st.y > m.h) continue;
      cx.fillRect(X(m.x + st.x + 6), Y(top + st.y), S(st.w), Math.max(1, S(2.4)));
    }
  }
  cx.restore();
}

// The mast beacons are the only part of the horizon that moves, so they are the
// only part that is not baked into the backdrop.
function drawMastLights(L) {
  var mods = stationGeom(L), base = L.hullY;
  cx.save();
  cx.fillStyle = P.ice;
  for (var i = 0; i < mods.length; i++) {
    var m = mods[i];
    if (!m.mast) continue;
    cx.globalAlpha = 0.22 + Math.abs(Math.sin(TIME * 1.7 + m.ph)) * 0.72;
    cx.beginPath();
    cx.arc(X(m.x + m.w * 0.5), Y(base - m.h - m.mast), Math.max(1, S(2.8)), 0, 6.2832);
    cx.fill();
  }
  cx.restore();
}

/* ── THE LAUNCH CORRIDOR ─────────────────────────────────────────────────
   Beyond the bay mouth. In landscape this is what fills the width slack with a
   real destination (Law 9) instead of dead air; in portrait only its lit throat
   is visible, which is exactly enough to say "out is that way". */

function drawCorridorTrench(L) {
  var c = L.corridor; if (!c) return;
  var x2 = L.safe.w + 240, taper = 0.17;
  // The floor is HULL, not the deep shadow it was first built from: portrait sees
  // only the first sliver of this and a near-black slot read as a hole in the
  // wall rather than the way out. The taper is HARD — landscape gives this thing
  // 60% of the frame, and a shallow trench there is just a flat field (Tell 6);
  // a passage that converges to a point is depth instead.
  poly([{ x: c.x1, y: c.y - c.h / 2 }, { x: x2, y: c.y - c.h * taper },
        { x: x2, y: c.y + c.h * taper }, { x: c.x1, y: c.y + c.h / 2 }], P.hull, null);
  cx.save();
  // a lit floor strip running down the centre of the passage
  cx.globalAlpha = 0.32; cx.fillStyle = P.hullLit;
  cx.beginPath();
  cx.moveTo(X(c.x1), Y(c.y - c.h * 0.20)); cx.lineTo(X(x2), Y(c.y - c.h * 0.13));
  cx.lineTo(X(x2), Y(c.y + c.h * 0.13)); cx.lineTo(X(c.x1), Y(c.y + c.h * 0.20));
  cx.closePath(); cx.fill();
  // structural ribs receding down the passage — the thing that turns a trapezoid
  // into a tunnel you could actually fly a ship down
  cx.globalAlpha = 1;
  for (var i = 1; i <= 6; i++) {
    var u = Math.pow(i / 6, 0.72);
    var rx = c.x1 + (x2 - c.x1) * u;
    var rh = (c.h / 2) * (1 - u) + (c.h * taper) * u;
    cx.globalAlpha = 0.5 - u * 0.3;
    cx.fillStyle = P.hullLit;
    cx.fillRect(X(rx), Y(c.y - rh), Math.max(1, S(7)), S(rh * 2));
    cx.globalAlpha = 0.85 - u * 0.5;
    cx.fillStyle = P.hullDeep;
    cx.fillRect(X(rx + 7), Y(c.y - rh), Math.max(1, S(5)), S(rh * 2));
  }
  // walls, lit along the top edge only — one light direction for the whole ad
  cx.globalAlpha = 1;
  cx.strokeStyle = P.hullEdge; cx.lineWidth = Math.max(1.5, S(3.5));
  cx.beginPath(); cx.moveTo(X(c.x1), Y(c.y - c.h / 2)); cx.lineTo(X(x2), Y(c.y - c.h * taper)); cx.stroke();
  cx.globalAlpha = 0.5;
  cx.beginPath(); cx.moveTo(X(c.x1), Y(c.y + c.h / 2)); cx.lineTo(X(x2), Y(c.y + c.h * taper)); cx.stroke();
  cx.restore();
}
function drawCorridorLights(L) {
  var c = L.corridor; if (!c) return;
  var x2 = L.safe.w + 240, taper = 0.17;
  // guide lights running OUTWARD — the corridor is always moving, and it always
  // points the same way the hero is going to go.
  cx.save();
  cx.fillStyle = P.ice;
  for (var i = 0; i < 10; i++) {
    var u = ((i / 10) + TIME * 0.14) % 1;
    var lx = c.x1 + (x2 - c.x1) * u;
    var hy = (c.h / 2) * (1 - u) + (c.h * taper) * u;
    var a = Math.sin(u * Math.PI) * 0.75;
    cx.globalAlpha = a;
    cx.fillRect(X(lx), Y(c.y - hy), Math.max(1, S(9)), Math.max(1, S(3)));
    cx.fillRect(X(lx), Y(c.y + hy - 3), Math.max(1, S(9)), Math.max(1, S(3)));
  }
  cx.restore();
  // The threshold light just outside the mouth. Portrait only ever sees the first
  // sliver of this corridor, so without it "out" was a black gap in the wall.
  glow(X(c.x1 + 30), Y(c.y), S(c.h * 0.80), P.ice, 0.24 + Math.abs(Math.sin(TIME * 1.3)) * 0.08);
  // the jump point at the far end (landscape's payoff for having the width)
  glow(X(x2 - 70), Y(c.y), S(140), P.ice, 0.14 + Math.abs(Math.sin(TIME * 0.9)) * 0.05);
}

/* ── THE BAY ──────────────────────────────────────────────────────────────
   The berth slab is the lightest mass in the frame, because it is the playfield.
   Painted berth outlines, plating seams, a welded frame with bolts, and a
   brighter floor strip down the hero's lane — which is the only bit of "here is
   your exit" signage in the ad, and it is paint, not a caption. */

function slabRect(L) {
  var g = L.grid, pad = 26;
  return { x: g.x0 - pad, y: g.y0 - pad, w: GRID_COLS * g.cell + pad * 2, h: GRID_ROWS * g.cell + pad * 2 };
}

// The platform's front face — everything below the slab. Darker than the slab,
// lighter than space, so all three bands separate at a squint.
function drawPlatform(L) {
  var s = slabRect(L);
  var bot = (VH - cam.oy) / cam.s + 260;
  var top = s.y + s.h;
  poly([{ x: -320, y: top }, { x: L.safe.w + 320, y: top },
        { x: L.safe.w + 320, y: bot }, { x: -320, y: bot }], P.hullDeep, null);
  cx.save();
  // lit lip where the face meets the slab
  cx.strokeStyle = P.hullEdge; cx.lineWidth = Math.max(1.5, S(4));
  cx.beginPath(); cx.moveTo(X(-320), Y(top)); cx.lineTo(X(L.safe.w + 320), Y(top)); cx.stroke();
  cx.restore();
  // painted edge hazard — the strongest horizontal in the lower band, and the
  // thing that stops the platform face reading as an empty field (Tell 6)
  cx.save();
  cx.beginPath(); cx.rect(X(-320), Y(top + 6), S(L.safe.w + 640), S(26)); cx.clip();
  cx.globalAlpha = 0.55; cx.fillStyle = P.hazard;
  cx.fillRect(X(-320), Y(top + 6), S(L.safe.w + 640), S(26));
  cx.fillStyle = P.frameDark;
  for (var d = 0; d * 46 < L.safe.w + 700; d++) {
    cx.beginPath();
    cx.moveTo(X(-320 + d * 46), Y(top + 6));
    cx.lineTo(X(-320 + d * 46 + 23), Y(top + 6));
    cx.lineTo(X(-320 + d * 46 + 49), Y(top + 32));
    cx.lineTo(X(-320 + d * 46 + 26), Y(top + 32));
    cx.closePath(); cx.fill();
  }
  cx.restore();
  cx.save();
  // plating seams + bolt row
  cx.globalAlpha = 0.5; cx.strokeStyle = P.hull; cx.lineWidth = Math.max(1, S(2));
  for (var i = 1; i <= 4; i++) {
    var y = top + 44 + i * 66;
    cx.beginPath(); cx.moveTo(X(-320), Y(y)); cx.lineTo(X(L.safe.w + 320), Y(y)); cx.stroke();
  }
  cx.globalAlpha = 0.7; cx.fillStyle = P.hull;
  for (var b = 0; b * 74 < L.safe.w + 120; b++)
    cx.fillRect(X(-40 + b * 74), Y(top + 50), Math.max(1, S(7)), Math.max(1, S(7)));
  cx.restore();
  // vent louvres — asymmetric, one cluster only
  var vx = L.safe.w * 0.16, vy = top + 74;
  cx.save();
  cx.fillStyle = P.hull;
  for (var v = 0; v < 5; v++) cx.fillRect(X(vx), Y(vy + v * 14), S(132), Math.max(1, S(8)));
  cx.globalAlpha = 0.35; cx.fillStyle = P.strip;
  cx.fillRect(X(vx), Y(vy - 9), S(132), Math.max(1, S(3)));
  cx.restore();
  drawCrates(L, top);
  drawPipes(L, top);
  // the face falls away into shadow at the bottom of the frame
  var gd = cx.createLinearGradient(0, Y(top + 120), 0, Y(bot));
  gd.addColorStop(0, 'rgba(5,7,15,0)'); gd.addColorStop(1, 'rgba(5,7,15,.85)');
  cx.fillStyle = gd; cx.fillRect(-90, Y(top + 120), VW + 180, VH + 180);
}
// A stack of cargo containers on the platform face. Silhouette interest in the
// band that was otherwise empty, and a second reason to believe this is a working
// dock rather than a puzzle board with a space wallpaper behind it.
function drawCrates(L, top) {
  var c = L.crates; if (!c) return;
  var y = Math.max(c.y, top + 60), s = c.s || 1;
  var box = [[0, 0, 96, 58], [104, 0, 62, 58], [16, -52, 78, 50], [0, -96, 54, 42]];
  cx.save();
  for (var i = 0; i < box.length; i++) {
    var bx = c.x + box[i][0] * s, by = y + box[i][1] * s, bw = box[i][2] * s, bh = box[i][3] * s;
    cx.fillStyle = P.hull;
    cx.fillRect(X(bx), Y(by), S(bw), S(bh));
    cx.fillStyle = P.hullLit;                          // lit top edge, one light direction
    cx.fillRect(X(bx), Y(by), S(bw), Math.max(1, S(4)));
    cx.globalAlpha = 0.45; cx.fillStyle = P.hullDeep;  // corrugation
    for (var k = 1; k * 14 < bw; k++) cx.fillRect(X(bx + k * 14), Y(by + 6), Math.max(1, S(3)), S(bh - 12));
    cx.globalAlpha = 1;
  }
  cx.restore();
}
function drawPipes(L, top) {
  var p = L.pipes; if (!p) return;
  var y = Math.max(p.y, top + 84);
  cx.save();
  cx.lineCap = 'round';
  for (var i = 0; i < 3; i++) {
    cx.strokeStyle = i === 1 ? P.hullLit : P.hull;
    cx.lineWidth = Math.max(2, S(11 - i * 2));
    cx.beginPath(); cx.moveTo(X(p.x), Y(y + i * 21)); cx.lineTo(X(p.x + p.w), Y(y + i * 21)); cx.stroke();
  }
  // valve collars
  cx.fillStyle = P.hullEdge;
  for (var j = 0; j < 3; j++) cx.fillRect(X(p.x + 40 + j * 96), Y(y - 9), Math.max(2, S(12)), Math.max(3, S(52)));
  cx.restore();
}

// Everything in here is fixed for the life of a staging, so it is rendered ONCE
// into the backdrop (see makeBackdrop) instead of every frame. The moving parts
// of the bay — chevrons, beacons, the swaying hook — live in drawBayLive.
function drawBayStatic(L) {
  var g = L.grid, s = slabRect(L), w = GRID_COLS * g.cell;

  // 1. the slab — the lightest mass on screen
  poly([{ x: s.x, y: s.y }, { x: s.x + s.w, y: s.y },
        { x: s.x + s.w, y: s.y + s.h }, { x: s.x, y: s.y + s.h }], P.hull, null);

  // 2. the hero's lane, painted brighter all the way to the mouth, with edge
  // lines — this is the only "here is your exit" signage in the ad, and it is
  // paint on a deck rather than a caption over one.
  var laneY = g.y0 + L.gate.laneRow * g.cell;
  cx.save();
  cx.globalAlpha = 0.5; cx.fillStyle = P.hullLit;
  cx.fillRect(X(s.x), Y(laneY), S(L.gate.x - s.x), S(g.cell));
  cx.globalAlpha = 0.34; cx.fillStyle = P.strip;
  cx.fillRect(X(s.x), Y(laneY), S(L.gate.x - s.x), Math.max(1, S(3)));
  cx.fillRect(X(s.x), Y(laneY + g.cell - 3), S(L.gate.x - s.x), Math.max(1, S(3)));
  cx.restore();

  // 3. plating seams, offset from the berth lines so they read as structure
  cx.save();
  cx.globalAlpha = 0.45; cx.strokeStyle = P.hullDeep; cx.lineWidth = Math.max(1, S(2));
  for (var i = 1; i < 3; i++) {
    var yy = s.y + (s.h / 3) * i + 14;
    cx.beginPath(); cx.moveTo(X(s.x), Y(yy)); cx.lineTo(X(s.x + s.w), Y(yy)); cx.stroke();
  }
  cx.restore();

  // 4. painted berth markings — CORNER TICKS ONLY. Closed rectangles turned the
  // deck into a spreadsheet in the first film pass; four right-angles per berth
  // read as paint on steel, which is what an actual hardstand looks like.
  cx.save();
  cx.strokeStyle = P.strip; cx.lineWidth = Math.max(1, S(2.6));
  cx.globalAlpha = 0.4;
  for (var r = 0; r < GRID_ROWS; r++) {
    for (var c = 0; c < GRID_COLS; c++) {
      var bx = g.x0 + c * g.cell + g.cell * 0.11, by = g.y0 + r * g.cell + g.cell * 0.11;
      var bw = g.cell * 0.78, tick = g.cell * 0.20;
      cx.beginPath();
      cx.moveTo(X(bx), Y(by + tick)); cx.lineTo(X(bx), Y(by)); cx.lineTo(X(bx + tick), Y(by));
      cx.moveTo(X(bx + bw - tick), Y(by)); cx.lineTo(X(bx + bw), Y(by)); cx.lineTo(X(bx + bw), Y(by + tick));
      cx.moveTo(X(bx), Y(by + bw - tick)); cx.lineTo(X(bx), Y(by + bw)); cx.lineTo(X(bx + tick), Y(by + bw));
      cx.moveTo(X(bx + bw - tick), Y(by + bw)); cx.lineTo(X(bx + bw), Y(by + bw)); cx.lineTo(X(bx + bw), Y(by + bw - tick));
      cx.stroke();
    }
  }
  cx.restore();

  // 5. the welded frame: heavy bars top and bottom, bolts, a lit top edge
  cx.save();
  cx.fillStyle = P.frame;
  cx.fillRect(X(s.x), Y(s.y - 16), S(s.w), S(18));
  cx.fillRect(X(s.x), Y(s.y + s.h - 2), S(s.w), S(18));
  cx.fillStyle = P.hullEdge;
  cx.fillRect(X(s.x), Y(s.y - 16), S(s.w), Math.max(1, S(3)));
  cx.globalAlpha = 0.8; cx.fillStyle = P.hullDeep;
  for (var b = 0; b * 58 < s.w; b++) {
    cx.fillRect(X(s.x + 14 + b * 58), Y(s.y - 11), Math.max(1, S(6)), Math.max(1, S(6)));
    cx.fillRect(X(s.x + 14 + b * 58), Y(s.y + s.h + 3), Math.max(1, S(6)), Math.max(1, S(6)));
  }
  cx.restore();
  // left wall ribs — the bay has a back, and only one side of it, on purpose
  cx.save();
  cx.fillStyle = P.frame;
  cx.fillRect(X(s.x - 12), Y(s.y - 16), S(14), S(s.h + 34));
  cx.globalAlpha = 0.55; cx.fillStyle = P.hullEdge;
  for (var k = 0; k * 46 < s.h; k++) cx.fillRect(X(s.x - 12), Y(s.y + 6 + k * 46), S(14), Math.max(1, S(4)));
  cx.restore();

  drawGantryArm(L);
}

// The bay's moving dressing, drawn live over the baked backdrop.
function drawBayLive(L) {
  var g = L.grid, w = GRID_COLS * g.cell;

  // Exit chevrons marching the WHOLE lane, from the hero's berth to the mouth —
  // drawn before the ships, so a berth that is still occupied simply covers them
  // and the visible run of chevrons is exactly the distance already cleared.
  var rowY = g.y0 + (L.gate.laneRow + 0.5) * g.cell;
  var runFrom = g.x0 + g.cell * 1.02, runTo = L.gate.x - g.cell * 0.4;
  cx.save();
  cx.strokeStyle = P.ice; cx.lineWidth = Math.max(1, S(4)); cx.lineCap = 'round';
  for (var q = 0; q < 5; q++) {
    var u = ((q / 5) + TIME * 0.22) % 1;
    var cxk = runFrom + u * (runTo - runFrom);
    cx.globalAlpha = Math.sin(u * Math.PI) * 0.5;
    cx.beginPath();
    cx.moveTo(X(cxk - 11), Y(rowY - 13)); cx.lineTo(X(cxk + 8), Y(rowY)); cx.lineTo(X(cxk - 11), Y(rowY + 13));
    cx.stroke();
  }
  cx.restore();

  // the crane's hook, swaying
  var gy = L.gantry;
  if (gy) {
    var sway = Math.sin(TIME * 0.7) * 7;
    cx.save();
    cx.strokeStyle = P.hullEdge; cx.lineWidth = Math.max(1, S(2));
    cx.beginPath(); cx.moveTo(X(gy.x2), Y(gy.y2)); cx.lineTo(X(gy.x2 + sway), Y(gy.y2 + 62)); cx.stroke();
    cx.fillStyle = P.frame;
    cx.fillRect(X(gy.x2 + sway - 9), Y(gy.y2 + 60), S(18), S(13));
    cx.restore();
  }

  drawBeacons(L);
}

// Asymmetric dressing. The board's dependency graph is mirrored; the composition
// must not be (Tell 8). One crane arm, on one side, crossing the horizon.
function drawGantryArm(L) {
  var gy = L.gantry; if (!gy) return;
  cx.save();
  cx.strokeStyle = P.frame; cx.lineWidth = Math.max(2, S(9)); cx.lineCap = 'round';
  cx.beginPath(); cx.moveTo(X(gy.x), Y(gy.y)); cx.lineTo(X(gy.x2), Y(gy.y2)); cx.stroke();
  cx.strokeStyle = P.hullEdge; cx.lineWidth = Math.max(1, S(2.4));
  for (var i = 1; i < 6; i++) {
    var u = i / 6;
    var lx = gy.x + (gy.x2 - gy.x) * u, ly = gy.y + (gy.y2 - gy.y) * u;
    cx.beginPath(); cx.moveTo(X(lx), Y(ly - 11)); cx.lineTo(X(lx), Y(ly + 11)); cx.stroke();
  }
  cx.restore();
}

// Beacon pylons. Cool light: in this world warm means danger and nothing else.
function drawBeacons(L) {
  if (!L.beacons) return;
  for (var i = 0; i < L.beacons.length; i++) {
    var p = L.beacons[i];
    cx.strokeStyle = P.frame; cx.lineWidth = Math.max(1.5, S(5)); cx.lineCap = 'round';
    cx.beginPath(); cx.moveTo(X(p.x), Y(p.y + 30)); cx.lineTo(X(p.x), Y(p.y)); cx.stroke();
    var pulse = 0.20 + Math.abs(Math.sin(TIME * 1.5 + i * 1.4)) * 0.24;
    glow(X(p.x), Y(p.y), S(22), P.ice, pulse);
    cx.fillStyle = P.ice;
    cx.beginPath(); cx.arc(X(p.x), Y(p.y), Math.max(1.5, S(4.5)), 0, 6.2832); cx.fill();
  }
}

function drawDecorShips(L) {
  if (!L.decorShips) return;
  for (var i = 0; i < L.decorShips.length; i++) {
    var d = L.decorShips[i];
    var bob = Math.sin(TIME * 0.55 + i * 2.1) * L.grid.cell * 0.06;
    drawShipBody(d.x, d.y + bob, L.grid.cell * d.s, d.rot, P.ships[d.hue % P.ships.length], true, d.kind, 0.30);
  }
}

/* ── THE BLAST DOOR ───────────────────────────────────────────────────────
   The hazard, and the clock, and the same object. Two panels close on the hero's
   lane; the GAP is the time remaining, read spatially — there is no number on
   screen anywhere in this ad. Pre-touch it creeps and judders (see doorFrac):
   the world threatens, but only the player's first tap arms it. */

function drawDoor(L) {
  var g = gatePos(L), frac = doorFrac(), half = L.gate.half;
  var yTop = g.y - half, yBot = g.y + half;
  var gapHalf = half * (1 - frac);
  var pw = L.grid.cell * 0.56;                       // panel width

  // THE HOUSING. Without this the panels were two orange bricks floating in
  // space — there was no aperture for them to be closing. Two guide rails run the
  // full travel and heavy lintels cap both ends, so even wide open the mouth
  // reads as a doorway with something in it.
  cx.save();
  var rw = pw * 0.20;
  cx.fillStyle = P.frameDark;
  cx.fillRect(X(g.x - pw / 2 - rw), Y(yTop - 24), S(rw), S(half * 2 + 48));
  cx.fillRect(X(g.x + pw / 2), Y(yTop - 24), S(rw), S(half * 2 + 48));
  cx.fillStyle = P.frame;
  cx.fillRect(X(g.x - pw * 0.86), Y(yTop - 30), S(pw * 1.72), S(30));      // lintel
  cx.fillRect(X(g.x - pw * 0.86), Y(yBot), S(pw * 1.72), S(30));           // sill
  cx.fillStyle = P.hullEdge;
  cx.fillRect(X(g.x - pw * 0.86), Y(yTop - 30), S(pw * 1.72), Math.max(1, S(3)));
  cx.globalAlpha = 0.75; cx.fillStyle = P.frameDark;
  for (var b = 0; b < 4; b++) {                                            // bolts
    cx.fillRect(X(g.x - pw * 0.74 + b * pw * 0.42), Y(yTop - 20), Math.max(1, S(6)), Math.max(1, S(6)));
    cx.fillRect(X(g.x - pw * 0.74 + b * pw * 0.42), Y(yBot + 12), Math.max(1, S(6)), Math.max(1, S(6)));
  }
  cx.restore();

  var sp = panelSprites(L, pw);
  panel(sp, g.x, yTop, g.y - gapHalf, pw, true);     // upper, leading edge DOWN
  panel(sp, g.x, yBot, g.y + gapHalf, pw, false);    // lower, leading edge UP

  // the gap itself hots up as it narrows — pressure you can see without a number
  var heat = 0.05 + frac * frac * 0.30;
  glow(X(g.x), Y(g.y), S(Math.max(14, gapHalf) * 1.5), P.hazard, heat);

  // warning strobe on the top post, blinking faster the tighter it gets
  var rate = 1.6 + frac * 6.0;
  var s = Math.pow(Math.abs(Math.sin(TIME * rate)), 3);
  glow(X(g.x), Y(yTop - 26), S(30), P.hazard, 0.16 + s * 0.6);
  cx.fillStyle = s > 0.4 ? P.hazardHot : P.frame;
  cx.beginPath(); cx.arc(X(g.x), Y(yTop - 26), Math.max(2, S(6)), 0, 6.2832); cx.fill();
}

// A panel's ONLY changing property is how far it has travelled, so its body and
// its striped leading edge are baked once and blitted at the right length. The
// two panels share one pair of sprites: the lower one is drawn mirrored, which is
// also the honest way to build it — both panels are the same part, fitted upside
// down. Hazard stripes live ONLY on the leading band, so the moving edge is the
// loudest thing about it, which is exactly what the player must track.
var doorCache = null;
function panelSprites(L, pw) {
  if (doorCache) return doorCache;
  var w = Math.max(2, Math.ceil(S(pw))), bodyH = Math.max(2, Math.ceil(S(L.gate.half)) + 2);
  var eh = Math.max(2, Math.ceil(S(46))), hot = Math.max(1.5, S(4));

  // The body is plated STEEL, not the frame's near-black: against open space a
  // dark panel simply disappeared and only its striped tip was visible.
  var body = bakeSprite(w, bodyH, function () {
    cx.fillStyle = '#4C5A85'; cx.fillRect(0, 0, w, bodyH);
    cx.globalAlpha = 0.45; cx.fillStyle = P.frameDark;
    for (var i = 0; i * S(34) < bodyH; i++) cx.fillRect(0, S(8 + i * 34), w, Math.max(1, S(5)));
    cx.globalAlpha = 0.85; cx.fillStyle = '#7E8FC0';
    cx.fillRect(0, 0, Math.max(1, S(5)), bodyH);                 // lit rail edge
    cx.globalAlpha = 0.5; cx.fillStyle = P.frameDark;
    cx.fillRect(w - Math.max(1, S(5)), 0, Math.max(1, S(5)), bodyH);
  });

  var edge = bakeSprite(w, eh, function () {
    cx.fillStyle = P.hazard; cx.fillRect(0, 0, w, eh - hot);
    cx.fillStyle = P.hazardStripe;
    for (var k = -2; k < 7; k++) {
      cx.beginPath();
      cx.moveTo(S(k * 26), 0);
      cx.lineTo(S(k * 26 + 13), 0);
      cx.lineTo(S(k * 26 + 13 + 42), S(42));
      cx.lineTo(S(k * 26 + 42), S(42));
      cx.closePath(); cx.fill();
    }
    cx.globalCompositeOperation = 'destination-in';     // keep the stripes inside the band
    cx.fillStyle = '#000'; cx.fillRect(0, 0, w, eh - hot);
    cx.globalCompositeOperation = 'source-over';
    cx.fillStyle = P.hazardHot;                          // the hot leading line
    cx.fillRect(0, eh - hot, w, hot);
  });

  doorCache = { body: body, edge: edge, w: w, bodyH: bodyH, edgeH: eh };
  return doorCache;
}

// yOuter is the panel's fixed anchor at the frame; yLead is its moving edge.
function panel(sp, x, yOuter, yLead, pw, down) {
  var len = Math.abs(Y(yLead) - Y(yOuter));
  if (len < 1.5) return;
  var dx = X(x - pw / 2);
  cx.save();
  cx.translate(0, Y(yOuter));
  if (!down) cx.scale(1, -1);
  var bh = Math.min(sp.bodyH, Math.max(1, len));
  // source rect is in DEVICE pixels (the sprite is baked at DPR), dest in CSS
  cx.drawImage(sp.body.img, 0, 0, sp.w * DPR, bh * DPR, dx, 0, sp.w, bh);
  if (len > sp.edgeH * 0.5) cx.drawImage(sp.edge.img, dx, len - sp.edgeH, sp.w, sp.edgeH);
  cx.restore();
  glow(X(x), Y(yLead), S(pw * 0.9), P.hazard, 0.30);
}

/* ── SHIPS ────────────────────────────────────────────────────────────────
   Five hulls, five silhouettes. Nothing here is a palette swap of anything else,
   because "four identical shapes in four colours" is the single fastest way to
   look asset-flipped. Each gets the four fills Law 5 asks for — silhouette, lit
   facet, shadow facet, rim — plus a canopy and engine bells.

   THE RULE LIVES IN THE THRUSTERS: lane clear ⇒ plume lit; blocked ⇒ dark and
   dimmed. No caption teaches this, and none is needed. */

var HULLS = {
  scout:  [[1.15, 0], [0.55, -0.16], [0.20, -0.20], [-0.25, -0.82], [-0.52, -0.80], [-0.45, -0.26],
           [-0.88, -0.30], [-0.95, -0.12], [-0.72, -0.10], [-0.72, 0.10], [-0.95, 0.12], [-0.88, 0.30],
           [-0.45, 0.26], [-0.52, 0.80], [-0.25, 0.82], [0.20, 0.20], [0.55, 0.16]],
  runner: [[1.20, 0], [0.42, -0.13], [-0.06, -0.48], [-0.38, -0.50], [-0.34, -0.17], [-0.86, -0.21],
           [-0.92, -0.09], [-0.92, 0.09], [-0.86, 0.21], [-0.34, 0.17], [-0.38, 0.50], [-0.06, 0.48], [0.42, 0.13]],
  hauler: [[1.00, -0.34], [0.35, -0.34], [0.30, -0.62], [-0.55, -0.62], [-0.60, -0.34], [-0.95, -0.30],
           [-0.95, 0.30], [-0.60, 0.34], [-0.55, 0.62], [0.30, 0.62], [0.35, 0.34], [1.00, 0.34]],
  tug:    [[0.85, 0], [0.55, -0.34], [0.05, -0.40], [-0.05, -0.62], [-0.55, -0.66], [-0.72, -0.40],
           [-0.95, -0.36], [-0.95, 0.36], [-0.72, 0.40], [-0.55, 0.66], [-0.05, 0.62], [0.05, 0.40], [0.55, 0.34]],
  pod:    [[0.85, -0.20], [0.55, -0.48], [0.05, -0.55], [-0.02, -0.85], [-0.30, -0.85], [-0.28, -0.52],
           [-0.72, -0.42], [-0.85, -0.16], [-0.85, 0.16], [-0.72, 0.42], [-0.28, 0.52], [-0.30, 0.85],
           [-0.02, 0.85], [0.05, 0.55], [0.55, 0.48], [0.85, 0.20]]
};
var ENGINES = {
  scout:  [[-0.92, -0.22, 0.19], [-0.92, 0.22, 0.19]],
  runner: [[-0.90, 0, 0.23]],
  hauler: [[-0.95, -0.16, 0.21], [-0.95, 0.16, 0.21]],
  tug:    [[-0.95, 0, 0.36]],
  pod:    [[-0.84, -0.26, 0.17], [-0.84, 0.26, 0.17]]
};
var CANOPY = {
  scout:  [0.44, 0, 0.40, 0.26], runner: [0.46, 0, 0.34, 0.19], hauler: [0.70, 0, 0.24, 0.46],
  tug:    [0.40, 0, 0.34, 0.40], pod:    [0.32, 0, 0.42, 0.46]
};

function tracePath(pts, sr) {
  cx.beginPath();
  for (var i = 0; i < pts.length; i++) {
    var px = pts[i][0] * sr, py = pts[i][1] * sr;
    if (i) cx.lineTo(px, py); else cx.moveTo(px, py);
  }
  cx.closePath();
}

// The hull itself — silhouette, shadow facet, lit facet, rim, bells, canopy —
// only ever changes when a ship's lane opens or shuts, so it is rendered ONCE per
// (hull, colour, dim, lit, size) into a sprite. Fifteen path ops per ship per
// frame became one drawImage; the plume, which genuinely animates, stays live.
var shipCache = {};
function shipSprite(hull, col, dim, lit, sr) {
  var key = hull + '|' + col.base + '|' + (dim ? 1 : 0) + '|' + (lit ? 1 : 0) + '|' + Math.round(sr);
  if (shipCache[key]) return shipCache[key];
  var pts = HULLS[hull] || HULLS.runner, eng = ENGINES[hull] || ENGINES.runner,
      can = CANOPY[hull] || CANOPY.runner, i;
  var pad = Math.ceil(sr * 1.45) + 4;
  var sp = bakeSprite(pad * 2, pad * 2, function () {
  cx.translate(pad, pad);
  cx.globalAlpha = dim ? 0.7 : 1;

  // 1. silhouette
  tracePath(pts, sr);
  cx.fillStyle = col.base; cx.fill();

  cx.save();
  cx.clip();
  // 2. shadow facet (away from the light)
  cx.globalAlpha *= 0.8; cx.fillStyle = col.dark;
  cx.beginPath();
  cx.moveTo(-sr * 1.4, sr * 0.04); cx.lineTo(sr * 1.4, sr * 0.30);
  cx.lineTo(sr * 1.4, sr * 1.4); cx.lineTo(-sr * 1.4, sr * 1.4); cx.closePath(); cx.fill();
  // 3. lit facet (toward it)
  cx.globalAlpha = dim ? 0.14 : 0.32; cx.fillStyle = col.lit;
  cx.beginPath();
  cx.moveTo(-sr * 1.4, -sr * 1.4); cx.lineTo(sr * 1.4, -sr * 1.4);
  cx.lineTo(sr * 1.4, -sr * 0.34); cx.lineTo(-sr * 1.4, -sr * 0.08); cx.closePath(); cx.fill();
  // hull marking — one stripe, off-centre, so no ship is its own mirror
  cx.globalAlpha = dim ? 0.22 : 0.44; cx.fillStyle = col.dark;
  cx.fillRect(-sr * 0.34, -sr * 0.9, sr * 0.13, sr * 1.05);
  cx.restore();

  // 4. rim
  cx.globalAlpha = dim ? 0.5 : 1;
  cx.strokeStyle = col.lit; cx.lineWidth = Math.max(1.1, sr * 0.055);
  tracePath(pts, sr);
  cx.stroke();

  // engine bells — lit iron or cold iron: the rule, stated a second time
  for (i = 0; i < eng.length; i++) {
    cx.globalAlpha = dim ? 0.75 : 1;
    cx.fillStyle = lit ? '#FFFFFF' : '#232C46';
    cx.beginPath(); cx.arc(eng[i][0] * sr + sr * 0.04, eng[i][1] * sr, eng[i][2] * sr * 0.52, 0, 6.2832); cx.fill();
  }

  // canopy — dark glass, one hard highlight. The only "face" a ship gets.
  cx.globalAlpha = dim ? 0.8 : 1;
  cx.fillStyle = 'rgba(9,14,30,.86)';
  roundQuad(can[0] * sr, can[1] * sr, can[2] * sr, can[3] * sr);
  cx.fill();
  cx.globalAlpha = dim ? 0.24 : 0.62;
  cx.fillStyle = P.ice;
  roundQuad(can[0] * sr - can[2] * sr * 0.16, can[1] * sr - can[3] * sr * 0.24, can[2] * sr * 0.46, can[3] * sr * 0.24);
  cx.fill();
  });
  sp.pad = pad;
  shipCache[key] = sp;
  return sp;
}

function drawShipBody(x, y, r, rot, col, dim, hull, thrust) {
  var eng = ENGINES[hull] || ENGINES.runner, sr = S(r), lit = thrust > 0.01, i;

  cx.save();
  cx.translate(X(x), Y(y));
  cx.rotate(rot);

  // Underglow only where it earns its composite. The hero keeps its crimson
  // underglow even when boxed in — it owns the one hue in the ad and the eye has
  // to find "me" on every frame (Law 2 / Law 6), blocked or not.
  if (!dim) glow(0, 0, sr * 1.9, col.lit, 0.17);
  else if (col === P.hero) glow(0, 0, sr * 1.8, col.lit, 0.12);

  // THRUST — the wordless tell, and the direction indicator, in one element.
  // Drawn before the hull so the ship occludes the root of its own plume.
  if (lit) {
    var fl = 0.55 + Math.abs(Math.sin(TIME * 18 + x * 0.11)) * 0.45;
    for (i = 0; i < eng.length; i++) {
      var ex = eng[i][0] * sr, ey = eng[i][1] * sr, ew = eng[i][2] * sr;
      var len = sr * (0.5 + fl * 0.6) * thrust;
      if (!dim) glow(ex - len * 0.4, ey, ew * 2.8, col.lit, 0.32 * thrust);
      cx.globalAlpha = 0.85 * thrust; cx.fillStyle = col.lit;
      cx.beginPath(); cx.moveTo(ex, ey - ew * 0.58); cx.lineTo(ex - len, ey); cx.lineTo(ex, ey + ew * 0.58); cx.closePath(); cx.fill();
      cx.globalAlpha = 0.8 * thrust; cx.fillStyle = '#FFFFFF';
      cx.beginPath(); cx.moveTo(ex, ey - ew * 0.26); cx.lineTo(ex - len * 0.5, ey); cx.lineTo(ex, ey + ew * 0.26); cx.closePath(); cx.fill();
    }
    cx.globalAlpha = 1;
  }

  var sp = shipSprite(hull, col, dim, lit, sr);
  cx.drawImage(sp.img, -sp.pad, -sp.pad, sp.w, sp.h);

  cx.restore();
}

// Where a berthed ship sits, or how far a launched one has burned. Driven by GT
// (SCALED game time), so the hero's exit plays out in the payoff's slow motion
// instead of finishing in 300 real milliseconds while everything else crawls.
function pieceRenderPos(L, piece) {
  var base = cellCenter(L, piece.r, piece.c);
  if (!piece.cleared) return { x: base.x, y: base.y, t: 0 };
  var t = Math.min(1, (GT - piece.clearedAt) / (SLIDE_MS / 1000));
  var v = DIR_VEC[piece.dir];
  // The hero's burn is the payoff and it must be a SCREEN event (Law 7): it is
  // staged to clear the whole safe box, so it covers the frame in either
  // orientation rather than being a hop that happens to end off-camera.
  // The hero decelerates to a STOP out in the launch tube rather than leaving the
  // frame. It still covers most of the width on the way (Law 7), but the tableau
  // the end card freezes over is the one the brief promised: the ship clear of the
  // bay with the door closing behind it — not an empty deck.
  var dist = piece.id === HERO_ID ? (L.heroStop - base.x) : L.grid.cell * 2.2;
  var e = 1 - Math.pow(1 - t, 3);
  return { x: base.x + v[1] * dist * e, y: base.y + v[0] * dist * e, t: t };
}

function isHeroId(piece) { return piece.id === HERO_ID; }

function drawShips(L) {
  for (var i = 0; i < W.board.length; i++) {
    var piece = W.board[i];
    var pos = pieceRenderPos(L, piece);
    // a launched service ship is gone once it is off the deck; the HERO stays,
    // holding station in the tube, because it is the last thing the end card shows
    if (piece.cleared && pos.t >= 1 && !isHeroId(piece)) continue;
    var isHero = piece.id === HERO_ID;
    var wob = 0, roll = 0, by = pos.y;
    if (!piece.cleared && piece.shakeAt) {                     // clamps refusing
      var st = (GT - piece.shakeAt) / 0.24;
      if (st < 1) wob = Math.sin(st * Math.PI * 5) * (1 - st) * 0.20;
    }
    if (isHero && !piece.cleared) {                            // Law 6 — alive while idle
      by += Math.sin(TIME * 2.3) * L.grid.cell * 0.028;
      roll = Math.sin(TIME * 1.5) * 0.04;
    }
    var free = isFree(W.board, piece.id);
    // the half-second flare right after this ship was unblocked — the beat that
    // teaches the chain without a word of explanation
    var ign = piece.igniteAt ? Math.max(0, 1 - (GT - piece.igniteAt) / 0.45) : 0;
    var thrust = piece.cleared ? 1
               : (free ? Math.min(1, 0.5 + ign * 0.5 + Math.abs(Math.sin(TIME * 3.1 + i)) * 0.14) : 0);
    // Tell 3 — the hero is the biggest, most saturated thing on the deck
    var r = L.grid.cell * (isHero ? 0.44 : 0.37);
    drawShipBody(pos.x, by, r, DIR_ROT[piece.dir] + wob + roll, colorOf(piece),
                 !free && !piece.cleared, piece.hull, thrust);
  }
}

/* ── THE IMPULSE DIAL — the control's on-screen home ──────────────────────
   A machined gauge bolted to the platform face. It reads PACE (tOf), it is
   deliberately WORDLESS — a redline either side of a cool band is a hundred
   years of established visual language, and Law 6 says say less than that — and
   it is decorative: controlScreen() points here precisely so the harness's
   stray-tap probe lands on something that can neither win nor lose. */

function angOf(tt) { return Math.PI + tt * Math.PI; }

// The face never changes; only the needle does. Bake the plate, bezel, zones,
// ticks and hub once.
var gaugeCache = null;
function gaugeFace(L) {
  if (gaugeCache) return gaugeCache;
  var g = L.gauge, rad = S(g.r * 0.68), pad = Math.ceil(S(g.r * 1.05)) + 4;
  var sp = bakeSprite(pad * 2, pad * 2, function () {
  cx.translate(pad, pad);

  cx.fillStyle = P.hull; cx.globalAlpha = 0.9;
  roundQuad(0, -S(g.r * 0.18), S(g.r * 1.9), S(g.r * 1.05), 0.16);
  cx.fill();
  cx.globalAlpha = 0.7; cx.fillStyle = P.hullDeep;
  cx.fillRect(-S(g.r * 0.84), -S(g.r * 0.62), Math.max(1, S(6)), Math.max(1, S(6)));
  cx.fillRect(S(g.r * 0.78), -S(g.r * 0.62), Math.max(1, S(6)), Math.max(1, S(6)));

  cx.globalAlpha = 1; cx.lineCap = 'butt';
  cx.lineWidth = S(g.r * 0.30); cx.strokeStyle = P.frame;
  cx.beginPath(); cx.arc(0, 0, rad, Math.PI, 6.2832); cx.stroke();
  // zones: warm = danger, cool = good. The same code the whole ad uses, which is
  // why the dial needs no words: a redline either side of a cool band is already
  // a hundred years of established language.
  var zones = [[0, 0.21, P.hazard, 0.9], [0.21, 0.79, '#6FD4FF', 0.95], [0.79, 1, P.hazard, 0.9]];
  cx.lineWidth = S(g.r * 0.15);
  for (var i = 0; i < zones.length; i++) {
    cx.globalAlpha = zones[i][3];
    cx.strokeStyle = zones[i][2];
    cx.beginPath(); cx.arc(0, 0, rad, angOf(zones[i][0]), angOf(zones[i][1])); cx.stroke();
  }
  cx.globalAlpha = 0.5; cx.strokeStyle = P.paper; cx.lineWidth = Math.max(1, S(2));
  for (var k = 0; k <= 8; k++) {
    var a = angOf(k / 8);
    cx.beginPath();
    cx.moveTo(Math.cos(a) * rad * 0.80, Math.sin(a) * rad * 0.80);
    cx.lineTo(Math.cos(a) * rad * 0.90, Math.sin(a) * rad * 0.90);
    cx.stroke();
  }
  cx.globalAlpha = 1; cx.fillStyle = P.hullDeep;
  cx.beginPath(); cx.arc(0, 0, S(g.r * 0.34), 0, 6.2832); cx.fill();
  });
  sp.pad = pad; sp.rad = rad;
  gaugeCache = sp;
  return sp;
}

function drawGauge(L) {
  var g = L.gauge, t = tOf(W), f = gaugeFace(L), cxp = X(g.x), cyp = Y(g.y);
  cx.drawImage(f.img, cxp - f.pad, cyp - f.pad, f.w, f.h);
  var na = angOf(t);
  cx.save();
  cx.strokeStyle = P.paper; cx.lineWidth = Math.max(2, S(4)); cx.lineCap = 'round';
  cx.beginPath();
  cx.moveTo(cxp - Math.cos(na) * f.rad * 0.16, cyp - Math.sin(na) * f.rad * 0.16);
  cx.lineTo(cxp + Math.cos(na) * f.rad * 0.9, cyp + Math.sin(na) * f.rad * 0.9);
  cx.stroke();
  cx.fillStyle = P.ice;
  cx.beginPath(); cx.arc(cxp, cyp, Math.max(2, S(6)), 0, 6.2832); cx.fill();
  cx.restore();
}

/* ── PREVIEW + HINT ───────────────────────────────────────────────────────
   Law 4: misses TEACH. 45% of the solution on attempt one (a hand on the ship
   that is correct right now); by attempt five every ship shows its burn vector
   AND its place in the order. The board is never solved for free early, and it
   is never unreadable late. */

function drawPreviewAndHint(L) {
  var frac = PREVIEW_FRAC(), target = bestFreeTarget(W.board), i;
  if (frac >= 0.5) {
    for (i = 0; i < W.board.length; i++) {
      var piece = W.board[i];
      if (piece.cleared) continue;
      var pos = cellCenter(L, piece.r, piece.c), v = DIR_VEC[piece.dir];
      var free = isFree(W.board, piece.id);
      vectorHint(pos.x, pos.y, Math.atan2(v[0], v[1]), L.grid.cell,
                 free ? colorOf(piece).lit : 'rgba(207,230,255,.34)', free);
    }
  }
  if (frac >= 0.85) {
    var order = canonicalOrder();
    for (i = 0; i < order.length; i++) {
      var pc = W.board[order[i]];
      if (pc.cleared) continue;
      var p2 = cellCenter(L, pc.r, pc.c);
      pill(X(p2.x), Y(p2.y - L.grid.cell * 0.52), String(i + 1), 'rgba(10,14,26,.85)', P.ice, S(14));
    }
  }
  if (W.hint > 0.01 && target) {
    var tp = cellCenter(L, target.r, target.c), s = slabRect(L);
    // The RING is the pointer; the label is a one-time teach line, so it gets a
    // fixed berth under the top frame instead of chasing the target around. Tried
    // it the other way: it landed on the freighter, then on the bottom frame bar.
    handHintAt(tp.x, tp.y, W.hint, TIME, CONFIG.COPY.hint, L.grid.cell,
               s.x + s.w * 0.5, s.y + L.grid.cell * 0.21,
               target.r === GRID_ROWS - 1 ? -1 : 1);
  }
}

// A burn vector: two chevrons drifting the way the ship will go, brighter on the
// ships that can actually take it right now.
function vectorHint(x, y, angle, cell, color, free) {
  cx.save();
  cx.translate(X(x), Y(y)); cx.rotate(angle);
  cx.strokeStyle = color; cx.lineCap = 'round'; cx.lineJoin = 'round';
  cx.lineWidth = Math.max(1.2, S(cell * 0.032));
  for (var i = 0; i < 2; i++) {
    var u = ((i / 2) + TIME * 0.6) % 1;
    var o = S(cell * (0.36 + u * 0.20)), d = S(cell * 0.10);
    cx.globalAlpha = (free ? 0.9 : 0.55) * Math.sin(u * Math.PI);
    cx.beginPath();
    cx.moveTo(o - d, -d); cx.lineTo(o + d * 0.7, 0); cx.lineTo(o - d, d);
    cx.stroke();
  }
  cx.restore();
}

// The hand. It performs the real gesture on the real target — the opening teach
// AND the idle rescue — and dies the instant the player touches the glass.
function handHintAt(px, py, alpha, time, label, cell, lx, ly, handSide) {
  // the hand flips above the target on the bottom row, where below is the frame bar
  var hx = X(px) + S(Math.sin(time * 2.6) * 10);
  var hy = Y(py) + handSide * (S(38) + S(Math.abs(Math.sin(time * 5.2)) * 5));

  cx.save();
  cx.globalAlpha = alpha * (0.28 + Math.abs(Math.sin(time * 4.2)) * 0.28);
  cx.strokeStyle = P.ice; cx.lineWidth = Math.max(1.5, S(2.4));
  cx.beginPath(); cx.arc(X(px), Y(py), S(cell * 0.40 + Math.sin(time * 4.2) * 5), 0, 6.2832); cx.stroke();
  cx.restore();

  cx.save();
  cx.globalAlpha = alpha;
  cx.translate(hx, hy);
  cx.fillStyle = P.paper; cx.strokeStyle = '#0A0E1A'; cx.lineWidth = 2;
  cx.beginPath();
  cx.moveTo(0, -14); cx.quadraticCurveTo(-5, -16, -5, -7);
  cx.lineTo(-5, 3); cx.quadraticCurveTo(-11, 0, -14, 3);
  cx.quadraticCurveTo(-16, 7, -11, 11);
  cx.quadraticCurveTo(-3, 21, 3, 21);
  cx.quadraticCurveTo(12, 21, 13, 10);
  cx.lineTo(13, -3); cx.quadraticCurveTo(13, -7, 9, -7);
  cx.quadraticCurveTo(9, -11, 5, -11);
  cx.quadraticCurveTo(5, -16, 0, -14);
  cx.closePath(); cx.fill(); cx.stroke();
  cx.restore();

  cx.save();
  cx.globalAlpha = alpha * 0.95;
  cx.lineWidth = Math.max(2, S(4)); cx.strokeStyle = 'rgba(5,7,15,.88)';
  cx.font = '700 ' + FS(15) + "px Chakra, sans-serif"; cx.textAlign = 'center';
  cx.strokeText(label, X(lx), Y(ly));
  cx.fillStyle = P.ice;
  cx.fillText(label, X(lx), Y(ly));
  cx.restore();
}

/* ── DEBRIS + RINGS + FLOATS ──────────────────────────────────────────── */

// Streaks, not squares: a spark is drawn along its own velocity, so it reads as
// something that was thrown by an event rather than sprinkled near one.
function drawSparks() {
  cx.save();
  cx.lineCap = 'round';
  for (var i = 0; i < sparks.length; i++) {
    var p = sparks[i], a = Math.max(0, p.life / p.max);
    var sx2 = X(p.x), sy2 = Y(p.y);
    cx.globalAlpha = a;
    cx.strokeStyle = p.c;
    cx.lineWidth = Math.max(1, S(p.r * (0.35 + a * 0.65)));
    cx.beginPath();
    cx.moveTo(sx2, sy2);
    cx.lineTo(sx2 - S(p.vx * 0.016 * p.len), sy2 - S(p.vy * 0.016 * p.len));
    cx.stroke();
  }
  cx.restore();
}
function drawRings() {
  cx.save();
  for (var i = 0; i < rings.length; i++) {
    var r = rings[i], u = 1 - r.life / r.max;
    var rr = r.r0 + (r.r1 - r.r0) * (1 - Math.pow(1 - u, 2.2));
    cx.globalAlpha = (1 - u) * 0.85;
    cx.strokeStyle = r.c;
    cx.lineWidth = Math.max(1, S(8 * (1 - u) + 1));
    cx.beginPath(); cx.arc(X(r.x), Y(r.y), S(rr), 0, 6.2832); cx.stroke();
  }
  cx.restore();
}
function drawFloats() {
  for (var i = 0; i < floats.length; i++) {
    var f = floats[i], a = Math.min(1, f.life / f.max * 1.6);
    var pop = 1 + (1 - Math.min(1, (f.max - f.life) * 7)) * 0.5;
    cx.save();
    cx.globalAlpha = a;
    cx.translate(X(f.x), Y(f.y)); cx.scale(pop, pop);
    cx.font = '700 ' + Math.round(S(f.s)) + 'px Chakra, sans-serif';
    cx.textAlign = 'center';
    cx.lineWidth = Math.max(3, S(6)); cx.strokeStyle = 'rgba(5,7,15,.9)';
    cx.strokeText(f.text, 0, 0);
    cx.fillStyle = f.c;
    cx.fillText(f.text, 0, 0);
    cx.restore();
  }
}

/* ── THE FRAME ────────────────────────────────────────────────────────── */

// EVERY pixel that cannot change without a resize is rendered once, here, into a
// screen-space image: the nebula, the gas giant, the station horizon, the
// corridor trench, the platform face and the berth slab. That is three big
// composited glow sprites, two gradients, a clip and ~140 small fills that were
// otherwise being paid for sixty times a second — the first headless landscape
// pass measured 30 fps with them live and 60 with them baked.
//
// It is exact, not an approximation: those elements are static in WORLD space and
// the camera only moves on resize, so blitting the bake inside the same camera
// transform is pixel-identical to redrawing them.
// ONE opaque image, baked 24px oversized on every side so the camera push and a
// hard screen-shake can never expose a seam — which is also why the frame needs
// no base fill and no second blit. The bake runs with the camera offset by the
// same padding, so the world lands pixel-exact when it is blitted back at (-24,-24).
var BG_PAD = 24;
var bgAll = null;
function makeBackdrop(L) {
  var ox = cam.ox, oy = cam.oy;
  classifyStars(L);
  cam.ox += BG_PAD; cam.oy += BG_PAD;
  bgAll = bakeSprite(VW + BG_PAD * 2, VH + BG_PAD * 2, function () {
    skyGradient([[0, '#05070F'], [0.34, '#0C1128'], [0.63, '#1B1440'], [0.85, '#2B1443'], [1, '#3A1638']]);
    drawNebula();
    bakeStars();
    drawPlanet(L);
    drawStation(L);
    drawCorridorTrench(L);
    drawPlatform(L);
    drawBayStatic(L);
  });
  cam.ox = ox; cam.oy = oy;
}

function draw() {
  var L = W ? W.layout : prep(layout());
  var sx = 0, sy = 0;
  if (shake > 0) { sx = (Math.random() - 0.5) * shakeMag * 2; sy = (Math.random() - 0.5) * shakeMag * 2; }

  cx.setTransform(DPR, 0, 0, DPR, 0, 0);

  cx.save();
  var push = 1 + camPush * 0.06;
  cx.translate(VW / 2, VH * 0.45); cx.scale(push, push); cx.translate(-VW / 2, -VH * 0.45);
  cx.translate(sx, sy);

  var g = gatePos(L);
  if (bgAll) cx.drawImage(bgAll.img, -BG_PAD, -BG_PAD, bgAll.w, bgAll.h);
  drawLiveStars();
  drawWarpStreaks(L, X(g.x), Y(g.y));
  drawMastLights(L);
  drawCorridorLights(L);
  drawDecorShips(L);
  drawBayLive(L);
  drawDoor(L);
  drawShips(L);
  drawRings();
  drawSparks();
  // The dial is a fixture bolted to the platform, so it stays put in every state —
  // popping it out on the payoff left a hole in the lower third of the frame.
  if (W) drawGauge(L);
  if (W && W.state === 'SOLVE') drawPreviewAndHint(L);
  drawFloats();

  cx.restore();

  // the slam wash — a fail is the only time the whole frame goes warm
  if (flash > 0.01) {
    cx.save();
    cx.globalCompositeOperation = 'lighter';
    cx.globalAlpha = flash * 0.20;
    cx.fillStyle = P.hazard; cx.fillRect(0, 0, VW, VH);
    cx.restore();
  }
  if (vignette) cx.drawImage(vignette, 0, 0, VW, VH);
}

/* ══ 14. LOOP — ENGINE. Fixed 1/120 physics, render every rAF. ═══════════ */

var acc = 0, last = performance.now(), FIXED = 1 / 120;
var fpsBuf = [], fpsEl = document.getElementById('dbg-stat'), LAST_FPS = 60;

function frame(now) {
  // Pause cleanly when the ad is off-screen: no wasted battery, and no giant dt
  // spike when it comes back.
  if (document.hidden) { last = now; acc = 0; requestAnimationFrame(frame); return; }

  var dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  TIME += dt; acc += dt;
  var guard = 0;
  while (acc >= FIXED && guard++ < 8) { step(FIXED); acc -= FIXED; }
  if (W) draw();

  fpsBuf.push(dt);
  if (fpsBuf.length > 45) {
    var sum = fpsBuf.reduce(function (a, b) { return a + b; }, 0);
    LAST_FPS = Math.round(fpsBuf.length / sum);
    fpsEl.textContent = Math.round(SIZE_BYTES / 1024) + ' KB · 0 requests · ' + LAST_FPS + ' fps';
    fpsBuf.length = 0;
    if (started) postMeta();   // keep the gallery's fps badge live
  }
  requestAnimationFrame(frame);
}

/* ══ 15. TEST HANDLE — tools/verify-playable.mjs drives this. ═════════════
   Every key below is part of the contract. Do not rename them.

   archetype: 'sequence' — a THIRD archetype (docs/archetypes.md), added because
   neither shipped shape fit: this isn't aim-then-fire, and there's no continuous
   drag to hold. The player commits ONE discrete action at a time (a tap on a
   currently-free car), any number of times, against a shared countdown. Its ARCH
   entry lives in tools/verify-playable.mjs:

     playState: 'SOLVE'.  commitsOnTap: false — a tap on something that ISN'T a
     currently-free car (including the control itself, see controlScreen() below)
     is always harmless, exactly like a launcher's "picks up but doesn't commit".
     win(page, sw, shot) taps __ad.autopilotScreen() on a loop — a REAL sequence
     of REAL taps on the REAL canvas, the same shape CLOUD RUNNER's win() uses
     (it drives autopilotScreen() too, just continuously instead of discretely).

   It still owes every other guarantee: ONE scalar control t ∈ [0,1] (tOf() —
   PACE, a live readout, not a physical drag value), a PURE sweepable sim
   (simRun/sweep, section 6), a 10–34% band closed on both sides, an escalating
   preview. Never weaken an assertion to make a mechanic fit — add the archetype. */

window.__ad = {
  archetype: 'sequence',
  get state()       { return W ? W.state : 'BOOT'; },
  get control()     { return W ? tOf(W) : 0.5; },
  get attempts()    { return attempts; },
  get hint()        { return W ? W.hint : 0; },
  get fps()         { return LAST_FPS; },
  get assist()      { return ASSIST(); },
  get previewFrac() { return PREVIEW_FRAC(); },
  maxAssist: 0.35,
  events: EVENTS,
  layoutName: function () { return VW / VH > 1.15 ? 'landscape' : 'portrait'; },
  sweep:      function (assist, n) { return sweep(assist, n); },
  // The control is the pace gauge (a decorative HUD dial) — never a car, so the
  // harness's stray-tap probe (it taps exactly here) can neither win nor lose.
  controlScreen: function () { if (!W) return { x: 0, y: 0 }; var p = gaugeNeedlePos(); return { x: X(p.x), y: Y(p.y) }; },
  setControl:    function (t) { if (W) W.paceOverride = Math.max(0, Math.min(1, t)); },
  // Where a good player's next tap should land RIGHT NOW — the harness's win()
  // loop taps this on repeat to prove a real sequence of real taps wins for real.
  autopilotScreen: function () {
    if (!W || W.state !== 'SOLVE') return null;
    var t = bestFreeTarget(W.board);
    if (!t) return null;
    var p = cellCenter(W.layout, t.r, t.c);
    return { x: X(p.x), y: Y(p.y) };
  },
  fire: function () { /* nothing to commit here — each tap resolves itself; see onDown */ },

  // Both FAST-FORWARD through the REAL resolve path (clearPiece/failRun), they
  // just skip the waiting: forceWin taps the correct car, in order, back-to-back
  // with no real delay between taps, so it can never disagree with real play.
  forceWin: function () {
    if (!W || W.state !== 'SOLVE') return;
    var guard = 0, t;
    while (W.state === 'SOLVE' && (t = bestFreeTarget(W.board)) && guard++ < PIECE_DEFS.length + 1) clearPiece(t);
  },
  forceFail: function () {
    if (!W || W.state !== 'SOLVE') return;
    W.timeLeft = 0;
    failRun('stalled');
  },
  // Dev-only: patch tuning and re-derive, so the level can be BALANCED by
  // sweeping rather than by guessing. Never used at runtime.
  tune: function (tPatch, lPatch) {
    if (tPatch) for (var k in tPatch) T[k] = tPatch[k];
    var L = layout();
    if (lPatch) for (var j in lPatch) L[j] = lPatch[j];
    L._ready = false; prep(L); resize(); resetAttempt(true);
    return { layout: L, band: sweep(0, 200).band };
  }
};

/* ══ 16. GO ══════════════════════════════════════════════════════════════ */

resize();
resetAttempt(true);
requestAnimationFrame(frame);
bootWhenReady();

// Stamped in by tools/bake.mjs. Measuring it at runtime would cost a request,
// and this ad does not make any.
// Debug overlay: nothing on the glass by default. CONFIG.DEBUG or ?debug=1 shows
// the event ticker + size/fps tag for dev work; players never see either.
if (CONFIG.DEBUG || /[?&#]debug=1/.test(location.href)) {
  document.getElementById('dbg').classList.add('on');
}
fpsEl.textContent = Math.round(SIZE_BYTES / 1024) + ' KB · 0 requests · 60 fps';

})();
</script>
