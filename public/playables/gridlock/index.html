/* ── GAME LOGIC: palette. Keep in sync with CONFIG.PALETTE below. ─────────── */
:root{
  --void:#05070F; --hull-deep:#0E1424; --hull:#1A2238; --hull-lit:#28324F; --hull-edge:#46567F;
  --strip:#8FB6E8; --ice:#CFE6FF; --hazard:#FF9A2E;
  --crimson:#FF4655; --gold:#FFD166; --paper:#EAF2FF;
  --disp:'Chakra','Futura','Trebuchet MS',Impact,sans-serif;
  --mono:'TechMono',ui-monospace,Menlo,Consolas,monospace;
}
/* ── ENGINE: everything below is shared chrome. Recolour, don't restructure. ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0B0910;
  font-family:var(--disp);color:var(--paper);
  -webkit-user-select:none;user-select:none;touch-action:none;overscroll-behavior:none}

#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0B0910}
#stage.framed{background:radial-gradient(120% 120% at 50% 0%,#191426 0%,#0B0910 60%)}
#screen{position:relative;width:100%;height:100%;overflow:hidden;background:#16121F}
#stage.framed #screen{
  width:min(400px,42vh);height:min(866px,91vh);aspect-ratio:400/866;
  border-radius:44px;box-shadow:0 0 0 11px #1B1626,0 0 0 13px #2E2740,
    0 34px 90px -12px rgba(0,0,0,.85),0 0 120px -30px rgba(196,107,255,.30)}
#stage.framed #notch{position:absolute;top:9px;left:50%;transform:translateX(-50%);
  width:104px;height:26px;border-radius:14px;background:#0B0910;z-index:30}
#notch{display:none}
#stage.framed #dbg{top:44px}
#stage.framed #mute{top:38px}

canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

.layer{position:absolute;inset:0;pointer-events:none;z-index:10;
  padding:calc(env(safe-area-inset-top,0px) + 10px) calc(env(safe-area-inset-right,0px) + 10px)
          calc(env(safe-area-inset-bottom,0px) + 10px) calc(env(safe-area-inset-left,0px) + 10px)}


#mute{position:absolute;top:calc(env(safe-area-inset-top,0px) + 6px);right:calc(env(safe-area-inset-right,0px) + 6px);
  width:48px;height:48px;display:flex;align-items:center;justify-content:center;
  pointer-events:auto;cursor:pointer;opacity:.55;transition:opacity .2s}
#mute:hover{opacity:1}
#mute svg{width:20px;height:20px;fill:none;stroke:var(--paper);stroke-width:1.8;stroke-linecap:round}

/* Debug overlay — the old event ticker + size tag, OFF the glass by default.
   Shown only when CONFIG.DEBUG is true or the URL contains debug=1. The player-
   facing glass carries no instrumentation chrome; the gallery renders the live
   event feed BESIDE the phone from the postMessage envelope (docs/gallery-embed.md). */
#dbg{display:none;position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);
  left:calc(env(safe-area-inset-left,0px) + 12px);font-family:var(--mono);
  font-size:9px;letter-spacing:.02em;color:#CBB8E8;opacity:.85}
#dbg.on{display:block}
#dbg .row{white-space:nowrap;overflow:hidden}
#dbg .row .nm{color:var(--teal-l)}
#dbg .row .vl{color:#9C86BE;padding-left:6px}

#rail{position:absolute;right:calc(env(safe-area-inset-right,0px) + 12px);
  bottom:calc(env(safe-area-inset-bottom,0px) + 14px);
  pointer-events:auto;cursor:pointer;opacity:0;transform:translateY(14px);
  transition:opacity .45s ease,transform .45s cubic-bezier(.2,1,.3,1)}
#rail.on{opacity:1;transform:none}
#rail .btn{min-height:48px;padding:0 18px;display:flex;align-items:center;gap:7px;border-radius:24px;
  background:linear-gradient(180deg,#FFE49A,var(--gold));color:#2A1B06;
  font-size:13px;font-weight:700;letter-spacing:.09em;
  box-shadow:0 6px 18px -4px rgba(255,209,102,.5),inset 0 -2px 0 rgba(0,0,0,.16)}

/* End card: buttons only, over a LIGHT scrim — the finished scene (the payoff)
   stays readable behind it. Never an opaque panel. The whole scrim is tappable
   and triggers the CTA; REPLAY is its own button on top. */
#end{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  gap:12px;padding:24px 24px calc(env(safe-area-inset-bottom,0px) + 34px);
  opacity:0;pointer-events:none;cursor:pointer;
  background:linear-gradient(180deg,rgba(0,0,0,0) 34%,rgba(0,0,0,.30) 70%,rgba(0,0,0,.58) 100%);
  transition:opacity .5s ease;z-index:20}
#end.on{opacity:1;pointer-events:auto}
#cta{margin-top:4px;min-height:58px;width:min(300px,88%);border:0;cursor:pointer;border-radius:29px;
  font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:.1em;color:#2A1B06;
  background:linear-gradient(180deg,#FFE9A8,var(--gold));
  box-shadow:0 10px 0 -2px #B8853A,0 18px 34px -8px rgba(255,209,102,.5);
  animation:breathe 2.1s ease-in-out infinite;transition:transform .09s ease}
#cta:active{transform:translateY(4px);box-shadow:0 6px 0 -2px #B8853A}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
#replay{min-height:48px;padding:0 22px;border:1px solid rgba(87,64,121,.85);cursor:pointer;border-radius:24px;
  background:rgba(22,18,31,.6);color:#C9B7E4;font-family:var(--disp);font-weight:700;
  font-size:12px;letter-spacing:.15em;transition:all .18s ease}
#replay:hover{background:rgba(59,44,85,.7);color:var(--paper)}

#toast{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 84px);
  transform:translate(-50%,10px);padding:9px 15px;border-radius:9px;
  background:rgba(11,9,16,.93);border:1px solid rgba(79,227,193,.42);
  font-family:var(--mono);font-size:10.5px;color:var(--teal-l);white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s cubic-bezier(.2,1.2,.4,1);z-index:25}
#toast.on{opacity:1;transform:translate(-50%,0)}
</style>

<div id="stage">
  <div id="screen">
    <canvas id="c"></canvas>
    <div id="notch"></div>

    <div class="layer">
      <div id="dbg"><div id="dbg-stat">— KB · 0 requests · 60 fps</div><div id="dbg-ticker"></div></div>
      <div id="rail"><div class="btn" id="railbtn">PLAY NOW ▸</div></div>
    </div>

    <div id="mute" title="Sound"><svg id="muteicon" viewBox="0 0 24 24"></svg></div>

    <div id="end">
      <button id="cta">PLAY NOW ▸</button>
      <button id="replay">REPLAY</button>
    </div>

    <div id="toast"></div>
  </div>
</div>

<script>
(function () {
'use strict';

/* ══════════════════════════════════════════════════════════════════════════
   PLAYABLE SHELL — Inorganic Games
   ──────────────────────────────────────────────────────────────────────────
   Sections marked ENGINE are shared across every ad: do not restructure them.
   Sections marked GAME LOGIC are the ad: replace them wholesale.

   GRIDLOCK is a tap-in-order docking-bay escape — a THIRD archetype, 'sequence'
   (see docs/archetypes.md + ARCH.sequence in tools/verify-playable.mjs). Five
   ships sit in a berth grid aboard a station; each burns in exactly ONE fixed
   direction and only if that lane is empty all the way out to the bay wall. Tap
   a ship whose lane is clear and it launches; tap a blocked one and it just
   shakes in its clamps (free, but it costs time). A two-panel blast door is
   closing over the bay mouth — clear a path and get the crimson hero out
   before the panels meet.

   This is not a drag, so the shape is different from LEDGE, but it owes the
   exact same guarantees:

     · one control, normalised to t ∈ [0,1]  — PACE: hasty(0) ↔ steady(0.5) ↔
       hesitant(1). It's a LIVE readout (setControl/controlScreen still work),
       not something the player drags directly — see tOf() in section 8.
     · a pure sim you can sweep: simRun(t) → outcome    (proves winnability)
     · a win band of 10–34% of the control range        (winnable, not trivial)
     · a stray tap costs nothing — commitsOnTap:false, controlScreen() sits on
       a decorative HUD dial, not on a ship
     · escalating preview on each miss                  (nobody gets stuck)

   The art carries the RULE, not a caption: a ship whose lane is clear runs LIT
   thrusters; a blocked one is dark. That single contrast is the whole tutorial,
   and the plume also points at where the ship is about to go.

   Read docs/playable-design.md and docs/archetypes.md before you touch this.
   ══════════════════════════════════════════════════════════════════════════ */

/* ══ 1. CONFIG — the entire reskin surface. GAME LOGIC. ═══════════════════ */

var CONFIG = {
  // The ONE constant you repoint per campaign/network. Not always a store: the
  // gallery build points at our own site.
  CTA_URL: 'https://apps.apple.com/app/id0000000000',
  BRAND: 'INORGANIC GAMES',
  // One or two sentences describing the LOOK this ad is going for. tools/critique.mjs
  // reads it and grades the art against YOUR stated direction, not a fixed style.
  ART_BRIEF: 'Cold industrial docking bay in deep space: a crimson scout ship boxed into a dark brushed-steel berth grid by four service craft with distinct hulls — three cool (azure, mint, orchid) and one acid-lemon survey pod — a two-panel amber-and-bone hazard blast door closing over the bay mouth, against an indigo-to-plum nebula, a banded gas giant cropped by the corner and a hard near-black station silhouette. Hard-edged and industrial, never soft purple haze.',

  CTA_TEXT: 'PLAY NOW ▸',
  COPY: {
    // The art teaches the rule: a ship with a clear lane runs LIT thrusters, a
    // blocked one is dark. Four words name that tell once; it dies on first touch.
    hint:    'TAP A LIT SHIP',
    // No celebration copy: the shock ring, slow-mo, star streaks and fanfare ARE
    // the celebration. Failure strings stay — they name the failure side.
    shortF:  'TOO HASTY',
    longF:   'TOO SLOW',
    toast:   'In a live ad, this opens the App Store.'
  },

  // Hero owns crimson — nothing else in the bay is red (Law 2). Danger runs warm
  // (the blast door alone); everything friendly runs cool (guide strips, chevrons,
  // beacons). Gold is reserved: it appears in the world ONLY in the payoff burst,
  // and otherwise belongs to the CTA.
  PALETTE: {
    voidDeep:'#05070F', hullDeep:'#0E1424', hull:'#1A2238', hullLit:'#28324F', hullEdge:'#46567F',
    strip:'#8FB6E8', ice:'#CFE6FF', gold:'#FFD166', goldLit:'#FFE9B0', paper:'#EAF2FF',
    hero:  { base:'#FF4655', lit:'#FFA3AB', dark:'#8C1C28' },
    // Four hulls that must be told apart AT A GLANCE and from each other — the

    ships: [

    reactMs: 480,          // bot: baseline think time before any valid tap
    clearAnimMs: 240,      // bot: fixed per-action overhead (burn-out time)
    maxMistaps: 3,         // bot: wasted taps/round at t=0 (fully hasty)
    mistapCostMs: 1100,    // live+bot: time lost per wasted tap on a blocked ship

    // to ~24%, still closed on both sides. Never move this one on its own.
    timeLimitMs: 7800,

    hesitantWindowMs: 3000,// live pace-gauge: ms of stillness = fully "hesitant"
    idleAutofireMs: 5200,  // never stall: demo the mechanic if they just watch
    nearMissGap: 0.32,     // door gap ≤ this at the moment of escape ⇒ a scrape
    retryMs: 900,

  SHOW_PHONE_FRAME: 'auto',  // 'auto' | true | false

/* The analytics shim. Swap this ONE function to wire a real endpoint — every event
   in the ad passes through it on the way to the three required destinations. */
CONFIG.ANALYTICS = function (name, payload) {
  // e.g. navigator.sendBeacon('https://your-endpoint/e', JSON.stringify({ name: name, payload: payload }));
};

var P = CONFIG.PALETTE, T = CONFIG.TUNING;
var DEG = Math.PI / 180;

/* ══ 2. INSTRUMENTATION — ENGINE. Four events, three destinations. ═════════
   console · window.parent · window.__ad.events · the on-screen ticker.
   Buyers watch the ticker. Never quietly drop an event. */

var tickerEl = document.getElementById('dbg-ticker');
var EVENTS = [];
var t0 = performance.now();

// Stamped by tools/bake.mjs — the ad's own byte size, exposed via inorganic_meta
// and the debug overlay. Never measured at runtime (CORS on file:// + a request).
var SIZE_BYTES = 140502; /* @size */

function emit(name, payload) {
  var e = { event: name, payload: payload || {}, t: Math.round(performance.now() - t0) };
  EVENTS.push(e);
  console.log('[playable] ' + name, e.payload);
  try { CONFIG.ANALYTICS(name, e.payload); } catch (err) {}
  try { if (window.parent && window.parent !== window)
    window.parent.postMessage({ type: 'inorganic_event', name: name, payload: e.payload, t: e.t }, '*');
  } catch (err) {}
  tick(name, e.payload);
}

// Haptics. Guarded: desktop and iOS Safari have no vibrate(), and calling it there
// unguarded throws. Pass a number or a [buzz, gap, buzz] pattern.
function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }

// The gallery's size/requests/fps badge (docs/gallery-embed.md). Posted on boot,
// re-posted as the fps sample refreshes so the badge is live.
function postMeta() {
  try { if (window.parent && window.parent !== window)
    window.parent.postMessage({ type: 'inorganic_meta', meta: { bytes: SIZE_BYTES, requests: 0, fps: LAST_FPS } }, '*');
  } catch (err) {}
}

function tick(name, payload) {
  var val = payload && payload.ms_to_first_tap != null ? payload.ms_to_first_tap + 'ms'
          : payload && payload.ms != null ? (payload.ms / 1000).toFixed(1) + 's'
          : payload && payload.source ? payload.source : '✓';
  var row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = '<span class="nm"></span><span class="vl"></span>';
  row.querySelector('.nm').textContent = name;
  row.querySelector('.vl').textContent = val;
  tickerEl.appendChild(row);
  var rows = tickerEl.querySelectorAll('.row');
  if (rows.length > 4) rows[0].remove();
}

/* ══ 3. AUDIO — ENGINE. Procedural, gesture-gated, silence-safe. ══════════
   Never construct an AudioContext before the first pointerdown, or iOS logs a
   warning and Chrome's autoplay policy leaves it suspended forever. */

var SFX = (function () {
  var ctx = null, muted = false;
  function ac() {
    if (muted) return null;
    if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; } }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(freq, endFreq, dur, type, vol, delay) {
    var c = ac(); if (!c) return;
    var t = c.currentTime + (delay || 0);
    var o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (endFreq) o.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, vol, cut, delay) {
    var c = ac(); if (!c) return;
    var t = c.currentTime + (delay || 0);
    var n = Math.floor(c.sampleRate * dur), buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 1.6);
    var src = c.createBufferSource(), g = c.createGain(), f = c.createBiquadFilter();
    src.buffer = buf; f.type = 'lowpass'; f.frequency.value = cut || 900;
    g.gain.setValueAtTime(vol, t);
    src.connect(f); f.connect(g); g.connect(c.destination); src.start(t);
  }
  return {
    unlock: function () { ac(); },
    setMuted: function (m) { muted = m; if (m && ctx) { try { ctx.close(); } catch (e) {} ctx = null; } },
    isMuted: function () { return muted; },
    // A ship lights its thrusters and goes: a short pressurised blip.
    launch: function () { tone(300, 760, 0.09, 'sawtooth', 0.055); noise(0.13, 0.055, 2600); },
    // Clamps refuse: a dull mechanical clunk, no pitch to enjoy.
    deny:   function () { tone(150, 96, 0.10, 'square', 0.09); noise(0.07, 0.06, 420); },
    // The hero's burn — the payoff's bottom end.
    burn:   function () { tone(120, 700, 0.42, 'sawtooth', 0.13); noise(0.40, 0.13, 2400); },
    // Panel edges kissing the hull on a late escape — the engineered near-miss.
    scrape: function () { noise(0.20, 0.10, 5200); tone(1900, 820, 0.16, 'square', 0.045); },
    // Half a tonne of blast door arriving.
    slam:   function () { tone(180, 52, 0.26, 'square', 0.13); noise(0.22, 0.15, 900); },
    win:    function () { [523, 659, 784, 1047].forEach(function (f, i) { tone(f, 0, 0.30, 'triangle', 0.13, i * 0.085); }); },
    fail:   function () { tone(200, 55, 0.45, 'sawtooth', 0.13); noise(0.30, 0.16, 400); }
  };
})();

/* ══ 4. AD CONTAINER — ENGINE. MRAID, Google ExitApi, or plain web. ═══════
   Google AdMob does NOT speak MRAID; it injects ExitApi and its own CTA, and

var MRAID = window.mraid || null;

/* ══ 5. LAYOUTS — GAME LOGIC. One authored staging per orientation. ═══════
   NOT one scene letterboxed twice. Portrait has height; landscape has width.
   Stage for each. safe{} is the box guaranteed to be fully on-screen; the
   background is drawn beyond it to fill whatever slack the viewport has.

   The BOARD TOPOLOGY (which cell holds which car, who blocks whom) is shared —
   see PIECE_DEFS in section 6. Only the PIXEL staging (cell size, origin, gauge
   position, decoration) differs per orientation, same split CANDY SWAP uses for
   its grid. */

var GRID_COLS = 4, GRID_ROWS = 3;

var LAYOUTS = {
  // PORTRAIT owns HEIGHT: open space + gas giant + station silhouette on top, the
  // berth grid and blast door through the middle, deck plating and the impulse dial
  // below. The door's two panels meet exactly on the hero's lane, so the gap the
  // player is racing is always the gap the hero has to thread.
  // Staged in thirds: sky on top, the bay through the middle, the platform face
  // below. The bay is pushed DOWN from where it started — the first film pass had
  // the slab high and left 40% of the frame as empty hull, which is Tell 6 exactly.
  portrait: {
    safe: { x: 0, y: 0, w: 620, h: 1100 },
    // Portrait is width-limited: the camera shows exactly safe.w across, so the
    // door channel + its lintel (≈1.9 cells wide) has to be BUDGETED out of the
    // 620, not appended to it. The grid is pushed left and its left wall runs off
    // the frame — cropping one side beats cropping the hazard.
    grid: { x0: 34, y0: 380, cell: 116 },           // berths: x 34…498, y 380…728
    gate: { x: 560, laneRow: 1, half: 224 },        // world x of the door channel; half = panel travel
    gauge: { x: 300, y: 918, r: 96 },               // the impulse dial (the control)
    hullY: 320,                                     // the station horizon
    corridor: { x1: 560, y: 554, h: 168 },          // the lit bay mouth beyond the door
    heroStop: 604,                                  // where the escape comes to rest
    planet: { x: -140, y: 70, r: 356 },             // cropped by the top-left corner
    gantry: { x: 44, y: 360, x2: 290, y2: 222 },    // asymmetric dressing — breaks Tell 8
    beacons: [ { x: 22, y: 368 }, { x: 22, y: 742 }, { x: 504, y: 742 } ],
    decorShips: [ { x: 110, y: 200, kind: 'runner', hue: 0, rot: 0.22, s: 0.30 },
                  { x: 440, y: 150, kind: 'pod',    hue: 3, rot: -0.16, s: 0.22 } ],
    crates: { x: 430, y: 880, s: 1 },
    pipes: { x: 80, y: 1042, w: 420 }
  },
  // LANDSCAPE owns WIDTH: the launch corridor runs the slack out to a jump point,
  // which is both the composition's right anchor and the reason the hero is running.
  landscape: {
    safe: { x: 0, y: 0, w: 1180, h: 560 },
    grid: { x0: 96, y0: 118, cell: 104 },           // berths: x 96…512, y 118…430
    gate: { x: 566, laneRow: 1, half: 196 },
    gauge: { x: 1008, y: 494, r: 76 },
    hullY: 54,
    corridor: { x1: 566, y: 274, h: 156 },          // runs the width slack out to a jump point
    heroStop: 1010,                                 // where the escape comes to rest
    planet: { x: 1090, y: -150, r: 330 },           // cropped by the top-right corner
    gantry: { x: 88, y: 94, x2: 346, y2: 24 },
    beacons: [ { x: 82, y: 102 }, { x: 82, y: 446 }, { x: 524, y: 446 } ],
    decorShips: [ { x: 790, y: 92,  kind: 'hauler', hue: 1, rot: 0.12, s: 0.26 },
                  { x: 1062, y: 170, kind: 'runner', hue: 0, rot: -0.10, s: 0.17 },
                  { x: 874, y: 404, kind: 'tug',    hue: 2, rot: 0.06, s: 0.20 } ],
    crates: { x: 690, y: 508, s: 0.8 },
    pipes: { x: 120, y: 530, w: 340 }
  }
};

// cell (r,c) → its centre in world space for the CURRENT layout's staging.
function cellCenter(L, r, c) {
  var g = L.grid;
  return { x: g.x0 + (c + 0.5) * g.cell, y: g.y0 + (r + 0.5) * g.cell };
}

function prep(L) {
  if (L._ready) return L;
  L._ready = true;
  L._station = null;     // authored scenery is cached per staging; tune() invalidates it
  return L;
}

/* ══ 6. SIM — GAME LOGIC, but the SHAPE is mandatory. ═════════════════════

   The board topology: 5 ships, each locked to ONE burn direction, each blocked if
   its lane isn't fully clear to the bay wall. Two independent 2-deep chains
   converge on the hero:

       K1 (r0,c1) → left,  always clear
       B1 (r1,c1) → up,    needs K1 gone (K1 sits in B1's escape cell)
       K2 (r2,c3) → right, always clear (off-grid = clear)
       B2 (r1,c3) → down,  needs K2 gone
       HERO(r1,c0)→ right, range 3 — needs (r1,c1) AND (r1,c3) clear, i.e. B1 & B2 gone

   All four cardinal burns are represented, and every hull is a different
   silhouette (see HULLS in section 13) — the board is a mirrored graph, so the
   ART has to carry the asymmetry the topology doesn't.

   isFree() is the ONE hit-test both the live tap handler and the bot below call
   — not two copies. It is pure: given a board snapshot, no clock, no randomness.

   simRun(t) must be PURE and DETERMINISTIC: same t in, same result out. That
   single property buys sweep() the proof of winnability, and buys the harness a
   bot it can trust. t is NOT a physical quantity here — it's the player's
   deviation from optimal PACING (see docs/archetypes.md's generalisation):
     t < 0.5  → hasty:    the bot burns wasted taps on still-blocked cars
     t = 0.5  → steady:   the bot always taps the one correct car, promptly
     t > 0.5  → hesitant: the bot waits too long between correct taps
   Both sides burn the SAME budget — the gate's countdown — so both sides fail
   for real, distinguishable reasons: 'rushed' (mistap pile-up) vs 'stalled'
   (the clock just runs out). Never read Math.random() in here. */

var HERO_ID = 0;
var PIECE_DEFS = [
  { id: 0, kind: 'hero', hull: 'scout',  r: 1, c: 0, dir: 'right', range: 3 },
  { id: 1, kind: 'k1',   hull: 'runner', r: 0, c: 1, dir: 'left',  range: 1 },
  { id: 2, kind: 'b1',   hull: 'hauler', r: 1, c: 1, dir: 'up',    range: 1 },
  { id: 3, kind: 'k2',   hull: 'tug',    r: 2, c: 3, dir: 'right', range: 1 },
  { id: 4, kind: 'b2',   hull: 'pod',    r: 1, c: 3, dir: 'down',  range: 1 }
];
var DIR_VEC = { up: [-1, 0], down: [1, 0], left: [0, -1], right: [0, 1] };

function freshBoard() {
  return PIECE_DEFS.map(function (d) {
    return { id: d.id, kind: d.kind, hull: d.hull, r: d.r, c: d.c, dir: d.dir, range: d.range, cleared: false };
  });
}
function pieceAt(board, r, c) {
  for (var i = 0; i < board.length; i++) {
    var p = board[i];
    if (!p.cleared && p.r === r && p.c === c) return p;
  }
  return null;
}
// The path cells a piece must find EMPTY to move — stops at the grid edge
// (off-grid = clear, exactly how K2's rightward exit and HERO's gate work).
function pathCells(p) {
  var v = DIR_VEC[p.dir], cells = [], r = p.r, c = p.c;
  for (var i = 0; i < p.range; i++) {
    r += v[0]; c += v[1];
    if (r < 0 || r >= GRID_ROWS || c < 0 || c >= GRID_COLS) break;
    cells.push({ r: r, c: c });
  }
  return cells;
}
// THE shared hit-test. Live taps and the sim bot both call this — never a
// second copy — so the preview can never disagree with what actually happens.
function isFree(board, id) {
  var p = board[id];
  if (!p || p.cleared) return false;
  var cells = pathCells(p);
  for (var i = 0; i < cells.length; i++) {
    var occ = pieceAt(board, cells[i].r, cells[i].c);
    if (occ && occ.id !== id) return false;
  }
  return true;
}
function allFree(board) {
  var out = [];
  for (var i = 0; i < board.length; i++) if (!board[i].cleared && isFree(board, board[i].id)) out.push(board[i]);
  return out;
}
// The canonical "correct next tap" — lowest id among currently-free cars. Any
// order that respects the dependency graph wins, so this single deterministic
// rule is always a SAFE choice: the idle demo, the autopilot hook the harness
// drives, and the escalating preview's order badges all read from this one rule.
function bestFreeTarget(board) {
  var free = allFree(board);
  if (!free.length) return null;
  free.sort(function (a, b) { return a.id - b.id; });
  return free[0];
}
// The full canonical solve order, computed fresh (never mutates board) — used
// by the escalating preview once it reaches attempt 5 (docs/playable-design.md
// Principle 4: "by attempt five the shot is readable, not lucky").
function canonicalOrder() {
  var board = freshBoard(), order = [];
  while (order.length < PIECE_DEFS.length) {
    var t = bestFreeTarget(board);
    if (!t) break;
    order.push(t.id);
    board[t.id].cleared = true;
  }
  return order;
}

// The bot: holds a CONSTANT pace for the whole attempt, exactly like CLOUD
// RUNNER holds a constant steering error. It always picks a real, currently-free
// car (never a phantom one) — the only thing t changes is how many BLOCKED cars
// it wastes a tap on first, and how long it dawdles before the tap that counts.
function simRun(t, assist) {
  var board = freshBoard();
  var timeTotal = T.timeLimitMs * (1 + (assist || 0));
  var hasty = Math.max(0, (0.5 - t) / 0.5);
  var slow  = Math.max(0, (t - 0.5) / 0.5);
  var mistapsWanted = Math.round(T.maxMistaps * hasty);
  var extraDelay = T.maxExtraDelayMs * slow;
  var elapsed = 0, rounds = 0, mistapsTotal = 0;

  while (rounds < PIECE_DEFS.length) {
    var notCleared = board.filter(function (p) { return !p.cleared; });
    if (!notCleared.length) break;
    var free = allFree(board);
    var blocked = notCleared.filter(function (p) { return !isFree(board, p.id); });
    if (!free.length) break;                          // stuck — shouldn't happen by design
    var m = Math.min(mistapsWanted, blocked.length);
    mistapsTotal += m;
    elapsed += m * T.mistapCostMs + T.reactMs + extraDelay + T.clearAnimMs;
    free.sort(function (a, b) { return a.id - b.id; }); // canonical: lowest id first
    free[0].cleared = true;
    rounds++;
  }
  var won = board[HERO_ID].cleared && elapsed <= timeTotal;
  var perfect = won && mistapsTotal === 0 && elapsed <= timeTotal * 0.72;
  return {
    out: won ? 'win' : (t < 0.5 ? 'rushed' : 'stalled'),
    elapsed: elapsed, mistaps: mistapsTotal, perfect: perfect
  };
}

// Sample the whole control range. The harness uses this to PROVE the level is
// winnable but not trivial.
function sweep(assist, n) {
  n = n || 200;
  var res = [], win = [];
  for (var i = 0; i < n; i++) {
    var t = i / (n - 1);
    var r = simRun(t, assist || 0);
    res.push({ t: t, out: r.out, elapsed: Math.round(r.elapsed), mistaps: r.mistaps, perfect: r.perfect });
    if (r.out === 'win') win.push(t);
  }
  var band = win.length ? { lo: win[0], hi: win[win.length - 1], width: win[win.length - 1] - win[0] } : null;
  return {
    band: band,
    idealApex: null,   // n/a for this archetype; kept for contract shape
    perfect: res.filter(function (r) { return r.out === 'win' && r.perfect; }).map(function (r) { return r.t; }),
    samples: res
  };
}

/* ══ 7. RENDERER — ENGINE. HiDPI backing store + contain-fit camera. ══════
   Canvas 2D has no automatic DPR handling: size the BACKING STORE in physical
   pixels, the CSS box in layout pixels, then scale the context. Re-apply on
   every resize. Cap DPR at 2 — 3× costs ~2× the fill for no visible gain. */

var cv = document.getElementById('c'), cx = cv.getContext('2d', { alpha: false });
var VW = 0, VH = 0, DPR = 1;
var cam = { s: 1, ox: 0, oy: 0 };
var vignette = null, grain = null;

function layout() { return LAYOUTS[VW / VH > 1.15 ? 'landscape' : 'portrait']; }

function resize() {
  var stage = document.getElementById('stage');
  var frame = CONFIG.SHOW_PHONE_FRAME === true ||
             (CONFIG.SHOW_PHONE_FRAME === 'auto' && window.innerWidth > 760 && window.innerHeight > 560);
  stage.classList.toggle('framed', frame);
  document.getElementById('notch').style.display = frame ? 'block' : 'none';

  var box = document.getElementById('screen').getBoundingClientRect();
  VW = Math.max(1, Math.round(box.width));
  VH = Math.max(1, Math.round(box.height));
  DPR = Math.min(window.devicePixelRatio || 1, 2);

  cv.width  = Math.round(VW * DPR);
  cv.height = Math.round(VH * DPR);
  cv.style.width = VW + 'px';
  cv.style.height = VH + 'px';
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);

  var L = prep(layout());
  cam.s = Math.min(VW / L.safe.w, VH / L.safe.h);     // contain: nothing critical crops
  cam.ox = (VW - L.safe.w * cam.s) / 2 - L.safe.x * cam.s;
  cam.oy = (VH - L.safe.h * cam.s) / 2 - L.safe.y * cam.s;

  if (!grain) grain = makeGrain();
  vignette = makeVignette();
  // every sprite below is baked at the CURRENT camera scale — a resize or an
  // orientation flip invalidates all of them
  shipCache = {}; doorCache = null; gaugeCache = null;
  makeBackdrop(L);
  if (W && W.layout !== L) resetAttempt(true);        // orientation flip → silent re-stage
}
window.addEventListener('resize', function () { setTimeout(resize, 0); });
window.addEventListener('orientationchange', function () { setTimeout(resize, 60); });

function X(x) { return x * cam.s + cam.ox; }
function Y(y) { return y * cam.s + cam.oy; }
function S(v) { return v * cam.s; }

// ALWAYS size canvas text with this, never with a raw world number.
//
// Positions go through X()/Y()/S(); a font size set straight from world units does
// NOT, so the text renders oversized for the world it sits in — and, because cam.s
// differs per orientation, it looks correct in one and broken in the other. That cost
// a debugging session in CLOUD RUNNER, where two gate labels collided into an
// unreadable mash in portrait only. See docs/learnings.md.
function FS(worldSize) { return Math.max(8, S(worldSize)); }
function text(str, wx, wy, worldSize, fill, stroke) {
  cx.font = '700 ' + FS(worldSize) + "px 'Chakra','Trebuchet MS',sans-serif";
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  if (stroke) {
    cx.lineWidth = Math.max(2, S(worldSize * 0.11));
    cx.strokeStyle = stroke;
    cx.strokeText(str, X(wx), Y(wy));
  }
  cx.fillStyle = fill;
  cx.fillText(str, X(wx), Y(wy));
}

function makeVignette() {
  var o = document.createElement('canvas');
  o.width = Math.max(2, VW >> 1); o.height = Math.max(2, VH >> 1);
  var g = o.getContext('2d');
  var r = g.createRadialGradient(o.width / 2, o.height * 0.44, o.height * 0.16,
                                 o.width / 2, o.height * 0.5, o.height * 0.82);
  r.addColorStop(0, 'rgba(0,0,0,0)');
  r.addColorStop(0.62, 'rgba(6,4,10,0.22)');
  r.addColorStop(1, 'rgba(6,4,10,0.80)');
  g.fillStyle = r; g.fillRect(0, 0, o.width, o.height);
  // bake the grain in, so the whole post pass is a single drawImage per frame
  if (grain) {
    g.globalAlpha = 0.05;
    g.fillStyle = g.createPattern(grain, 'repeat');
    g.fillRect(0, 0, o.width, o.height);
  }
  return o;
}
function makeGrain() {
  var o = document.createElement('canvas'); o.width = o.height = 96;
  var g = o.getContext('2d'), d = g.createImageData(96, 96), a = d.data;
  for (var i = 0; i < a.length; i += 4) {
    var n = 118 + Math.random() * 68;
    a[i] = a[i + 1] = a[i + 2] = n; a[i + 3] = 255;
  }
  g.putImageData(d, 0, 0);
  return o;
}

// One prerendered radial glow, tinted on demand. NEVER use ctx.shadowBlur in a
// frame loop — it is the single most expensive thing in canvas 2D.
var GLOW = (function () {
  var o = document.createElement('canvas'); o.width = o.height = 128;
  var g = o.getContext('2d');
  var r = g.createRadialGradient(64, 64, 0, 64, 64, 64);
  r.addColorStop(0, 'rgba(255,255,255,1)');
  r.addColorStop(0.22, 'rgba(255,255,255,0.55)');
  r.addColorStop(0.55, 'rgba(255,255,255,0.16)');
  r.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = r; g.fillRect(0, 0, 128, 128);
  return o;
})();
var tintCache = {};
function tint(color) {
  if (tintCache[color]) return tintCache[color];
  var o = document.createElement('canvas'); o.width = o.height = 128;
  var g = o.getContext('2d');
  g.drawImage(GLOW, 0, 0);
  g.globalCompositeOperation = 'source-in';
  g.fillStyle = color; g.fillRect(0, 0, 128, 128);
  tintCache[color] = o;
  return o;
}
function glow(x, y, rad, color, alpha) {
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  cx.globalAlpha = alpha;
  cx.drawImage(tint(color), x - rad, y - rad, rad * 2, rad * 2);
  cx.restore();
}
function poly(pts, fill, edge) {
  cx.beginPath();
  cx.moveTo(X(pts[0].x), Y(pts[0].y));
  for (var i = 1; i < pts.length; i++) cx.lineTo(X(pts[i].x), Y(pts[i].y));
  cx.closePath();
  cx.fillStyle = fill; cx.fill();
  if (edge) { cx.strokeStyle = edge; cx.lineWidth = Math.max(1, S(2)); cx.stroke(); }
}

/* ══ 8. STATE + DIFFICULTY — ENGINE contract, GAME LOGIC fields. ══════════ */

var W = null;
var attempts = 0, firstTapAt = 0, wonAt = 0, gemGot = false;
// GT is SCALED game time in seconds — it stops dead during hitstop and crawls
// during the payoff's slow motion. Every launch/shake/ignition animation is keyed
// to it rather than to performance.now(), or the hero's escape would finish in
// 300 real milliseconds while the rest of the moment is still playing at 0.25×.
var GT = 0;
var shake = 0, shakeMag = 0, hitstop = 0, timeScale = 1, camPush = 0;
// sparks = debris (inherits the source object's hue AND momentum — Tell 2);
// rings = the payoff shock ring; warp drives the starfield stretch; flash is the
// amber slam wash on a fail.
var parts = [], floats = [], sparks = [], rings = [];
var warp = 0, flash = 0;

// Nobody watches an ad twice to "get good", so misses have to TEACH. Do that by
// revealing more of the solution each time — never by cheating the clock. The
// TIME BUDGET widens only a hair (≤35%): enough to forgive a near-miss run,
// never enough to look like the door waited for you. See docs/playable-design.md.
function ASSIST() { return Math.min(attempts * T.assistPerFail, 0.35); }
function PREVIEW_FRAC() { return Math.min(1, 0.45 + attempts * 0.16); }

// GAME LOGIC: the LIVE pace readout — the control. 0.5 = steady (just acted, or
// acting promptly); it swings toward 0 right after a mistap (hasty) and drifts
// toward 1 the longer nothing happens (hesitant). Same scalar the sim bot holds
// CONSTANT — see simRun(). setControl() can override it (dev/test only).
function tOf(w) {
  if (w.paceOverride != null) return w.paceOverride;
  var since = performance.now() - w.lastEventAt;
  var hesitant = Math.max(0, Math.min(1, since / T.hesitantWindowMs));
  var hasty = Math.max(0, Math.min(1, w.hastyBurst));
  return Math.max(0, Math.min(1, 0.5 - hasty * 0.5 + hesitant * 0.5));
}

function resetAttempt(hard) {
  var L = prep(layout());
  var total = T.timeLimitMs * (1 + ASSIST());
  W = {
    layout: L,
    state: 'SOLVE',                 // SOLVE → RESOLVE → SOLVE (a fail retries) | END (a win)
    board: freshBoard(),
    timeTotal: total, timeLeft: total,
    lastEventAt: performance.now(), hastyBurst: 0, paceOverride: null,
    mistapsThisAttempt: 0, startedAt: performance.now(), clearOrder: 0,
    out: null, resolveT: 0, nearMiss: false, punched: false,
    hint: 1, touched: false, idle: 0, demo: false
  };
  // Seed the "was this ship already free?" flags so the first launch only flares
  // the ships it actually unblocked (see clearPiece).
  for (var i = 0; i < W.board.length; i++) W.board[i].wasFree = isFree(W.board, W.board[i].id);
  parts.length = 0; floats.length = 0;
  if (hard) { sparks.length = 0; rings.length = 0; timeScale = 1; camPush = 0; warp = 0; flash = 0; }
}

/* ══ 9. INPUT — GAME LOGIC. One tap. Only a ship with a clear lane responds:
   tap it and it burns out of the bay. Tap a blocked one and it shakes in its
   clamps — harmless, but the wasted beat costs time off the door's countdown.
   That's the whole game: recognise what's currently free (its thrusters are
   lit), in the right order, at a good pace. */

function toWorld(ev) {
  var b = cv.getBoundingClientRect();
  return { x: (ev.clientX - b.left - cam.ox) / cam.s, y: (ev.clientY - b.top - cam.oy) / cam.s };
}
// GAME LOGIC: which not-yet-cleared piece (if any) sits under a world point.
function pieceAtPoint(L, p) {
  var board = W.board, rad = L.grid.cell * 0.46;
  for (var i = 0; i < board.length; i++) {
    var piece = board[i];
    if (piece.cleared) continue;
    var c = cellCenter(L, piece.r, piece.c);
    if (Math.abs(p.x - c.x) < rad && Math.abs(p.y - c.y) < rad) return piece;
  }
  return null;
}
function colorOf(piece) { return piece.id === HERO_ID ? P.hero : P.ships[piece.id - 1]; }

// GAME LOGIC: where THE CONTROL sits on screen — the impulse-dial needle. A tap
// here is always safe: it's a decorative HUD dial, never a ship, so the harness's
// stray-tap probe (it taps exactly here) can never advance or cost anything.
function gaugeNeedlePos() {
  var L = W.layout, g = L.gauge, t = tOf(W);
  var a = Math.PI + t * Math.PI;                  // t=0 → 180° (hasty, left) … t=1 → 360° (slow, right), through UP
  return { x: g.x + Math.cos(a) * g.r * 0.7 * 0.92, y: g.y + Math.sin(a) * g.r * 0.7 * 0.92 };
}

function onDown(ev) {
  ev.preventDefault();
  SFX.unlock();
  if (!firstTapAt && started) {
    firstTapAt = performance.now();
    emit('first_interaction', { ms_to_first_tap: Math.round(firstTapAt - t0) });
    setTimeout(function () { document.getElementById('rail').classList.add('on'); }, 1100);
  }
  if (!W || W.state !== 'SOLVE') return;
  if (!W.touched) W.startedAt = performance.now();   // the attempt clock arms NOW (timer law)
  W.touched = true; W.idle = 0; W.demo = false;
  var L = W.layout, wp = toWorld(ev);
  var piece = pieceAtPoint(L, wp);
  if (!piece) return;                              // empty deck plating — always harmless
  if (isFree(W.board, piece.id)) clearPiece(piece); else mistapPiece(piece);
}
cv.addEventListener('pointerdown', onDown, { passive: false });

// GAME LOGIC: the shared hit-test (isFree, section 6) already decided whether
// this tap is valid — these two just carry out the consequence.
function clearPiece(piece) {
  var now = performance.now(), L = W.layout, c = colorOf(piece), pos = cellCenter(L, piece.r, piece.c);
  var v = DIR_VEC[piece.dir];
  var freeBefore = allFree(W.board).length;
  piece.cleared = true; piece.clearedAt = GT;
  W.lastEventAt = now; W.hastyBurst = Math.max(0, W.hastyBurst - 0.4);
  W.clearOrder++;
  kick(2, 0.08);
  SFX.launch(); buzz(14);
  // Exhaust, not decoration: the debris carries the ship's own hue and is thrown
  // BACKWARD along the lane it just burned down (Tell 2).
  spark(pos.x - v[1] * L.grid.cell * 0.34, pos.y - v[0] * L.grid.cell * 0.34,
        c.lit, 11, -v[1], -v[0], 210, 0.42, 3);
  // The beat that teaches the chain: whatever this ship was blocking now lights
  // up. Mark it so drawShips can flare the ignition rather than just switch state.
  for (var i = 0; i < W.board.length; i++) {
    var p2 = W.board[i];
    if (!p2.cleared && p2.id !== piece.id && isFree(W.board, p2.id) && !p2.wasFree) p2.igniteAt = GT;
  }
  for (var j = 0; j < W.board.length; j++) W.board[j].wasFree = isFree(W.board, W.board[j].id);
  emit('ship_launched', { kind: piece.kind, order: W.clearOrder, freed: allFree(W.board).length - (freeBefore - 1) });
  if (piece.id === HERO_ID) winRun();
}
function mistapPiece(piece) {
  var now = performance.now(), L = W.layout, pos = cellCenter(L, piece.r, piece.c);
  piece.shakeAt = GT;
  W.mistapsThisAttempt++;
  W.timeLeft = Math.max(0, W.timeLeft - T.mistapCostMs);
  W.lastEventAt = now; W.hastyBurst = 1;
  kick(4, 0.14);
  SFX.deny(); buzz(22);
  // Clamp sparks fall off the hull — warm, so a refusal never reads as progress.
  spark(pos.x, pos.y + L.grid.cell * 0.22, P.hazard, 6, 0, 1, 120, 0.30, 2);
  emit('blocked_tap', { kind: piece.kind, cost_ms: T.mistapCostMs });
  if (W.timeLeft <= 0) failRun('rushed');
}

/* ══ 10. JUICE — ENGINE. Calibrate the numbers, keep the tools. ═══════════ */

function float(x, y, text, color, size) {
  floats.push({ x: x, y: y, text: text, c: color, s: size || 26, life: 0.9, max: 0.9 });
}
function kick(mag, dur) { shakeMag = Math.max(shakeMag, mag); shake = Math.max(shake, dur); }
function stop(ms) { hitstop = Math.max(hitstop, ms / 1000); }

// DEBRIS, not decoration. Tell 2 says particles must come FROM the thing that
// made them: spark() takes the source's colour and a direction vector, so every
// puff inherits the hue, the position and the momentum of the event that threw
// it. There is no gravity in a vacuum, so these drag to a stop instead of falling.
function spark(x, y, color, n, dx, dy, spd, life, size) {
  var mag = Math.hypot(dx || 0, dy || 0) || 1;
  var ux = (dx || 0) / mag, uy = (dy || 0) / mag;
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2, s = spd * (0.30 + Math.random() * 0.70);
    var bias = 0.72;
    sparks.push({
      x: x, y: y,
      vx: (Math.cos(a) * (1 - bias) + ux * bias) * s,
      vy: (Math.sin(a) * (1 - bias) + uy * bias) * s,
      r: (size || 3) * (0.5 + Math.random()), life: life || 0.5, max: life || 0.5,
      c: color, drag: 1.6 + Math.random() * 1.4, len: 1.6 + Math.random() * 2.4
    });
  }
}
// The payoff's shock ring — one expanding stroked circle, no fill, hard edge.
function ring(x, y, r0, r1, color, life) {
  rings.push({ x: x, y: y, r0: r0, r1: r1, c: color, life: life, max: life });
}

/* ══ 11. STEP — GAME LOGIC. ═══════════════════════════════════════════════ */

// The bay mouth: where the two blast-door panels meet. laneRow is the hero's row,
// so the closing gap is centred on exactly the lane the hero has to thread.
function gatePos(L) { return { x: L.gate.x, y: cellCenter(L, L.gate.laneRow, 0).y }; }

// How far shut the door is, 0..1. Pre-touch it CREEPS and judders — the world is
// allowed to threaten (Law 1's motion on frame one) but the countdown itself does
// not run until the first pointerdown, so an idle viewer can never be sealed in.
// The panels never start flush with the frame: they begin DOOR_START of the way
// across, because the first film pass showed the door fully open on frame one —
// two invisible slivers — and the hazard has to be legible in the cold read. The
// remaining travel still maps linearly onto the remaining time, so the gap is an
// honest readout throughout; the door just starts already committed.
var DOOR_START = 0.24;
function doorFrac() {
  if (!W) return DOOR_START;
  var f = Math.max(0, Math.min(1, 1 - W.timeLeft / W.timeTotal));
  f = DOOR_START + (1 - DOOR_START) * f;
  // pre-touch: it judders and creeps, threatening without ever concluding
  if (!W.touched && W.state === 'SOLVE') f = DOOR_START + Math.abs(Math.sin(TIME * 1.15)) * 0.05;
  return f;
}

function step(dt) {
  if (!W) return;
  var L = W.layout;

  if (hitstop > 0) { hitstop -= dt; return; }
  dt *= timeScale;
  GT += dt;

  if (shake > 0) { shake -= dt; if (shake <= 0) shakeMag = 0; }
  camPush += (0 - camPush) * Math.min(1, dt * 5);
  timeScale += (1 - timeScale) * Math.min(1, dt * (timeScale < 1 ? 2.4 : 8));
  if (timeScale > 0.995) timeScale = 1;

  if (W.state === 'SOLVE' && started) {
    // TIMER LAW: the door's consequential countdown starts at the first
    // pointerdown of the attempt. Pre-touch the door looms but cannot conclude —
    // an idle viewer watches the demo taps; they can never be failed.
    if (W.touched) W.timeLeft -= dt * 1000;
    W.hastyBurst = Math.max(0, W.hastyBurst - dt / T.hastyDecayS);
    W.hint = Math.max(0, W.hint - (W.touched ? dt * 1.1 : 0));

    // Never stall: if they only watch, demo the loop for them — tap the correct
    // next ship at a comfortable cadence until the hero is out.
    W.idle += dt;
    if (!W.touched && W.idle > T.idleAutofireMs / 1000) W.demo = true;
    if (W.demo) {
      W.demoT = (W.demoT || 0) + dt;
      if (W.demoT > 0.5) {
        W.demoT = 0;
        var target = bestFreeTarget(W.board);
        if (target) clearPiece(target);
      }
    }
    if (W.timeLeft <= 0) failRun('stalled');
  }

  if (W.state === 'RESOLVE') {
    W.resolveT += dt;
    // THE ENGINEERED NEAR-MISS. The door does NOT politely freeze the moment the
    // hero launches — it keeps closing at its real rate right through the payoff,
    // in slow motion. Escape early and it shuts on a wide gap behind you; escape
    // late and it scrapes your flank on the way past. The difference between a
    // clean run and a scraped one is the player's own pacing, never a script.
    if (W.out === 'win') {
      W.timeLeft = Math.max(0, W.timeLeft - dt * 1000);
      // the frame the hero's nose crosses the door plane — fire the burst there
      if (!W.punched && pieceRenderPos(L, W.board[HERO_ID]).x >= L.gate.x) punchOut();
    }
    if (W.out !== 'win' && W.resolveT > T.retryMs / 1000) { attempts++; resetAttempt(false); }
  }

  warp = Math.max(0, warp - dt * 1.1);
  flash = Math.max(0, flash - dt * 3.4);

  for (var i = sparks.length - 1; i >= 0; i--) {
    var p = sparks[i];
    var d = Math.exp(-p.drag * dt);                  // vacuum: drag to a stop, no fall
    p.vx *= d; p.vy *= d;
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0) sparks.splice(i, 1);
  }
  for (var j = floats.length - 1; j >= 0; j--) {
    var f = floats[j]; f.y -= 46 * dt; f.life -= dt;
    if (f.life <= 0) floats.splice(j, 1);
  }
  for (var k = rings.length - 1; k >= 0; k--) {
    rings[k].life -= dt;
    if (rings[k].life <= 0) rings.splice(k, 1);
  }
}

// ── THE MOMENT ── one memorable beat of delight: the hero burns out through a
// door that is still closing. Time dilates to a quarter, the camera pushes in, a
// shock ring snaps off the bay mouth, the starfield stretches, and crimson-and-
// gold debris trails the hero's own exit vector. Every ad needs exactly one.
function winRun() {
  if (!W || W.state === 'RESOLVE' || W.state === 'END') return;
  W.state = 'RESOLVE'; W.out = 'win'; W.resolveT = 0;
  var L = W.layout, g = gatePos(L);
  var perfect = W.mistapsThisAttempt === 0 && (performance.now() - W.startedAt) <= W.timeTotal * 0.72;
  var gap = 1 - Math.max(0, Math.min(1, 1 - W.timeLeft / W.timeTotal));   // door gap at escape
  gemGot = perfect;
  W.nearMiss = gap <= T.nearMissGap;
  if (W.nearMiss) emit('near_miss', { gap: +gap.toFixed(3) });
  // The LAUNCH half of the beat. The burst is deliberately NOT here: the shock
  // ring belongs to the moment the hero crosses the door plane, not to the moment
  // it lights its engines — fired here it went off at an empty doorway a third of
  // a second before the ship arrived. See punchOut(), called from step().
  timeScale = 0.25; camPush = 1;
  kick(W.nearMiss ? 14 : 10, W.nearMiss ? 0.38 : 0.3); stop(W.nearMiss ? 140 : 90);
  SFX.burn(); buzz([40, 30, 90]);
  wonAt = performance.now();
  emit('level_complete', { ms: Math.round(wonAt - t0), attempts: attempts + 1,
                           bonus: perfect, control: +tOf(W).toFixed(3) });
  setTimeout(showEnd, 1450);
}

// ── THE PUNCH-OUT ── fired once, the frame the hero's nose crosses the door
// plane. Everything loud lives here so it lands ON the ship, not near it.
function punchOut() {
  var L = W.layout, g = gatePos(L);
  W.punched = true;
  warp = 1;
  // sized to stay inside the frame — the mouth sits near the right edge in
  // portrait, and a ring that leaves the frame reads as a bug, not a shockwave
  ring(g.x, g.y, L.grid.cell * 0.20, L.grid.cell * 1.30, P.ice, 0.5);
  ring(g.x, g.y, L.grid.cell * 0.10, L.grid.cell * 0.82, P.gold, 0.38);
  // Debris on the hero's vector — it inherits the hue and the direction of the
  // thing that made it, which is the whole difference between exhaust and confetti.
  spark(g.x, g.y, P.hero.lit, 26, 1, 0, 520, 0.95, 4);
  spark(g.x, g.y, P.gold, 16, 1, -0.25, 400, 0.85, 3);
  SFX.win();
  kick(8, 0.22);
  if (W.nearMiss) {
    // Panel edges kissing the hull: sparks shear off both leading edges.
    SFX.scrape();
    spark(g.x, g.y - L.gate.half * 0.10, P.hazardHot, 14, 0.6, -1, 320, 0.7, 2);
    spark(g.x, g.y + L.gate.half * 0.10, P.hazardHot, 14, 0.6, 1, 320, 0.7, 2);
  }
}
// reason: 'rushed' (a mistap emptied the clock) or 'stalled' (the clock just ran out).
function failRun(reason) {
  if (!W || W.state === 'RESOLVE' || W.state === 'END') return;
  W.state = 'RESOLVE'; W.out = reason; W.resolveT = 0;
  var L = W.layout, g = gatePos(L);
  kick(8, 0.24); flash = 1;
  SFX.slam(); SFX.fail(); buzz(45);
  // Half a tonne of door arriving: sparks shear off the seam in both directions.
  spark(g.x, g.y, P.hazard, 10, 0, -1, 230, 0.6, 3);
  spark(g.x, g.y, P.hazard, 10, 0, 1, 230, 0.6, 3);
  ring(g.x, g.y, L.grid.cell * 0.1, L.grid.cell * 1.2, P.hazard, 0.35);
  float(L.grid.x0 + GRID_COLS * L.grid.cell * 0.5, L.grid.y0 - 52,
        reason === 'rushed' ? CONFIG.COPY.shortF : CONFIG.COPY.longF, P.hazard, 22);
  emit('attempt_failed', { reason: reason, ships_left: W.board.filter(function (p) { return !p.cleared; }).length });
}

/* ══ 12. END CARD — ENGINE. ═══════════════════════════════════════════════ */

var endEl = document.getElementById('end');
function showEnd() {
  if (!W || W.out !== 'win') return;
  W.state = 'END';
  endEl.classList.add('on');
  document.getElementById('rail').classList.remove('on');
}
// The WHOLE end card is the CTA — a buyer's conversion rate lives on this. Replay
// is the one thing on the card that isn't.
endEl.addEventListener('click', function (ev) {
  if (ev.target.closest && ev.target.closest('#replay')) return;
  openStore('endcard');
});
