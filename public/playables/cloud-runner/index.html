    storm:'#2B1B4E', stormLit:'#8E7BC8', bolt:'#FFE86B',
    wall:'#4A2A78', wallLit:'#7B4FB8',
    violet:'#C46BFF', gold:'#FFD166', paper:'#FFF6E9'
  },

  /* ── The run. THIS is the difficulty surface. ── */
  TUNING: {
    startCrowd: 6,          // sprites you begin with
    threshold: 80,          // the number stamped on the finish wall. With four ×2/+
                            // gates a clean run reaches ~148, so 80 means dropping a
                            // single ×2 (→74) comes up SHORT — the band stays honest.
    maxCrowd: 400,          // clamp, so a reskin can't explode the draw cost

    speed0: 250,            // world units/sec at the start line
    speed1: 430,            // ...and at the wall. Escalates with distance.
    steerLerp: 9,           // how fast the crowd eases toward the thumb

    // Must be comfortably BELOW the time it takes to reach row 1 (~2.8s), plus the
    // ~0.5s the crowd needs to ease onto the line — or a purely passive viewer
    // watches the ad lose its own first gate, which is a terrible advert for the ad.
    idleDemoMs: 1700,       // never stall: if they only watch, demo the steering
    retryMs: 900,           // fail beat before the instant retry
    assistPerFail: 0.30,    // gate mouths widen per miss, capped at 0.35 (Law 4)

    // Clipping the storm must HURT but stay recoverable: it lops 40% off the pack,
    // and the two ×2 gates that follow can still claw the crowd back over the wall.
    // That is the "crowd is tiny — nail these last gates" beat, and it only exists
    // because the storm is survivable rather than an instant wipe.
    hazardKeep: 0.6,        // crowd multiplier when you clip a storm cloud
    nearMissBand: 2.2       // clear the storm by < this × its half-width → near_miss
                            // (0.30 × 2.2 = 0.66 > the racing line's 0.62 clearance,
                            //  so a PERFECT run still fires the near-miss beat)
  },

  /* ── The gate script. Order matters; d is distance from the start line. ──
       lane:  −0.62 = left, 0 = centre, +0.62 = right   (the road spans −1..+1)
       op:    'x2' | 'p25' | 'd2' | 'm20'                (see applyOp)
       ideal: the lane a perfect run is in AT this row — i.e. the racing line.
       mouth: half-width of a gate's catch, in road units. The TIGHTEST mouth on
              the track sets the win band:  band ≈ 2 · minMouth / errSpan.       */
  ROWS: [
    // 1 — the hook. Visible on frame one, reached at ~2.8s. Good gate LEFT,
    //     penalty RIGHT. (Don't pull this closer: the crowd needs ~0.5s to ease
    //     onto the line, and the idle demo needs to beat it there.)
    { d: 700,  ideal: -0.62, mouth: 0.30,
      good: { lane: -0.62, op: 'x2',  label: '×2'  },
      bad:  { lane:  0.62, op: 'd2',  label: '÷2'  } },

    // 2 — cut back to centre. Now the penalty is on the LEFT: the punished
    //     direction flips, so neither "hug left" nor "hug right" is a strategy.
    { d: 1600, ideal: 0,     mouth: 0.28,
      good: { lane:  0,    op: 'p25', label: '+25' },
      bad:  { lane: -0.62, op: 'm20', label: '−20' } },

    // 3 — THE NEAR MISS. A storm sits dead centre; the line swerves right past it.
    //     On the racing line the crowd clears it by ~0.06 road units — close
    //     enough to fire near_miss and buzz the phone.
    { d: 2650, ideal: 0.62,  mouth: 0.26,
      hazard: { lane: 0, half: 0.30 } },

    // 4 — the recovery ×2. Cut back to centre; the penalty is right where you were.
    { d: 3700, ideal: 0,     mouth: 0.26,
      good: { lane:  0,    op: 'x2',  label: '×2'  },
      bad:  { lane:  0.62, op: 'd2',  label: '÷2'  } },

    // 5 — THE FINALE. Cut hard RIGHT for one last ×2 while the crowd is already a
    //     river, then sprint into the wall. The punished lane is LEFT, so the last
    //     stretch is still a steer and not a coast — and the crowd number crossing
    //     the threshold on this gate is the "now smash it" beat.
    { d: 4850, ideal: 0.62,  mouth: 0.26,
      good: { lane:  0.62, op: 'x2',  label: '×2'  },
      bad:  { lane: -0.62, op: 'd2',  label: '÷2'  } }
  ],

  SHOW_PHONE_FRAME: 'auto',  // 'auto' | true | false
  DEBUG: false
};

/* ── The analytics shim. Swap this ONE function to wire a real endpoint. ──
   Every event passes through here on its way to the three required destinations
   (console · window.parent · window.__ad.events · the on-screen ticker). */
CONFIG.ANALYTICS = function (name, payload) {
  // e.g. navigator.sendBeacon('https://your-endpoint/e', JSON.stringify({ name: name, payload: payload }));
};

var P = CONFIG.PALETTE, T = CONFIG.TUNING;

// How many scoring gates the track has (rows with a `good`). Derived, never
// hand-typed, so adding or removing a gate can never leave a stale "/3" behind.
var GOOD_GATES = CONFIG.ROWS.filter(function (r) { return r.good; }).length;

/* ══ 2. INSTRUMENTATION — ENGINE. Four events, three destinations. ═════════
   console · window.parent · window.__ad.events · the on-screen ticker.
   Buyers watch the ticker. Never quietly drop an event. */

var tickerEl = document.getElementById('dbg-ticker');
var EVENTS = [];
var t0 = performance.now();

// Stamped by tools/bake.mjs — the ad's own byte size, exposed via inorganic_meta
// and the debug overlay. Never measured at runtime (CORS on file:// + a request).
var SIZE_BYTES = 112725; /* @size */

function emit(name, payload) {
  var e = { event: name, payload: payload || {}, t: Math.round(performance.now() - t0) };
  EVENTS.push(e);
  console.log('[playable] ' + name, e.payload);
  try { CONFIG.ANALYTICS(name, e.payload); } catch (err) {}
  try { if (window.parent && window.parent !== window)
    window.parent.postMessage({ type: 'inorganic_event', name: name, payload: e.payload, t: e.t }, '*');
  } catch (err) {}
  tick(name, e.payload);
}

// The gallery's size/requests/fps badge (docs/gallery-embed.md). Posted on boot,
// re-posted as the fps sample refreshes so the badge is live.
function postMeta() {
  try { if (window.parent && window.parent !== window)
    window.parent.postMessage({ type: 'inorganic_meta', meta: { bytes: SIZE_BYTES, requests: 0, fps: LAST_FPS } }, '*');
  } catch (err) {}
}

function tick(name, payload) {
  var val = payload && payload.ms_to_first_tap != null ? payload.ms_to_first_tap + 'ms'
          : payload && payload.ms != null ? (payload.ms / 1000).toFixed(1) + 's'
          : payload && payload.crowd != null ? (payload.value ? payload.value + ' → ' + payload.crowd : String(payload.crowd))
          : payload && payload.source ? payload.source : '✓';
  var row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = '<span class="nm"></span><span class="vl"></span>';
  row.querySelector('.nm').textContent = name;
  row.querySelector('.vl').textContent = val;
  tickerEl.appendChild(row);
  var rows = tickerEl.querySelectorAll('.row');
  if (rows.length > 4) rows[0].remove();
}

// Haptics. Guarded: desktop and iOS Safari have no vibrate(), and calling it
// unguarded there throws.
function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }

/* ══ 3. AUDIO — ENGINE. Procedural, gesture-gated, silence-safe. ══════════
   Never construct an AudioContext before the first pointerdown, or iOS logs a
   warning and Chrome's autoplay policy leaves it suspended forever. Every
   impression starts effectively muted; the ad is designed to be perfect that way. */

var SFX = (function () {
  var ctx = null, muted = false;
  function ac() {
    if (muted) return null;
    if (!ctx) { try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; } }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(freq, endFreq, dur, type, vol, delay) {
    var c = ac(); if (!c) return;
    var t = c.currentTime + (delay || 0);
    var o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (endFreq) o.frequency.exponentialRampToValueAtTime(Math.max(1, endFreq), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, vol, cut, delay) {
    var c = ac(); if (!c) return;
    var t = c.currentTime + (delay || 0);
    var n = Math.floor(c.sampleRate * dur), buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 1.6);
    var src = c.createBufferSource(), g = c.createGain(), f = c.createBiquadFilter();
    src.buffer = buf; f.type = 'lowpass'; f.frequency.value = cut || 900;
    g.gain.setValueAtTime(vol, t);
    src.connect(f); f.connect(g); g.connect(c.destination); src.start(t);
  }
  return {
    unlock: function () { ac(); },
    setMuted: function (m) { muted = m; if (m && ctx) { try { ctx.close(); } catch (e) {} ctx = null; } },
    isMuted: function () { return muted; },
    grab:   function () { tone(520, 700, 0.05, 'square', 0.05); },
    slide:  function () { tone(180, 220, 0.03, 'triangle', 0.035); },
    // The crowd grows → the pitch climbs. Cheap, and it reads as "number go up".
    gate:   function (i) { var s = [523, 659, 784, 988, 1175, 1319], f = s[Math.min(i, 5)];
                           tone(f, f * 1.5, 0.16, 'square', 0.09); noise(0.16, 0.07, 3200); },
    bad:    function () { tone(300, 90, 0.30, 'sawtooth', 0.11); noise(0.22, 0.12, 500); },
    woosh:  function () { noise(0.30, 0.13, 2600); },
    thunder:function () { noise(0.55, 0.20, 380); tone(90, 40, 0.5, 'sawtooth', 0.09); },
    crunch: function () { noise(0.42, 0.26, 1600); tone(160, 50, 0.34, 'square', 0.16); },
    shatter:function () { noise(0.30, 0.20, 4200); tone(2100, 900, 0.20, 'triangle', 0.09); },
    coins:  function () { for (var i = 0; i < 6; i++) tone(880 + i * 190, 0, 0.09, 'square', 0.07, i * 0.045); },
    win:    function () { [523, 659, 784, 1047, 1319].forEach(function (f, i) { tone(f, 0, 0.34, 'triangle', 0.13, i * 0.085); }); },
    fail:   function () { tone(200, 55, 0.45, 'sawtooth', 0.13); noise(0.30, 0.16, 400); },
    // A crowd wave slamming the wall — pitch climbs with the wave index so the
    // battering builds toward the collapse instead of drumming flat.
    thud:   function (i) { var f = 96 + (i || 0) * 11; tone(f, f * 0.6, 0.11, 'square', 0.09); noise(0.09, 0.07, 800); }
  };
})();

/* ══ 4. AD CONTAINER — ENGINE. MRAID, Google ExitApi, or plain web. ═══════
   Google AdMob does NOT speak MRAID; it injects ExitApi and its own CTA, and
   calling mraid.* in a Google build is a rejection. Check ExitApi first. */

var MRAID = window.mraid || null;
var started = false;

function bootWhenReady() {
  if (!MRAID) { start(); return; }                       // website / Google / preview
  if (MRAID.getState && MRAID.getState() === 'loading')
    MRAID.addEventListener('ready', onMraidReady);
  else onMraidReady();
}
function onMraidReady() {
  if (MRAID.isViewable && MRAID.isViewable()) { start(); return; }
  MRAID.addEventListener('viewableChange', function (v) { if (v) start(); });
}
function start() {
  if (started) return;
  started = true;
  t0 = performance.now();
  emit('playable_start', { mraid: !!MRAID });
  postMeta();
  emit('play_start', { mraid: !!MRAID });                // the brief's alias for the same beat
  resetAttempt(true);
}

function openStore(source) {
  emit('cta_click', { source: source });
  if (window.ExitApi && window.ExitApi.exit) { window.ExitApi.exit(); return; }   // Google AdMob

  /* ── MINTEGRAL HOOK ────────────────────────────────────────────────────────
     Mintegral does NOT attribute a plain mraid.open(). For an MTG build,
     uncomment the line below (and confirm against the campaign's spec sheet —
     some MTG template versions expose window.install() instead):            */
  // if (window.mtg && window.mtg.openurl) { window.mtg.openurl(CONFIG.CTA_URL); return; }

  if (MRAID && MRAID.open) { MRAID.open(CONFIG.CTA_URL); return; }                // MRAID 3.0
  ctaClicked();                                                                   // plain web
}

// Website-showcase behaviour. Global so a host page can override it.
// Gallery/demo build: this is a showcase, not a store listing — there's no game to
// launch, so PLAY NOW is deliberately INERT (no navigation). The cta_click event
// still fires in openStore, so the instrumentation demo stays honest; and the ad-
// network hooks in openStore (ExitApi / MRAID) are untouched for real campaigns.
window.ctaClicked = function () {
  showToast(CONFIG.COPY.toast);
};

var toastEl = document.getElementById('toast'), toastT = 0;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(function () { toastEl.classList.remove('on'); }, 3200);
}

/* ══ 5. LAYOUTS — GAME LOGIC. One authored staging per orientation. ═══════
   NOT one scene letterboxed twice. Portrait gets a tall road, a high horizon and
   a steep rush at the vanishing point. Landscape gets a wide road, a low horizon
   and a shallower fall-off, so the gates read ACROSS the frame instead of
   stacking on top of each other.

   The perspective is one divide:   scale(z) = focal / (focal + z)
     screenY = horizonY + (groundY − horizonY) · scale
     screenX = cx + roadX · roadHalf · scale          (roadX ∈ −1..+1)

   errSpan is the difficulty dial: the win band ≈ 2 · minMouth / errSpan. */

var LAYOUTS = {
  portrait: {
    safe: { x: 0, y: 0, w: 620, h: 1160 },
    cx: 310, horizonY: 322, groundY: 1108,
    roadHalf: 292, focal: 880, crowdZ: 96, drawZ: 3600,
    errSpan: 2.0,            // → band ≈ 2 · 0.26 / 2.0 = 26%
    mouthScale: 1.0,
    sun: { x: 310, y: 300, r: 190 },
    banks: [                 // parallax cloud banks: hump height, colour, drift rate
      { h: 128, c: 'cloudFar',  k: 0.012 },
      { h: 92,  c: 'cloudMid',  k: 0.030 },
      { h: 58,  c: 'cloudNear', k: 0.062 }
    ]
  },
  landscape: {
    safe: { x: 0, y: 0, w: 1180, h: 600 },
    cx: 590, horizonY: 168, groundY: 578,
    roadHalf: 545, focal: 640, crowdZ: 74, drawZ: 3000,
    errSpan: 2.2,            // a wider road on screen makes steering easier —
    mouthScale: 0.94,        // so tighten both dials to hold the same skill bar
    sun: { x: 590, y: 150, r: 150 },
    banks: [
      { h: 84, c: 'cloudFar',  k: 0.012 },
      { h: 60, c: 'cloudMid',  k: 0.030 },
      { h: 38, c: 'cloudNear', k: 0.062 }
    ]
  }
};

// Derive the track once per staging. The ROWS are shared; only the difficulty
// scalars differ per orientation, so the two stagings can never silently drift
// apart the way two hand-edited copies of a gate list would.
function prep(L) {
  if (L._ready) return L;
  L._ready = true;
  L.rows = CONFIG.ROWS.map(function (r) {
    var o = { d: r.d, ideal: r.ideal, mouth: r.mouth * L.mouthScale };
    if (r.good) o.good = r.good;
    if (r.bad) o.bad = r.bad;
    if (r.hazard) o.hazard = r.hazard;
    return o;
  });
  L.wallD = L.rows[L.rows.length - 1].d + 1100;   // the run ends 1100 units past the last gate
  return L;
}

/* ══ 6. SIM — GAME LOGIC, but the SHAPE is mandatory. ═════════════════════

   runSim(L, t, assist) must be PURE and DETERMINISTIC: same control in, same
   result out. No Math.random() in here, ever. That single property buys:
     · sweep() can prove the run is winnable and measure the skill band
     · the racing-line preview cannot disagree with what actually happens
     · the harness can drive the ad without flaking

   hitRow() is the ONE hit test. The live run (§11) calls it with the crowd's
   real x; the sim calls it with the bot's x. They cannot diverge. */

function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function smooth(u) { return u * u * (3 - 2 * u); }

// The racing line: where a perfect run is at distance d. It arrives at each row's
// lane ~40% of the gap early, so the crowd is settled before it reaches the gate.
function idealAt(L, d) {
  var R = L.rows;
  if (d <= R[0].d) return R[0].ideal;
  for (var i = 0; i < R.length - 1; i++) {
    if (d <= R[i + 1].d) {
      var a = R[i], b = R[i + 1];
      var u = clamp(((d - a.d) / (b.d - a.d) - 0.04) / 0.56, 0, 1);
      return a.ideal + (b.ideal - a.ideal) * smooth(u);
    }
  }
  return R[R.length - 1].ideal;
}

function applyOp(n, op) {
  if (op === 'x2')  return n * 2;
  if (op === 'p25') return n + 25;
  if (op === 'd2')  return Math.floor(n / 2);
  if (op === 'm20') return n - 20;
  return n;
}

// The single hit test: what does this row do to a crowd sitting at x?
//   → { kind: 'good'|'bad'|'hazard'|'near'|'clear', crowd, op?, label? }
// assist widens the GOOD mouth only (Law 4: ≤35%). It never shrinks a penalty and
// it never moves the crowd — a magnet is the tell of a cheap playable.
function hitRow(row, x, crowd, assist) {
  if (row.hazard) {
    var dh = Math.abs(x - row.hazard.lane);
    if (dh < row.hazard.half) return { kind: 'hazard', crowd: Math.floor(crowd * T.hazardKeep) };
    if (dh < row.hazard.half * T.nearMissBand) return { kind: 'near', crowd: crowd };
    return { kind: 'clear', crowd: crowd };
  }
  if (row.good && Math.abs(x - row.good.lane) < row.mouth * (1 + (assist || 0)))
    return { kind: 'good', op: row.good.op, label: row.good.label,
             crowd: clamp(applyOp(crowd, row.good.op), 0, T.maxCrowd) };
  if (row.bad && Math.abs(x - row.bad.lane) < row.mouth)
    return { kind: 'bad', op: row.bad.op, label: row.bad.label,
             crowd: clamp(applyOp(crowd, row.bad.op), 0, T.maxCrowd) };
  return { kind: 'clear', crowd: crowd };
}

// The bot: holds a CONSTANT lateral error for the whole track. t = 0.5 is dead on
// the racing line; t = 0 is a full road-half-width left of it, t = 1 right of it.
function errorOf(L, t) { return (t - 0.5) * L.errSpan; }
function botX(L, t, row) { return clamp(row.ideal + errorOf(L, t), -1, 1); }

function runSim(L, t, assist) {
  var crowd = T.startCrowd, gates = 0, hazard = false, near = false;
  for (var i = 0; i < L.rows.length; i++) {
    var row = L.rows[i];
    var h = hitRow(row, botX(L, t, row), crowd, assist || 0);
    crowd = h.crowd;
    if (h.kind === 'good') gates++;
    if (h.kind === 'hazard') hazard = true;
    if (h.kind === 'near') near = true;
    if (crowd <= 0) return { out: 'wipe', crowd: 0, gates: gates, hazard: hazard, near: near };
  }
  return { out: crowd >= T.threshold ? 'win' : 'short',
           crowd: crowd, gates: gates, hazard: hazard, near: near };
}

// Sample the whole control range. The harness uses this to PROVE the run is
// winnable but not trivial; you use it (via __ad.tune) to set errSpan and mouths.
function sweep(L, assist, n) {
  L = prep(L || layout()); n = n || 200;
  var res = [], win = [], best = -1, bestT = 0.5;
  for (var i = 0; i < n; i++) {
    var t = i / (n - 1);
    var r = runSim(L, t, assist || 0);
    res.push({ t: t, out: r.out, crowd: r.crowd, gates: r.gates, hazard: r.hazard, near: r.near });
    if (r.out === 'win') win.push(t);
    if (r.crowd > best) { best = r.crowd; bestT = t; }
  }
  var band = win.length ? { lo: win[0], hi: win[win.length - 1], width: win[win.length - 1] - win[0] } : null;
  return {
    band: band,
    idealApex: null,                       // n/a for a runner; kept for contract shape
    bestT: bestT, bestCrowd: best,
    // PERFECT = a win that took every gate AND threaded the storm untouched.
    perfect: res.filter(function (r) { return r.out === 'win' && r.gates === GOOD_GATES && !r.hazard; })
                .map(function (r) { return r.t; }),
    samples: res
  };
}

/* ══ 7. RENDERER — ENGINE. HiDPI backing store + contain-fit camera. ══════
   Canvas 2D has no automatic DPR handling: size the BACKING STORE in physical
   pixels, the CSS box in layout pixels, then scale the context. Re-apply on
   every resize. Cap DPR at 2 — 3× costs ~2× the fill for no visible gain. */

var cv = document.getElementById('c'), cx = cv.getContext('2d', { alpha: false });
var VW = 0, VH = 0, DPR = 1;
var cam = { s: 1, ox: 0, oy: 0 };
var vignette = null, grain = null;

function layout() { return LAYOUTS[VW / VH > 1.15 ? 'landscape' : 'portrait']; }

function resize() {
  var stage = document.getElementById('stage');
  var frame = CONFIG.SHOW_PHONE_FRAME === true ||
             (CONFIG.SHOW_PHONE_FRAME === 'auto' && window.innerWidth > 760 && window.innerHeight > 560);
  stage.classList.toggle('framed', frame);
  document.getElementById('notch').style.display = frame ? 'block' : 'none';

  var box = document.getElementById('screen').getBoundingClientRect();
  VW = Math.max(1, Math.round(box.width));
  VH = Math.max(1, Math.round(box.height));
  DPR = Math.min(window.devicePixelRatio || 1, 2);

  cv.width  = Math.round(VW * DPR);
  cv.height = Math.round(VH * DPR);
  cv.style.width = VW + 'px';
  cv.style.height = VH + 'px';
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);

  var L = prep(layout());
  cam.s = Math.min(VW / L.safe.w, VH / L.safe.h);     // contain: nothing critical crops
  cam.ox = (VW - L.safe.w * cam.s) / 2 - L.safe.x * cam.s;
  cam.oy = (VH - L.safe.h * cam.s) / 2 - L.safe.y * cam.s;

  if (!grain) grain = makeGrain();
  vignette = makeVignette();
  if (W && W.layout !== L) resetAttempt(true);        // orientation flip → silent re-stage
}
window.addEventListener('resize', function () { setTimeout(resize, 0); });
window.addEventListener('orientationchange', function () { setTimeout(resize, 60); });

function X(x) { return x * cam.s + cam.ox; }
function Y(y) { return y * cam.s + cam.oy; }
function S(v) { return v * cam.s; }

function makeVignette() {
  var o = document.createElement('canvas');
  o.width = Math.max(2, VW >> 1); o.height = Math.max(2, VH >> 1);
  var g = o.getContext('2d');
  var r = g.createRadialGradient(o.width / 2, o.height * 0.44, o.height * 0.16,
                                 o.width / 2, o.height * 0.5, o.height * 0.86);
  r.addColorStop(0, 'rgba(0,0,0,0)');
  r.addColorStop(0.62, 'rgba(12,4,26,0.16)');
  r.addColorStop(1, 'rgba(12,4,26,0.70)');
  g.fillStyle = r; g.fillRect(0, 0, o.width, o.height);
  // bake the grain in, so the whole post pass is a single drawImage per frame
  if (grain) {
    g.globalAlpha = 0.045;
    g.fillStyle = g.createPattern(grain, 'repeat');
    g.fillRect(0, 0, o.width, o.height);
  }
  return o;
}
function makeGrain() {
  var o = document.createElement('canvas'); o.width = o.height = 96;
  var g = o.getContext('2d'), d = g.createImageData(96, 96), a = d.data;
  for (var i = 0; i < a.length; i += 4) {
    var n = 118 + Math.random() * 68;
    a[i] = a[i + 1] = a[i + 2] = n; a[i + 3] = 255;
  }
  g.putImageData(d, 0, 0);
  return o;
}

// One prerendered radial glow, tinted on demand. NEVER use ctx.shadowBlur in a
// frame loop — it is the single most expensive thing in canvas 2D. With ~80 puffs
// on screen this one function is the entire bloom budget.
var GLOW = (function () {
  var o = document.createElement('canvas'); o.width = o.height = 128;
  var g = o.getContext('2d');
  var r = g.createRadialGradient(64, 64, 0, 64, 64, 64);
  r.addColorStop(0, 'rgba(255,255,255,1)');
  r.addColorStop(0.22, 'rgba(255,255,255,0.55)');
  r.addColorStop(0.55, 'rgba(255,255,255,0.16)');
  r.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = r; g.fillRect(0, 0, 128, 128);
  return o;
})();
var tintCache = {};
function tint(color) {
  if (tintCache[color]) return tintCache[color];
  var o = document.createElement('canvas'); o.width = o.height = 128;
  var g = o.getContext('2d');
  g.drawImage(GLOW, 0, 0);
  g.globalCompositeOperation = 'source-in';
  g.fillStyle = color; g.fillRect(0, 0, 128, 128);
  tintCache[color] = o;
  return o;
}
function glow(x, y, rad, color, alpha) {
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  cx.globalAlpha = alpha;
  cx.drawImage(tint(color), x - rad, y - rad, rad * 2, rad * 2);
  cx.restore();
}
function poly(pts, fill, edge) {
  cx.beginPath();
  cx.moveTo(X(pts[0].x), Y(pts[0].y));
  for (var i = 1; i < pts.length; i++) cx.lineTo(X(pts[i].x), Y(pts[i].y));
  cx.closePath();
  cx.fillStyle = fill; cx.fill();
  if (edge) { cx.strokeStyle = edge; cx.lineWidth = Math.max(1, S(2)); cx.stroke(); }
}

/* ── The perspective projection. Everything in the world goes through these. ── */
function PS(L, z) { return L.focal / (L.focal + Math.max(-L.focal * 0.86, z)); }
function PX(L, x, z) { return L.cx + x * L.roadHalf * PS(L, z); }
function PY(L, z)    { return L.horizonY + (L.groundY - L.horizonY) * PS(L, z); }

// The road's NEAR edge must reach the actual bottom of the canvas, not just the
// authored safe box: resize()'s contain-fit (cam.s = min of the two axis ratios)
// only guarantees the safe box is fully VISIBLE, not that it fills the screen — on
// a phone taller/narrower than the safe box's own aspect it leaves a strip of
// canvas below groundY where the void shows through, clipping the closest part of
// the road right where the demo hand sits. Solve for the world z whose projection
// lands on the real bottom edge, clamped to PS's own near-plane limit.
function roadNearZ(L) {
  var worldBottom = (VH - cam.oy) / cam.s;
  var ps = (worldBottom - L.horizonY) / (L.groundY - L.horizonY);
  if (ps <= 0) return -0.86 * L.focal;
  return Math.max(-0.86 * L.focal, L.focal * (1 / ps - 1));
}

/* ══ 8. STATE + DIFFICULTY — ENGINE contract, GAME LOGIC fields. ══════════ */

var W = null;
var attempts = 0, firstTapAt = 0, wonAt = 0, gatesTaken = 0, wonCrowd = 0;

// The finale is a BATTER, not a detonation: the crowd hurls itself at the wall in
// waves, each impact chipping the wall's health and peeling bodies off the pack,
// until the wall gives and the survivors surge through. SMASH_HITS waves of
// BATTER_STEP seconds ⇒ ~0.8s of build-up before the one big collapse beat.
var SMASH_HITS = 9, BATTER_STEP = 0.085;
var shake = 0, shakeMag = 0, hitstop = 0, timeScale = 1, camPush = 0;
var parts = [], floats = [], confetti = [];

// Nobody watches an ad twice to "get good", so misses have to TEACH. Do that by
// revealing more of the RACING LINE each time — not by cheating the steering. The
// gate mouths widen only a hair (≤35%): enough to forgive a near-miss, never
// enough to look like the crowd is being sucked sideways into a gate. See Law 4.
function ASSIST() { return Math.min(attempts * T.assistPerFail, 0.35); }
// The FIRST run shows no racing line at all — the hook is the player reading the
// gates and steering by instinct, not tracing a rail we drew for them. The line is
// a teaching aid that only appears once they've actually missed, then reveals more
// of the solution each failure (50% → 100%) until nobody can stall. Law 4 lives in
// this escalation, not in a permanent guide.
function PREVIEW_FRAC() { return attempts === 0 ? 0 : Math.min(1, 0.5 + (attempts - 1) * 0.18); }

function resetAttempt(hard) {
  var L = prep(layout());
  W = {
    layout: L,
    state: 'RUN',                 // RUN → SMASH → END   (a miss: RUN → RESOLVE → RUN)
    dist: 0,
    x: 0,                         // the crowd's lateral position, road units −1..+1
    target: 0,                    // where the thumb wants it
    vx: 0,
    crowd: T.startCrowd,
    puffs: [],
    rowAt: 0,                     // index of the next row to resolve
    gates: 0, hazardHit: false,
    out: null, resolveT: 0, smashT: 0,
    // battering finale (set for real in hitWall)
    collapsed: false, wallHP: 1, batterHit: 0, smashSpend: 0, smashRemoved: 0,
    idle: 0, demo: false, hint: 1, dragging: false, touched: false,
    lean: 0, speedLines: 0
  };
  seedPuffs(W, T.startCrowd);
  parts.length = 0; floats.length = 0;
  if (hard) {
    confetti.length = 0; timeScale = 1; camPush = 0;
    attempts = 0; gatesTaken = 0;
  }
}

// The crowd. Puff offsets are cosmetic ONLY — no outcome ever reads them, so the
// sim stays pure even though the pack jitters.
function seedPuffs(w, n) {
  w.puffs.length = 0;
  for (var i = 0; i < n; i++) addPuff(w, i);
}
function addPuff(w, i) {
  var a = i * 2.399963, r = Math.sqrt(i + 0.6) * 0.052;   // phyllotaxis → an even, organic pack
  w.puffs.push({ ox: Math.cos(a) * r, oz: Math.sin(a) * r * 260,
                 ph: Math.random() * 6.283, sq: 1.6, pop: 1 });
}
function syncPuffs(w) {
  var want = Math.min(w.crowd, 140);                      // draw cap: 140 already reads as a river
  while (w.puffs.length < want) addPuff(w, w.puffs.length);
  while (w.puffs.length > want) w.puffs.pop();
}

/* ══ 9. INPUT — ENGINE contract, GAME LOGIC mapping. ══════════════════════
   One axis. The whole game is "where is your thumb". Both pointer types, and the
   crowd EASES toward the thumb — never teleports — so it reads as a crowd with
   mass rather than a cursor. */

var pointer = { down: false, moved: 0, sx: 0, sy: 0 };

function toWorld(ev) {
  var b = cv.getBoundingClientRect();
  return { x: (ev.clientX - b.left - cam.ox) / cam.s, y: (ev.clientY - b.top - cam.oy) / cam.s };
}
// GAME LOGIC: a world point → the lateral road position the thumb is asking for.
function roadXFromPoint(p) {
  var L = W.layout;
  return clamp((p.x - L.cx) / (L.roadHalf * PS(L, L.crowdZ)), -1, 1);
}
// GAME LOGIC: THE CONTROL, normalised. t = the crowd's ERROR from the racing line
// — the same scalar the sweep bot holds constant. 0.5 = dead on the line.
function tOf(w) {
  var L = w.layout;
  return clamp(0.5 + (w.x - idealAt(L, w.dist)) / L.errSpan, 0, 1);
}
function xFromT(w, t) {
  var L = w.layout;
  return clamp(idealAt(L, w.dist) + (t - 0.5) * L.errSpan, -1, 1);
}
// GAME LOGIC: where the control is on screen — it IS the crowd.
function controlPos() {
  var L = W.layout;
  return { x: PX(L, W.x, L.crowdZ), y: PY(L, L.crowdZ) - 26 };
}

function onDown(ev) {
  ev.preventDefault();
  SFX.unlock();
  if (!firstTapAt && started) {
    firstTapAt = performance.now();
    emit('first_interaction', { ms_to_first_tap: Math.round(firstTapAt - t0) });
    setTimeout(function () { document.getElementById('rail').classList.add('on'); }, 1100);
  }
  if (!W || W.state !== 'RUN') return;
  pointer.down = true; pointer.moved = 0;
  pointer.sx = ev.clientX; pointer.sy = ev.clientY;
  W.dragging = true; W.idle = 0; W.demo = false; W.touched = true;
  W.target = roadXFromPoint(toWorld(ev));
  SFX.grab();
}
function onMove(ev) {
  if (!pointer.down || !W || W.state !== 'RUN') return;
  ev.preventDefault();
  pointer.moved = Math.max(pointer.moved, Math.hypot(ev.clientX - pointer.sx, ev.clientY - pointer.sy));
  var nx = roadXFromPoint(toWorld(ev));
  if (Math.abs(nx - W.target) > 0.02) SFX.slide();
  W.target = nx; W.idle = 0;
}
function onUp() {
  if (!pointer.down) return;
  pointer.down = false;
  if (!W) return;
  W.dragging = false;
  // A runner never "commits". Lifting your thumb just parks the crowd where it is,
  // so it can never burn an attempt — the stray-tap problem the launcher shell
  // guards against with its >8px commit gate cannot arise in this archetype.
}
cv.addEventListener('pointerdown', onDown, { passive: false });
window.addEventListener('pointermove', onMove, { passive: false });
window.addEventListener('pointerup', onUp);
window.addEventListener('pointercancel', onUp);

/* ══ 10. JUICE — ENGINE. Calibrate the numbers, keep the tools. ═══════════ */

function burst(x, y, color, n, spd, life, size) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2, s = spd * (0.35 + Math.random() * 0.65);
    parts.push({ x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - spd * 0.2,
      r: (size || 4) * (0.5 + Math.random()), life: life || 0.7, max: life || 0.7,
      c: color, g: 900 + Math.random() * 700, rot: Math.random() * 6, spin: (Math.random() - 0.5) * 14 });
  }
}
function float(x, y, text, color, size) {
  floats.push({ x: x, y: y, text: text, c: color, s: size || 26, life: 0.9, max: 0.9 });
}
function kick(mag, dur) { shakeMag = Math.max(shakeMag, mag); shake = Math.max(shake, dur); }
function stop(ms) { hitstop = Math.max(hitstop, ms / 1000); }
function popConfetti(n, cxp, cyp) {
  for (var i = 0; i < n; i++) confetti.push({
    x: cxp + (Math.random() - 0.5) * 240, y: cyp + (Math.random() - 0.5) * 100,
    vx: (Math.random() - 0.5) * 620, vy: -320 - Math.random() * 560,
    w: 5 + Math.random() * 8, h: 3 + Math.random() * 6,
    rot: Math.random() * 6, spin: (Math.random() - 0.5) * 18, life: 2.6,
    c: [P.gold, P.puff, P.violet, P.paper, P.good, P.sky3][i % 6]
  });
}

/* ══ 11. STEP — GAME LOGIC. ═══════════════════════════════════════════════ */

function speedAt(L, d) {
  return T.speed0 + (T.speed1 - T.speed0) * clamp(d / L.wallD, 0, 1);
}

function step(dt) {
  if (!W) return;
  var L = W.layout;

  if (hitstop > 0) { hitstop -= dt; return; }
  dt *= timeScale;

  if (shake > 0) { shake -= dt; if (shake <= 0) shakeMag = 0; }
  camPush += (0 - camPush) * Math.min(1, dt * 5);
  timeScale += (1 - timeScale) * Math.min(1, dt * (timeScale < 1 ? 2.4 : 8));
  if (timeScale > 0.995) timeScale = 1;

  if (W.state === 'RUN' && started) {
    // The idle safety valve. If they only WATCH, demo the steering for them: the
    // ghost hand drags, the crowd follows the line, the gates pay off, the wall
    // breaks. Any touch cancels it forever. Never let the ad stall on a lurker.
    W.idle += dt;
    if (!W.touched && W.idle > T.idleDemoMs / 1000) W.demo = true;
    if (W.demo) W.target = idealAt(L, W.dist + 300);

    // Steering: the crowd EASES toward the thumb. Never a teleport.
    var nx = W.x + (W.target - W.x) * Math.min(1, dt * T.steerLerp);
    W.vx = (nx - W.x) / Math.max(dt, 1e-4);
    W.x = clamp(nx, -1, 1);
    W.lean += (clamp(W.vx * 0.9, -1, 1) - W.lean) * Math.min(1, dt * 8);

    // Forward motion is automatic, and it escalates across the run.
    var sp = speedAt(L, W.dist);
    W.dist += sp * dt;
    W.speedLines = clamp((sp - T.speed0) / (T.speed1 - T.speed0), 0, 1);

    // Resolve every row we just crossed — through the SAME hit test the sim uses.
    while (W.rowAt < L.rows.length && W.dist >= L.rows[W.rowAt].d) {
      resolveRow(L.rows[W.rowAt]);
      W.rowAt++;
      if (W.state !== 'RUN') return;      // a wipe ends the run inside resolveRow
    }

    if (W.dist >= L.wallD) hitWall();

    W.hint = Math.max(0, W.hint - (W.touched ? dt * 2.0 : 0));
  }

  if (W.state === 'SMASH') {
    W.smashT += dt;
    if (!W.collapsed) {
      W.dist = L.wallD;                                 // pin the pack against the wall
      while (W.batterHit < SMASH_HITS && W.smashT >= (W.batterHit + 1) * BATTER_STEP)
        batterWall(W.batterHit++);
      if (W.batterHit >= SMASH_HITS) collapseWall();
    } else {
      W.dist += 160 * dt;                               // survivors surge through the gap
    }
  }

  if (W.state === 'RESOLVE') {
    W.resolveT += dt;
    if (W.resolveT > T.retryMs / 1000) {
      attempts++;
      var played = W.touched;
      resetAttempt(false);
      W.touched = played;                // don't run the demo at someone who is playing
    }
  }

  // puff bob / squash / pop
  for (var i = 0; i < W.puffs.length; i++) {
    var pf = W.puffs[i];
    pf.ph += dt * 5.2;
    pf.sq += (1 - pf.sq) * Math.min(1, dt * 9);
    pf.pop = Math.max(0, pf.pop - dt * 2.4);
  }

  for (var a = parts.length - 1; a >= 0; a--) {
    var p = parts[a];
    p.vy += p.g * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    p.rot += p.spin * dt; p.life -= dt;
    if (p.life <= 0) parts.splice(a, 1);
  }
  for (var j = floats.length - 1; j >= 0; j--) {
    var f = floats[j]; f.y -= 52 * dt; f.life -= dt;
    if (f.life <= 0) floats.splice(j, 1);
  }
  for (var k = confetti.length - 1; k >= 0; k--) {
    var c = confetti[k];
    c.vy += 900 * dt; c.vx *= 0.99;
    c.x += c.vx * dt; c.y += c.vy * dt; c.rot += c.spin * dt; c.life -= dt;
    if (c.life <= 0) confetti.splice(k, 1);
  }
}

function resolveRow(row) {
  var L = W.layout, before = W.crowd;
  var h = hitRow(row, W.x, W.crowd, ASSIST());
  var sx = PX(L, W.x, L.crowdZ), sy = PY(L, L.crowdZ) - 40;

  if (h.kind === 'good') {
    W.crowd = h.crowd; W.gates++;
    syncPuffs(W);
    for (var i = 0; i < W.puffs.length; i++) if (i >= before - 1) W.puffs[i].pop = 1;
    kick(4, 0.14); stop(28);                    // a SMALL kick — the smash owns the big one
    SFX.gate(W.gates);
    buzz(18);
    burst(sx, sy, P.good, 16, 260, 0.55, 4);
    float(sx, sy - 96, h.label, P.goodLit, 34);
    // No second "+25" float under the label: for the additive gate the two read
    // identically and stack on top of each other. The crowd counter above the pack
    // is already showing the new total.
    emit('gate_passed', { value: h.label, op: h.op, crowd: W.crowd, gate: W.gates });

  } else if (h.kind === 'bad') {
    W.crowd = h.crowd;
    syncPuffs(W);
    kick(6, 0.2); stop(40);
    SFX.bad();
    buzz(30);
    burst(sx, sy, P.bad, 18, 280, 0.6, 4);
    float(sx, sy - 96, h.label, P.badLit, 34);
    emit('gate_passed', { value: h.label, op: h.op, crowd: W.crowd, gate: W.gates });

  } else if (h.kind === 'hazard') {
    W.crowd = h.crowd; W.hazardHit = true;
    syncPuffs(W);
    kick(9, 0.3); stop(70);
    SFX.thunder();
    buzz([40, 30, 60]);
    burst(sx, sy, P.stormLit, 24, 340, 0.8, 5);
    burst(sx, sy, P.bolt, 10, 300, 0.5, 3);
    float(sx, sy - 96, 'ZAPPED', P.bolt, 30);
    emit('gate_passed', { value: 'storm', op: 'hazard', crowd: W.crowd, gate: W.gates });

  } else if (h.kind === 'near') {
    kick(3, 0.16);
    SFX.woosh();
    buzz(12);
    float(sx, sy - 96, 'CLOSE!', P.bolt, 26);
    emit('near_miss', { crowd: W.crowd, clearance: +Math.abs(W.x - row.hazard.lane).toFixed(3) });
  }

  if (W.crowd <= 0) { W.crowd = 0; syncPuffs(W); failRun('wipe'); }
}

// ── THE MOMENT ── the ad's one engineered beat of delight, now earned by a BATTER.
// Contact starts a ~0.8s siege: waves of the crowd hurl themselves at the wall, each
// wave chipping its health and thinning the pack, and only when the wall's health
// hits zero does the collapse land (collapseWall). The win is DECIDED here — the
// analytics fire immediately — the battering is pure spectacle on top.
function hitWall() {
  if (W.crowd < T.threshold) { failRun('short'); return; }

  W.state = 'SMASH'; W.smashT = 0; W.out = 'win';
  W.collapsed = false; W.wallHP = 1; W.batterHit = 0; W.smashRemoved = 0;
  wonCrowd = W.crowd;                          // the trophy: the crowd that made it
  // Bodies spent knocking the wall down — a visible slice of the pack, never enough
  // to gut it (the survivors still surge through as a river).
  W.smashSpend = clamp(Math.round(wonCrowd * 0.35), 6, Math.max(6, wonCrowd - 8));

  var flawless = W.gates === GOOD_GATES && !W.hazardHit;
  wonAt = performance.now();
  gatesTaken = W.gates;
  emit('level_complete', {
    ms: Math.round(wonAt - t0),
    attempts: attempts + 1,
    bonus: flawless,                        // the PERFECT tier
    control: +tOf(W).toFixed(3),
    crowd: wonCrowd
  });
  emit('completed', { crowd: wonCrowd, ms: Math.round(wonAt - t0), gates: W.gates });
  setTimeout(showEnd, 1500);
}

// One batter wave: drain a slice of the wall's health, peel the matching bodies off
// the front of the pack (they fly in and burst), and knock a chip of masonry loose.
function batterWall(i) {
  var L = W.layout;
  W.wallHP = 1 - (i + 1) / SMASH_HITS;
  var want = Math.round(W.smashSpend * (i + 1) / SMASH_HITS);   // cumulative, so it lands exactly
  var lose = Math.max(0, want - W.smashRemoved);
  W.smashRemoved = want;
  W.crowd = Math.max(1, W.crowd - lose);
  syncPuffs(W);

  var wx = PX(L, W.x, 0), wy = PY(L, 0) - 150;               // impact tracks where they hit
  var cx0 = PX(L, W.x, L.crowdZ), cy0 = PY(L, L.crowdZ) - 30;
  burst(cx0, cy0, P.puffLit, 4 + lose, 300, 0.4, 4);          // bodies leaving the pack
  burst(wx + (Math.random() - 0.5) * 160, wy, P.wallLit, 8, 340, 0.5, 6);  // masonry chip
  burst(wx + (Math.random() - 0.5) * 160, wy, P.wall, 5, 260, 0.55, 7);
  kick(3, 0.1); stop(16);
  SFX.thud(i);
  if (i % 3 === 0) buzz(9);
}

// The collapse — the single big beat. Toned-down shake (was up to ~36; now capped
// near ~14), a soft camera push, the wall bursts into rubble + confetti scaled to
// the crowd, and the five-note fanfare rises over the crunch.
function collapseWall() {
  if (W.collapsed) return;
  W.collapsed = true; W.wallHP = 0;
  var L = W.layout;
  var big = clamp(wonCrowd / (T.threshold * 2), 0.4, 2.2);

  timeScale = 0.3; camPush = 1;
  kick(5 + 4 * big, 0.34);                     // the toned-down "end screen shake"
  stop(90);
  SFX.crunch(); SFX.shatter();
  setTimeout(function () { SFX.coins(); SFX.win(); }, 150);
  buzz([50, 30, 90]);

  var wx = PX(L, 0, 0), wy = PY(L, 0) - 210;
  for (var i = 0; i < 5; i++)
    burst(wx + (Math.random() - 0.5) * 320, wy + (Math.random() - 0.5) * 170,
          [P.wallLit, P.wall, P.paper, P.violet, P.gold][i], Math.round(14 * big), 470, 1.3, 8);
  popConfetti(Math.round(70 * big), wx, wy);

}

function failRun(out) {
  if (W.state !== 'RUN') return;
  var L = W.layout;
  W.state = 'RESOLVE'; W.out = out; W.resolveT = 0;
  kick(7, 0.26);
  SFX.fail();
  buzz(70);
  var sx = PX(L, W.x, L.crowdZ), sy = PY(L, L.crowdZ) - 40;
  burst(sx, sy, P.bad, 22, 320, 0.8, 5);
  float(sx, sy - 40, out === 'wipe' ? CONFIG.COPY.wipeF : CONFIG.COPY.shortF, P.bad, 32);
  if (out === 'short') float(sx, sy - 90, 'NEEDED ' + T.threshold, P.paper, 22);
}

/* ══ 12. END CARD — ENGINE. ═══════════════════════════════════════════════ */

var endEl = document.getElementById('end');
function showEnd() {
  if (!W || W.out !== 'win') return;
  W.state = 'END';
  endEl.classList.add('on');
  document.getElementById('rail').classList.remove('on');
}

// The WHOLE end card is the CTA — a buyer's conversion rate lives on this. Replay
// is the one thing on the card that isn't.
endEl.addEventListener('click', function (ev) {
  if (ev.target.closest && ev.target.closest('#replay')) return;
  openStore('endcard');
});
document.getElementById('railbtn').addEventListener('click', function () { openStore('rail'); });
document.getElementById('replay').addEventListener('click', function (ev) {
  ev.stopPropagation();
  emit('replay', { crowd: W ? W.crowd : 0 });
  endEl.classList.remove('on');
  document.getElementById('rail').classList.add('on');
  wonAt = 0;
  confetti.length = 0;
  resetAttempt(true);
  W.touched = true;                    // they've played once — don't demo at them
  W.hint = 0.6;
});

var muteEl = document.getElementById('mute'), icon = document.getElementById('muteicon');
function drawIcon() {
  icon.innerHTML = SFX.isMuted()
    ? '<path d="M4 9h4l5-4v14l-5-4H4z"/><path d="M17 9l4 6M21 9l-4 6"/>'
    : '<path d="M4 9h4l5-4v14l-5-4H4z"/><path d="M16.5 8.5a5 5 0 010 7M19 6a8.5 8.5 0 010 12"/>';
}
drawIcon();
muteEl.addEventListener('click', function () { SFX.setMuted(!SFX.isMuted()); drawIcon(); });

/* ══ 13. DRAW — GAME LOGIC. ═══════════════════════════════════════════════ */

var TIME = 0;

function draw() {
  var L = W ? W.layout : prep(layout());
  var sx = 0, sy = 0;
  if (shake > 0) { sx = (Math.random() - 0.5) * shakeMag * 2; sy = (Math.random() - 0.5) * shakeMag * 2; }

  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
  cx.fillStyle = P.sky0; cx.fillRect(0, 0, VW, VH);

  cx.save();
  var push = 1 + camPush * 0.07;
  cx.translate(VW / 2, VH * 0.58); cx.scale(push, push); cx.translate(-VW / 2, -VH * 0.58);
  cx.translate(sx, sy);

  drawSky(L);
  drawBanks(L);
  drawRoad(L);
  if (W) {
    drawLine(L);          // the racing-line preview (escalates with attempts)
    drawRows(L);          // gates + storms, far → near
    drawWall(L);
    drawCrowd(L);
  }
  drawParticles();
  if (W && W.state === 'RUN') drawHint(L);
  drawSpeedLines(L);
  drawConfetti();
  drawFloats();

  cx.restore();
  if (vignette) cx.drawImage(vignette, 0, 0, VW, VH);
}

function drawSky(L) {
  var top = (0 - cam.oy) / cam.s, bot = (VH - cam.oy) / cam.s;
  var hz = L.horizonY;

  var g = cx.createLinearGradient(0, Y(top), 0, Y(hz + 40));
  g.addColorStop(0, P.sky0);
  g.addColorStop(0.42, P.sky1);
  g.addColorStop(0.78, P.sky2);
  g.addColorStop(1, P.sky3);
  cx.fillStyle = g;
  cx.fillRect(0, 0, VW, Y(hz + 42));

  // God-rays fanning up from the sun — a dozen thin additive triangles, slowly
  // breathing. Cheap, and it turns a flat gradient sky into a lit one.
  var sunX = X(L.sun.x), sunY = Y(L.sun.y);
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  for (var ry = 0; ry < 11; ry++) {
    var ang = -Math.PI / 2 + (ry - 5) * 0.27 + Math.sin(TIME * 0.22 + ry) * 0.02;
    var len = S(L.sun.r * (3.2 + (ry % 3) * 0.8));
    var wob = 0.05 + 0.02 * ((ry * 7) % 5) / 5;
    cx.globalAlpha = 0.045 + 0.03 * Math.abs(Math.sin(TIME * 0.5 + ry * 1.3));
    cx.fillStyle = ry % 2 ? P.sky3 : P.paper;
    cx.beginPath();
    cx.moveTo(sunX, sunY);
    cx.lineTo(sunX + Math.cos(ang - wob) * len, sunY + Math.sin(ang - wob) * len);
    cx.lineTo(sunX + Math.cos(ang + wob) * len, sunY + Math.sin(ang + wob) * len);
    cx.closePath();
    cx.fill();
  }
  cx.restore();

  // The sun: layered soft discs at the vanishing point — a wide coral halo, a warmer
  // mid, a hot white core. It is what the road runs into. (Kept off gold: gold is
  // reserved for the reward/CTA in this ad.)
  glow(X(L.sun.x), Y(L.sun.y), S(L.sun.r * 1.5), P.sky3, 0.42);
  glow(X(L.sun.x), Y(L.sun.y), S(L.sun.r * 0.95), P.sky3, 0.24);
  glow(X(L.sun.x), Y(L.sun.y), S(L.sun.r * 0.7), P.paper, 0.32);

  // Below the horizon: the void the cloud highway floats over. It MUST open on the
  // same colour the sky above closes on, or a hard seam runs across the frame.
  var g2 = cx.createLinearGradient(0, Y(hz + 40), 0, Y(bot));
  g2.addColorStop(0, P.sky3);
  g2.addColorStop(0.18, P.sky2);
  g2.addColorStop(0.55, P.sky1);
  g2.addColorStop(1, P.sky0);
  cx.fillStyle = g2;
  cx.fillRect(0, Y(hz + 40), VW, VH - Y(hz + 40));

  // Ambient motes — the background is never a flat colour.
  cx.save();
  for (var m = 0; m < 22; m++) {
    var mx = (m * 137.5) % (L.safe.w + 200) - 100;
    var my = ((m * 61.3 + TIME * (7 + m % 5 * 3)) % (hz + 120)) - 60;
    cx.globalAlpha = 0.06 + (m % 4) * 0.04;
    cx.fillStyle = m % 3 === 0 ? P.puffLit : P.paper;
    cx.beginPath(); cx.arc(X(mx), Y(my), S(1 + (m % 3) * 0.9), 0, 7); cx.fill();
  }
  cx.restore();
}

// Layered parallax cloud banks. Each drifts at its own rate against the run, so
// speed stays legible even when the road ahead is empty.
//
// Every bank sits on the SAME baseline — the horizon — and differs only in how
// high it humps and how fast it slides. Give them their own flat bottoms instead
// and you get three hard horizontal rules ruled straight across the sky, which is
// exactly what the first build did.
function drawBanks(L) {
  var d = W ? W.dist : TIME * 120;
  var base = L.horizonY + 6;
  for (var b = 0; b < L.banks.length; b++) {
    var bank = L.banks[b], off = (d * bank.k) % 460;
    cx.save();
    cx.globalAlpha = 0.5 + b * 0.16;
    cx.fillStyle = P[bank.c];
    var cols = Math.ceil(L.safe.w / 230) + 3;
    for (var i = -1; i < cols; i++) {
      var bx = i * 230 - off + b * 70;
      cx.beginPath();
      cx.moveTo(X(bx - 120), Y(base));
      for (var k = 0; k <= 8; k++) {
        var u = k / 8;
        var lx = bx - 120 + u * 240;
        var hump = Math.sin(u * Math.PI);
        var ly = base - hump * hump * bank.h * (0.65 + 0.35 * Math.sin(i * 2.1 + b * 1.7));
        cx.lineTo(X(lx), Y(ly));
      }
      cx.lineTo(X(bx + 120), Y(base));
      cx.closePath();
      cx.fill();
    }
    cx.restore();
  }
}

// The highway: a cloud-white ribbon running at the vanishing point. It is the
// LIGHTEST mass on screen — the contrast law, inverted for a sky world. What you
// run on must separate instantly from what is behind it.
function drawRoad(L) {
  var d = W ? W.dist : TIME * 200;
  // The ribbon runs all the way to the VANISHING POINT, not to a fixed object-draw
  // distance that leaves a wedge of empty sky between the road's end and the horizon.
  // Objects (gates, wall) still cull at L.drawZ; the road itself does not.
  var far = L.focal * 48;
  var near = roadNearZ(L);

  var xl0 = PX(L, -1.06, near), xr0 = PX(L, 1.06, near), y0 = PY(L, near);
  var xl1 = PX(L, -1.06, far),  xr1 = PX(L, 1.06, far),  y1 = PY(L, far);

  var g = cx.createLinearGradient(0, Y(y1), 0, Y(y0));
  g.addColorStop(0, P.road2);
  g.addColorStop(0.35, P.road);
  g.addColorStop(1, P.road);
  poly([{ x: xl1, y: y1 }, { x: xr1, y: y1 }, { x: xr0, y: y0 }, { x: xl0, y: y0 }], g, null);

  // A soft cloud fringe along both kerbs, wobbling in world space. Sampled on a
  // POWER curve (dense near the camera, sparse toward the horizon) so a road that
  // now reaches the vanishing point still costs a bounded ~30 segments a side.
  var N = 30;
  for (var s = -1; s <= 1; s += 2) {
    var pts = [], seg, z, w;
    for (seg = 0; seg <= N; seg++) {
      z = near + (far - near) * Math.pow(seg / N, 2.4);
      w = 1.06 + 0.10 * Math.sin(z * 0.006 + d * 0.004 + s);
      pts.push({ x: PX(L, s * w, z), y: PY(L, z) });
    }
    for (seg = N; seg >= 0; seg--) {
      z = near + (far - near) * Math.pow(seg / N, 2.4);
      pts.push({ x: PX(L, s * 0.98, z), y: PY(L, z) });
    }
    poly(pts, P.roadEdge, null);
  }

  // Lane dividers, anchored in WORLD space so they rush at you at exactly the run's
  // speed. This is the single strongest cue that you are moving, and moving fast.
  // They now march much deeper toward the horizon (28 vs 14) so the road never runs
  // out of markings before it runs out of road — off-screen ones cull for free.
  var period = 260, len = 130;
  var first = Math.floor(d / period) * period;
  for (var lane = -1; lane <= 1; lane += 2) {
    var lx = lane * 0.31;
    for (var n = 0; n < 28; n++) {
      var zA = first + n * period - d, zB = zA + len;
      if (zB < near || zA > far) continue;
      zA = Math.max(zA, near);
      var a1 = PS(L, zA), a2 = PS(L, zB);
      var w1 = Math.max(0.6, 9 * a1), w2 = Math.max(0.4, 9 * a2);
      // fade the farthest dashes into the horizon haze so they don't pop in as a hard row
      cx.save();
      cx.globalAlpha = clamp(1 - zA / (far * 0.5), 0.12, 1);
      poly([
        { x: PX(L, lx, zA) - w1, y: PY(L, zA) }, { x: PX(L, lx, zA) + w1, y: PY(L, zA) },
        { x: PX(L, lx, zB) + w2, y: PY(L, zB) }, { x: PX(L, lx, zB) - w2, y: PY(L, zB) }
      ], P.road2, null);
      cx.restore();
    }
  }

  // A luminous haze where the highway meets the sky — hides the seam at the vanishing
  // point and reads as distance/atmosphere. Two stacked glows: a wide warm wash and a
  // tighter bright core sitting right on the road's end.
  glow(X(L.cx), Y(L.horizonY + 4), S(L.roadHalf * 1.15), P.puff, 0.14);
  glow(X(L.cx), Y(L.horizonY + 6), S(L.roadHalf * 0.55), P.paper, 0.24);
}

// The escalating preview: the racing line. The FIRST run shows nothing — you read
// the gates yourself. Miss, and it appears (50% of the way ahead), then reveals more
// each failure until by attempt 5 it runs to the wall and the threshold ring pulses.
// This is the HONEST assist — information, not a magnet. Nothing about the steering
// changes; a player who keeps missing is simply shown the answer.
function drawLine(L) {
  if (W.state !== 'RUN') return;
  var frac = PREVIEW_FRAC();
  var ahead = (L.wallD - W.dist) * frac;
  if (ahead < 40) return;
  var pulse = 0.55 + Math.sin(TIME * 4) * 0.18;

  cx.save();
  cx.globalCompositeOperation = 'lighter';
  cx.globalAlpha = 0.28 + 0.14 * frac;
  cx.strokeStyle = P.puffLit;
  cx.lineWidth = Math.max(1.5, S(5));
  cx.lineJoin = 'round';
  cx.beginPath();
  for (var z = 20; z <= ahead; z += 40) {
    var d = W.dist + z;
    var px = PX(L, idealAt(L, d), z), py = PY(L, z);
    if (z === 20) cx.moveTo(X(px), Y(py)); else cx.lineTo(X(px), Y(py));
  }
  cx.stroke();
  cx.restore();

  // Chevrons riding the line — they read as "go here", not as a debug overlay.
  for (var i = 0; i < 10; i++) {
    var zc = (i * 190 + TIME * 260) % Math.max(240, ahead);
    if (zc > ahead || zc < 30) continue;
    var dc = W.dist + zc, sc = PS(L, zc);
    var cxp = PX(L, idealAt(L, dc), zc), cyp = PY(L, zc);
    cx.save();
    cx.globalCompositeOperation = 'lighter';
    cx.globalAlpha = pulse * (1 - zc / Math.max(1, ahead)) * 0.9;
    cx.fillStyle = P.puffLit;
    cx.beginPath();
    cx.moveTo(X(cxp), Y(cyp - 26 * sc));
    cx.lineTo(X(cxp + 22 * sc), Y(cyp - 2 * sc));
    cx.lineTo(X(cxp), Y(cyp - 11 * sc));
    cx.lineTo(X(cxp - 22 * sc), Y(cyp - 2 * sc));
    cx.closePath(); cx.fill();
    cx.restore();
  }

  // By the last attempts, the wall's threshold ring shows too — no dead ends, ever.
  if (frac >= 0.99) {
    var zw = L.wallD - W.dist;
    if (zw > 0 && zw < L.drawZ) {
      var sw = PS(L, zw);
      glow(X(PX(L, 0, zw)), Y(PY(L, zw) - 150 * sw), S(120 * sw), P.gold,
           0.32 + Math.sin(TIME * 5) * 0.12);
    }
  }
}

function drawRows(L) {
  for (var i = L.rows.length - 1; i >= 0; i--) {
    var row = L.rows[i], z = row.d - W.dist;
    if (z < -160 || z > L.drawZ) continue;
    if (row.hazard) drawStorm(L, row, z); else drawGatePair(L, row, z);
  }
}

// A gate: a glowing portal with a chunky number that bounces. Good = green,
// bad = red. There is no third reading — a UA manager should understand the
// decision from a muted one-second screenshot.
function drawGate(L, g, row, z, good) {
  var s = PS(L, z);
  var col = good ? P.good : P.bad, lit = good ? P.goodLit : P.badLit;
  var mouth = row.mouth * (good ? (1 + ASSIST()) : 1);
  var x0 = PX(L, g.lane - mouth, z), x1 = PX(L, g.lane + mouth, z);
  var yb = PY(L, z), yt = yb - 230 * s;
  var alpha = clamp(1 - z / L.drawZ * 0.85, 0.18, 1);
  var cxw = PX(L, g.lane, z), padw = (x1 - x0) / 2;

  // A luminous footprint on the road between the posts — the portal's landing zone.
  // With no racing line on run one, this pulsing pad is the clearest "steer into
  // this" cue the gate can give.
  glow(X(cxw), Y(yb), S(padw * 1.25), col, 0.22 * alpha);
  cx.save();
  cx.globalAlpha = alpha * (0.55 + 0.22 * Math.sin(TIME * 4 + row.d));
  cx.fillStyle = lit;
  cx.beginPath();
  cx.ellipse(X(cxw), Y(yb), Math.max(2, S(padw)), Math.max(1, S(12 * s)), 0, 0, 7);
  cx.fill();
  cx.restore();

  cx.save();
  // the beam between the posts
  var g1 = cx.createLinearGradient(0, Y(yt), 0, Y(yb));
  g1.addColorStop(0, 'rgba(255,255,255,0)');
  g1.addColorStop(1, col);
  cx.globalAlpha = alpha * 0.30;
  poly([{ x: x0, y: yt }, { x: x1, y: yt }, { x: x1, y: yb }, { x: x0, y: yb }], g1, null);

  // posts + lintel
  cx.globalAlpha = alpha;
  var pw = 9 * s;
  poly([{ x: x0 - pw, y: yt }, { x: x0 + pw, y: yt }, { x: x0 + pw, y: yb }, { x: x0 - pw, y: yb }], col, lit);
  poly([{ x: x1 - pw, y: yt }, { x: x1 + pw, y: yt }, { x: x1 + pw, y: yb }, { x: x1 - pw, y: yb }], col, lit);
  poly([{ x: x0 - pw, y: yt }, { x: x1 + pw, y: yt },
        { x: x1 + pw, y: yt + 16 * s }, { x: x0 - pw, y: yt + 16 * s }], lit, null);
  cx.restore();

  glow(X(PX(L, g.lane, z)), Y(yt + 90 * s), S(120 * s), col, 0.30 * alpha);

  // The number. It bounces, because a static number is a dead number.
  //
  // Font sizes go through S() like every other length. Positions are camera-scaled
  // and text was not, so the labels rendered ~1.6× oversized for the world they sit
  // in — and two gates in adjacent lanes (0.62 road units apart) collided into an
  // unreadable "−20+25". It also fades over the last 300 units, so the number
  // doesn't smear across the whole frame as the gate engulfs the camera.
  var bob = Math.sin(TIME * 5 + row.d) * 4 * s;
  var fs = Math.max(8, S(72 * s));
  cx.save();
  cx.globalAlpha = alpha * clamp(z / 300, 0, 1);
  cx.font = "700 " + fs + "px 'Chakra','Trebuchet MS',sans-serif";
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.lineWidth = Math.max(2, S(7 * s));
  cx.strokeStyle = 'rgba(20,8,40,.85)';
  cx.strokeText(g.label, X(PX(L, g.lane, z)), Y(yt + 108 * s + bob));
  cx.fillStyle = lit;
  cx.fillText(g.label, X(PX(L, g.lane, z)), Y(yt + 108 * s + bob));
  cx.restore();
}

function drawGatePair(L, row, z) {
  if (row.bad) drawGate(L, row.bad, row, z, false);
  if (row.good) drawGate(L, row.good, row, z, true);
}

// The storm. The only dark mass in a bright world — it reads as danger before
// anything is explained, and swerving past it is the ad's near-miss beat.
// It has to read as a CLOUD, not a rock. Stacked trapezoids with a flat base sit on
// the highway looking like a dark mountain — the first build did exactly that. A
// churning mass of overlapping lumps, lifted clear of the road and lit along its
// crown, reads as weather at a glance and at any distance.
function drawStorm(L, row, z) {
  var s = PS(L, z), hz = row.hazard;
  var cxp = PX(L, hz.lane, z), yb = PY(L, z);
  var alpha = clamp(1 - z / L.drawZ * 0.85, 0.2, 1);
  var w = hz.half * L.roadHalf * s;          // it fills its half-width exactly:
  var cy = yb - 132 * s;                     // what you see IS what you collide with

  glow(X(cxp), Y(cy), S(w * 2.1), P.storm, 0.42 * alpha);

  cx.save();
  cx.globalAlpha = alpha;

  // the body: eight lumps churning on their own phases
  var lumps = [[-0.72, 0.10, 0.52], [-0.30, -0.30, 0.62], [0.18, -0.34, 0.58],
               [0.66, 0.02, 0.50], [-0.46, 0.36, 0.48], [0.06, 0.30, 0.56],
               [0.50, 0.38, 0.44], [-0.02, -0.02, 0.72]];
  for (var pass = 0; pass < 2; pass++) {
    cx.fillStyle = pass ? P.storm : P.stormLit;      // lit crown, then the dark mass
    for (var i = 0; i < lumps.length; i++) {
      var lm = lumps[i];
      var wob = Math.sin(TIME * 2.2 + i * 1.9) * 5 * s;
      var lx = cxp + lm[0] * w + wob * 0.5;
      var ly = cy + lm[1] * w * 0.85 + wob + (pass ? 7 * s : 0);
      cx.beginPath();
      cx.arc(X(lx), Y(ly), S(lm[2] * w * (0.92 + 0.08 * Math.sin(TIME * 3 + i))), 0, 7);
      cx.fill();
    }
  }

  // Rain streaking off the underbelly — reads as weather at a glance and keeps the
  // storm alive with motion even far down the road where the lumps are small.
  cx.globalAlpha = alpha * 0.45;
  cx.strokeStyle = P.stormLit;
  cx.lineWidth = Math.max(0.6, S(1.6 * s));
  for (var rn = 0; rn < 9; rn++) {
    var rx = cxp + ((rn / 8) - 0.5) * w * 1.4;
    var rp = (TIME * 1.9 + rn * 0.37) % 1;
    var ry0 = cy + w * 0.42 + rp * w * 1.05;
    cx.beginPath();
    cx.moveTo(X(rx), Y(ry0));
    cx.lineTo(X(rx - 3 * s), Y(ry0 + 22 * s));
    cx.stroke();
  }

  // the bolt, always present, flaring on a fast cycle so it crackles
  var flare = 0.55 + 0.45 * Math.max(0, Math.sin(TIME * 7 + row.d));
  cx.globalAlpha = alpha * flare;
  poly([{ x: cxp - 13 * s, y: cy + 6 * s },  { x: cxp + 7 * s,  y: cy + 4 * s },
        { x: cxp - 3 * s,  y: cy + 48 * s }, { x: cxp + 17 * s, y: cy + 42 * s },
        { x: cxp - 9 * s,  y: cy + 116 * s },{ x: cxp + 3 * s,  y: cy + 58 * s },
        { x: cxp - 15 * s, y: cy + 60 * s }], P.bolt, null);
  cx.restore();
  glow(X(cxp), Y(cy + 40 * s), S(70 * s), P.bolt, 0.45 * alpha * flare);
}

// The finish wall: a slab stamped with the number you have to beat. It grows for
// ~4 seconds before it arrives, and that approach IS the tension of the last beat.
function drawWall(L) {
  var z = L.wallD - W.dist;
  if (z > L.drawZ || z < -500) return;
  if (W.state === 'END' || W.collapsed) return;   // it is rubble now

  // During the SMASH it is under SIEGE, not gone: its top crumbles down, an enemy
  // health bar drains, cracks brighten and the stamped number fades — the crowd is
  // literally beating it apart, one wave at a time.
  var battering = W.state === 'SMASH';
  var dmg = battering ? clamp(1 - W.wallHP, 0, 1) : 0;

  // Opaque well before you reach it. A wall you can see the highway through is not
  // a wall, and this is the object the whole run is aimed at breaking.
  var s = PS(L, z), alpha = clamp(1.25 - (z / L.drawZ) * 0.95, 0.15, 1);
  var x0 = PX(L, -1.25, z), x1 = PX(L, 1.25, z);
  var yb = PY(L, z), yt0 = yb - 430 * s;
  var yt = yt0 + (yb - yt0) * dmg * 0.30;         // the top erodes DOWN as it's battered
  var ww = x1 - x0;
  var cxc = PX(L, 0, z);
  var cleared = W.crowd >= T.threshold || battering;

  cx.save();
  cx.globalAlpha = alpha;

  var g = cx.createLinearGradient(0, Y(yt), 0, Y(yb));
  g.addColorStop(0, P.wallLit); g.addColorStop(1, P.wall);
  poly([{ x: x0, y: yt }, { x: x1, y: yt }, { x: x1, y: yb }, { x: x0, y: yb }], g, P.violet);

  // brick courses, so it reads as mass and not a rectangle
  cx.globalAlpha = alpha * 0.22;
  for (var r = 1; r < 5; r++) {
    var ry = yt + (yb - yt) * (r / 5);
    poly([{ x: x0, y: ry }, { x: x1, y: ry }, { x: x1, y: ry + 3 * s }, { x: x0, y: ry + 3 * s }],
         P.paper, null);
  }

  // a crisp lit cap along the top edge, so the slab catches the sky rather than
  // fading softly into it
  cx.globalAlpha = alpha;
  poly([{ x: x0, y: yt }, { x: x1, y: yt }, { x: x1, y: yt + 9 * s }, { x: x0, y: yt + 9 * s }],
       P.wallLit, null);

  // Battering bites jagged notches out of the top edge, deepening as it crumbles.
  if (dmg > 0) {
    for (var nb = 0; nb < 6; nb++) {
      var nx = x0 + ww * ((nb + 0.5) / 6), nw = ww * 0.085;
      var nh = (16 + ((nb * 53) % 34)) * s * dmg;
      poly([{ x: nx - nw, y: yt - 2 * s }, { x: nx + nw, y: yt - 2 * s },
            { x: nx + nw * 0.45, y: yt + nh }, { x: nx - nw * 0.5, y: yt + nh }], P.sky0, null);
    }
  }

  // Hairline cracks spidering from the impact point. Faint while the wall still
  // out-numbers you; they brighten to gold the instant your crowd clears the
  // threshold, then flare wider with every batter wave — a promise of the shatter.
  var cyc = yt + (yb - yt) * 0.46;
  cx.globalAlpha = alpha * (cleared ? 0.55 + dmg * 0.35 : 0.20);
  cx.strokeStyle = cleared ? P.gold : P.stormLit;
  cx.lineWidth = Math.max(1, S((2.6 + dmg * 2.4) * s));   // wider with damage, NOT longer
  cx.lineJoin = 'round';
  var cracks = [[-1, -0.55], [0.7, -0.9], [1.05, 0.15], [0.25, 1], [-0.85, 0.7]];
  for (var ck = 0; ck < cracks.length; ck++) {
    var dx = cracks[ck][0], dy = cracks[ck][1], wh = yb - yt;
    cx.beginPath();
    cx.moveTo(X(cxc), Y(cyc));
    cx.lineTo(X(cxc + dx * ww * 0.20 + (ck % 2 ? ww * 0.04 : -ww * 0.04)), Y(cyc + dy * wh * 0.20));
    cx.lineTo(X(cxc + dx * ww * 0.44), Y(cyc + dy * wh * 0.42));   // kept ON the slab
    cx.stroke();
  }
  cx.globalAlpha = alpha;

  // The threshold. It turns GOLD the moment your crowd clears it — the most
  // motivating number in the ad — then fades as the crowd pounds the wall apart.
  cx.globalAlpha = alpha * (1 - dmg * 0.6);
  var fs = Math.max(10, S(190 * s));           // S(), like every other length
  cx.font = "700 " + fs + "px 'Chakra','Trebuchet MS',sans-serif";
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.lineWidth = Math.max(2, S(10 * s));
  cx.strokeStyle = 'rgba(20,8,40,.8)';
  cx.strokeText(String(T.threshold), X(cxc), Y(cyc));
  cx.fillStyle = cleared ? P.gold : P.paper;
  cx.fillText(String(T.threshold), X(cxc), Y(cyc));
  cx.globalAlpha = alpha;

  if (battering) {
    // The wall's HEALTH — an enemy HP bar draining on its shoulder as the crowd
    // hammers it to zero. Red, so "smash the wall down" reads at a glance.
    var hbw = ww * 0.64, hbx = cxc - hbw / 2, hby = yt - 34 * s, hbh = Math.max(4, 15 * s);
    poly([{ x: hbx, y: hby }, { x: hbx + hbw, y: hby },
          { x: hbx + hbw, y: hby + hbh }, { x: hbx, y: hby + hbh }], 'rgba(18,7,34,.9)', P.violet);
    var fw = hbw * clamp(W.wallHP, 0, 1);
    if (fw > 1) {
      var hg = cx.createLinearGradient(0, Y(hby), 0, Y(hby + hbh));
      hg.addColorStop(0, P.badLit); hg.addColorStop(1, P.bad);
      poly([{ x: hbx, y: hby }, { x: hbx + fw, y: hby },
            { x: hbx + fw, y: hby + hbh }, { x: hbx, y: hby + hbh }], hg, null);
    }
  } else {
    var fs2 = Math.max(7, S(46 * s));
    cx.font = "700 " + fs2 + "px 'Chakra','Trebuchet MS',sans-serif";
    cx.fillStyle = cleared ? P.gold : P.violet;
    cx.fillText(cleared ? 'BREAK IT' : 'NEED', X(cxc), Y(yt + (yb - yt) * 0.15));
  }
  cx.restore();

  if (cleared) glow(X(cxc), Y(cyc), S(160 * s), P.gold, 0.28 + Math.sin(TIME * 6) * 0.10);
}

// The crowd: a river of light. Each puff is a silhouette + a lit facet + a glowing
// core + two eyes, with ghost trails so that a big pack smears into a streak.
function drawCrowd(L) {
  if (W.state === 'END') return;
  var spread = 0.10 + Math.sqrt(W.puffs.length) * 0.030;
  // Bloom is composited per-puff, and it is the frame budget. A 74-strong pack was
  // paying 74 additive sprites for a haze that, at that density, is one haze — so
  // past 34 the pack gets a single glow around the whole crowd instead.
  var trails = W.puffs.length <= 34;
  var perPuffGlow = trails;
  var order = [];
  for (var i = 0; i < W.puffs.length; i++) {
    var pf = W.puffs[i];
    order.push({ pf: pf,
                 wx: clamp(W.x + pf.ox * spread, -1.08, 1.08),
                 wz: L.crowdZ + pf.oz * spread * 5.5 });
  }
  order.sort(function (a, b) { return b.wz - a.wz; });    // far → near

  // Contact shadows first, all of them, under everything. Without these the crowd
  // hovers a few pixels above a white road and reads as a sticker, not a runner.
  cx.save();
  cx.globalAlpha = 0.16;
  cx.fillStyle = '#3A4E86';
  for (var q = 0; q < order.length; q++) {
    var oq = order[q], sq0 = PS(L, oq.wz);
    cx.beginPath();
    cx.ellipse(X(PX(L, oq.wx, oq.wz)), Y(PY(L, oq.wz)), S(13 * sq0), S(4.5 * sq0), 0, 0, 7);
    cx.fill();
  }
  cx.restore();

  // one haze for the whole river of light
  if (!perPuffGlow) {
    var gz = PS(L, L.crowdZ);
    glow(X(PX(L, W.x, L.crowdZ)), Y(PY(L, L.crowdZ) - 30 * gz),
         S(spread * L.roadHalf * gz * 2.6), P.puff, 0.34);
  }

  for (var k = 0; k < order.length; k++) {
    var o = order[k], p2 = o.pf, s = PS(L, o.wz);
    var bob = Math.sin(p2.ph) * 5 * s;
    var px = PX(L, o.wx, o.wz), py = PY(L, o.wz) - 22 * s + bob;
    var r = (16 + 6 * Math.sin(p2.ph * 0.7)) * s * (1 + p2.pop * 0.7);
    var sq = p2.sq * (1 + p2.pop * 0.35);

    // Motion tails: two composited sprites each, and they scale with the crowd. In
    // a dense pack nobody can see them anyway, so they go the same way as the glow.
    if (trails)
      for (var gh = 2; gh >= 1; gh--)
        glow(X(px + W.lean * 9 * gh * s), Y(py + 15 * gh * s), S(r * (1.5 - gh * 0.2)), P.puff, 0.10 / gh);
    if (perPuffGlow) glow(X(px), Y(py), S(r * 2.4), P.puff, 0.30);

    cx.save();
    cx.translate(X(px), Y(py));
    cx.rotate(-W.lean * 0.22);
    cx.scale(1 / Math.max(0.4, sq), sq);
    var R = S(r);
    cx.beginPath();                                    // silhouette
    cx.moveTo(-R, R * 0.35);
    cx.lineTo(-R * 0.62, -R * 0.72);
    cx.lineTo(R * 0.2, -R);
    cx.lineTo(R * 0.95, -R * 0.3);
    cx.lineTo(R * 0.72, R * 0.68);
    cx.lineTo(-R * 0.3, R);
    cx.closePath();
    cx.fillStyle = P.puffDeep; cx.fill();
    cx.lineWidth = Math.max(1, S(r * 0.13));           // a dark rim, or cyan-on-white
    cx.strokeStyle = '#11305C';                        // washes out against the road
    cx.stroke();
    cx.beginPath();                                    // lit facet
    cx.moveTo(-R * 0.62, -R * 0.72);
    cx.lineTo(R * 0.2, -R);
    cx.lineTo(R * 0.35, -R * 0.1);
    cx.lineTo(-R * 0.35, R * 0.05);
    cx.closePath();
    cx.fillStyle = P.puff; cx.fill();
    cx.beginPath();                                    // glowing core
    cx.arc(0, -R * 0.12, R * 0.32, 0, 7);
    cx.fillStyle = P.puffLit; cx.fill();
    cx.fillStyle = '#12234A';                          // two dots = a character
    cx.beginPath(); cx.arc(-R * 0.22, -R * 0.22, R * 0.09, 0, 7); cx.fill();
    cx.beginPath(); cx.arc(R * 0.16, -R * 0.26, R * 0.09, 0, 7); cx.fill();
    cx.restore();
  }

  // The live crowd count, riding just above the pack. Goes gold the instant it
  // clears the wall's threshold: number-go-up, made legible in one glance.
  var hx = PX(L, W.x, L.crowdZ), hy = PY(L, L.crowdZ) - 92;
  var winning = W.crowd >= T.threshold || W.state === 'SMASH';   // stay gold through the smash
  cx.save();
  cx.font = "700 " + Math.max(16, S(54)) + "px 'Chakra','Trebuchet MS',sans-serif";
  cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.lineWidth = Math.max(2, S(6));
  cx.strokeStyle = 'rgba(20,8,40,.8)';
  cx.strokeText(String(W.crowd), X(hx), Y(hy));
  cx.fillStyle = winning ? P.gold : P.puffLit;
  cx.fillText(String(W.crowd), X(hx), Y(hy));
  cx.restore();
  glow(X(hx), Y(hy), S(58), winning ? P.gold : P.puff, 0.20);
}

// Speed streaks, intensifying with velocity. The cheapest possible way to say
// "fast" — and motion is the one thing a static or video ad cannot sell, which is
// the whole reason this genre converts.
function drawSpeedLines(L) {
  if (!W) return;
  var n = Math.round(6 + W.speedLines * 16 + (W.state === 'SMASH' ? 20 : 0));
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  cx.strokeStyle = P.paper;
  cx.lineWidth = Math.max(1, S(2));
  for (var i = 0; i < n; i++) {
    var a = (i * 2.399963 + TIME * 1.4) % 6.283;
    var rr = 0.42 + ((i * 37) % 100) / 160;
    var ex = L.cx + Math.cos(a) * L.safe.w * rr;
    var ey = L.horizonY + Math.sin(a) * L.safe.h * rr * 0.7;
    var t2 = (TIME * (1.6 + (i % 5) * 0.5) + i * 0.31) % 1;
    var u1 = 0.35 + t2 * 0.75, u2 = u1 + 0.10;
    cx.globalAlpha = (0.05 + W.speedLines * 0.14) * Math.sin(t2 * Math.PI);
    cx.beginPath();
    cx.moveTo(X(L.cx + (ex - L.cx) * u1), Y(L.horizonY + (ey - L.horizonY) * u1));
    cx.lineTo(X(L.cx + (ex - L.cx) * u2), Y(L.horizonY + (ey - L.horizonY) * u2));
    cx.stroke();
  }
  cx.restore();
}

// The hand-hint: up from frame one, on the one thing you can touch, swinging
// left↔right because that is literally the whole control. No text, ever.
function drawHint(L) {
  var h = W.demo ? 1 : W.hint;
  if (h <= 0.01) return;
  var sway = Math.sin(TIME * 2.1) * 0.42;
  var hx = W.demo ? W.target : W.x + sway;
  var px = PX(L, clamp(hx, -1, 1), L.crowdZ), py = PY(L, L.crowdZ) + 40;
  var pulse = 0.72 + Math.sin(TIME * 4.4) * 0.28;

  glow(X(px), Y(py), S(52 * pulse), P.paper, 0.28 * h);

  cx.save();
  cx.globalAlpha = h * 0.92;
  cx.translate(X(px), Y(py));
  cx.rotate(-0.15 + sway * 0.12);
  var R = S(30);
  cx.beginPath();                                   // a chunky mitt: palm + thumb
  cx.moveTo(0, -R * 0.9);
  cx.quadraticCurveTo(R * 0.55, -R * 0.9, R * 0.55, -R * 0.15);
  cx.lineTo(R * 0.55, R * 0.6);
  cx.quadraticCurveTo(R * 0.55, R * 1.25, -R * 0.1, R * 1.25);
  cx.quadraticCurveTo(-R * 0.75, R * 1.25, -R * 0.75, R * 0.45);
  cx.lineTo(-R * 0.75, -R * 0.1);
  cx.quadraticCurveTo(-R * 0.75, -R * 0.5, -R * 0.4, -R * 0.4);
  cx.lineTo(-R * 0.4, -R * 0.75);
  cx.quadraticCurveTo(-R * 0.4, -R * 1.1, 0, -R * 0.9);
  cx.closePath();
  cx.fillStyle = 'rgba(255,246,233,.94)';
  cx.fill();
  cx.lineWidth = Math.max(1, S(2.4));
  cx.strokeStyle = 'rgba(26,11,61,.85)';
  cx.stroke();
  cx.restore();

  // the left↔right arrows that make the gesture unambiguous
  cx.save();
  cx.globalAlpha = h * pulse * 0.85;
  cx.fillStyle = P.paper;
  for (var s2 = -1; s2 <= 1; s2 += 2) {
    var ax = px + s2 * (74 + Math.sin(TIME * 4.4) * 8);
    cx.beginPath();
    cx.moveTo(X(ax + s2 * 20), Y(py - 6));
    cx.lineTo(X(ax), Y(py - 20));
    cx.lineTo(X(ax), Y(py + 8));
    cx.closePath(); cx.fill();
  }
  cx.restore();
}

function drawParticles() {
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  for (var i = 0; i < parts.length; i++) {
    var p = parts[i], a = Math.max(0, p.life / p.max);
    cx.globalAlpha = a;
    cx.save();
    cx.translate(X(p.x), Y(p.y));
    cx.rotate(p.rot);
    cx.fillStyle = p.c;
    var r = S(p.r * a);
    cx.fillRect(-r, -r, r * 2, r * 2);
    cx.restore();
  }
  cx.restore();
}

function drawConfetti() {
  for (var i = 0; i < confetti.length; i++) {
    var c = confetti[i], a = Math.min(1, c.life / 0.8);
    cx.save();
    cx.globalAlpha = a;
    cx.translate(X(c.x), Y(c.y));
    cx.rotate(c.rot);
    cx.fillStyle = c.c;
    cx.fillRect(-S(c.w) / 2, -S(c.h) / 2, S(c.w), S(c.h));
    cx.restore();
  }
}

function drawFloats() {
  for (var i = 0; i < floats.length; i++) {
    var f = floats[i], a = Math.max(0, f.life / f.max);
    var pop = 1 + Math.max(0, (a - 0.75) * 2);      // pops in at ~1.5×, then settles
    cx.save();
    cx.globalAlpha = Math.min(1, a * 1.6);
    cx.font = "700 " + Math.max(10, S(f.s * pop)) + "px 'Chakra','Trebuchet MS',sans-serif";
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.lineWidth = Math.max(2, S(5));
    cx.strokeStyle = 'rgba(20,8,40,.85)';
    cx.strokeText(f.text, X(f.x), Y(f.y));
    cx.fillStyle = f.c;
    cx.fillText(f.text, X(f.x), Y(f.y));
    cx.restore();
  }
}

/* ══ 14. LOOP — ENGINE. Fixed 1/120 physics, render every rAF. ═══════════ */

var acc = 0, last = performance.now(), FIXED = 1 / 120;
var fpsBuf = [], fpsEl = document.getElementById('dbg-stat'), LAST_FPS = 60;

function frame(now) {
  // Pause cleanly when the ad is not visible: no wasted battery, and no giant dt
  // spike when it comes back.
  if (document.hidden) { last = now; acc = 0; requestAnimationFrame(frame); return; }

  var dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  TIME += dt; acc += dt;
  var guard = 0;
  while (acc >= FIXED && guard++ < 8) { step(FIXED); acc -= FIXED; }
  if (W) draw();

  fpsBuf.push(dt);
  if (fpsBuf.length > 45) {
    var sum = fpsBuf.reduce(function (a, b) { return a + b; }, 0);
    LAST_FPS = Math.round(fpsBuf.length / sum);
    fpsEl.textContent = Math.round(SIZE_BYTES / 1024) + ' KB · 0 requests · ' + LAST_FPS + ' fps';
    fpsBuf.length = 0;
    if (started) postMeta();   // keep the gallery's fps badge live
  }
  requestAnimationFrame(frame);
}

/* ══ 15. TEST HANDLE — ENGINE. tools/verify-playable.mjs drives this. ═════
   Every key below is part of the contract. Do not rename them.

   archetype:'runner' tells the harness this ad is steered LIVE. There is no
   aim-then-fire, so the harness wins it by HOLDING a drag along autopilotScreen()
   for the length of the run, instead of dragging a control and releasing it. */

window.__ad = {
  archetype: 'runner',
  get state()       { return W ? W.state : 'BOOT'; },
  get control()     { return W ? tOf(W) : 0.5; },
  get attempts()    { return attempts; },
  get hint()        { return W ? Math.max(W.hint, W.demo ? 1 : 0) : 0; },
  get fps()         { return LAST_FPS; },
  get assist()      { return ASSIST(); },
  get previewFrac() { return PREVIEW_FRAC(); },
  get crowd()       { return W ? W.crowd : 0; },
  get progress()    { return W ? clamp(W.dist / W.layout.wallD, 0, 1) : 0; },   // 0..1 along the track
  maxAssist: 0.35,
  events: EVENTS,
  layoutName:    function () { return VW / VH > 1.15 ? 'landscape' : 'portrait'; },
  sweep:         function (assist, n) { return sweep(layout(), assist, n); },
  controlScreen: function () { var p = controlPos(); return { x: X(p.x), y: Y(p.y) }; },
  setControl:    function (t) {
    if (!W) return;
    W.x = xFromT(W, clamp(t, 0, 1));
    W.target = W.x;
    W.touched = true; W.demo = false;
  },
  // Where a good player's thumb should be RIGHT NOW. The harness follows this to
  // play the run for real. Nothing in the shipped game reads it.
  autopilotScreen: function () {
    if (!W) return null;
    var L = W.layout;
    return { x: X(PX(L, idealAt(L, W.dist + 300), L.crowdZ)), y: Y(PY(L, L.crowdZ) - 26) };
  },
  fire: function () { /* a runner never commits — forward motion is automatic */ },

  // Both force* hooks FAST-FORWARD: they run the pure sim and jump straight to the
  // wall, so a forced fail and its retry land well inside the harness's 2.2s budget
  // even though a real run takes ~15s.
  forceWin: function () {
    if (!W || W.state !== 'RUN') return;
    var L = W.layout;
    var s = sweep(L, ASSIST(), 120);
    var t = s.perfect.length ? s.perfect[Math.floor(s.perfect.length / 2)]
          : s.band ? (s.band.lo + s.band.hi) / 2 : 0.5;
    var r = runSim(L, t, ASSIST());
    W.crowd = r.crowd; W.gates = r.gates; W.hazardHit = r.hazard;
    W.rowAt = L.rows.length;
    W.dist = L.wallD;
    W.x = xFromT(W, t); W.target = W.x;
    syncPuffs(W);
    hitWall();
  },
  forceFail: function () {
    if (!W || W.state !== 'RUN') return;
    var L = W.layout;
    var r = runSim(L, 0, ASSIST());
    W.crowd = r.crowd; W.gates = r.gates; W.hazardHit = r.hazard;
    W.rowAt = L.rows.length;
    W.dist = L.wallD;
    W.x = xFromT(W, 0); W.target = W.x;
    syncPuffs(W);
    failRun(W.crowd <= 0 ? 'wipe' : 'short');
  },
  // Dev-only: patch tuning/geometry and re-derive, so the run can be BALANCED by
  // sweeping rather than by guessing. Never used at runtime.
  tune: function (tPatch, lPatch) {
    if (tPatch) for (var k in tPatch) T[k] = tPatch[k];
    var L = layout();
    if (lPatch) for (var j in lPatch) L[j] = lPatch[j];
    L._ready = false; prep(L); resize(); resetAttempt(true);
    return { layout: L, band: sweep(L, 0, 200).band };
  }
};

/* ══ 16. GO ══════════════════════════════════════════════════════════════ */

resize();
resetAttempt(true);
requestAnimationFrame(frame);
bootWhenReady();

// Stamped in by tools/bake.mjs. Measuring it at runtime would cost a request, and
// this ad does not make any.
// Debug overlay: nothing on the glass by default. CONFIG.DEBUG or ?debug=1 shows
// the event ticker + size/fps tag for dev work; players never see either.
if (CONFIG.DEBUG || /[?&#]debug=1/.test(location.href)) {
  document.getElementById('dbg').classList.add('on');
}
fpsEl.textContent = Math.round(SIZE_BYTES / 1024) + ' KB · 0 requests · 60 fps';

})();
</script>
