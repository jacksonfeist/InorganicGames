name: Deploy to GitHub Pages

# NOTE: this replaces the old "deploy from branch root" setup. Before the first
# run, the repo's Pages source must be switched to "GitHub Actions" in
# Settings → Pages. Until that switch is made, this workflow will build but the
# deploy step will fail. The CNAME (inorganicgames.com) is committed at
# public/CNAME so Astro copies it into dist/ on every build.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
